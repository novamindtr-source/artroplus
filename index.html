  <style>

    .panel{overflow:hidden;margin-top:16px}.ph{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}.pht{font-size:16px;font-weight:950}.phs{font-size:12px;color:var(--muted);margin-top:3px}.pb{padding:18px}.toolbar{display:grid;grid-template-columns:1fr 180px 180px auto;gap:10px;margin-bottom:14px}.field{height:42px;border:1px solid var(--line);border-radius:11px;background:white;padding:0 12px;outline:0}.field:focus{border-color:#8ab7f3;box-shadow:0 0 0 3px rgba(23,105,224,.12)}textarea.field{height:auto;padding:10px 12px}.seg{display:flex;background:#edf2f8;border:1px solid var(--line);padding:4px;border-radius:12px;gap:4px}.seg button{border:0;background:transparent;color:#65758a;border-radius:9px;padding:8px 11px;font-size:12px;font-weight:950}.seg button.active{background:white;color:var(--blue);box-shadow:0 1px 2px rgba(16,24,40,.08)}
    table{width:100%;border-collapse:separate;border-spacing:0}th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#748399;text-align:left;background:#f5f8fc;border-bottom:1px solid var(--line);padding:12px}td{padding:13px 12px;border-bottom:1px solid #edf1f6;font-size:13px}tr:hover td{background:#fafcff}.mono{font-family:Consolas,monospace;font-weight:950}.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:950;border:1px solid}.tag.blue{background:#edf4ff;color:var(--blue);border-color:#cfdef7}.tag.green{background:#eaf9f2;color:var(--green);border-color:#c9efdf}.tag.red{background:#fff0f2;color:var(--red);border-color:#ffd2d8}.tag.amber{background:#fff7e8;color:var(--amber);border-color:#ffe1ad}.loc{display:inline-flex;align-items:center;gap:7px}.ld{width:9px;height:9px;border-radius:50%}.quick-wrap{grid-template-columns:repeat(4,1fr);margin-top:16px}.quick{padding:16px;text-align:left}.quick h3{margin:0;font-size:14px}.quick p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.empty{padding:42px;text-align:center;color:#7c8da3}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:14px;overflow:hidden;background:white;margin-top:16px}.day{min-height:116px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px}.day:nth-child(7n){border-right:0}.dn{font-size:12px;font-weight:950;color:#68778c}.event{margin-top:7px;border-left:3px solid var(--blue);background:#f1f6ff;border-radius:8px;padding:6px;font-size:11px}.event b{display:block;color:#15365c}
    .ops-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}.health{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:center}.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--green) var(--deg),#e7edf5 0);position:relative}.ring:after{content:"";position:absolute;inset:12px;background:#fff;border-radius:50%}.ring b{position:relative;z-index:1;font-size:24px}.risk-list{display:grid;gap:9px}.risk{display:grid;grid-template-columns:1fr auto;gap:10px;padding:11px;border:1px solid var(--line);border-radius:12px;background:#fbfdff}.risk strong{font-size:13px}.risk span{font-size:12px;color:var(--muted)}.mini-bars{display:grid;gap:9px}.mini-row{display:grid;grid-template-columns:135px 1fr 44px;gap:10px;align-items:center;font-size:12px;font-weight:850}.bar{height:9px;border-radius:999px;background:#e8eef6;overflow:hidden}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--cyan))}.print-note{display:none}.row-actions{display:flex;gap:6px;flex-wrap:wrap}.btn.xs{padding:6px 8px;border-radius:8px;font-size:11px}.panel.pro{border-color:#cbd8ea;box-shadow:0 12px 28px rgba(22,34,51,.08)}.ph .tools{margin-left:auto;display:flex;gap:8px;align-items:center}
    @media print{.side,.top,.hero .actions,.btn,.toolbar,.modal-bg,.toast{display:none!important}.app{display:block}.content{padding:0}.panel,.stat,.quick{box-shadow:none;break-inside:avoid}body{background:#fff}.print-note{display:block;color:#667589;font-size:12px;margin:10px 0}}
    .modal-bg{position:fixed;inset:0;background:rgba(5,12,21,.56);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal-bg.open{display:flex}.modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:white;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.32)}.mh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex}.mh h2{font-size:18px;margin:0;font-weight:950}.x{margin-left:auto;border:0;background:#f1f5f9;border-radius:10px;width:34px;height:34px}.mb{padding:20px}.mf{padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#f9fbfd}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.label{display:block;font-size:11px;color:#68778c;text-transform:uppercase;font-weight:950;letter-spacing:.05em;margin:0 0 6px}.toast{position:fixed;right:22px;bottom:22px;background:#102033;color:white;padding:13px 15px;border-radius:12px;box-shadow:var(--shadow);font-weight:850;display:none;z-index:60}.toast.show{display:block}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:40;transform:translateX(-100%);transition:.2s}.side.open{transform:translateX(0)}.menu{display:inline-flex}.stats,.quick-wrap{grid-template-columns:1fr 1fr}.toolbar{grid-template-columns:1fr 1fr}.search{display:none}.content{padding:18px}}@media(max-width:700px){.stats,.quick-wrap,.form{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.hero h1{font-size:22px}.calendar{grid-template-columns:1fr}.day{min-height:auto;border-right:0}.hide-sm{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside id="side" class="side">
    <div class="brand"><div class="mark">A+</div><div><div class="btitle">ARTROPLUS</div><div class="bsub">Kurumsal Platform</div></div></div>
    <div class="nav-title">Ana Menü</div>
    <button class="nav active" data-page="dashboard"><span class="ico">▦</span>Dashboard</button>
    <button class="parent active" data-toggle="depo"><span class="ico">▣</span>Depo Yönetimi <span class="chev">⌄</span></button>
    <div class="children open" id="g-depo">
      <button class="nav child" data-page="stock">Stok Yönetimi</button>
      <button class="nav child" data-page="movements">Ürün Hareket İşlemleri</button>
      <button class="nav child" data-page="consignment">Konsinye Paneli</button>
      <button class="nav child" data-page="products">Ürün Kartları</button>
    </div>
    <button class="parent" data-toggle="ops"><span class="ico">◫</span>Operasyon <span class="chev">⌄</span></button>
    <div class="children" id="g-ops"><button class="nav child" data-page="calendar">Ameliyat Programı</button><button class="nav child" data-page="assignments">Personel Atama</button></div>
    <div class="nav-title">Yönetim</div><button class="nav" data-page="reports"><span class="ico">◱</span>Raporlar</button><button class="nav" data-page="settings"><span class="ico">⚙</span>Ayarlar</button>
    <div class="user"><div class="ucard"><div class="avatar">M</div><div><b>Mehmet Yönetici</b><div class="urole">Yönetici erişimi</div></div></div></div>
  </aside>
  <main>
    <header class="top"><button class="btn menu" id="menu">☰</button><div><div class="kicker">Kurumsal Operasyon</div><div class="ptitle" id="title">Dashboard</div></div><div class="search"><span>⌕</span><input id="q" placeholder="REF, LOT, hastane, doktor veya işlem ara"></div><div class="pill hide-sm"><span class="dot"></span>Sistem aktif</div><div class="pill" id="date"></div></header>
    <section class="content" id="app"></section>
  </main>
</div>
<div class="modal-bg" id="modal"></div><div class="toast" id="toast"></div>
<script>
(()=>{const KEY="artroplus_enterprise_v2";const C=["#1769e0","#0f9f6e","#d98b05","#7256d9","#0794b8","#d94452"];let page="dashboard",query="",mode="all",locFilter="",searchTimer=null;
const uid=()=>Math.random().toString(36).slice(2,9);const today=()=>new Date().toISOString().slice(0,10);
const seed=()=>{const p=[["AR-6430","Meniskus Tamir Sistemi","Arthrex",4],["AR-6562","ACL TightRope","Arthrex",3],["72203804","Suture Anchor","Smith+Nephew",5],["KCM-0306CN","Rejoin Implant","Rejoin",2],["00-5950-040-00","Zimmer Drill Guide","Zimmer",2]].map(x=>({id:uid(),ref:x[0],name:x[1],brand:x[2],unit:"adet",min:x[3]}));return{products:p,hospitals:[["ana","Ana Depo","depot",C[0]],["fulya","Acibadem Fulya","hospital",C[1]],["maslak","Acibadem Maslak","hospital",C[2]],["sisli","Memorial Şişli","hospital",C[3]],["atasehir","Acibadem Ataşehir","hospital",C[4]]].map(x=>({id:x[0],name:x[1],type:x[2],color:x[3]})),doctors:["Mahir Mahiroğulları","Umut Akgün"],surgeryTypes:["ACL","Menisküs Tamiri","Rotator Cuff"],personnel:["Tevrat Metin","Ozan Coşar"],stock:[st(p[0].id,"ana","25071016",18,"2028-10-01"),st(p[0].id,"fulya","25071016",3,"2028-10-01"),st(p[0].id,"maslak","25071016",4,"2028-10-01"),st(p[1].id,"ana","508017",9,"2027-08-16"),st(p[2].id,"ana","5092158741",12,"2029-02-20"),st(p[3].id,"ana","2605048",6,"2027-12-05"),st(p[4].id,"sisli","15448556",2,"2028-05-05")],moves:[],surgeries:[{id:uid(),date:today(),time:"08:00",doctor:"Mahir Mahiroğulları",hospital:"Memorial Şişli",type:"ACL",personnel:"Tevrat Metin"},{id:uid(),date:today(),time:"10:30",doctor:"Umut Akgün",hospital:"Acibadem Maslak",type:"Menisküs Tamiri",personnel:"Ozan Coşar"}]}};function st(productId,locationId,lot,qty,exp){return{id:uid(),productId,locationId,lot,qty,exp}}let db=JSON.parse(localStorage.getItem(KEY)||"null")||seed();migrate();const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function migrate(){db.hospitals=db.hospitals||[{id:"ana",name:"Ana Depo",type:"depot",color:C[0]}];if(!db.hospitals.some(x=>x.id=="ana"))db.hospitals.unshift({id:"ana",name:"Ana Depo",type:"depot",color:C[0]});db.doctors=db.doctors||[...new Set((db.surgeries||[]).map(x=>x.doctor).filter(Boolean))];db.surgeryTypes=db.surgeryTypes||[...new Set((db.surgeries||[]).map(x=>x.type).filter(Boolean))];db.personnel=db.personnel||[...new Set((db.surgeries||[]).map(x=>x.personnel).filter(Boolean))];db.stock=db.stock||[];db.moves=db.moves||[];db.products=db.products||[];db.surgeries=db.surgeries||[]}
const p=id=>db.products.find(x=>x.id===id)||{};const h=id=>db.hospitals.find(x=>x.id===id)||{name:"Lokasyon yok",color:"#64748b"};const txt=v=>String(v||"").toLocaleLowerCase("tr-TR");const toast=m=>{let t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400)};
const ana=(pid,lot="")=>db.stock.filter(s=>s.productId===pid&&s.locationId==="ana"&&(!lot||s.lot===lot)).reduce((a,s)=>a+s.qty,0);const total=()=>db.stock.reduce((a,s)=>a+s.qty,0);const stat=s=>s.qty<=0?["Tükendi","red"]:s.qty<=p(s.productId).min?["Kritik","amber"]:["Normal","green"];
function hero(t,c,a=""){return`<div class="hero"><h1>${t}</h1><p>${c}</p><div class="actions">${a}</div></div>`}function stats(){let crit=db.stock.filter(s=>stat(s)[0]!="Normal").length,cons=db.stock.filter(s=>h(s.locationId).type=="hospital").reduce((a,s)=>a+s.qty,0);return`<div class="grid stats"><div class="stat"><div class="sl">Toplam Stok</div><div class="sv blue">${total()}</div><div class="sf">Ana depo + konsinye</div></div><div class="stat"><div class="sl">Ana Depo</div><div class="sv green">${db.stock.filter(s=>s.locationId=="ana").reduce((a,s)=>a+s.qty,0)}</div><div class="sf">Raf adedi</div></div><div class="stat"><div class="sl">Konsinye</div><div class="sv amber">${cons}</div><div class="sf">Hastane stokları</div></div><div class="stat"><div class="sl">Aksiyon</div><div class="sv red">${crit}</div><div class="sf">Kritik / tükenmiş lot</div></div></div>`}
function healthPanel(){let rows=db.stock,ok=rows.filter(s=>stat(s)[0]=="Normal").length,score=rows.length?Math.round(ok/rows.length*100):100,deg=Math.max(0,Math.min(100,score))*3.6,risks=riskRows().slice(0,4);return`<div class="ops-grid"><div class="panel"><div class="ph"><div><div class="pht">Operasyon Sağlığı</div><div class="phs">Stok dengesi, ana depo gücü ve konsinye dağılımı</div></div><button class="btn soft" data-print="1">Yazdır</button></div><div class="pb health"><div class="ring" style="--deg:${deg}deg"><b>${score}%</b></div><div class="mini-bars">${db.hospitals.map(x=>{let q=db.stock.filter(s=>s.locationId==x.id).reduce((a,s)=>a+s.qty,0),w=total()?Math.round(q/total()*100):0;return`<div class="mini-row"><span>${x.name}</span><div class="bar"><i style="width:${w}%;background:${x.color}"></i></div><b>${q}</b></div>`}).join("")}</div></div></div><div class="panel"><div class="ph"><div><div class="pht">Aksiyon Kuyruğu</div><div class="phs">Öncelikli kontrol gereken kayıtlar</div></div><span class="pill">${risks.length} kayıt</span></div><div class="pb risk-list">${risks.map(r=>`<div class="risk"><div><strong>${p(r.productId).ref} / ${r.lot||"LOT yok"}</strong><br><span>${h(r.locationId).name} - ${r.reason}</span></div><span class="tag ${r.cls}">${r.qty}</span></div>`).join("")||`<div class="empty">Aksiyon bekleyen kritik kayıt yok</div>`}</div></div></div>`}
function riskRows(){let now=new Date();return db.stock.map(s=>{let exp=s.exp?Math.ceil((new Date(s.exp+"T12:00:00")-now)/86400000):9999,st=stat(s);let reason=st[0]!="Normal"?st[0]:exp<0?"SKT geçmiş":exp<=120?"SKT yaklaşıyor":"";let cls=reason.includes("geç")||st[1]=="red"?"red":reason?"amber":"green";return{...s,reason,cls,priority:reason.includes("geç")?1:st[1]=="red"?2:st[1]=="amber"?3:exp<=120?4:99}}).filter(x=>x.priority<99).sort((a,b)=>a.priority-b.priority||p(a.productId).ref.localeCompare(p(b.productId).ref,"tr"))}
function csv(name,headers,rows){let esc=v=>`"${String(v??"").replace(/"/g,'""')}"`,data=[headers.join(","),...rows.map(r=>headers.map(h=>esc(r[h])).join(","))].join("\\n"),blob=new Blob(["\\ufeff"+data],{type:"text/csv;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);toast("CSV hazırlandı")}
function match(s){if(!query)return true;let pr=p(s.productId),ho=h(s.locationId);return txt([pr.ref,pr.name,pr.brand,s.lot,ho.name,s.qty,s.exp].join(" ")).includes(txt(query))}
function stockRows(filter=locFilter){return db.stock.filter(s=>(!filter||s.locationId==filter)&&match(s)).sort((a,b)=>(p(a.productId).ref||"").localeCompare(p(b.productId).ref||"","tr")||a.lot.localeCompare(b.lot,"tr"))}

function refreshLots(){let pid=val("mProduct"),loc=val("mLoc"),type=val("mType"),lots=[...new Set(db.stock.filter(s=>s.productId==pid&&((type=="consign"&&s.locationId=="ana")||(type=="return"&&s.locationId==loc)||type=="out"||type=="receipt")).map(s=>s.lot).filter(Boolean))];document.getElementById("mLots").innerHTML=lots.map(l=>`<option value="${l}"></option>`).join("")}
function syncMoveForm(){let type=val("mType"),pid=val("mProduct"),lot=val("mLot");let label={receipt:"Giriş Lokasyonu",consign:"Hedef Hastane",return:"Kaynak Hastane",out:"Çıkış Lokasyonu"}[type]||"Lokasyon";document.getElementById("mLocLabel").textContent=label;let loc=document.getElementById("mLoc"),current=loc.value;loc.innerHTML=locationOptionsFor(type,pid,lot);if([...loc.options].some(o=>o.value==current))loc.value=current;if(type=="receipt")loc.value="ana";refreshLots()}
function wireMoveForm(){let type=document.getElementById("mType"),search=document.getElementById("mSearch"),prod=document.getElementById("mProduct"),loc=document.getElementById("mLoc"),lot=document.getElementById("mLot");type.onchange=syncMoveForm;search.oninput=()=>{let keep=prod.value;prod.innerHTML=productOptions(search.value);if([...prod.options].some(o=>o.value==keep))prod.value=keep;syncMoveForm()};prod.onchange=syncMoveForm;loc.onchange=refreshLots;lot.oninput=syncMoveForm;syncMoveForm()}
function row(pid,loc,lot){return db.stock.find(s=>s.productId==pid&&s.locationId==loc&&s.lot==lot)}function addStock(pid,loc,lot,qty,exp){let r=row(pid,loc,lot);if(r)r.qty+=qty;else db.stock.push(st(pid,loc,lot,qty,exp))}
function saveMove(){let type=val("mType"),pid=val("mProduct"),lot=val("mLot").toUpperCase(),qty=+val("mQty")||1,loc=val("mLoc"),sourceLoc=loc,note=val("mNote");if(!pid)return toast("Ürün seçin");if(type!="receipt"&&!lot)return toast("LOT girin veya listeden seçin");if(type=="receipt"){addStock(pid,"ana",lot,qty,val("mExp"));loc="ana";note=note||"Ana depo stok giriş"}if(type=="consign"){if(loc=="ana")return toast("Hedef hastane seçin");let r=row(pid,"ana",lot);if(!r||r.qty<qty)return toast(`Ana Depo yeterli değil. Raf adedi: ${r?r.qty:0}`);r.qty-=qty;addStock(pid,loc,lot,qty,r.exp);note=note||`Ana Depo → ${h(loc).name} konsinye sevk`}if(type=="return"){if(loc=="ana")return toast("Kaynak hastane seçin");let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast(`${h(loc).name} stokunda yeterli adet yok`);r.qty-=qty;addStock(pid,"ana",lot,qty,r.exp);loc="ana";note=note||`${h(sourceLoc).name} → Ana Depo geri alım`}if(type=="out"){let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast("Seçili lokasyonda yeterli stok yok");r.qty-=qty;note=note||"Stok çıkış"}db.moves.push({id:uid(),date:new Date().toISOString(),type,productId:pid,locationId:loc,sourceLocationId:sourceLoc,lot,qty,note});db.stock=db.stock.filter(s=>s.qty>0);save();close();toast("Hareket kaydedildi");render()}
function barcodeModal(){modal("Honeywell Barkod Okutma",`<label><span class="label">Barkod / GS1 DataMatrix</span><textarea class="field" id="barcode" rows="4" placeholder="Barkodu okutun veya yapıştırın"></textarea></label><div id="bResult" class="stat" style="margin-top:12px">Sonuç bekleniyor</div>`,`<button class="btn" id="cancel">İptal</button><button class="btn soft" id="parse">Çözümle</button><button class="btn primary" id="bIn">Ana Depoya Giriş Yap</button>`);document.getElementById("cancel").onclick=close;document.getElementById("parse").onclick=()=>{let b=parseB(val("barcode"));document.getElementById("bResult").innerHTML=`<b>REF:</b> ${b.ref||"-"} &nbsp; <b>LOT:</b> ${b.lot||"-"} &nbsp; <b>SKT:</b> ${b.exp||"-"} &nbsp; <b>Adet:</b> ${b.qty}`};document.getElementById("bIn").onclick=()=>{let b=parseB(val("barcode")),pr=db.products.find(x=>x.ref==b.ref)||db.products[0];close();moveModal("receipt");setTimeout(()=>{document.getElementById("mProduct").value=pr.id;document.getElementById("mLot").value=b.lot;document.getElementById("mQty").value=b.qty;document.getElementById("mExp").value=b.exp},20)}}
function parseB(raw){let t=String(raw||"").replace(/[\x1d\n\r\t]/g," "),ref=(t.match(/(?:REF|240|241)[:\s]*([A-Z0-9-]+)/i)||[])[1]||"",lot=(t.match(/(?:LOT|10)[:\s]*([A-Z0-9-]+)/i)||[])[1]||"",qty=+(t.match(/(?:QTY|30)[:\s]*(\d+)/i)||[])[1]||1,exp=(t.match(/(?:17|SKT|EXP)[:\s]*(\d{6}|\d{4}-\d{2}-\d{2})/i)||[])[1]||"";if(/^\d{6}$/.test(exp))exp=`20${exp.slice(0,2)}-${exp.slice(2,4)}-${exp.slice(4,6)}`;return{ref,lot,qty,exp}}
function surgeryModal(date=today()){modal("Ameliyat Ekle",`<div class="form"><label><span class="label">Tarih</span><input class="field" id="sDate" type="date" value="${date}"></label><label><span class="label">Saat</span><input class="field" id="sTime" type="time" value="08:00"></label><label><span class="label">Doktor</span><select class="field" id="sDoc"><option value="">Doktor seçin</option>${optList(db.doctors)}</select></label><label><span class="label">Hastane</span><select class="field" id="sHosp"><option value="">Hastane seçin</option>${optsH(false)}</select></label><label><span class="label">Ameliyat Türü</span><select class="field" id="sType"><option value="">Tür seçin</option>${optList(db.surgeryTypes)}</select></label><label><span class="label">Personel</span><select class="field" id="sPer"><option value="">Personel seçin</option>${optList(db.personnel)}</select></label></div><div class="phs" style="margin-top:12px">Liste boşsa Ayarlar > Tanımlar ekranından doktor, hastane, ameliyat türü ve personel ekleyin.</div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveS">Kaydet</button>`);document.getElementById("cancel").onclick=close;document.getElementById("saveS").onclick=()=>{if(!val("sDoc")||!val("sHosp")||!val("sType"))return toast("Doktor, hastane ve ameliyat türü seçin");db.surgeries.push({id:uid(),date:val("sDate"),time:val("sTime"),doctor:val("sDoc"),hospital:h(val("sHosp")).name,type:val("sType"),personnel:val("sPer")||""});save();close();toast("Ameliyat eklendi");render()}}
function exportStock(){let rows=stockRows().map(s=>{let pr=p(s.productId),ho=h(s.locationId),st=stat(s);return{REF:pr.ref,Urun:pr.name,Marka:pr.brand,LOT:s.lot,Lokasyon:ho.name,Adet:s.qty,AnaDepoRaf:ana(s.productId,s.lot),SKT:s.exp||"",Durum:st[0]}});csv("artroplus-stok.csv",["REF","Urun","Marka","LOT","Lokasyon","Adet","AnaDepoRaf","SKT","Durum"],rows)}
function exportMoves(){let rows=moveRows().map(m=>({Tarih:new Date(m.date).toLocaleString("tr-TR"),Tip:label(m.type),REF:p(m.productId).ref,LOT:m.lot,Lokasyon:moveLocation(m),Adet:m.qty,AnaDepoRaf:ana(m.productId,m.lot),Aciklama:m.note||""}));csv("artroplus-hareketler.csv",["Tarih","Tip","REF","LOT","Lokasyon","Adet","AnaDepoRaf","Aciklama"],rows)}
function scheduleSearch(value){clearTimeout(searchTimer);searchTimer=setTimeout(()=>{query=value;render()},320)}
function go(pg){page=pg;document.getElementById("side").classList.remove("open");render()}function bind(){document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>go(b.dataset.page));document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>go(b.dataset.goto));document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>document.getElementById("g-"+b.dataset.toggle).classList.toggle("open"));document.querySelectorAll(".local").forEach(i=>i.oninput=e=>scheduleSearch(e.target.value));document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});document.querySelectorAll("[data-export]").forEach(b=>b.onclick=()=>b.dataset.export=="moves"?exportMoves():exportStock());document.querySelectorAll("[data-print]").forEach(b=>b.onclick=()=>window.print());document.querySelectorAll("[data-def]").forEach(b=>b.onclick=()=>defModal(b.dataset.def));document.querySelectorAll("[data-edit-def]").forEach(b=>b.onclick=()=>defModal(b.dataset.editDef,+b.dataset.index));document.querySelectorAll("[data-del-def]").forEach(b=>b.onclick=()=>deleteDef(b.dataset.delDef,+b.dataset.index));document.querySelectorAll("[data-product-edit]").forEach(b=>b.onclick=()=>productModal(b.dataset.productEdit));document.querySelectorAll("[data-product-del]").forEach(b=>b.onclick=()=>deleteProduct(b.dataset.productDel));document.querySelectorAll("[data-stock-edit]").forEach(b=>b.onclick=()=>stockModal(b.dataset.stockEdit));document.querySelectorAll("[data-stock-del]").forEach(b=>b.onclick=()=>deleteStock(b.dataset.stockDel));document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>{let a=b.dataset.action;if(a=="product")productModal();if(a=="movement")moveModal();if(a=="receipt")moveModal("receipt");if(a=="consign")moveModal("consign");if(a=="return")moveModal("return");if(a=="barcode")barcodeModal();if(a=="surgery")surgeryModal(b.dataset.date||today())});let loc=document.getElementById("loc");if(loc)loc.onchange=()=>{locFilter=loc.value;render()};let clear=document.getElementById("clearDemo");if(clear)clear.onclick=clearDemo;let r=document.getElementById("reset");if(r)r.onclick=()=>{localStorage.removeItem(KEY);db=seed();migrate();save();toast("Demo veri sıfırlandı");render()}}
function render(){document.getElementById("title").textContent={dashboard:"Dashboard",stock:"Stok Yönetimi",movements:"Ürün Hareket İşlemleri",consignment:"Konsinye Paneli",products:"Ürün Kartları",calendar:"Ameliyat Programı",assignments:"Personel Atama",reports:"Raporlar",settings:"Ayarlar"}[page];document.getElementById("date").textContent=new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"});document.querySelectorAll(".nav").forEach(b=>b.classList.toggle("active",b.dataset.page==page));document.getElementById("app").innerHTML=(V[page]||V.dashboard)();bind()}document.getElementById("q").oninput=e=>scheduleSearch(e.target.value);document.getElementById("menu").onclick=()=>document.getElementById("side").classList.add("open");document.getElementById("modal").onclick=e=>{if(e.target.id=="modal")close()};render();
})();
</script>
