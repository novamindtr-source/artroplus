<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SurgiFlow Enterprise</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
    }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .timeline-row:hover {
      background: rgba(255,255,255,0.02);
    }

    .card-hover {
      transition: all .2s ease;
    }

    .card-hover:hover {
      transform: translateY(-2px);
      border-color: rgba(59,130,246,.35);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    /* =========================================================
       SUPABASE
    ========================================================= */

    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    /* =========================================================
       GS1 PARSER
    ========================================================= */

    function parseGS1(raw) {
      const result = {
        gtin: "",
        lot: "",
        serial: "",
        expiryDate: null,
        mfgDate: null,
        qty: 1,
        ref: "",
        udi: String(raw || "").trim()
      };

      if (!raw) return result;

      let s = raw.replace(/^\].[0-9]/, "").trim();

      const aiPairs = [];

      s.replace(/\((\d{2,4})\)\s*([^\(]+)/g, (_, ai, val) => {
        aiPairs.push([ai, val.trim()]);
        return "";
      });

      const applyAI = (ai, val) => {
        switch (ai) {
          case "01":
            result.gtin = val;
            result.ref = val.replace(/^0+/, "");
            break;

          case "10":
            result.lot = val;
            break;

          case "21":
            result.serial = val;
            break;

          case "17":
            if (val.length === 6) {
              const year = 2000 + parseInt(val.slice(0, 2), 10);
              const month = val.slice(2, 4);
              const day = val.slice(4, 6);
              result.expiryDate = `${year}-${month}-${day}`;
            }
            break;
        }
      };

      if (aiPairs.length > 0) {
        aiPairs.forEach(([ai, val]) => applyAI(ai, val));
      }

      return result;
    }

    /* =========================================================
       DASHBOARD CARD
    ========================================================= */

    function DashboardCard({ title, value, color = "text-cyan-300" }) {
      return (
        <div className="glass rounded-3xl p-5 card-hover">
          <div className="text-slate-400 text-sm">
            {title}
          </div>

          <div className={`text-4xl font-black mt-3 ${color}`}>
            {value}
          </div>
        </div>
      );
    }

    /* =========================================================
       APP
    ========================================================= */

    function App() {
      const [products, setProducts] = useState([
        {
          id: 1,
          kod: "AR-2323BCC",
          ad: "Femoral Component Titanium",
          min_stok: 5
        },
        {
          id: 2,
          kod: "AR-8892TIB",
          ad: "Tibial Plate",
          min_stok: 3
        }
      ]);

      const [stocks, setStocks] = useState([
        {
          id: 1,
          urun_id: 1,
          lot: "15485965",
          miktar: 12,
          skt: "2029-07-31"
        },
        {
          id: 2,
          urun_id: 1,
          lot: "15485966",
          miktar: 8,
          skt: "2029-08-10"
        },
        {
          id: 3,
          urun_id: 2,
          lot: "6621123",
          miktar: 2,
          skt: "2028-12-20"
        }
      ]);

      const [surgeries] = useState([
        {
          id: 1,
          type: "Total Diz Protezi",
          doctor: "Ahmet Yılmaz",
          time: "09:30"
        },
        {
          id: 2,
          type: "Kalça Revizyon",
          doctor: "Mehmet Kaya",
          time: "14:00"
        }
      ]);

      const [search, setSearch] = useState("");
      const [barcode, setBarcode] = useState("");
      const [parsed, setParsed] = useState(null);

      const filteredProducts = useMemo(() => {
        return products.filter((p) => {
          const q = search.toLowerCase();

          return (
            p.kod.toLowerCase().includes(q) ||
            p.ad.toLowerCase().includes(q)
          );
        });
      }, [products, search]);

      function totalStock(productId) {
        return stocks
          .filter((s) => s.urun_id === productId)
          .reduce((a, b) => a + b.miktar, 0);
      }

      function processBarcode() {
        const result = parseGS1(barcode);
        setParsed(result);

        if (!result.ref || !result.lot) {
          alert("GS1 barkod çözümlenemedi");
          return;
        }

        alert(`REF: ${result.ref}\nLOT: ${result.lot}`);
      }

      const FULL_DAY_HOURS = Array.from(
        { length: 24 },
        (_, i) => `${String(i).padStart(2, "0")}:00`
      );

      return (
        <div className="min-h-screen p-4 md:p-6">
          <div className="max-w-7xl mx-auto space-y-6">

            {/* HEADER */}
            <div className="flex flex-wrap gap-4 items-center justify-between">
              <div>
                <h1 className="text-4xl md:text-5xl font-black tracking-tight bg-gradient-to-r from-cyan-300 to-blue-500 bg-clip-text text-transparent">
                  SurgiFlow Enterprise
                </h1>

                <div className="text-slate-400 mt-2 text-sm md:text-base">
                  GS1 • LOT • REF • Realtime • Audit Safe
                </div>
              </div>

              <div className="flex flex-wrap gap-2 w-full xl:w-auto">
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="REF / ürün ara"
                  className="bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:border-blue-500 w-full md:w-[240px]"
                />

                <input
                  value={barcode}
                  onChange={(e) => setBarcode(e.target.value)}
                  placeholder="GS1 barkod okut"
                  className="bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:border-blue-500 w-full md:w-[340px]"
                />

                <button
                  onClick={processBarcode}
                  className="bg-blue-600 hover:bg-blue-500 transition px-6 py-3 rounded-2xl font-bold w-full md:w-auto"
                >
                  Barkod İşle
                </button>
              </div>
            </div>

            {/* PARSED RESULT */}
            {parsed && (
              <div className="glass rounded-3xl p-5 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                  <div className="text-slate-500 text-xs">REF</div>
                  <div className="font-mono font-bold text-cyan-300 mt-1">{parsed.ref || "-"}</div>
                </div>

                <div>
                  <div className="text-slate-500 text-xs">LOT</div>
                  <div className="font-mono font-bold mt-1">{parsed.lot || "-"}</div>
                </div>

                <div>
                  <div className="text-slate-500 text-xs">GTIN</div>
                  <div className="font-mono font-bold mt-1 break-all">{parsed.gtin || "-"}</div>
                </div>

                <div>
                  <div className="text-slate-500 text-xs">SKT</div>
                  <div className="font-mono font-bold mt-1">{parsed.expiryDate || "-"}</div>
                </div>
              </div>
            )}

            {/* DASHBOARD */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
              <DashboardCard title="Toplam Ürün" value={products.length} />
              <DashboardCard title="Aktif LOT" value={stocks.length} />
              <DashboardCard title="Bugünkü Ameliyat" value={surgeries.length} color="text-emerald-300" />
              <DashboardCard
                title="Kritik Stok"
                value={stocks.filter((s) => s.miktar <= 2).length}
                color="text-red-400"
              />
            </div>

            {/* STOCK TABLE */}
            <div className="glass rounded-3xl overflow-hidden">
              <div className="p-5 border-b border-white/5 flex items-center justify-between">
                <div>
                  <h2 className="text-xl font-black">LOT Bazlı Stok Yönetimi</h2>
                  <div className="text-slate-500 text-sm mt-1">
                    REF merkezli medikal stok mimarisi
                  </div>
                </div>
              </div>

              <div className="divide-y divide-white/5">
                {filteredProducts.map((u) => {
                  const miktar = totalStock(u.id);
                  const critical = miktar <= u.min_stok;

                  return (
                    <div
                      key={u.id}
                      className="p-5 flex flex-col xl:flex-row gap-4 xl:items-center justify-between"
                    >
                      <div className="min-w-0 flex-1">
                        <div className="font-mono text-cyan-300 font-black text-lg tracking-wider">
                          {u.kod}
                        </div>

                        <div className="text-slate-400 text-sm truncate mt-1">
                          {u.ad}
                        </div>
                      </div>

                      <div className="flex flex-wrap gap-2 flex-1">
                        {stocks
                          .filter((s) => s.urun_id === u.id)
                          .map((s) => (
                            <div
                              key={s.id}
                              className="px-3 py-2 rounded-2xl bg-slate-800 border border-white/5 text-xs"
                            >
                              <div className="text-slate-500">LOT</div>
                              <div className="font-mono font-bold mt-1">
                                {s.lot}
                              </div>
                              <div className="mt-1 text-cyan-300">
                                {s.miktar} adet
                              </div>
                            </div>
                          ))}
                      </div>

                      <div className={`text-right text-3xl font-black w-24 ${critical ? 'text-red-400' : 'text-emerald-300'}`}>
                        {miktar}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* TIMELINE */}
            <div className="glass rounded-3xl overflow-hidden">
              <div className="p-5 border-b border-white/5">
                <h2 className="text-xl font-black">24 Saat Ameliyat Timeline</h2>
              </div>

              <div className="max-h-[720px] overflow-y-auto divide-y divide-white/5">
                {FULL_DAY_HOURS.map((hour) => {
                  const matched = surgeries.filter((s) =>
                    s.time.startsWith(hour.split(':')[0])
                  );

                  return (
                    <div
                      key={hour}
                      className="timeline-row grid grid-cols-[90px_1fr] min-h-[90px]"
                    >
                      <div className="border-r border-white/5 p-4 text-slate-500 font-mono font-bold">
                        {hour}
                      </div>

                      <div className="p-3 flex flex-col gap-2 justify-center">
                        {matched.length === 0 && (
                          <div className="text-slate-700 text-sm italic">
                            Planlı operasyon yok
                          </div>
                        )}

                        {matched.map((s) => (
                          <div
                            key={s.id}
                            className="bg-blue-500/10 border-l-4 border-blue-500 rounded-2xl p-4 hover:bg-blue-500/20 transition cursor-pointer"
                          >
                            <div className="flex flex-wrap items-center justify-between gap-3">
                              <div>
                                <div className="font-bold text-lg">
                                  {s.type}
                                </div>

                                <div className="text-sm text-slate-400 mt-1">
                                  Dr. {s.doctor}
                                </div>
                              </div>

                              <div className="bg-blue-500/20 text-blue-200 px-3 py-1 rounded-xl text-xs font-bold">
                                {s.time}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
