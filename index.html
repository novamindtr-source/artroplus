<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artroplus | Kurumsal Operasyon Platformu</title>
  <style>
    :root{--bg:#eef3f8;--card:#fff;--ink:#102033;--muted:#667589;--line:#dbe4ef;--nav:#071321;--blue:#1769e0;--green:#0f9f6e;--amber:#d98b05;--red:#d94452;--violet:#7256d9;--cyan:#0794b8;--shadow:0 18px 44px rgba(22,34,51,.11);--r:14px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(120deg,#eef3f8,#f8fbff);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:276px 1fr}.side{background:linear-gradient(180deg,var(--nav),#06101c);color:#d8e6f7;padding:18px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}.brand{display:flex;gap:12px;align-items:center;padding:8px 10px 20px}.mark{width:42px;height:42px;border-radius:12px;background:#fff;color:var(--blue);display:grid;place-items:center;font-weight:950}.btitle{font-weight:950}.bsub{font-size:10px;color:#7f92aa;font-weight:900;letter-spacing:.09em;text-transform:uppercase;margin-top:4px}
    .nav-title{font-size:10px;color:#61758f;text-transform:uppercase;letter-spacing:.11em;font-weight:950;margin:16px 10px 8px}.nav,.parent{width:100%;border:0;background:transparent;color:#aebdd0;border-radius:10px;display:flex;align-items:center;gap:10px;padding:11px 12px;text-align:left;font-weight:850;margin:2px 0}.nav:hover,.parent:hover{background:rgba(255,255,255,.06);color:#fff}.nav.active,.parent.active{background:linear-gradient(90deg,rgba(23,105,224,.34),rgba(23,105,224,.08));color:#fff;box-shadow:inset 3px 0 0 #5ca8ff}.ico{width:22px;text-align:center;color:#8fb8ee}.chev{margin-left:auto;color:#6f83a0}.children{padding-left:16px;border-left:1px solid rgba(255,255,255,.08);margin:4px 0 8px 22px;display:none}.children.open{display:block}.child{font-size:13px;min-height:36px;padding:8px 10px}.user{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}.ucard{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:center}.avatar{width:34px;height:34px;border-radius:10px;background:var(--blue);display:grid;place-items:center;font-weight:950;color:white}.urole{font-size:11px;color:#7f92aa}
    .top{height:72px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 26px;position:sticky;top:0;z-index:8}.menu{display:none}.kicker{font-size:11px;color:#7a8aa0;font-weight:950;text-transform:uppercase;letter-spacing:.08em}.ptitle{font-size:18px;font-weight:950}.search{margin-left:auto;max-width:430px;flex:1;position:relative}.search input{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;padding:0 14px 0 38px;background:#f8fafc}.search span{position:absolute;left:14px;top:11px;color:#8aa0b8}.pill{display:inline-flex;gap:7px;align-items:center;padding:9px 12px;border:1px solid var(--line);background:white;border-radius:999px;font-size:12px;font-weight:900;color:#506176}.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
    .content{padding:26px;max-width:1680px}.hero{background:linear-gradient(135deg,#0b1d31,#123d68 58%,#0f7b9c);color:white;border-radius:18px;padding:24px;box-shadow:var(--shadow);overflow:hidden}.hero h1{margin:0;font-size:28px}.hero p{margin:8px 0 0;color:#c8d8ea;max-width:850px;line-height:1.5}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{border:1px solid transparent;border-radius:11px;padding:10px 14px;font-weight:900;background:white;color:var(--ink)}.btn.primary{background:linear-gradient(180deg,var(--blue),#0d4fb3);color:white}.btn.ghost{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:white}.btn.soft{background:#edf4ff;color:var(--blue);border-color:#cfe0fb}.btn.green{background:#e9f8f2;color:var(--green);border-color:#c8efdf}.btn.red{background:#fff0f2;color:var(--red);border-color:#ffd2d8}.btn.dark{background:#102033;color:white}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,1fr);margin-top:18px}.stat,.panel,.quick{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 1px 2px rgba(16,24,40,.06)}.stat{padding:18px}.sl{font-size:12px;color:var(--muted);font-weight:950}.sv{font-size:31px;font-weight:950;margin-top:8px}.sf{font-size:12px;color:#8190a3;margin-top:8px}.blue{color:var(--blue)}.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}
    .panel{overflow:hidden;margin-top:16px}.ph{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}.pht{font-size:16px;font-weight:950}.phs{font-size:12px;color:var(--muted);margin-top:3px}.pb{padding:18px}.toolbar{display:grid;grid-template-columns:1fr 180px 180px auto;gap:10px;margin-bottom:14px}.field{height:42px;border:1px solid var(--line);border-radius:11px;background:white;padding:0 12px;outline:0}.field:focus{border-color:#8ab7f3;box-shadow:0 0 0 3px rgba(23,105,224,.12)}textarea.field{height:auto;padding:10px 12px}.seg{display:flex;background:#edf2f8;border:1px solid var(--line);padding:4px;border-radius:12px;gap:4px}.seg button{border:0;background:transparent;color:#65758a;border-radius:9px;padding:8px 11px;font-size:12px;font-weight:950}.seg button.active{background:white;color:var(--blue);box-shadow:0 1px 2px rgba(16,24,40,.08)}
    table{width:100%;border-collapse:separate;border-spacing:0}th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#748399;text-align:left;background:#f5f8fc;border-bottom:1px solid var(--line);padding:12px}td{padding:13px 12px;border-bottom:1px solid #edf1f6;font-size:13px}tr:hover td{background:#fafcff}.mono{font-family:Consolas,monospace;font-weight:950}.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:950;border:1px solid}.tag.blue{background:#edf4ff;color:var(--blue);border-color:#cfdef7}.tag.green{background:#eaf9f2;color:var(--green);border-color:#c9efdf}.tag.red{background:#fff0f2;color:var(--red);border-color:#ffd2d8}.tag.amber{background:#fff7e8;color:var(--amber);border-color:#ffe1ad}.loc{display:inline-flex;align-items:center;gap:7px}.ld{width:9px;height:9px;border-radius:50%}.quick-wrap{grid-template-columns:repeat(4,1fr);margin-top:16px}.quick{padding:16px;text-align:left}.quick h3{margin:0;font-size:14px}.quick p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.empty{padding:42px;text-align:center;color:#7c8da3}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:14px;overflow:hidden;background:white;margin-top:16px}.day{min-height:116px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px}.day:nth-child(7n){border-right:0}.dn{font-size:12px;font-weight:950;color:#68778c}.event{margin-top:7px;border-left:3px solid var(--blue);background:#f1f6ff;border-radius:8px;padding:6px;font-size:11px}.event b{display:block;color:#15365c}
    .modal-bg{position:fixed;inset:0;background:rgba(5,12,21,.56);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal-bg.open{display:flex}.modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:white;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.32)}.mh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex}.mh h2{font-size:18px;margin:0;font-weight:950}.x{margin-left:auto;border:0;background:#f1f5f9;border-radius:10px;width:34px;height:34px}.mb{padding:20px}.mf{padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#f9fbfd}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.label{display:block;font-size:11px;color:#68778c;text-transform:uppercase;font-weight:950;letter-spacing:.05em;margin:0 0 6px}.toast{position:fixed;right:22px;bottom:22px;background:#102033;color:white;padding:13px 15px;border-radius:12px;box-shadow:var(--shadow);font-weight:850;display:none;z-index:60}.toast.show{display:block}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:40;transform:translateX(-100%);transition:.2s}.side.open{transform:translateX(0)}.menu{display:inline-flex}.stats,.quick-wrap{grid-template-columns:1fr 1fr}.toolbar{grid-template-columns:1fr 1fr}.search{display:none}.content{padding:18px}}@media(max-width:700px){.stats,.quick-wrap,.form{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.hero h1{font-size:22px}.calendar{grid-template-columns:1fr}.day{min-height:auto;border-right:0}.hide-sm{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside id="side" class="side">
    <div class="brand"><div class="mark">A+</div><div><div class="btitle">ARTROPLUS</div><div class="bsub">Kurumsal Platform</div></div></div>
    <div class="nav-title">Ana Menü</div>
    <button class="nav active" data-page="dashboard"><span class="ico">▦</span>Dashboard</button>
    <button class="parent active" data-toggle="depo"><span class="ico">▣</span>Depo Yönetimi <span class="chev">⌄</span></button>
    <div class="children open" id="g-depo">
      <button class="nav child" data-page="stock">Stok Yönetimi</button>
      <button class="nav child" data-page="movements">Ürün Hareket İşlemleri</button>
      <button class="nav child" data-page="consignment">Konsinye Paneli</button>
      <button class="nav child" data-page="products">Ürün Kartları</button>
    </div>
    <button class="parent" data-toggle="ops"><span class="ico">◫</span>Operasyon <span class="chev">⌄</span></button>
    <div class="children" id="g-ops"><button class="nav child" data-page="calendar">Ameliyat Programı</button><button class="nav child" data-page="assignments">Personel Atama</button></div>
    <div class="nav-title">Yönetim</div><button class="nav" data-page="reports"><span class="ico">◱</span>Raporlar</button><button class="nav" data-page="settings"><span class="ico">⚙</span>Ayarlar</button>
    <div class="user"><div class="ucard"><div class="avatar">M</div><div><b>Mehmet Yönetici</b><div class="urole">Yönetici erişimi</div></div></div></div>
  </aside>
  <main>
    <header class="top"><button class="btn menu" id="menu">☰</button><div><div class="kicker">Kurumsal Operasyon</div><div class="ptitle" id="title">Dashboard</div></div><div class="search"><span>⌕</span><input id="q" placeholder="REF, LOT, hastane, doktor veya işlem ara"></div><div class="pill hide-sm"><span class="dot"></span>Sistem aktif</div><div class="pill" id="date"></div></header>
    <section class="content" id="app"></section>
  </main>
</div>
<div class="modal-bg" id="modal"></div><div class="toast" id="toast"></div>
<script>
(()=>{const KEY="artroplus_enterprise_v2";const C=["#1769e0","#0f9f6e","#d98b05","#7256d9","#0794b8","#d94452"];let page="dashboard",query="",mode="all",locFilter="";
const uid=()=>Math.random().toString(36).slice(2,9);const today=()=>new Date().toISOString().slice(0,10);
const seed=()=>{const p=[["AR-6430","Meniskus Tamir Sistemi","Arthrex",4],["AR-6562","ACL TightRope","Arthrex",3],["72203804","Suture Anchor","Smith+Nephew",5],["KCM-0306CN","Rejoin Implant","Rejoin",2],["00-5950-040-00","Zimmer Drill Guide","Zimmer",2]].map(x=>({id:uid(),ref:x[0],name:x[1],brand:x[2],unit:"adet",min:x[3]}));return{products:p,hospitals:[["ana","Ana Depo","depot",C[0]],["fulya","Acibadem Fulya","hospital",C[1]],["maslak","Acibadem Maslak","hospital",C[2]],["sisli","Memorial Şişli","hospital",C[3]],["atasehir","Acibadem Ataşehir","hospital",C[4]]].map(x=>({id:x[0],name:x[1],type:x[2],color:x[3]})),stock:[st(p[0].id,"ana","25071016",18,"2028-10-01"),st(p[0].id,"fulya","25071016",3,"2028-10-01"),st(p[0].id,"maslak","25071016",4,"2028-10-01"),st(p[1].id,"ana","508017",9,"2027-08-16"),st(p[2].id,"ana","5092158741",12,"2029-02-20"),st(p[3].id,"ana","2605048",6,"2027-12-05"),st(p[4].id,"sisli","15448556",2,"2028-05-05")],moves:[],surgeries:[{id:uid(),date:today(),time:"08:00",doctor:"Mahir Mahiroğulları",hospital:"Memorial Şişli",type:"ACL",personnel:"Tevrat Metin"},{id:uid(),date:today(),time:"10:30",doctor:"Umut Akgün",hospital:"Acibadem Maslak",type:"Menisküs Tamiri",personnel:"Ozan Coşar"}]}};function st(productId,locationId,lot,qty,exp){return{id:uid(),productId,locationId,lot,qty,exp}}let db=JSON.parse(localStorage.getItem(KEY)||"null")||seed();const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
const p=id=>db.products.find(x=>x.id===id)||{};const h=id=>db.hospitals.find(x=>x.id===id)||{name:"Lokasyon yok",color:"#64748b"};const txt=v=>String(v||"").toLocaleLowerCase("tr-TR");const toast=m=>{let t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400)};
const ana=(pid,lot="")=>db.stock.filter(s=>s.productId===pid&&s.locationId==="ana"&&(!lot||s.lot===lot)).reduce((a,s)=>a+s.qty,0);const total=()=>db.stock.reduce((a,s)=>a+s.qty,0);const stat=s=>s.qty<=0?["Tükendi","red"]:s.qty<=p(s.productId).min?["Kritik","amber"]:["Normal","green"];
function hero(t,c,a=""){return`<div class="hero"><h1>${t}</h1><p>${c}</p><div class="actions">${a}</div></div>`}function stats(){let crit=db.stock.filter(s=>stat(s)[0]!="Normal").length,cons=db.stock.filter(s=>h(s.locationId).type=="hospital").reduce((a,s)=>a+s.qty,0);return`<div class="grid stats"><div class="stat"><div class="sl">Toplam Stok</div><div class="sv blue">${total()}</div><div class="sf">Ana depo + konsinye</div></div><div class="stat"><div class="sl">Ana Depo</div><div class="sv green">${db.stock.filter(s=>s.locationId=="ana").reduce((a,s)=>a+s.qty,0)}</div><div class="sf">Raf adedi</div></div><div class="stat"><div class="sl">Konsinye</div><div class="sv amber">${cons}</div><div class="sf">Hastane stokları</div></div><div class="stat"><div class="sl">Aksiyon</div><div class="sv red">${crit}</div><div class="sf">Kritik / tükenmiş lot</div></div></div>`}
function match(s){if(!query)return true;let pr=p(s.productId),ho=h(s.locationId);return txt([pr.ref,pr.name,pr.brand,s.lot,ho.name,s.qty,s.exp].join(" ")).includes(txt(query))}
function stockRows(filter=locFilter){return db.stock.filter(s=>(!filter||s.locationId==filter)&&match(s)).sort((a,b)=>(p(a.productId).ref||"").localeCompare(p(b.productId).ref||"","tr")||a.lot.localeCompare(b.lot,"tr"))}
function stockTable(rows=stockRows()){return`<div class="panel"><div class="ph"><div><div class="pht">Stok Listesi</div><div class="phs">REF, LOT, lokasyon, ana depo raf adedi ve durum</div></div><button class="btn soft" data-action="product">+ Manuel Ürün</button></div><div class="pb"><div class="toolbar"><input class="field local" placeholder="REF, LOT, hastane veya marka ara" value="${query}"><select class="field" id="loc"><option value="">Tüm Lokasyonlar</option>${db.hospitals.map(x=>`<option value="${x.id}" ${locFilter==x.id?"selected":""}>${x.name}</option>`).join("")}</select><span class="pill">${rows.length} satır</span><button class="btn primary" data-action="receipt">Stok Giriş</button></div><div style="overflow:auto"><table><thead><tr><th>REF</th><th>Ürün</th><th>LOT</th><th>Lokasyon</th><th>Adet</th><th>Ana Depo / Raf</th><th>SKT</th><th>Durum</th></tr></thead><tbody>${rows.map(s=>{let pr=p(s.productId),ho=h(s.locationId),st=stat(s);return`<tr><td class="mono">${pr.ref}</td><td>${pr.name}<br><span class="phs">${pr.brand}</span></td><td class="mono">${s.lot||"LOT yok"}</td><td><span class="loc"><span class="ld" style="background:${ho.color}"></span>${ho.name}</span> ${ho.type=="hospital"?'<span class="tag blue">Konsinye</span>':""}</td><td><b>${s.qty}</b> ${pr.unit}</td><td><b class="green">${ana(s.productId,s.lot)}</b> ${pr.unit}</td><td>${s.exp||"-"}</td><td><span class="tag ${st[1]}">${st[0]}</span></td></tr>`}).join("")||`<tr><td colspan="8" class="empty">Stok kaydı bulunamadı</td></tr>`}</tbody></table></div></div></div>`}
function moveRows(){return db.moves.filter(m=>(mode=="all"||m.type==mode)&&(!query||txt([p(m.productId).ref,p(m.productId).name,m.lot,h(m.locationId).name,m.note,label(m.type)].join(" ")).includes(txt(query)))).sort((a,b)=>new Date(b.date)-new Date(a.date))}
const label=t=>({receipt:"Stok Giriş",consign:"Konsinye Sevk",return:"Geri Alım",out:"Stok Çıkış"}[t]||t);function moveTable(){let rows=moveRows();return`<div class="panel"><div class="ph"><div><div class="pht">Ürün Hareket Kayıtları</div><div class="phs">Ana depo, konsinye sevk, geri alım ve çıkış kayıtları</div></div><button class="btn primary" data-action="movement">Yeni Hareket</button></div><div class="pb"><div class="toolbar"><input class="field local" placeholder="REF, LOT, lokasyon veya açıklama ara" value="${query}"><div class="seg">${[["all","Tümü"],["receipt","Giriş"],["consign","Konsinye"],["return","Geri"],["out","Çıkış"]].map(x=>`<button data-mode="${x[0]}" class="${mode==x[0]?"active":""}">${x[1]}</button>`).join("")}</div><span class="pill">${rows.length} kayıt</span><button class="btn soft" data-action="barcode">Barkod</button></div><div style="overflow:auto"><table><thead><tr><th>Tarih</th><th>Tip</th><th>REF</th><th>LOT</th><th>Lokasyon</th><th>Adet</th><th>Ana Depo / Raf</th><th>Açıklama</th></tr></thead><tbody>${rows.map(m=>`<tr><td>${new Date(m.date).toLocaleString("tr-TR")}</td><td><span class="tag ${m.type=="receipt"?"green":m.type=="out"?"red":m.type=="return"?"amber":"blue"}">${label(m.type)}</span></td><td class="mono">${p(m.productId).ref}</td><td class="mono">${m.lot}</td><td><span class="loc"><span class="ld" style="background:${h(m.locationId).color}"></span>${h(m.locationId).name}</span></td><td><b>${m.qty}</b></td><td><b class="green">${ana(m.productId,m.lot)}</b></td><td>${m.note||"-"}</td></tr>`).join("")||`<tr><td colspan="8" class="empty">Hareket kaydı bulunamadı</td></tr>`}</tbody></table></div></div></div>`}
const V={dashboard:()=>hero("Kurumsal Operasyon Paneli","Depo, stok, konsinye, ameliyat programı ve personel atama süreçleri tek profesyonel çalışma alanında toplandı.",`<button class="btn primary" data-goto="stock">Stok Yönetimine Git</button><button class="btn ghost" data-action="movement">Yeni Hareket</button><button class="btn ghost" data-action="product">Manuel Ürün Ekle</button>`)+stats()+`<div class="grid quick-wrap"><button class="quick" data-action="receipt"><h3>Stok Giriş</h3><p>Ürün önce Ana Depo'ya REF + LOT ile alınır.</p></button><button class="quick" data-action="consign"><h3>Konsinye Sevk</h3><p>Ana Depo'dan hastaneye kontrollü sevk.</p></button><button class="quick" data-action="return"><h3>Geri Alım</h3><p>Hastaneden Ana Depo'ya dönüş hareketi.</p></button><button class="quick" data-action="barcode"><h3>Honeywell Barkod</h3><p>REF, LOT, SKT ve adet ayrıştırılır.</p></button></div>`+stockTable(stockRows().slice(0,8)),stock:()=>hero("Depo ve Stok Yönetimi","Ana depo raf adetleri, hastane konsinyeleri ve kritik stoklar tek tabloda okunur.",`<button class="btn primary" data-action="product">Manuel Ürün Ekle</button><button class="btn ghost" data-action="receipt">Ana Depoya Stok Giriş</button>`)+stats()+stockTable(),movements:()=>hero("Ürün Hareket İşlemleri","Ana Depo'dan hastaneye sevk, konsinye, geri alım ve stok çıkış süreçleri kayıt altına alınır.",`<button class="btn primary" data-action="movement">Yeni Hareket</button><button class="btn ghost" data-action="barcode">Barkod Okut</button>`)+moveTable(),consignment:()=>hero("Konsinye Paneli","Fulya, Maslak ve tüm hastaneler ayrı renklerle izlenir. Aynı REF farklı hastanelerde karışmadan görünür.",`<button class="btn primary" data-action="consign">Konsinye Sevk</button><button class="btn ghost" data-action="return">Geri Alım</button>`)+`<div class="grid quick-wrap">${db.hospitals.filter(x=>x.type=="hospital").map(x=>{let r=stockRows(x.id),qty=r.reduce((a,s)=>a+s.qty,0);return`<button class="quick" style="border-left:5px solid ${x.color}"><h3>${x.name}</h3><p><b>${qty}</b> adet / <b>${r.length}</b> lot satırı<br>Konsinye stok rengi sabit.</p></button>`}).join("")}</div>`+stockTable(db.stock.filter(s=>h(s.locationId).type=="hospital"&&match(s))),products:()=>hero("Ürün Kartları","Arthrex, Smith+Nephew, Rejoin, Zimmer ve diğer ürünler REF bazlı yönetilir.",`<button class="btn primary" data-action="product">Manuel Ürün Ekle</button>`)+`<div class="panel"><div class="ph"><div><div class="pht">Ürün Kartları</div><div class="phs">REF, marka, minimum stok ve toplam adet</div></div></div><div class="pb"><table><thead><tr><th>REF</th><th>Ürün</th><th>Marka</th><th>Min</th><th>Toplam</th><th>Ana Depo</th></tr></thead><tbody>${db.products.filter(x=>!query||txt([x.ref,x.name,x.brand].join(" ")).includes(txt(query))).map(x=>`<tr><td class="mono">${x.ref}</td><td>${x.name}</td><td>${x.brand}</td><td>${x.min}</td><td>${db.stock.filter(s=>s.productId==x.id).reduce((a,s)=>a+s.qty,0)}</td><td>${ana(x.id)}</td></tr>`).join("")}</tbody></table></div></div>`,calendar:()=>hero("Ameliyat Programı","Takvimden tarih seçilebilir, ameliyat kaydı istenen güne eklenir.",`<button class="btn primary" data-action="surgery">Ameliyat Ekle</button>`)+cal(),assignments:()=>hero("Personel Atama","Günlük ameliyatlar ve atanmış personeller yalın listede takip edilir.",`<button class="btn primary" data-action="surgery">Ameliyat Ekle</button>`)+`<div class="panel"><div class="ph"><div><div class="pht">Bugünkü Atamalar</div><div class="phs">Ameliyat bilgisi ve personel</div></div></div><div class="pb"><table><thead><tr><th>Saat</th><th>Doktor</th><th>Hastane</th><th>İşlem</th><th>Personel</th></tr></thead><tbody>${db.surgeries.filter(s=>s.date==today()).map(s=>`<tr><td class="mono">${s.time}</td><td>${s.doctor}</td><td>${s.hospital}</td><td>${s.type}</td><td>${s.personnel}</td></tr>`).join("")||`<tr><td colspan="5" class="empty">Bugün kayıt yok</td></tr>`}</tbody></table></div></div>`,reports:()=>hero("Raporlar","Stok, hareket, konsinye ve ameliyat verileri raporlanır.")+stats()+moveTable(),settings:()=>hero("Ayarlar","Kurum, kullanıcı ve veri yönetimi ayarları.")+`<div class="panel"><div class="pb"><button class="btn red" id="reset">Demo Veriyi Sıfırla</button></div></div>`};
function cal(){let n=new Date(),y=n.getFullYear(),m=n.getMonth(),start=(new Date(y,m,1).getDay()+6)%7,days=new Date(y,m+1,0).getDate(),html=`<div class="calendar">`;for(let i=0;i<start;i++)html+=`<div class="day"></div>`;for(let d=1;d<=days;d++){let date=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,ev=db.surgeries.filter(s=>s.date==date);html+=`<div class="day"><div class="dn">${d}</div>${ev.map(e=>`<div class="event"><b>${e.time} ${e.doctor}</b>${e.hospital} / ${e.type}</div>`).join("")}<button class="btn soft" style="margin-top:8px;padding:6px 8px;font-size:11px" data-action="surgery" data-date="${date}">+ Ekle</button></div>`}return html+`</div>`}
function modal(t,b,f){let m=document.getElementById("modal");m.innerHTML=`<div class="modal"><div class="mh"><h2>${t}</h2><button class="x" id="x">×</button></div><div class="mb">${b}</div><div class="mf">${f}</div></div>`;m.classList.add("open");document.getElementById("x").onclick=close}function close(){document.getElementById("modal").classList.remove("open")}const val=id=>document.getElementById(id)?.value||"";const optsP=()=>db.products.map(p=>`<option value="${p.id}">${p.ref} - ${p.brand}</option>`).join("");const optsH=(ana=true)=>db.hospitals.filter(h=>ana||h.id!="ana").map(h=>`<option value="${h.id}">${h.name}</option>`).join("");
function productModal(){modal("Manuel Ürün Ekle",`<div class="form"><label><span class="label">REF</span><input class="field" id="pRef"></label><label><span class="label">Marka</span><input class="field" id="pBrand"></label><label class="full"><span class="label">Ürün Adı</span><input class="field" id="pName"></label><label><span class="label">LOT</span><input class="field" id="pLot"></label><label><span class="label">Ana Depo Adedi</span><input class="field" id="pQty" type="number" value="1"></label><label><span class="label">SKT</span><input class="field" id="pExp" type="date"></label><label><span class="label">Minimum Stok</span><input class="field" id="pMin" type="number" value="0"></label></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveP">Kaydet</button>`);document.getElementById("cancel").onclick=close;document.getElementById("saveP").onclick=()=>{let pr={id:uid(),ref:val("pRef").toUpperCase(),brand:val("pBrand")||"Marka yok",name:val("pName")||val("pRef"),unit:"adet",min:+val("pMin")||0};if(!pr.ref)return toast("REF zorunlu");db.products.push(pr);let qty=+val("pQty")||0;if(qty>0){db.stock.push(st(pr.id,"ana",val("pLot").toUpperCase(),qty,val("pExp")));db.moves.push({id:uid(),date:new Date().toISOString(),type:"receipt",productId:pr.id,locationId:"ana",lot:val("pLot").toUpperCase(),qty,note:"Manuel ürün girişi"})}save();close();toast("Ürün Ana Depo stokuna eklendi");render()}}
function moveModal(def="receipt"){modal("Ürün Hareket İşlemi",`<div class="form"><label><span class="label">İşlem</span><select class="field" id="mType"><option value="receipt">Ana Depoya Stok Giriş</option><option value="consign">Ana Depo → Hastane / Konsinye</option><option value="return">Hastane → Ana Depo / Geri Alım</option><option value="out">Stok Çıkış</option></select></label><label><span class="label">Ürün</span><select class="field" id="mProduct">${optsP()}</select></label><label><span class="label">LOT</span><input class="field" id="mLot"></label><label><span class="label">Adet</span><input class="field" id="mQty" type="number" value="1"></label><label><span class="label">Lokasyon</span><select class="field" id="mLoc">${optsH(true)}</select></label><label><span class="label">SKT</span><input class="field" id="mExp" type="date"></label><label class="full"><span class="label">Not</span><input class="field" id="mNote"></label></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveM">Kaydet</button>`);document.getElementById("mType").value=def;document.getElementById("cancel").onclick=close;document.getElementById("saveM").onclick=saveMove}
function row(pid,loc,lot){return db.stock.find(s=>s.productId==pid&&s.locationId==loc&&s.lot==lot)}function addStock(pid,loc,lot,qty,exp){let r=row(pid,loc,lot);if(r)r.qty+=qty;else db.stock.push(st(pid,loc,lot,qty,exp))}
function saveMove(){let type=val("mType"),pid=val("mProduct"),lot=val("mLot").toUpperCase(),qty=+val("mQty")||1,loc=val("mLoc"),note=val("mNote");if(type=="receipt"){addStock(pid,"ana",lot,qty,val("mExp"));loc="ana";note=note||"Ana depo stok giriş"}if(type=="consign"){if(loc=="ana")return toast("Hedef hastane seçin");let r=row(pid,"ana",lot);if(!r||r.qty<qty)return toast(`Ana Depo yeterli değil. Raf adedi: ${r?r.qty:0}`);r.qty-=qty;addStock(pid,loc,lot,qty,r.exp);note=note||"Ana Depo → Hastane konsinye sevk"}if(type=="return"){if(loc=="ana")return toast("Kaynak hastane seçin");let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast("Hastanede yeterli stok yok");r.qty-=qty;addStock(pid,"ana",lot,qty,r.exp);loc="ana";note=note||"Hastaneden geri alım"}if(type=="out"){let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast("Seçili lokasyonda yeterli stok yok");r.qty-=qty;note=note||"Stok çıkış"}db.moves.push({id:uid(),date:new Date().toISOString(),type,productId:pid,locationId:loc,lot,qty,note});db.stock=db.stock.filter(s=>s.qty>0);save();close();toast("Hareket kaydedildi");render()}
function barcodeModal(){modal("Honeywell Barkod Okutma",`<label><span class="label">Barkod / GS1 DataMatrix</span><textarea class="field" id="barcode" rows="4" placeholder="Barkodu okutun veya yapıştırın"></textarea></label><div id="bResult" class="stat" style="margin-top:12px">Sonuç bekleniyor</div>`,`<button class="btn" id="cancel">İptal</button><button class="btn soft" id="parse">Çözümle</button><button class="btn primary" id="bIn">Ana Depoya Giriş Yap</button>`);document.getElementById("cancel").onclick=close;document.getElementById("parse").onclick=()=>{let b=parseB(val("barcode"));document.getElementById("bResult").innerHTML=`<b>REF:</b> ${b.ref||"-"} &nbsp; <b>LOT:</b> ${b.lot||"-"} &nbsp; <b>SKT:</b> ${b.exp||"-"} &nbsp; <b>Adet:</b> ${b.qty}`};document.getElementById("bIn").onclick=()=>{let b=parseB(val("barcode")),pr=db.products.find(x=>x.ref==b.ref)||db.products[0];close();moveModal("receipt");setTimeout(()=>{document.getElementById("mProduct").value=pr.id;document.getElementById("mLot").value=b.lot;document.getElementById("mQty").value=b.qty;document.getElementById("mExp").value=b.exp},20)}}
function parseB(raw){let t=String(raw||"").replace(/[\x1d\n\r\t]/g," "),ref=(t.match(/(?:REF|240|241)[:\s]*([A-Z0-9-]+)/i)||[])[1]||"",lot=(t.match(/(?:LOT|10)[:\s]*([A-Z0-9-]+)/i)||[])[1]||"",qty=+(t.match(/(?:QTY|30)[:\s]*(\d+)/i)||[])[1]||1,exp=(t.match(/(?:17|SKT|EXP)[:\s]*(\d{6}|\d{4}-\d{2}-\d{2})/i)||[])[1]||"";if(/^\d{6}$/.test(exp))exp=`20${exp.slice(0,2)}-${exp.slice(2,4)}-${exp.slice(4,6)}`;return{ref,lot,qty,exp}}
function surgeryModal(date=today()){modal("Ameliyat Ekle",`<div class="form"><label><span class="label">Tarih</span><input class="field" id="sDate" type="date" value="${date}"></label><label><span class="label">Saat</span><input class="field" id="sTime" type="time" value="08:00"></label><label><span class="label">Doktor</span><input class="field" id="sDoc"></label><label><span class="label">Hastane</span><select class="field" id="sHosp">${optsH(false)}</select></label><label><span class="label">Ameliyat Türü</span><input class="field" id="sType"></label><label><span class="label">Personel</span><input class="field" id="sPer"></label></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveS">Kaydet</button>`);document.getElementById("cancel").onclick=close;document.getElementById("saveS").onclick=()=>{db.surgeries.push({id:uid(),date:val("sDate"),time:val("sTime"),doctor:val("sDoc")||"Doktor",hospital:h(val("sHosp")).name,type:val("sType")||"Ameliyat",personnel:val("sPer")||""});save();close();toast("Ameliyat eklendi");render()}}
function go(pg){page=pg;document.getElementById("side").classList.remove("open");render()}function bind(){document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>go(b.dataset.page));document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>go(b.dataset.goto));document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>document.getElementById("g-"+b.dataset.toggle).classList.toggle("open"));document.querySelectorAll(".local").forEach(i=>i.oninput=e=>{query=e.target.value;render()});document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>{let a=b.dataset.action;if(a=="product")productModal();if(a=="movement")moveModal();if(a=="receipt")moveModal("receipt");if(a=="consign")moveModal("consign");if(a=="return")moveModal("return");if(a=="barcode")barcodeModal();if(a=="surgery")surgeryModal(b.dataset.date||today())});let loc=document.getElementById("loc");if(loc)loc.onchange=()=>{locFilter=loc.value;render()};let r=document.getElementById("reset");if(r)r.onclick=()=>{localStorage.removeItem(KEY);db=seed();save();toast("Demo veri sıfırlandı");render()}}
function render(){document.getElementById("title").textContent={dashboard:"Dashboard",stock:"Stok Yönetimi",movements:"Ürün Hareket İşlemleri",consignment:"Konsinye Paneli",products:"Ürün Kartları",calendar:"Ameliyat Programı",assignments:"Personel Atama",reports:"Raporlar",settings:"Ayarlar"}[page];document.getElementById("date").textContent=new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"});document.querySelectorAll(".nav").forEach(b=>b.classList.toggle("active",b.dataset.page==page));document.getElementById("app").innerHTML=(V[page]||V.dashboard)();bind()}document.getElementById("q").oninput=e=>{query=e.target.value;render()};document.getElementById("menu").onclick=()=>document.getElementById("side").classList.add("open");document.getElementById("modal").onclick=e=>{if(e.target.id=="modal")close()};render();
})();
</script>
</body>
</html>
