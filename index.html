<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Enterprise | Kurumsal ERP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        brand: { DEFAULT:'#4361ee', light:'#eef1ff', dark:'#2d4bc4' },
                        navy: { DEFAULT:'#0f172a', mid:'#1e293b' }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        
        /* Animasyonlar */
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .toast-in { animation: slideIn 0.3s ease-out forwards; }
        .fade-up { animation: fadeUp 0.3s ease-out forwards; }
        
        /* İnce Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Form Elemanları Focus Efekti */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }
        
        .modal-overlay { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const getSupabase = () => {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (url && key) return supabase.createClient(url, key);
            return null;
        };
        let supabaseClient = getSupabase();

        // --- TOAST BİLDİRİM ---
        const ToastContext = createContext();
        const useToast = () => useContext(ToastContext);
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };
            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed top-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-in px-4 py-3 rounded-lg shadow-lg text-white flex items-center gap-3 pointer-events-auto font-medium ${t.type === 'error' ? 'bg-red-500' : t.type === 'success' ? 'bg-emerald-500' : 'bg-navy-mid'}`}>
                                <i data-lucide={t.type === 'success' ? 'check-circle' : t.type === 'error' ? 'alert-circle' : 'info'} className="w-5 h-5"></i>
                                {t.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // --- ORTAK MODAL ---
        const Modal = ({ title, onClose, children, large = false }) => {
            useEffect(() => { lucide.createIcons(); });
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay fade-up">
                    <div className={`bg-white rounded-xl shadow-2xl w-full ${large ? 'max-w-4xl' : 'max-w-xl'} max-h-[90vh] flex flex-col overflow-hidden`}>
                        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-lg text-navy">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm border border-slate-200">
                                <i data-lucide="x" className="w-5 h-5"></i>
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD (KONTROL MERKEZİ) ---
        const Dashboard = () => {
            const [stats, setStats] = useState({ today: 0, pending: 0, total: 0, lowStock: 0, totalMovements: 0 });
            useEffect(() => {
                const fetchStats = async () => {
                    if(!supabaseClient) return;
                    const today = new Date().toISOString().split('T')[0];
                    const [surgeries, products, movements] = await Promise.all([
                        supabaseClient.from('surgeries').select('*'),
                        supabaseClient.from('products').select('*'),
                        supabaseClient.from('stock_movements').select('*', { count: 'exact', head: true })
                    ]);
                    
                    if (surgeries.data && products.data) {
                        setStats({
                            today: surgeries.data.filter(s => s.date === today).length,
                            pending: surgeries.data.filter(s => s.status === 'Planlandı').length,
                            total: surgeries.data.length,
                            lowStock: products.data.filter(p => p.shelf_stock < 10).length,
                            totalMovements: movements.count || 0
                        });
                    }
                };
                fetchStats();
            }, []);

            return (
                <div className="space-y-6 fade-up">
                    <h2 className="text-2xl font-bold text-navy">Kontrol Merkezi</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-brand text-white p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow">
                            <h3 className="text-brand-light font-medium mb-1 flex items-center gap-2"><i data-lucide="calendar" className="w-4 h-4"></i> Bugün</h3>
                            <div className="text-4xl font-bold">{stats.today}</div>
                        </div>
                        <div className="bg-red-500 text-white p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow">
                            <h3 className="text-red-100 font-medium mb-1 flex items-center gap-2"><i data-lucide="alert-triangle" className="w-4 h-4"></i> Kritik Stok</h3>
                            <div className="text-4xl font-bold">{stats.lowStock} <span className="text-lg font-normal">ürün</span></div>
                        </div>
                        <div className="bg-emerald-500 text-white p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow">
                            <h3 className="text-emerald-100 font-medium mb-1 flex items-center gap-2"><i data-lucide="activity" className="w-4 h-4"></i> Açık Operasyon</h3>
                            <div className="text-4xl font-bold">{stats.pending}</div>
                        </div>
                        <div className="bg-navy-mid text-white p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow">
                            <h3 className="text-slate-300 font-medium mb-1 flex items-center gap-2"><i data-lucide="package" className="w-4 h-4"></i> Toplam İşlem</h3>
                            <div className="text-4xl font-bold">{stats.totalMovements}</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- STOK & DEPO ERP MODÜLÜ ---
        const InventoryView = ({ user }) => {
            const toast = useToast();
            const [tab, setTab] = useState('products');
            const [products, setProducts] = useState([]);
            const [movements, setMovements] = useState([]);
            const [isMovementModalOpen, setIsMovementModalOpen] = useState(false);
            const [isCountModalOpen, setIsCountModalOpen] = useState(false);
            const [selectedProductForCount, setSelectedProductForCount] = useState(null);
            const [countValue, setCountValue] = useState('');
            
            const [movementForm, setMovementForm] = useState({
                product_id: '', movement_type: 'FATURALI_SATIŞ', quantity: 1, 
                invoice_no: '', hospital: '', doctor: '', surgery_type: '', personnel: '', notes: ''
            });

            const loadData = async () => {
                if(!supabaseClient) return;
                const { data: p } = await supabaseClient.from('products').select('*').order('name');
                if(p) setProducts(p);
                const { data: m } = await supabaseClient.from('stock_movements').select('*, products(name)').order('created_at', {ascending: false}).limit(100);
                if(m) setMovements(m);
            };

            useEffect(() => { loadData(); }, [tab]);

            // Stok Çıkış / Fatura İşlemi
            const handleMovementSubmit = async (e) => {
                e.preventDefault();
                const { product_id, movement_type, quantity, hospital, notes, invoice_no, doctor, surgery_type, personnel } = movementForm;
                
                const { error } = await supabaseClient.rpc('process_stock_movement', {
                    p_product_id: product_id, p_type: movement_type, p_qty: parseInt(quantity), p_hospital: hospital, 
                    p_notes: notes, p_user: user.id, p_invoice_no: invoice_no, p_doctor: doctor, 
                    p_surgery_type: surgery_type, p_personnel: personnel
                });

                if (error) toast('İşlem başarısız: ' + error.message, 'error');
                else {
                    toast('Stok işlemi başarıyla kaydedildi!', 'success');
                    setIsMovementModalOpen(false);
                    setMovementForm({...movementForm, quantity: 1, invoice_no: '', notes: ''});
                    loadData();
                }
            };

            // Depo Sayımı İşlemi
            const handleCountSubmit = async (e) => {
                e.preventDefault();
                const diff = parseInt(countValue) - selectedProductForCount.shelf_stock;
                
                if (diff !== 0) {
                    const moveType = diff > 0 ? 'SAYIM_FAZLASI' : 'SAYIM_FİRESİ';
                    await supabaseClient.rpc('process_stock_movement', {
                        p_product_id: selectedProductForCount.id, p_type: moveType, p_qty: Math.abs(diff), 
                        p_hospital: 'MERKEZ DEPO', p_notes: 'Envanter Sayım Eşitlemesi', p_user: user.id
                    });
                }

                await supabaseClient.from('stock_counts').insert([{
                    product_id: selectedProductForCount.id, system_quantity: selectedProductForCount.shelf_stock,
                    counted_quantity: parseInt(countValue), difference: diff, created_by: user.id
                }]);

                toast('Sayım başarıyla kaydedildi.', 'success');
                setIsCountModalOpen(false);
                setCountValue('');
                loadData();
            };

            const exportMovements = () => {
                const exportData = movements.map((m, i) => ({
                    'Sıra': i + 1,
                    'Tarih': new Date(m.created_at).toLocaleString('tr-TR'),
                    'İşlem Tipi': m.movement_type,
                    'Ürün': m.products?.name,
                    'Adet': m.quantity,
                    'Fatura/İrsaliye No': m.invoice_no || '-',
                    'Kurum/Taraf': m.hospital || '-',
                    'Doktor': m.doctor || '-',
                    'Ameliyat': m.surgery_type || '-',
                    'Personel': m.personnel || '-',
                    'Not': m.notes || '-'
                }));
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Mal Hareketleri");
                XLSX.writeFile(workbook, `Mal_Hareketleri_${new Date().toISOString().split('T')[0]}.xlsx`);
                toast('Excel olarak indiriliyor', 'success');
            };

            return (
                <div className="space-y-6 fade-up">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-navy">Depo & Envanter ERP</h2>
                    </div>

                    {/* Sekmeler */}
                    <div className="flex gap-6 border-b border-slate-200 overflow-x-auto hide-scroll text-sm font-semibold">
                        <button onClick={()=>setTab('products')} className={`pb-3 px-1 transition-colors border-b-2 whitespace-nowrap ${tab==='products'?'border-brand text-brand':'border-transparent text-slate-500 hover:text-navy'}`}>Raf & Stok Durumu</button>
                        <button onClick={()=>setTab('movements')} className={`pb-3 px-1 transition-colors border-b-2 whitespace-nowrap ${tab==='movements'?'border-brand text-brand':'border-transparent text-slate-500 hover:text-navy'}`}>Mal Hareketleri (Fatura)</button>
                        <button onClick={()=>setTab('count')} className={`pb-3 px-1 transition-colors border-b-2 whitespace-nowrap ${tab==='count'?'border-brand text-brand':'border-transparent text-slate-500 hover:text-navy'}`}>Fiziksel Depo Sayımı</button>
                    </div>

                    {/* Sekme İçerikleri */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-up">
                        
                        {tab === 'products' && (
                            <div>
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="font-semibold text-slate-700">Merkez Depo Envanteri</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                            <tr>
                                                <th className="p-4 font-semibold">Kodu</th>
                                                <th className="p-4 font-semibold">Ürün Adı</th>
                                                <th className="p-4 font-semibold">Mevcut Raf Adeti</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {products.length === 0
