  <style>
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#07111f;color:#e2e8f0;margin:0;overflow-x:hidden;}
    @keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseSoft{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes skeletonPulse{0%{opacity:.6}50%{opacity:.3}100%{opacity:.6}}
    @keyframes toastProgress{from{width:100%}to{width:0}}
    .toast-in{animation:slideIn .3s ease-out}
    .fade-up{animation:fadeUp .25s ease-out}
    .pulse-soft{animation:pulseSoft 2s infinite}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:#475569}
    input:focus,select:focus,textarea:focus{outline:none !important;border-color:#2563eb !important;box-shadow:0 0 0 3px rgba(37,99,235,.15) !important;}
    /* Glass Premium */
    .glass{background:rgba(10,16,37,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
    .glass-premium{background:rgba(255,255,255,.05);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 1px rgba(255,255,255,.04);}
    .glass-light{background:rgba(15,26,53,.6);backdrop-filter:blur(12px);}
    /* Cards */
    .card{background:linear-gradient(135deg,#0f1a35 0%,#0d1730 100%);border:1px solid rgba(255,255,255,.07);}
    .card-premium{background:linear-gradient(135deg,rgba(15,26,53,.96),rgba(13,23,48,.96));border:1px solid rgba(255,255,255,.07);border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.35);}
    .card-hover{transition:all .2s;cursor:pointer;}
    .card-hover:hover{border-color:rgba(37,99,235,.4);box-shadow:0 0 20px rgba(37,99,235,.1);transform:translateY(-1px);}
    .shimmer{background:linear-gradient(90deg,#0f1a35 25%,#162448 50%,#0f1a35 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
    /* Skeleton */
    .skeleton-box{border-radius:12px;background:#0f1a35;animation:skeletonPulse 1.6s ease-in-out infinite;position:relative;overflow:hidden;}
    .skeleton-box::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 1.6s infinite;}
    /* Sidebar */
    .sidebar-item{transition:all .18s ease;}
    .sidebar-item:hover{background:rgba(37,99,235,.12);color:#93c5fd;}
    .sidebar-item.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;box-shadow:0 4px 15px rgba(37,99,235,.35);}
    /* Buttons */
    .btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);transition:all .2s;}
    .btn-primary:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8);box-shadow:0 6px 20px rgba(37,99,235,.45);transform:translateY(-1px);}
    .btn-danger{background:linear-gradient(135deg,#be123c,#f43f5e);transition:all .2s;}
    .btn-danger:hover{box-shadow:0 4px 15px rgba(244,63,94,.3);}
    .btn-premium{background:linear-gradient(135deg,#2563eb,#3b82f6);transition:all .22s;border:none;color:white;cursor:pointer;}
    .btn-premium:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(37,99,235,.35);}
    /* Stats */
    .stat-card{background:linear-gradient(135deg,#0f1a35 0%,#0d1730 100%);border:1px solid rgba(255,255,255,.07);transition:all .2s;}
    .stat-card:hover{border-color:rgba(37,99,235,.3);box-shadow:0 8px 30px rgba(0,0,0,.3);}
    /* Inputs */
    .input-dark{background:#0a1025;border:1px solid rgba(255,255,255,.12);color:#e2e8f0;transition:border-color .2s;}
    .input-dark::placeholder{color:#475569;}
    .input-dark:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
    /* Badges */
    .badge-planned{background:rgba(37,99,235,.2);color:#93c5fd;border:1px solid rgba(37,99,235,.3);}
    .badge-done{background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.3);}
    .badge-cancelled{background:rgba(244,63,94,.2);color:#fda4af;border:1px solid rgba(244,63,94,.3);}
    .badge-postponed{background:rgba(245,158,11,.2);color:#fcd34d;border:1px solid rgba(245,158,11,.3);}
    /* Table */
    .table-row{border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s;}
    .table-row:hover{background:rgba(37,99,235,.06);}
    /* Modal */
    .modal-bg{background:rgba(0,0,0,.72);backdrop-filter:blur(10px);}
    .modal-box{background:linear-gradient(135deg,#0f1a35,#0a1025);border:1px solid rgba(255,255,255,.1);}
    /* Nav */
    .nav-tab.active{border-bottom:2px solid #2563eb;color:#60a5fa;}
    .progress-bar{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
    /* Calendar */
    .calendar-day{transition:all .15s;}
    .calendar-day:hover{background:rgba(37,99,235,.15);}
    .calendar-day.today{background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.5);}
    .calendar-day.has-surgery{border-bottom:2px solid #2563eb;}
    /* Recharts overrides */
    .recharts-tooltip-wrapper{z-index:50!important;}
    .recharts-cartesian-grid-horizontal line,.recharts-cartesian-grid-vertical line{stroke:rgba(255,255,255,.06)!important;}
    .recharts-text{fill:#94a3b8!important;font-size:11px!important;}
    .recharts-tooltip-content{background:#0f1a35!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:12px!important;color:#e2e8f0!important;}
    .recharts-legend-item-text{color:#94a3b8!important;font-size:11px!important;}
    /* Mobile sidebar overlay */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:39;backdrop-filter:blur(4px);}
    .sidebar-overlay.show{display:block;}
    @media(max-width:1023px){
      .sidebar-mobile-hidden{transform:translateX(-100%);transition:transform .28s ease;}
      .sidebar-mobile-open{transform:translateX(0)!important;}
      .table-scroll{overflow-x:auto;}
    }
    /* Enterprise polish */
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(7,17,31,1));z-index:-2;}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(180deg,rgba(0,0,0,.6),transparent 70%);z-index:-1;}
    .glass{background:rgba(8,17,32,.94);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
    .card,.stat-card,.card-premium{background:linear-gradient(180deg,rgba(15,26,48,.96),rgba(10,19,36,.98));border:1px solid rgba(148,163,184,.14);box-shadow:0 1px 0 rgba(255,255,255,.03),0 18px 45px rgba(0,0,0,.18);}
    .card.rounded-2xl,.stat-card.rounded-2xl,.card-premium.rounded-2xl{border-radius:10px!important;}
    .rounded-xl{border-radius:10px!important;}
    .rounded-2xl{border-radius:12px!important;}
    .sidebar-item{border:1px solid transparent;}
    .sidebar-item:hover{background:rgba(37,99,235,.08);border-color:rgba(148,163,184,.12);color:#dbeafe;}
    .sidebar-item.active{background:rgba(37,99,235,.16);border-color:rgba(96,165,250,.32);color:#fff;box-shadow:inset 3px 0 0 #60a5fa,0 8px 20px rgba(15,23,42,.22);}
    .btn-primary,.btn-premium{background:#2563eb;box-shadow:0 1px 0 rgba(255,255,255,.08) inset;}
    .btn-primary:hover,.btn-premium:hover{background:#1d4ed8;box-shadow:0 10px 24px rgba(37,99,235,.26);transform:translateY(-1px);}
    .btn-danger{background:#dc2626;}
    .input-dark{background:#08111f;border-color:rgba(148,163,184,.18);}
    .input-dark:hover{border-color:rgba(148,163,184,.28);}
    .table-row{border-bottom-color:rgba(148,163,184,.09);}
    .table-row:hover{background:rgba(96,165,250,.055);}
    .modal-bg{background:rgba(2,6,23,.78);backdrop-filter:blur(12px);}
    .modal-box{background:#0b1528;border:1px solid rgba(148,163,184,.18);box-shadow:0 24px 80px rgba(0,0,0,.42);}
    .enterprise-topbar{background:rgba(8,17,32,.96);border-bottom:1px solid rgba(148,163,184,.14);box-shadow:0 1px 0 rgba(255,255,255,.03);}
    .enterprise-kicker{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#64748b;font-weight:800;}
    .enterprise-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.7);color:#cbd5e1;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;}
    .enterprise-dot{width:7px;height:7px;border-radius:999px;background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12);}
    .card,.stat-card,.card-premium{width:100%!important;max-width:100%!important;box-sizing:border-box;}
    .flex-responsive{display:flex;flex-wrap:wrap;gap:.75rem;}
    .timeline-container{display:flex;flex-direction:column;max-height:560px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .timeline-row{display:grid;grid-template-columns:64px 1fr;align-items:stretch;min-height:60px;border-bottom:1px solid rgba(255,255,255,.05);}
    .timeline-hour{font-family:monospace;font-size:.82rem;color:#64748b;font-weight:700;}
    .timeline-cell{position:relative;width:100%;min-width:0;padding:4px;}
    .surgery-block{width:100%;cursor:pointer;}
    .surgery-block:hover{background:rgba(37,99,235,.22)!important;transform:translateY(-1px);}
    @media(max-width:768px){
      .flex-responsive{flex-direction:column;}
      .timeline-row{grid-template-columns:52px 1fr;}
      .timeline-hour{font-size:.72rem;}
      .toast-stack{left:12px;right:12px;top:12px;}
      .toast{min-width:0;width:100%;}
      input,select,textarea,button{max-width:100%;}
    }
  </style>
</head>

  skt:skt||null,
  mfg_date:mfgDate||null,

},["hospital_id","lot","skt","mfg_date"]);
const normalizeMovement=(h,defaultHospitalId)=>({

  notes:h.notes||h.aciklama||"",

});
const movementPayload=({urun_id,hospital_id,lot,type,quantity,notes,surgery_id,fatura_id})=>({
  urun_id,

});
const insertMovement=payload=>insertWithSchemaFallback("hareketler",payload,["hospital_id","lot","surgery_id","fatura_id"]);
const isCompanyShelfName=name=>{
  const n=(name||"").toLocaleLowerCase("tr-TR");
  return n.includes("şirket raf")||n.includes("sirket raf")||n.includes("merkez raf")||n.includes("merkez depo");
};
const displayLocationName=loc=>isCompanyShelfName(loc?.name||loc)?"Ana Depo":(loc?.name||loc||"");
const selectableHospitals=hospitals=>(hospitals||[]).filter(h=>!isCompanyShelfName(h.name));
const profileDisplayName=p=>p?.full_name||p?.name||p?.email||"Kullanıcı";
const buildProgramPersonnel=(profiles=[],legacyPersonnel=[])=>{
  const map=new Map();
  profiles.filter(p=>p&&p.status!=="inactive").forEach(p=>{
    const name=profileDisplayName(p);
    if(name)map.set(`profile-${p.id||name}`,{id:p.id||name,name,role:p.role||"user",source:"profile"});
  });
  if(!map.size){
    legacyPersonnel.forEach(p=>{
      const name=p?.name||p?.full_name||"";
      if(name)map.set(`legacy-${p.id||name}`,{id:p.id||name,name,role:p.role||"personel",source:"legacy"});
    });
  }
  return [...map.values()].sort((a,b)=>a.name.localeCompare(b.name,"tr"));
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
const ToastCtx=React.createContext(()=>{});
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const shown=useRef(new Set());
  const add=(msg,type="info")=>{
    const key=msg.slice(0,40);
    if(shown.current.has(key))return;
    shown.current.add(key);
    setTimeout(()=>shown.current.delete(key),3000);
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  };
  const icons={success:"✓",error:"✕",info:"i",warning:"⚠"};
  const colors={success:"bg-emerald-500",error:"bg-rose-500",info:"bg-brand",warning:"bg-amber-500"};
  return(
    <ToastCtx.Provider value={add}>
      {children}
      <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t=>(
          <div key={t.id} className="toast-in flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium text-white glass border border-white/10 pointer-events-auto min-w-[260px]">
            <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${colors[t.type]}`}>{icons[t.type]}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>React.useContext(ToastCtx);

// ─── PDF EXPORT ───────────────────────────────────────────────────────────────
const exportSurgeriesPDF=(surgeries,title="Ameliyat Raporu")=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"landscape",format:"a4"});
    const pw=doc.internal.pageSize.getWidth();
    doc.setFillColor(10,16,37);doc.rect(0,0,pw,28,["F"]);
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");
    doc.text("ARTROPLUS",14,16);
    doc.setFontSize(11);doc.setFont("helvetica","normal");doc.text(title,14,23);
    doc.setFontSize(9);doc.text(`Tarih: ${new Date().toLocaleString("tr-TR")}`,pw-14,16,{align:"right"});
    doc.text(`Toplam: ${surgeries.length} kayıt`,pw-14,23,{align:"right"});
    const st={planned:0,done:0,cancelled:0,postponed:0};
    surgeries.forEach(s=>{st[s.status]=(st[s.status]||0)+1;});
    doc.setFillColor(15,26,53);doc.rect(0,28,pw,16,["F"]);
    [["Planlandı",st.planned],["Tamamlandı",st.done],["İptal",st.cancelled],["Ertelendi",st.postponed]].forEach(([l,v],i)=>{
      doc.setTextColor(148,163,184);doc.setFontSize(7);doc.text(l,20+i*65,36);
      doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont("helvetica","bold");doc.text(String(v),20+i*65,43);
      doc.setFont("helvetica","normal");
    });
    doc.autoTable({
      startY:50,
      head:[["Tarih","Saat","Ameliyat Türü","Hastane","Doktor","Durum","Adet","Notlar"]],
      body:surgeries.map(s=>[s.date,s.time,s.type,s.hospital,s.doctor,{planned:"Planlandı",done:"Tamamlandı",cancelled:"İptal",postponed:"Ertelendi"}[s.status]||s.status,s.adet||1,s.notes||""]),
      styles:{fontSize:8,cellPadding:3.5,textColor:[203,213,225],fillColor:[10,16,37]},
      headStyles:{fillColor:[13,23,48],textColor:[147,197,253],fontStyle:"bold",fontSize:8},
      alternateRowStyles:{fillColor:[15,26,53]},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:14},5:{cellWidth:22},6:{cellWidth:10},7:{cellWidth:40}},
      margin:{left:14,right:14},
      tableLineColor:[30,41,59],tableLineWidth:0.2,
    });
    const pages=doc.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(71,85,105);doc.text(`ARTROPLUS Medikal — Sayfa ${i}/${pages}`,pw/2,doc.internal.pageSize.getHeight()-5,{align:"center"});}
    doc.save(`ameliyatlar_${new Date().toISOString().slice(0,10)}.pdf`);
    return true;
  }catch(e){console.error("PDF:",e);return false;}
};

function DonutChart({data,total}){
  if(!total)return<div className="flex items-center justify-center h-full text-slate-600 text-sm">Veri yok</div>;
  if(!RC_OK){
    const r=40,cx=50,cy=50,circ=2*Math.PI*r;let offset=0;
    return(<svg viewBox="0 0 100 100" className="w-full h-full">{data.map((d,i)=>{const pct=d.value/total;const dash=pct*circ;const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth="14" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset*circ} style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%"}} opacity="0.9"/>;offset+=pct;return el;})}<circle cx={cx} cy={cy} r="33" fill="#0a1025"/><text x="50" y="48" textAnchor="middle" fontSize="14" fill="white" fontWeight="bold">{total}</text><text x="50" y="60" textAnchor="middle" fontSize="6" fill="#94a3b8">toplam</text></svg>);
  }
  const RAD=Math.PI/180;
  const lbl=({cx,cy,midAngle,innerRadius,outerRadius,percent})=>{if(percent<0.08)return null;const rad=innerRadius+(outerRadius-innerRadius)*.5;return<text x={cx+rad*Math.cos(-midAngle*RAD)} y={cy+rad*Math.sin(-midAngle*RAD)} textAnchor="middle" fill="white" fontSize={9} fontWeight="bold">{`${(percent*100).toFixed(0)}%`}</text>;};
  return(
    <RPieChart width={120} height={120}>
      <Pie data={data} cx={55} cy={55} innerRadius={30} outerRadius={50} paddingAngle={2} dataKey="value" labelLine={false} label={lbl}>
        {data.map((d,i)=><Cell key={i} fill={d.color} stroke="transparent"/>)}
      </Pie>
    </RPieChart>
  );
}


// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({surgeries,types,profile,setPage,doctors}){
  const [period,setPeriod]=useState("month");
  const [selType,setSelType]=useState(null);
  const toast=useToast();

  const filtered=useMemo(()=>{
    const ws=new Date(today.getFullYear(),today.getMonth(),today.getDate()-(today.getDay()+6)%7);
    const ms=new Date(today.getFullYear(),today.getMonth(),1);
    if(period==="week")return surgeries.filter(s=>s.date>=fmtDate(ws)&&s.date<=todayStr);
    if(period==="month")return surgeries.filter(s=>s.date>=fmtDate(ms)&&s.date<=todayStr);
    return surgeries;
  },[surgeries,period]);

  const todayS=surgeries.filter(s=>s.date===todayStr).sort((a,b)=>a.time.localeCompare(b.time));
  const upcoming=surgeries.filter(s=>s.date>todayStr&&s.status==="planned").sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const tomorrowStr=fmtDate(new Date(today.getTime()+86400000));
  const tomorrowS=surgeries.filter(s=>s.date===tomorrowStr&&s.status!=="cancelled");
  const overduePlanned=surgeries.filter(s=>s.date<todayStr&&s.status==="planned");
  const missingInfo=surgeries.filter(s=>s.status==="planned"&&(s.time==="??:??"||s.doctor==="Bilinmiyor")).slice(0,6);
  const docsCompleted=surgeries.filter(s=>s.status==="done"&&getSurgeryDocs(s).length>0);

  const statusCounts=useMemo(()=>{
    const m={planned:0,done:0,cancelled:0,postponed:0};
    filtered.forEach(s=>{m[s.status]=(m[s.status]||0)+1;});
    return m;
  },[filtered]);

  const typeStats=useMemo(()=>{
    const m={};
    filtered.forEach(s=>{m[s.type]=(m[s.type]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
  },[filtered]);

  const docStats=useMemo(()=>{
    const m={};
    filtered.forEach(s=>{const d=s.doctor;m[d]=(m[d]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[filtered]);

  // Last 7 days trend
  const trendData=useMemo(()=>{
    return Array.from({length:7},(_,i)=>{
      const d=new Date(today);d.setDate(d.getDate()-6+i);

      return{label:DAYS[(d.getDay()+6)%7],value:surgeries.filter(s=>s.date===ds).length};

    <div className="space-y-5">
      {/* Header */}
      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <div>
          <h1 className="text-xl font-bold text-white">Yönetim Paneli</h1>
          <p className="text-sm text-slate-500 mt-0.5">{fmtTR(todayStr)} — Hoşgeldiniz, {profile?.full_name||"Kullanıcı"}</p>
        </div>
        <div className="sm:ml-auto flex flex-wrap gap-2 items-center">
          <div className="flex gap-1 p-1 bg-navy-800 rounded-xl border border-white/8">
            {["week","month","all"].map(p=>(
              <button key={p} onClick={()=>setPeriod(p)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${period===p?"bg-brand text-white shadow":"text-slate-400 hover:text-white"}`}>
                {p==="week"?"Bu Hafta":p==="month"?"Bu Ay":"Tümü"}
              </button>
            ))}
          </div>
          <button onClick={()=>{if(exportSurgeriesPDF(filtered,`Ameliyat Raporu — ${period==="week"?"Bu Hafta":period==="month"?"Bu Ay":"Tümü"}`))toast("PDF oluşturuldu ✓","success");else toast("PDF hatası","error");}}
            className="px-3 py-2 rounded-xl bg-brand/15 hover:bg-brand/25 text-brand-300 text-sm font-semibold border border-brand/25 flex items-center gap-1.5 transition-colors">
            ↓ PDF
          </button>
        </div>
      </div>

      {/* Stats row */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {[
          {label:"Toplam",value:totalFiltered,icon:"⚕",color:"#3b82f6",bg:"rgba(59,130,246,.15)"},
          {label:"Tamamlandı",value:statusCounts.done,icon:"✓",color:"#10b981",bg:"rgba(16,185,129,.15)"},
          {label:"Planlandı",value:statusCounts.planned,icon:"◷",color:"#f59e0b",bg:"rgba(245,158,11,.15)"},

// ─── SURGERY FORM ─────────────────────────────────────────────────────────────
function SurgeryForm({surg,types,hospitals,doctors,onSave,onCancel,onAddType,onAddHospital,onAddDoctor}){
  const initialForm=surg?{
    ...surg,
    notes:stripSurgeryMeta(surg.notes),
    timeUnknown:surg.time==="??:??",
    doctorUnknown:surg.doctor==="Bilinmiyor"
  }:{date:todayStr,time:"09:00",type:"",hospital:"",doctor:"",status:"planned",notes:"",adet:1,timeUnknown:false,doctorUnknown:false};
  const [f,setF]=useState(initialForm);
  const [docs,setDocs]=useState(surg?getSurgeryDocs(surg):[]);
  const [adding,setAdding]=useState(null);
  const toast=useToast();
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);

  const save=()=>{
    if(!f.type)return toast("Ameliyat türü seçin","warning");
    if(!f.hospital)return toast("Hastane seçin","warning");
    if(!f.doctor&&!f.doctorUnknown)return toast("Doktor seçin","warning");
    const{doctorUnknown,timeUnknown,...rest}=f;
    onSave({
      ...rest,
      doctor:doctorUnknown?"Bilinmiyor":f.doctor,
      time:timeUnknown?"??:??":f.time,
      adet:Number(f.adet)||1,
      status:docs.length?"done":f.status,
      notes:buildSurgeryNotes(f.notes,[],docs)
    });
  };

  const addDocs=files=>{
    const added=Array.from(files||[]).map(file=>({name:file.name,size:file.size,type:file.type,at:new Date().toISOString()}));
    if(!added.length)return;
    setDocs(prev=>[...prev,...added]);
    setF(prev=>({...prev,status:"done"}));
    toast("Evrak eklendi, ameliyat tamamlandı olarak işaretlendi","success");
  };

  const handleInline=async(field,name)=>{
    if(field==="type"){await onAddType(name);setF(p=>({...p,type:name}));}
    else if(field==="hospital"){await onAddHospital(name);setF(p=>({...p,hospital:name}));}
    else if(field==="doctor"){await onAddDoctor(name);setF(p=>({...p,doctor:autoDoc(name)}));}
    setAdding(null);
  };

  const Row=({label,children})=><div><Label>{label}</Label>{children}</div>;

  return(
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-4">
        <Row label="Tarih *">
          <Input type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))}/>
        </Row>
        <Row label="Saat">
          <div className="space-y-2">
            {!f.timeUnknown&&<Input type="time" value={f.time} onChange={e=>setF(p=>({...p,time:e.target.value}))} disabled={f.timeUnknown}/>}
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={f.timeUnknown} onChange={e=>setF(p=>({...p,timeUnknown:e.target.checked}))} className="rounded"/>
              <span className="text-xs text-slate-400">Saat bilinmiyor</span>
            </label>
          </div>
        </Row>
      </div>

      <Row label="Ameliyat Türü *">
        {adding==="type"?(
          <InlineAdd onSave={n=>handleInline("type",n)} onCancel={()=>setAdding(null)} placeholder="Ameliyat türü ekle"/>
        ):(
          <div className="flex gap-2">
            <div className="flex-1">
              <SearchableSelect items={types.map(t=>({name:t.name}))} value={f.type} onChange={v=>setF(p=>({...p,type:v}))} placeholder="Tür seçin"/>
            </div>
            <button type="button" onClick={()=>setAdding("type")} className="px-3 py-2.5 rounded-xl bg-brand/20 hover:bg-brand/30 text-brand-300 text-sm font-bold transition-colors">+</button>
          </div>
        )}
      </Row>

      <Row label="Hastane *">
        {adding==="hospital"?(
          <InlineAdd onSave={n=>handleInline("hospital",n)} onCancel={()=>setAdding(null)} placeholder="Hastane ekle"/>
        ):(
          <div className="flex gap-2">
            <div className="flex-1">
              <SearchableSelect items={visibleHospitals.map(h=>({name:h.name}))} value={f.hospital} onChange={v=>setF(p=>({...p,hospital:v}))} placeholder="Hastane seçin"/>
            </div>
            <button type="button" onClick={()=>setAdding("hospital")} className="px-3 py-2.5 rounded-xl bg-brand/20 hover:bg-brand/30 text-brand-300 text-sm font-bold transition-colors">+</button>
          </div>
        )}
      </Row>

      <Row label="Doktor *">
        <div className="space-y-2">
          {!f.doctorUnknown&&(
            adding==="doctor"?(
              <InlineAdd onSave={n=>handleInline("doctor",n)} onCancel={()=>setAdding(null)} placeholder="Doktor ekle" isDoc/>
            ):(
              <div className="flex gap-2">
                <div className="flex-1">
                  <SearchableSelect items={doctors.map(d=>({name:d.name}))} value={f.doctor} onChange={v=>setF(p=>({...p,doctor:v}))} placeholder="Doktor seçin" disabled={f.doctorUnknown}/>
                </div>
                <button type="button" onClick={()=>setAdding("doctor")} className="px-3 py-2.5 rounded-xl bg-brand/20 hover:bg-brand/30 text-brand-300 text-sm font-bold transition-colors">+</button>
              </div>
            )
          )}
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={f.doctorUnknown} onChange={e=>setF(p=>({...p,doctorUnknown:e.target.checked,doctor:e.target.checked?"":p.doctor}))} className="rounded"/>
            <span className="text-xs text-slate-400">Doktor bilinmiyor</span>
          </label>
        </div>
      </Row>

      <div className="grid grid-cols-2 gap-4">
        <Row label="Durum">
          <Select value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))}>
            <option value="planned">Planlandı</option>
            <option value="done">Tamamlandı</option>
            <option value="cancelled">İptal</option>
            <option value="postponed">Ertelendi</option>
          </Select>
        </Row>
        <Row label="Adet">
          <Input type="number" min="1" max="99" value={f.adet} onChange={e=>setF(p=>({...p,adet:e.target.value}))}/>
        </Row>
      </div>

      <Row label="Notlar">
        <Textarea value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))} rows={3} placeholder="Ek notlar..."/>
      </Row>

      <Row label="Ameliyat Evrakı">
        <div className="space-y-3">
          <label className="flex flex-col items-center justify-center gap-2 rounded-2xl border border-dashed border-white/15 bg-navy-800/60 px-4 py-5 text-center cursor-pointer hover:border-brand/60 hover:bg-brand/10 transition-colors">
            <span className="text-2xl">⇧</span>
            <span className="text-sm font-semibold text-slate-200">Evrak ekle</span>
            <span className="text-xs text-slate-500">PDF, fotoğraf veya belge seçilebilir. Evrak eklenince ameliyat tamamlandı olur.</span>
            <input type="file" multiple className="hidden" onChange={e=>{addDocs(e.target.files);e.target.value="";}}/>
          </label>
          {docs.length>0&&(
            <div className="space-y-2">
              {docs.map((doc,i)=>(
                <div key={`${doc.name}-${i}`} className="flex items-center gap-2 rounded-xl bg-emerald2/10 border border-emerald2/25 px-3 py-2">
                  <span className="text-emerald2">✓</span>
                  <span className="flex-1 truncate text-sm text-slate-200">{doc.name}</span>
                  <button type="button" onClick={()=>setDocs(prev=>prev.filter((_,idx)=>idx!==i))} className="text-xs text-slate-500 hover:text-rose2">Kaldır</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </Row>

      <div className="flex gap-3 pt-2">
        <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl bg-navy-800 hover:bg-navy-700 text-slate-300 text-sm font-semibold transition-colors border border-white/8">İptal</button>
        <button onClick={save} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Kaydet</button>
      </div>
    </div>
  );
}

// ─── SURGERIES VIEW ───────────────────────────────────────────────────────────
function SurgeriesView({surgeries,types,hospitals,doctors,profile,onRefresh,onAddList,onNotif}){
  const toast=useToast();
  const [search,setSearch]=useState("");
  const [fType,setFType]=useState("");
  const [fStatus,setFStatus]=useState("");
  const [fDoctor,setFDoctor]=useState("");
  const [modal,setModal]=useState(null);
  const [delConf,setDelConf]=useState(null);
  const [viewS,setViewS]=useState(null);
  const [sortBy,setSortBy]=useState("date_desc");

  const filtered=useMemo(()=>{
    let r=surgeries.filter(s=>{
      if(fType&&s.type!==fType)return false;
      if(fStatus&&s.status!==fStatus)return false;
      if(fDoctor&&s.doctor!==fDoctor)return false;
      if(search){const q=search.toLowerCase();return s.type.toLowerCase().includes(q)||s.doctor.toLowerCase().includes(q)||s.hospital.toLowerCase().includes(q)||s.notes?.toLowerCase().includes(q);}
      return true;
    });
    const[sf,sd]=sortBy.split("_");
    r.sort((a,b)=>{
      const va=sf==="date"?a.date+a.time:sf==="type"?a.type:a.doctor;
      const vb=sf==="date"?b.date+b.time:sf==="type"?b.type:b.doctor;
      return sd==="asc"?va.localeCompare(vb):vb.localeCompare(va);
    });
    return r;
  },[surgeries,fType,fStatus,fDoctor,search,sortBy]);

  const save=async(form)=>{
    if(form.id){
      const{error}=await SB.from("surgeries").update({...form,updated_at:new Date().toISOString()}).eq("id",form.id);

      toast("Ameliyat güncellendi","success");
      sendTelegram(`✏️ Güncellendi: ${form.type} — ${fmtTR(form.date)} ${form.time}`);
    }else{
      const{error}=await SB.from("surgeries").insert({...form,created_by:profile?.id});
      if(error)return toast(error.message,"error");
      toast("Ameliyat eklendi","success");
      sendTelegram(`➕ Yeni ameliyat: ${form.type} — ${fmtTR(form.date)} ${form.time} — ${form.hospital} — ${form.doctor}`);
      if(onNotif)onNotif(`Yeni ameliyat: ${form.type} - ${fmtTR(form.date)}`);

    setModal(null);setViewS(null);
    onRefresh();

  const del=async(id)=>{
    const deleted=surgeries.find(s=>s.id===id);
    const{error}=await SB.from("surgeries").delete().eq("id",id);
    if(error)return toast(error.message,"error");

    sendTelegram(`🗑️ ${deletedMsg}${deleted?.hospital?` — ${deleted.hospital}`:""}${deleted?.doctor?` — ${deleted.doctor}`:""}`);
    if(onNotif)onNotif(deletedMsg);

    onRefresh();

  const exportXLSX=()=>{
    const rows=filtered.map(s=>({Tarih:s.date,Saat:s.time,Tür:s.type,Hastane:s.hospital,Doktor:s.doctor,Durum:STATUS_MAP[s.status],Adet:s.adet,Notlar:s.notes||""}));
    const wb=XLSX.utils.book_new();

      {viewS&&(
        <Modal title="Ameliyat Detayı" onClose={()=>setViewS(null)} size="md"
          footer={
            <div className="flex gap-2">
              <button onClick={()=>setDelConf(viewS.id)} className="px-4 py-2.5 rounded-xl bg-rose2/20 hover:bg-rose2/30 text-rose2 text-sm font-semibold border border-rose2/30">Sil</button>
              <button onClick={()=>{setModal(viewS);setViewS(null);}} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Düzenle</button>

            <div className="flex items-start justify-between gap-4">
              <div>
                <h3 className="text-lg font-bold text-white">{viewS.type}</h3>
                <p className="text-slate-400 text-sm mt-0.5">{viewS.hospital}</p>

              <div className="flex flex-col items-end gap-2">
                <Badge status={viewS.status}/>

            {viewDocs.length>0&&(

                <div className="space-y-2">
                  {viewDocs.map((doc,i)=>(
                    <div key={`${doc.name}-${i}`} className="flex items-center gap-2 rounded-lg bg-emerald2/10 border border-emerald2/20 px-3 py-2">
                      <span className="text-emerald2">✓</span>

        </Modal>
      )}

      {modal&&(
        <Modal title={modal===true?"Yeni Ameliyat":"Ameliyatı Düzenle"} onClose={()=>setModal(null)} size="lg">
          <SurgeryForm
            surg={modal===true?null:modal}
            types={types} hospitals={hospitals} doctors={doctors}
            onSave={save} onCancel={()=>setModal(null)}
            onAddType={async n=>{await SB.from("surgery_types").insert({name:n});onAddList();}}
            onAddHospital={async n=>{await SB.from("hospitals").insert({name:n});onAddList();}}
            onAddDoctor={async n=>{await SB.from("doctors").insert({name:autoDoc(n)});onAddList();}}

      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <h1 className="text-xl font-bold text-white">Ameliyatlar</h1>
        <div className="sm:ml-auto flex gap-2">

            <span>↓</span> Excel
          </button>
          <button onClick={()=>{if(exportSurgeriesPDF(filtered))toast("PDF oluşturuldu ✓","success");else toast("PDF hatası","error");}}

            <span>↓</span> PDF
          </button>
          <button onClick={()=>setModal(true)} className="px-4 py-2 rounded-xl btn-primary text-white text-sm font-bold flex items-center gap-1.5">

        </div>
      </div>

      {/* Filters */}
      <div className="card rounded-2xl p-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
          <div className="relative lg:col-span-1">
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Ara..." className="w-full pl-8 pr-4 py-2.5 rounded-xl input-dark text-sm"/>
            <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">⌕</span>
          </div>
          <Select value={fType} onChange={e=>setFType(e.target.value)}>
            <option value="">Tüm Türler</option>
            {types.map(t=><option key={t.name} value={t.name}>{t.name}</option>)}
          </Select>
          <Select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="">Tüm Durumlar</option>
            {Object.entries(STATUS_MAP).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </Select>
          <Select value={fDoctor} onChange={e=>setFDoctor(e.target.value)}>
            <option value="">Tüm Doktorlar</option>

      {/* Table */}
      <div className="card rounded-2xl overflow-hidden">

        <div className="divide-y divide-white/5">

                  <button onClick={()=>setDelConf(s.id)} className="w-7 h-7 rounded-lg hover:bg-rose2/20 text-slate-500 hover:text-rose2 flex items-center justify-center text-sm transition-colors">⊗</button>

  );
}

// ─── PROGRAM VIEW ────────────────────────────────────────────────────────────
// Saat dilimleri: 00:00 → 23:00 tam gün program desteği
const HOURS=Array.from({length:24},(_,i)=>`${String(i).padStart(2,"0")}:00`);
const ROOMS=["Ameliyathane 1","Ameliyathane 2","Ameliyathane 3","Ameliyathane 4"];

// Ameliyat zaman dilimini bul
const getSurgerySlot=(time)=>{
  if(!time||time==="??:??")return null;
  const h=parseInt(time.split(":")[0]);
  if(h<0||h>23)return null;
  return h;
};

const PERSONNEL_NOTE_PREFIX="[PERSONEL]";
const DOC_NOTE_PREFIX="[EVRAK]";
const getSurgeryPersonnel=(s)=>{
  const m=(s.notes||"").match(/\[PERSONEL\]\s*([^\n]+)/);
  return m?m[1].split(",").map(x=>x.trim()).filter(Boolean):[];
};
const getSurgeryDocs=(s)=>{
  const m=(s.notes||"").match(/\[EVRAK\]\s*([^\n]+)/);
  return m?m[1].split(",").map(x=>x.trim()).filter(Boolean).map(name=>({name})):[];
};
const normalizePersonName=name=>String(name||"").trim().toLocaleLowerCase("tr-TR");
const surgeryHasProfilePersonnel=(s,profile)=>{
  const personnel=getSurgeryPersonnel(s).map(normalizePersonName);
  if(!personnel.length)return false;
  const names=[
    profile?.full_name,
    profile?.name,
    profile?.email,
    profileDisplayName(profile)
  ].map(normalizePersonName).filter(Boolean);
  return names.some(name=>personnel.includes(name));
};
const stripSurgeryMeta=notes=>String(notes||"").split("\n")
  .filter(line=>!line.startsWith(PERSONNEL_NOTE_PREFIX)&&!line.startsWith(DOC_NOTE_PREFIX))
  .join("\n").trim();
const buildSurgeryNotes=(notes,personnel=[],docs=[])=>[
  personnel?.length?`${PERSONNEL_NOTE_PREFIX} ${personnel.join(", ")}`:"",
  docs?.length?`${DOC_NOTE_PREFIX} ${docs.map(d=>d.name||d).filter(Boolean).join(", ")}`:"",
  stripSurgeryMeta(notes)
].filter(Boolean).join("\n");

function ProgramView({surgeries,types,doctors,hospitals,personel=[],onRefresh,profile,onAddSurgery,onNotif}){
  const toast=useToast();
  const [tab,setTab]=useState("today");        // today | calendar | mine | list
  const [selDate,setSelDate]=useState(todayStr);
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [sending,setSending]=useState(false);
  const [viewS,setViewS]=useState(null);
  const [viewPersonnel,setViewPersonnel]=useState([]);

  // Ameliyat ekle modalı (program sekmesinden)
  const [addModal,setAddModal]=useState(null); // {date, time, hospital}
  const emptyAddForm={type:"",hospital:"",doctor:"",time:"09:00",status:"planned",notes:"",adet:1,personnel:[],timeUnknown:false,doctorUnknown:false};
  const [addForm,setAddForm]=useState(emptyAddForm);
  const [addingInline,setAddingInline]=useState(null); // {field}
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);

  useEffect(()=>{
    setViewPersonnel(viewS?getSurgeryPersonnel(viewS):[]);
  },[viewS]);

  const docColorMap=useMemo(()=>{
    const uniq=[...new Set(surgeries.map(s=>s.doctor))];
    const m={};uniq.forEach((d,i)=>{m[d]=DOC_COLORS[i%DOC_COLORS.length];});
    return m;
  },[surgeries]);

  // Seçili günün ameliyatları
  const dayS=useMemo(()=>
    surgeries.filter(s=>s.date===selDate).sort((a,b)=>a.time.localeCompare(b.time))
  ,[surgeries,selDate]);

  // Benim ameliyatlarım: sadece personel listesinde mevcut kullanıcı varsa görünür.
  const mineS=useMemo(()=>
    surgeries.filter(s=>surgeryHasProfilePersonnel(s,profile))
      .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
  ,[surgeries,profile]);

  const mineUpcoming=mineS.filter(s=>s.date>=todayStr&&s.status==="planned");
  const minePast=mineS.filter(s=>s.date<todayStr);
  const mineThisMonth=mineS.filter(s=>s.date.startsWith(fmtDate(today).slice(0,7)));

  // Aylık takvim
  const firstDay=new Date(year,month,1);
  const daysInMonth=new Date(year,month+1,0).getDate();
  const startDow=(firstDay.getDay()+6)%7;
  const weeks=Math.ceil((startDow+daysInMonth)/7);

  const daySurgeries=(d)=>{
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return surgeries.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  };

  const listSurgeries=useMemo(()=>{
    const ms=`${year}-${String(month+1).padStart(2,"0")}`;
    return surgeries.filter(s=>s.date.startsWith(ms))
      .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  },[surgeries,year,month]);

  // Telegram günlük program
  const sendTGDay=async(date)=>{
    setSending(true);
    const ss=surgeries.filter(s=>s.date===date).sort((a,b)=>a.time.localeCompare(b.time));
    if(!ss.length){toast("Bu gün ameliyat yok","warning");setSending(false);return;}
    let msg=`📅 *${fmtTR(date)} Ameliyat Programı*\n\n`;
    ss.forEach((s,i)=>{
      const surgeryPersonnel=getSurgeryPersonnel(s);
      msg+=`*${i+1}.* ${s.time!=="??:??"?`⏰ ${s.time}`:""} — *${s.type}*\n`;
      msg+=`  🏥 ${s.hospital}\n  👨‍⚕️ ${s.doctor}\n\n`;
      if(surgeryPersonnel.length)msg+=`  Personel: ${surgeryPersonnel.join(", ")}\n\n`;
    });
    msg+=`_Toplam: ${ss.length} ameliyat_`;
    await sendTelegram(msg);
    toast("Telegram'a gönderildi ✓","success");
    setSending(false);
  };

  // Telegram aylık
  const sendTGMonth=async()=>{
    setSending(true);
    const ms=`${year}-${String(month+1).padStart(2,"0")}`;
    const data=surgeries.filter(s=>s.date.startsWith(ms))
      .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    if(!data.length){toast("Bu ay ameliyat yok","warning");setSending(false);return;}
    let msg=`📅 *${MONTHS[month]} ${year} Ameliyat Programı*\n\n`;
    let lastDate="";
    data.forEach(s=>{
      if(s.date!==lastDate){msg+=`\n📌 *${fmtTR(s.date)}*\n`;lastDate=s.date;}
      msg+=`  ⏰ ${s.time} — ${s.type} — ${s.doctor}\n`;
    });
    msg+=`\n_Toplam: ${data.length} ameliyat_`;
    await sendTelegram(msg);
    toast("Telegram'a gönderildi ✓","success");
    setSending(false);
  };

  // Hızlı ameliyat ekle
  const quickAdd=async()=>{
    if(!addForm.type||!addForm.hospital||(!addForm.doctor&&!addForm.doctorUnknown)){
      toast("Tür, hastane ve doktor zorunlu","warning");return;
    }
    const {personnel,timeUnknown,doctorUnknown,...payload}=addForm;
    const notes=buildSurgeryNotes(payload.notes,personnel,[]);
    const{error}=await SB.from("surgeries").insert({
      ...payload,
      doctor:doctorUnknown?"Bilinmiyor":payload.doctor,
      notes,date:addModal.date,time:timeUnknown?"??:??":(payload.time||addModal.time||"09:00"),
      adet:Number(addForm.adet)||1,created_by:profile?.id,
    });
    if(error)return toast(error.message,"error");
    toast("Ameliyat programa eklendi ✓","success");
    if(onNotif)onNotif(`Yeni ameliyat: ${payload.type} - ${fmtTR(addModal.date)}`);
    setAddModal(null);setAddForm(emptyAddForm);
    onRefresh();
  };

  const openProgramAdd=(data)=>{
    setAddForm({...emptyAddForm,time:data.time||"09:00",hospital:data.hospital||""});
    setAddModal(data);
  };

  const toggleViewPersonnel=name=>{
    setViewPersonnel(prev=>prev.includes(name)?prev.filter(x=>x!==name):[...prev,name]);
  };

  const saveViewPersonnel=async()=>{
    if(!viewS)return;
    const newNotes=buildSurgeryNotes(stripSurgeryMeta(viewS.notes),viewPersonnel,getSurgeryDocs(viewS));
    const {error}=await SB.from("surgeries").update({notes:newNotes,updated_at:new Date().toISOString()}).eq("id",viewS.id);
    if(error)return toast(error.message,"error");
    const updated={...viewS,notes:newNotes};
    setViewS(updated);
    toast("Personel ataması kaydedildi ✓","success");
    if(onNotif)onNotif(`Personel atandı: ${viewS.type} - ${fmtTR(viewS.date)}`);
    onRefresh();
  };

  const tabs=[
    {id:"today",label:"Günün Programı",icon:"⏰"},
    {id:"calendar",label:"Takvim",icon:"📅"},
    {id:"mine",label:"Benim Ameliyatlarım",icon:"👤"},
    {id:"list",label:"Aylık Liste",icon:"≡"},
  ];

  return(
    <div className="space-y-4">

      {/* Hızlı Ameliyat Ekle Modal */}
      {addModal&&(
        <Modal title={`➕ ${fmtTR(addModal.date)} — ${addModal.time||"?"} Ameliyat Ekle`}
          onClose={()=>setAddModal(null)} size="md"
          footer={<div className="flex gap-2">
            <button onClick={()=>setAddModal(null)} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button>
            <button onClick={quickAdd} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Programa Ekle</button>
          </div>}>
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <Label required>Saat</Label>
                <div className="space-y-2">
                  {!addForm.timeUnknown&&<Input type="time" value={addForm.time} onChange={e=>setAddForm(p=>({...p,time:e.target.value}))}/>}
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={addForm.timeUnknown} onChange={e=>setAddForm(p=>({...p,timeUnknown:e.target.checked}))} className="rounded"/>
                    <span className="text-xs text-slate-400">Saat bilinmiyor</span>
                  </label>
                </div>
              </div>
              <div>
                <Label>Durum</Label>
                <Select value={addForm.status} onChange={e=>setAddForm(p=>({...p,status:e.target.value}))}>
                  <option value="planned">Planlandı</option>
                  <option value="done">Tamamlandı</option>
                  <option value="cancelled">İptal</option>
                  <option value="postponed">Ertelendi</option>
                </Select>
              </div>
            </div>
            <div>

            </div>
            {mineS.length===0?(
              <div className="px-5 py-12 text-center">
                <div className="text-3xl opacity-20 mb-3">⚕</div>
                <p className="text-slate-500 text-sm">Size atanmış ameliyat yok</p>
                <p className="text-xs text-slate-600 mt-1">Programdan personel olarak seçildiğiniz ameliyatlar burada görünür</p>
              </div>
            ):(
              <div className="divide-y divide-white/5 max-h-96 overflow-y-auto">
                {mineS.map(s=>{
                  const dc=docColorMap[s.doctor]||"#3b82f6";
                  const isPast=s.date<todayStr;
                  return(
                    <div key={s.id} className={`table-row px-5 py-3 flex items-center gap-3 cursor-pointer ${isPast?"opacity-60":""}`}
                      onClick={()=>{setSelDate(s.date);setTab("today");}}>
                      <div className="w-1 h-10 rounded-full flex-shrink-0" style={{background:dc}}></div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-white truncate">{s.type}</div>
                        <div className="text-xs text-slate-500">{fmtTR(s.date)} · {s.time!=="??:??"?s.time+" · ":""}{s.hospital}</div>
                        <div className="text-xs" style={{color:dc}}>{s.doctor}</div>
                      </div>
                      <Badge status={s.status}/>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {!profile&&(
            <div className="card rounded-2xl p-6 text-center border border-amber2/20 bg-amber2/5">
              <p className="text-amber2 text-sm font-semibold">Kişisel ameliyatları görmek için giriş yapmalısınız</p>
            </div>
          )}
        </div>
      )}

      {/* ───── AY LİSTESİ ─────────────────────────────────── */}
      {tab==="list"&&(
        <div className="space-y-4">
          <div className="card rounded-2xl px-5 py-4 flex items-center gap-4">
            <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}
              className="w-9 h-9 rounded-xl hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">‹</button>
            <span className="flex-1 text-center font-bold text-white">{MONTHS[month]} {year}</span>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}
              className="w-9 h-9 rounded-xl hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">›</button>
          </div>

          <div className="card rounded-2xl overflow-hidden">
            {listSurgeries.length===0?(
              <div className="px-5 py-12 text-center text-slate-500 text-sm">Bu ay ameliyat yok</div>
            ):(()=>{
              // Tarih bazında grupla
              const groups={};
              listSurgeries.forEach(s=>{if(!groups[s.date])groups[s.date]=[];groups[s.date].push(s);});
              return Object.entries(groups).map(([date,ss])=>(
                <div key={date} className="border-b border-white/8 last:border-b-0">
                  <div className="px-5 py-2.5 bg-navy-900/50 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <span className="text-sm font-bold text-white">{fmtTR(date)}</span>
                      {date===todayStr&&<span className="px-2 py-0.5 rounded-full text-[10px] font-bold bg-brand text-white">Bugün</span>}
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-slate-500">{ss.length} ameliyat</span>
                      <button onClick={()=>{setSelDate(date);setTab("today");}}
                        className="text-xs text-brand-300 hover:text-brand-200 transition-colors">Programa Git →</button>
                    </div>
                  </div>
                  {ss.map(s=>(
                    <div key={s.id} className="table-row px-5 py-3 flex items-center gap-3">
                      <div className="w-1 h-8 rounded-full flex-shrink-0" style={{background:docColorMap[s.doctor]||"#3b82f6"}}></div>
                      <div className="text-xs font-mono text-slate-500 w-12 flex-shrink-0">{s.time!=="??:??"?s.time:"??:??"}</div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-white truncate">{s.type}</div>
                        <div className="text-xs text-slate-500 truncate">{s.hospital} · {s.doctor}</div>
                      </div>
                      <Badge status={s.status}/>
                    </div>
                  ))}
                </div>
              ));
            })()}
          </div>
        </div>
      )}
    </div>
  );
}


// ─── PRODUCTS VIEW ────────────────────────────────────────────────────────────
function UrunlerView({urunler,stoklar,hospitals,loadAll}){
  const toast=useToast();
  const [modal,setModal]=useState(null);          // null | true | urun_obj
  const [delConf,setDelConf]=useState(null);
  const [search,setSearch]=useState("");
  const [scanInput,setScanInput]=useState("");
  const [scanResult,setScanResult]=useState(null); // parsed GS1
  const [scanStatus,setScanStatus]=useState("");   // "" | "new" | "exists"
  const [matchedUrun,setMatchedUrun]=useState(null);
  const [cameraModal,setCameraModal]=useState(false);
  const scanRef=useRef(null);
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);

  // Form state — genişletildi: lot, expiryDate, mfgDate, initialStockQty, initialStockHospital
  const emptyForm={name:"",code:"",unit:"adet",min_stock:0,category:"",description:"",
    manufacturer:"",gtin:"",udi:"",
    addInitialStock:false,initialStockQty:1,initialStockHospital:"",
    lot:"",expiryDate:"",mfgDate:""};
  const [f,setF]=useState(emptyForm);

  const filtered=urunler.filter(u=>{
    const q=search.toLowerCase();
    const lots=stoklar.filter(s=>s.urun_id===u.id).map(s=>s.lot).join(" ").toLowerCase();
    return !search||u.name.toLowerCase().includes(q)||u.code?.toLowerCase().includes(q)||u.manufacturer?.toLowerCase().includes(q)||lots.includes(q);
  });
  const stockRowsForProduct=urunId=>stoklar.filter(s=>s.urun_id===urunId&&Number(s.quantity||0)>0);

  // ── Barkod okuma ─────────────────────────────────────────────────────────
  const doScan=(raw)=>{
    if(!raw.trim())return;
    const p=parseGS1(raw.trim());
    setScanResult(p);
    setScanInput("");

    // Katalogda bu REF/GTIN var mı?
    const existing=urunler.find(u=>
      (u.code&&(u.code===p.ref||u.code===p.gtin?.replace(/^0+/,"")))||
      (u.gtin&&u.gtin===p.gtin)
    );

    if(existing){
      // Ürün zaten var → stok girişi yap
      setScanStatus("exists");
      setMatchedUrun(existing);
      setF({...emptyForm,
        ...existing,
        addInitialStock:true,
        initialStockQty:p.qty||1,
        name:p.productName||existing.name||"",
        code:p.ref||existing.code||"",
        manufacturer:p.manufacturer||existing.manufacturer||"",
        udi:p.udi||raw.trim(),
        gtin:p.gtin||existing.gtin||"",
        lot:p.lot||"",
        expiryDate:p.expiryDate||"",
        mfgDate:p.mfgDate||"",
      });
    }else{
      // Yeni ürün → formu doldur
      setScanStatus("new");
      setMatchedUrun(null);
      setF({...emptyForm,
        name:p.productName||"",
        code:p.ref||"",
        manufacturer:p.manufacturer||"",
        category:p.manufacturer==="Arthrex"?"İmplant":"",
        description:p.size?`Ölçü: ${p.size}`:"",
        gtin:p.gtin||"",
        udi:p.udi||raw.trim(),
        lot:p.lot||"",
        expiryDate:p.expiryDate||"",
        mfgDate:p.mfgDate||"",
        addInitialStock:true,
        initialStockQty:p.qty||1,
      });
    }
    setModal(true);
  };

  const applyUdiToForm=(raw)=>{
    if(!raw?.trim())return;
    const p=parseGS1(raw.trim());
    const hasData=!!(p.ref||p.gtin||p.lot||p.serial||p.expiryDate||p.mfgDate||p.qty>1||p.productName||p.manufacturer);
    if(!hasData)return;
    setScanResult(p);
    setScanStatus(prev=>prev||"new");
    setF(prev=>({
      ...prev,
      name:p.productName||prev.name,
      code:p.ref||prev.code,
      manufacturer:p.manufacturer||prev.manufacturer,
      category:prev.category||(p.manufacturer==="Arthrex"?"İmplant":""),
      description:prev.description||(p.size?`Ölçü: ${p.size}`:""),
      gtin:p.gtin||prev.gtin,
      udi:p.udi||raw.trim(),
      lot:p.lot||prev.lot,
      expiryDate:p.expiryDate||prev.expiryDate,
      mfgDate:p.mfgDate||prev.mfgDate,
      initialStockQty:p.qty||prev.initialStockQty,
      addInitialStock:true
    }));
    toast("UDI bilgileri forma aktarıldı","success");
  };
  const productNameForSave=()=>(
    (f.name||"").trim()||
    (f.code?`REF ${f.code}`:"")||
    (f.gtin?`REF ${f.gtin.replace(/^0+/,"")}`:"")||
    (f.udi?`UDI ${String(f.udi).slice(0,32)}`:"")||
    "İsimsiz Ürün"
  );

  // ── Kaydet ───────────────────────────────────────────────────────────────
  const save=async()=>{
    const normalizedForm={...f,name:productNameForSave()};

    let urunId=null;
    const isNew=modal===true&&!matchedUrun;

    if(isNew){
      const duplicate=urunler.find(u=>
        (normalizedForm.code&&u.code&&u.code.toLocaleLowerCase("tr-TR")===normalizedForm.code.toLocaleLowerCase("tr-TR"))||
        (normalizedForm.gtin&&u.gtin&&u.gtin===normalizedForm.gtin)
      );
      if(duplicate){
        setMatchedUrun(duplicate);
        setScanStatus("exists");
        setF(p=>({...p,...duplicate,addInitialStock:true,initialStockQty:p.initialStockQty||1,lot:p.lot,expiryDate:p.expiryDate,mfgDate:p.mfgDate,udi:p.udi||duplicate.udi||""}));
        toast("Bu REF/GTIN zaten kayıtlı. Yeni kayıt yerine mevcut ürüne stok ekleyebilirsiniz.","warning");
        return;
      }
      // Yeni ürün ekle
      const detailLines=[
        normalizedForm.description||"",
        normalizedForm.manufacturer?`Üretici: ${normalizedForm.manufacturer}`:"",
        normalizedForm.gtin?`GTIN: ${normalizedForm.gtin}`:"",
        normalizedForm.udi?`UDI/Barkod: ${normalizedForm.udi}`:"",
        normalizedForm.lot?`LOT: ${normalizedForm.lot}`:"",
        normalizedForm.mfgDate?`Üretim: ${normalizedForm.mfgDate}`:"",
        normalizedForm.expiryDate?`SKT: ${normalizedForm.expiryDate}`:"",
      ].filter(Boolean);
      const payload=productPayload({...normalizedForm,description:detailLines.join("\n")});
      const{data,error}=await SB.from("urunler").insert(payload).select().single();
      if(error)return toast(error.message,"error");
      urunId=data.id;
      toast("Ürün kataloğa eklendi ✓","success");
    }else if(matchedUrun){
      // Mevcut ürünü güncelle
      const detailLines=[
        normalizedForm.description||"",
        normalizedForm.manufacturer?`Üretici: ${normalizedForm.manufacturer}`:"",
        normalizedForm.gtin?`GTIN: ${normalizedForm.gtin}`:"",
        normalizedForm.udi?`UDI/Barkod: ${normalizedForm.udi}`:"",
        normalizedForm.lot?`LOT: ${normalizedForm.lot}`:"",
        normalizedForm.mfgDate?`Üretim: ${normalizedForm.mfgDate}`:"",
        normalizedForm.expiryDate?`SKT: ${normalizedForm.expiryDate}`:"",
      ].filter(Boolean);
      const{error}=await SB.from("urunler").update(productPayload({...normalizedForm,description:detailLines.join("\n")})).eq("id",matchedUrun.id);
      if(error)return toast(error.message,"error");
      urunId=matchedUrun.id;
      toast("Ürün güncellendi ✓","success");
    }else{
      // Edit mode
      const detailLines=[
        normalizedForm.description||"",
        normalizedForm.manufacturer?`Üretici: ${normalizedForm.manufacturer}`:"",
        normalizedForm.gtin?`GTIN: ${normalizedForm.gtin}`:"",
        normalizedForm.udi?`UDI/Barkod: ${normalizedForm.udi}`:"",
        normalizedForm.lot?`LOT: ${normalizedForm.lot}`:"",
        normalizedForm.mfgDate?`Üretim: ${normalizedForm.mfgDate}`:"",
        normalizedForm.expiryDate?`SKT: ${normalizedForm.expiryDate}`:"",
      ].filter(Boolean);
      const{error}=await SB.from("urunler").update(productPayload({...normalizedForm,description:detailLines.join("\n")})).eq("id",modal.id);
      if(error)return toast(error.message,"error");
      urunId=modal.id;
      toast("Güncellendi ✓","success");
    }

    // Başlangıç stok + hareket kaydı
    if(f.addInitialStock&&urunId){
      const qty=Number(f.initialStockQty)||1;
      let shelf;
      try{shelf=f.initialStockHospital?{id:f.initialStockHospital}:await ensureCompanyShelf(hospitals);}
      catch(e){toast(e.message,"error");return;}
      const existing=findStockRow(stoklar,urunId,shelf.id,f.lot);
      let stockError=null;
      if(existing){
        const {error}=await updateStockQuantity(existing,(existing.quantity||0)+qty);
        stockError=error;
      }else{
        const {error}=await insertStockQuantity(urunId,shelf.id,qty,f.lot,f.expiryDate,f.mfgDate);
        stockError=error;
      }
      if(stockError)return toast("Ürün eklendi fakat stok kaydedilemedi: "+stockError.message,"error");
      const note=`Ana depo girişi${f.udi?` — UDI:${f.udi}`:""}${f.code?` — REF:${f.code}`:""}${f.lot?` — LOT:${f.lot}`:""}${f.mfgDate?` — ÜRT:${f.mfgDate}`:""}${f.expiryDate?` — SKT:${f.expiryDate}`:""}`;
      const {error:movementError}=await insertMovement(movementPayload({urun_id:urunId,hospital_id:shelf.id,lot:f.lot,type:"in",quantity:qty,notes:note}));
      if(movementError)toast("Stok eklendi ama hareket kaydı yazılamadı: "+movementError.message,"warning");
      toast(`${qty} adet ana depoya kaydedildi ✓`,"success");
    }

    rememberBarcodeCatalog(normalizedForm);
    setModal(null);setScanResult(null);setScanStatus("");setMatchedUrun(null);
    loadAll();
  };

  const openEdit=(u)=>{setScanResult(null);setScanStatus("");setMatchedUrun(null);
    setF({name:u.name,code:u.code||"",unit:u.unit||"adet",min_stock:u.min_stock||0,
      category:u.category||"",description:u.description||"",manufacturer:u.manufacturer||"",
      gtin:u.gtin||"",udi:u.udi||"",addInitialStock:false,initialStockQty:1,initialStockHospital:"",
      lot:"",expiryDate:"",mfgDate:""});
    setModal(u);
  };
  const openAdd=()=>{setScanResult(null);setScanStatus("");setMatchedUrun(null);
    setF(emptyForm);setModal(true);};

  const del=async(id)=>{
    const{error}=await SB.from("urunler").delete().eq("id",id);
    if(error)return toast(error.message,"error");
    toast("Silindi","success");setDelConf(null);loadAll();
  };

  const totalStok=(id)=>stoklar.filter(s=>s.urun_id===id).reduce((a,b)=>a+(b.quantity||0),0);
  const minStok=(u)=>u.min_stock||0;
  const critical=urunler.filter(u=>totalStok(u.id)>0&&totalStok(u.id)<=minStok(u)).length;
  const empty2=urunler.filter(u=>totalStok(u.id)===0).length;
  const ok=urunler.filter(u=>totalStok(u.id)>minStok(u)).length;

  const isExpiredScan=scanResult?.expiryDate&&new Date(scanResult.expiryDate)<new Date();
  const daysLeft=scanResult?.expiryDate?Math.floor((new Date(scanResult.expiryDate)-new Date())/86400000):null;
  const modalTitle=scanStatus==="exists"?`Stok Ekle — ${matchedUrun?.name}`:
    scanStatus==="new"?"Yeni Ürün (Barkoddan)":
    modal===true?"Yeni Ürün":"Ürünü Düzenle";

  return(
    <div className="space-y-5">
      {cameraModal&&<BarcodeCameraModal onDetected={doScan} onClose={()=>setCameraModal(false)}/>}
      {delConf&&(
        <Modal title="Ürünü Sil" onClose={()=>setDelConf(null)} size="sm"
          footer={<div className="flex gap-2">
            <button onClick={()=>setDelConf(null)} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button>
            <button onClick={()=>del(delConf)} className="flex-1 py-2.5 rounded-xl btn-danger text-white text-sm font-bold">Sil</button>
          </div>}>
          <p className="text-slate-300 text-sm">Bu ürünü silmek istediğinize emin misiniz?</p>
        </Modal>
      )}

      {modal&&(
        <Modal title={modalTitle} onClose={()=>{setModal(null);setScanResult(null);setScanStatus("");setMatchedUrun(null);}} size="lg"
          footer={<div className="flex gap-2">
            <button onClick={()=>{setModal(null);setScanResult(null);setScanStatus("");}} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button>
            <button onClick={save} disabled={isExpiredScan&&f.addInitialStock} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold disabled:opacity-40">
              {isExpiredScan&&f.addInitialStock?"⚠ SKT Geçmiş":"✓ Kaydet"}
            </button>
          </div>}>
          <div className="space-y-4">

            {/* Barkod sonucu bilgi kutusu */}
            {scanResult&&(
              <div className={`rounded-xl p-3 border fade-up ${isExpiredScan?"bg-rose2/10 border-rose2/30":scanStatus==="exists"?"bg-amber2/10 border-amber2/25":"bg-emerald2/8 border-emerald2/25"}`}>
                <div className="flex items-center gap-2 mb-2.5">
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${
                    isExpiredScan?"bg-rose2/20 text-rose2 border-rose2/30":
                    scanStatus==="exists"?"bg-amber2/20 text-amber2 border-amber2/30":
                    "bg-emerald2/20 text-emerald2 border-emerald2/30"}`}>
                    {isExpiredScan?"⚠ SKT GEÇMİŞ":scanStatus==="exists"?"↻ Mevcut Ürün Bulundu":"✓ Yeni Ürün Barkoddan"}
                  </span>
                  {scanStatus==="exists"&&<span className="text-xs text-slate-400">Sadece stok eklenecek</span>}
                </div>
                <div className="grid grid-cols-3 gap-1.5">
                  {[
                    {l:"REF",v:scanResult.ref||scanResult.gtin?.slice(-8)||"—"},
                    {l:"UDI",v:scanResult.udi||"—"},
                    {l:"Lot",v:scanResult.lot||"—"},
                    {l:"Seri",v:scanResult.serial||"—"},
                    {l:"SKT",v:scanResult.expiryDate||"—",warn:isExpiredScan},
                    {l:"Üretim",v:scanResult.mfgDate||"—"},
                    {l:"Adet",v:String(scanResult.qty||1)},
                  ].map(r=>(
                    <div key={r.l} className="bg-navy-800 rounded-lg p-2">
                      <div className="text-[9px] text-slate-500 mb-0.5">{r.l}</div>
                      <div className={`text-xs font-bold truncate ${r.warn?"text-rose2":"text-white"}`}>{r.v}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {scanStatus!=="exists"&&(
              <>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div><Label>REF / Referans Numarası</Label><Input value={f.code} onChange={e=>setF(p=>({...p,code:e.target.value}))} className="font-mono" placeholder="AR-2323BCC"/></div>
                  <div><Label>LOT Numarası</Label><Input value={f.lot} onChange={e=>setF(p=>({...p,lot:e.target.value}))} className="font-mono" placeholder="15485965"/></div>
                  <div><Label>Adet</Label><Input type="number" min="1" value={f.initialStockQty} onChange={e=>setF(p=>({...p,initialStockQty:e.target.value,addInitialStock:true}))}/></div>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  <div>
                    <Label>Birim</Label>
                    <Select value={f.unit} onChange={e=>setF(p=>({...p,unit:e.target.value}))}>
                      {["adet","kutu","paket","set","şişe","ampul","ml","gr"].map(u=><option key={u}>{u}</option>)}
                    </Select>
                  </div>
                  <div>
                    <Label>Kritik Stok</Label>
                    <Input type="number" min="0" value={f.min_stock} onChange={e=>setF(p=>({...p,min_stock:Number(e.target.value)}))}/>
                  </div>
                  <div>
                    <Label>Üretici</Label>
                    <Input value={f.manufacturer} onChange={e=>setF(p=>({...p,manufacturer:e.target.value}))} placeholder="Arthrex, Stryker…"/>
                  </div>
                </div>
                <input type="hidden" value={f.name} readOnly/>
              </>
            )}

            {/* Lot / SKT bilgileri */}
            {(scanResult||scanStatus==="exists"||modal===true)&&(
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <div>
                  <Label>UDI / Barkod No</Label>
                  <div className="flex gap-2">
                    <Input value={f.udi} onChange={e=>setF(p=>({...p,udi:e.target.value}))} onBlur={e=>applyUdiToForm(e.target.value)} className="font-mono" placeholder="UDI barkod numarası"/>
                    <button type="button" onClick={()=>applyUdiToForm(f.udi)} className="px-3 rounded-xl bg-brand/20 hover:bg-brand/30 text-brand-300 text-xs font-bold border border-brand/25">Oku</button>
                  </div>
                </div>
                <div>
                  <Label>Lot Numarası</Label>
                  <Input value={f.lot} onChange={e=>setF(p=>({...p,lot:e.target.value}))} className="font-mono" placeholder="15485965"/>
                </div>
                <div>
                  <Label>Son Kullanma (SKT)</Label>
                  <Input type="date" value={f.expiryDate} onChange={e=>setF(p=>({...p,expiryDate:e.target.value}))}
                    className={f.expiryDate&&new Date(f.expiryDate)<new Date()?"border-rose2!":""}/>
                  {f.expiryDate&&new Date(f.expiryDate)<new Date()&&(
                    <p className="text-xs text-rose2 mt-0.5 font-semibold">⚠ Tarih geçmiş!</p>
                  )}
                </div>
                <div>
                  <Label>Üretim Tarihi</Label>
                  <Input type="date" value={f.mfgDate} onChange={e=>setF(p=>({...p,mfgDate:e.target.value}))}/>
                </div>
              </div>
            )}

            {/* Başlangıç stok toggle */}
            <div className={`rounded-xl border transition-all ${f.addInitialStock?"border-brand/30 bg-brand/5":"border-white/8 bg-navy-800/50"}`}>
              <div className="flex items-center justify-between px-4 py-3">
                <div>
                  <div className="text-sm font-semibold text-white">Ana Depoya Stok Girişi Yap</div>
                  <div className="text-xs text-slate-500">Barkodlu ürün önce ana depoya eklenir</div>

// ─── GS1 BARCODE PARSER ──────────────────────────────────────────────────────
/**
 * Arthrex / medikal etiketleri GS1-128 veya GS1 DataMatrix formatı kullanır.
 * USB barkod okuyucu klavye girişi gibi çalışır → Enter ile tamamlar.
 * Format: 010088886702672817290731101548596521
 * AI (01)=GTIN  (17)=SKT  (10)=Lot  (11)=Üretim  (21)=Seri  (30)=Adet
 */
const normalizeBarcodeDate=(val)=>{
  if(!val)return null;
  const s=String(val).trim();
  let m=s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
  if(m)return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  m=s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  m=s.match(/^(\d{6})$/);
  if(m){
    const yy=s.slice(0,2),mm=s.slice(2,4),dd=s.slice(4,6);
    const year=parseInt(yy,10)+(parseInt(yy,10)<50?2000:1900);
    return `${year}-${mm}-${dd==="00"?"01":dd}`;
  }
  m=s.match(/^(\d{8})$/);
  if(m)return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  return null;
};

const readLabeledValue=(text,labels)=>{
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const joined=[...labels].sort((a,b)=>b.length-a.length).map(esc).join("|");
  const re=new RegExp(`(?:^|[\\s;,|])(?:${joined})\\s*(?:[:=#-]|=)?\\s*([^\\s;,|]+)`,"i");
  const m=text.match(re);
  return m?m[1].replace(/^["']|["']$/g,"").trim():"";
};
const extractLabelDates=text=>[...String(text||"").matchAll(/\b(?:\d{4}[-/.]\d{1,2}[-/.]\d{1,2}|\d{1,2}[-/.]\d{1,2}[-/.]\d{4})\b/g)]
  .map(m=>normalizeBarcodeDate(m[0])).filter(Boolean);
const extractArthrexProduct=text=>{
  const clean=String(text||"").replace(/\s+/g," ").trim();
  const m=clean.match(/(Suture Anchor,\s*[^]+?)(?=\s+(?:UDI|REF|LOT|QTY|\(01\)|Arthrex\b))/i);
  return m?m[1].replace(/\s+/g," ").trim():"";
};
const extractArthrexSize=text=>{
  const m=String(text||"").match(/\b\d+(?:[.,]\d+)?\s*x\s*\d+(?:[.,]\d+)?\s*mm\b/i);
  return m?m[0].replace(/\s+/g," ").replace(",","."):"";
};
const KNOWN_UDI_CATALOG={

    ref:"AR-2323BCC",
    lot:"15485965",
    mfgDate:"2025-08-21",
    expiryDate:"2029-07-31",

    productName:"FiberLink Braided Polyblend Suture Blue"
  }
};
const LEARNED_UDI_CATALOG_KEY="artroplus_learned_udi_catalog_v1";
const safeReadLearnedCatalog=()=>{
  try{return JSON.parse(localStorage.getItem(LEARNED_UDI_CATALOG_KEY)||"{}")||{};}
  catch{return {};}
};
const safeWriteLearnedCatalog=catalog=>{
  try{localStorage.setItem(LEARNED_UDI_CATALOG_KEY,JSON.stringify(catalog));}
  catch{}
};
const catalogKey=value=>String(value||"").trim().toUpperCase();
const catalogDigitKey=value=>String(value||"").replace(/\D/g,"");
const catalogLookupKeys=result=>{
  const raw=catalogKey(result.udi);
  const gtin=catalogDigitKey(result.gtin);
  const udiDigits=catalogDigitKey(result.udi);
  return [
    raw,
    gtin,
    gtin.replace(/^0+/,""),
    udiDigits,
    udiDigits.replace(/^0+/,""),
    catalogKey(result.ref),
    catalogKey(result.lot),
    result.ref&&result.lot?`${catalogKey(result.ref)}|${catalogKey(result.lot)}`:"",
  ].filter(Boolean);
};
const applyKnownUdiCatalog=result=>{
  const learned=safeReadLearnedCatalog();
  const keys=catalogLookupKeys(result);
  const known=keys.map(k=>KNOWN_UDI_CATALOG[k]||learned[k]).find(Boolean);
  if(!known)return result;
  Object.entries(known).forEach(([k,v])=>{
    if(v!==undefined&&(
      k==="ref"||k==="lot"||k==="expiryDate"||k==="mfgDate"||
      result[k]===undefined||result[k]===null||result[k]===""||(k==="qty"&&result[k]===1)
    ))result[k]=v;
  });
  return result;
};
const rememberBarcodeCatalog=form=>{
  const ref=catalogKey(form.code||form.ref);
  const lot=catalogKey(form.lot);
  if(!ref&&!lot)return;
  const entry={
    ref:ref||undefined,
    lot:lot||undefined,
    mfgDate:form.mfgDate||null,
    expiryDate:form.expiryDate||null,
    qty:Number(form.initialStockQty||form.qty)||1,
    manufacturer:form.manufacturer||"",
    productName:form.name||"",
  };
  const keys=[
    catalogKey(form.udi),
    catalogDigitKey(form.udi),
    catalogDigitKey(form.udi).replace(/^0+/,""),
    catalogDigitKey(form.gtin),
    catalogDigitKey(form.gtin).replace(/^0+/,""),
    ref,
    lot,
    ref&&lot?`${ref}|${lot}`:"",
  ].filter(Boolean);
  if(!keys.length)return;
  const catalog=safeReadLearnedCatalog();
  keys.forEach(k=>{catalog[k]={...(catalog[k]||{}),...entry};});
  safeWriteLearnedCatalog(catalog);
};

function parseGS1(raw){
  const result={gtin:"",lot:"",serial:"",expiryDate:null,mfgDate:null,qty:1,ref:"",udi:String(raw||"").trim(),productName:"",manufacturer:"",size:""};
  if(!raw||raw.length<4)return result;

  // Remove GS1 prefix identifiers ]d2 ]C1 ]e0 etc.
  let s=raw.replace(/^\].[0-9]/,"").replace(/^\][a-zA-Z][0-9]/,"").trim();
  const original=s;
  if(/arthrex/i.test(original))result.manufacturer="Arthrex";
  result.productName=extractArthrexProduct(original);
  result.size=extractArthrexSize(original);
  const digitsOnly=original.replace(/\D/g,"");
  if(/^\d{12,14}$/.test(digitsOnly)){
    result.gtin=digitsOnly.padStart(14,"0");
    result.ref=result.gtin.replace(/^0+/,"");
  }
  const inlineRef=original.match(/\b[A-Z]{1,6}-\d{2,}[A-Z0-9-]*\b/i);
  if(inlineRef&&!result.ref)result.ref=inlineRef[0].toUpperCase();
  const aiPairs=[];
  original.replace(/\((\d{2,4})\)\s*([^\(]+)/g,(_,ai,val)=>{
    aiPairs.push([ai,val.trim()]);
    return "";
  });

  // GS char (ASCII 29) as separator
  const GS="\x1d";

  const FIXED={
    "00":18,"01":14,"02":14,"03":14,
    "11":6,"12":6,"13":6,"15":6,"16":6,"17":6,
    "18":6,"19":6,"20":2,
    "31":10,"32":10,"33":10,"34":10,"35":10,"36":10,
    "41":14,
  };

  const applyAI=(ai,val)=>{
    switch(ai){
      case"01":case"02":
        result.gtin=val;
        // Last 4-8 chars of GTIN often map to REF
        if(!result.ref)result.ref=val.replace(/^0+/,"");
        break;
      case"10": result.lot=val; break;
      case"21": result.serial=val; break;
      case"17":{
        const d=normalizeBarcodeDate(val);
        if(d)result.expiryDate=d.replace(/-00$/,"-28");
        break;
      }
      case"11":{
        const d=normalizeBarcodeDate(val);
        if(d)result.mfgDate=d;
        break;
      }
      case"30":case"37":
        result.qty=parseInt(val)||1;
        break;
      default: break;
    }
  };

  if(aiPairs.length){
    aiPairs.forEach(([ai,val])=>applyAI(ai,FIXED[ai]?val.slice(0,FIXED[ai]):val));
  }else{
    let i=0;
    let safety=0;
    while(i<s.length&&safety<30){
      safety++;
      const ai2=s.slice(i,i+2);

      let ai="",len=0;
      if(FIXED[ai2]!==undefined){ai=ai2;len=FIXED[ai2];}
      else{ai=ai2;len=-1;} // variable

      if(!ai){i++;continue;}

      let val;
      if(len>0){
        val=s.slice(i+ai.length,i+ai.length+len);
        i+=ai.length+len;
      }else{
        // variable length — read until GS or end
        const gsIdx=s.indexOf(GS,i+ai.length);
        const end=gsIdx===-1?s.length:gsIdx;
        val=s.slice(i+ai.length,end);
        i=end+(gsIdx===-1?0:1);
      }

      applyAI(ai,val);
    }
  }

  const labeledRef=readLabeledValue(original,["REF","REF NO","REFERANS","REFERENCE","KOD","CODE"]);
  const labeledLot=readLabeledValue(original,["LOT","LOT NO","LOTE","BATCH"]);
  const labeledSerial=readLabeledValue(original,["SN","S\\/N","SERIAL","SERİ","SERI"]);
  const labeledUdi=readLabeledValue(original,["UDI","UDI-DI","BARKOD","BARCODE","BARKOD NO"]);
  const labeledQty=readLabeledValue(original,["QTY","QT","MİKTAR","MIKTAR","ADET"]);
  const labeledExp=readLabeledValue(original,["SKT","EXP","EXPIRY","SON KULLANMA","USE BY"]);
  const labeledMfg=readLabeledValue(original,["ÜRT","URT","MFG","MFD","ÜRETİM","URETIM","MANUFACTURE"]);
  if(labeledRef)result.ref=labeledRef;
  if(labeledLot)result.lot=labeledLot;
  if(labeledSerial)result.serial=labeledSerial;
  if(labeledUdi)result.udi=labeledUdi;
  if(labeledQty)result.qty=parseInt(labeledQty,10)||result.qty;
  const expDate=normalizeBarcodeDate(labeledExp);
  const mfgDate=normalizeBarcodeDate(labeledMfg);
  if(expDate)result.expiryDate=expDate;
  if(mfgDate)result.mfgDate=mfgDate;
  const visibleDates=extractLabelDates(original);
  if(!result.mfgDate&&visibleDates[0])result.mfgDate=visibleDates[0];
  if(!result.expiryDate&&visibleDates[1])result.expiryDate=visibleDates[1];
  if(!result.expiryDate&&visibleDates[0]&&/skt|exp|expiry|son kullanma/i.test(original))result.expiryDate=visibleDates[0];

  if(!result.gtin){
    const gtin=readLabeledValue(original,["GTIN","UDI-DI","DI"]);
    if(gtin)result.gtin=gtin;
  }
  if(!result.ref&&result.gtin)result.ref=result.gtin.replace(/^0+/,"");
  return applyKnownUdiCatalog(result);
}

const COMPANY_SHELF_NAME="Şirket Rafı";
const findCompanyShelf=(hospitals)=>hospitals.find(h=>{

const ensureCompanyShelf=async(hospitals)=>{
  const existing=findCompanyShelf(hospitals);
