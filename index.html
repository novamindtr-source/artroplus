<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Enterprise | Medikal Operasyon & ERP</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#3b82f6', dark: '#0f172a' }
                }
            }
        }
    </script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase & SheetJS & Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <!-- React Uygulamasının Bağlanacağı Kök Eleman -->
    <div id="root"></div>

    <!-- React ve JSX Kodlarının Başlangıcı -->
    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // --- SUPABASE BAĞLANTISI ---
        const getSupabase = () => {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (url && key) return supabase.createClient(url, key);
            return null;
        };
        let supabaseClient = getSupabase();

        // --- TOAST BİLDİRİM SİSTEMİ (CONTEXT API) ---
        const ToastContext = createContext();
        const useToast = () => useContext(ToastContext);

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev.filter(t => t.message !== message), { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-enter px-4 py-3 rounded shadow-lg text-white flex items-center gap-2 pointer-events-auto ${t.type === 'error' ? 'bg-red-500' : t.type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`}>
                                <i data-lucide={t.type === 'success' ? 'check-circle' : t.type === 'error' ? 'alert-circle' : 'info'} className="w-5 h-5"></i>
                                {t.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // --- ORTAK BİLEŞENLER ---
        const Modal = ({ title, onClose, children }) => {
            useEffect(() => { lucide.createIcons(); });
            return (
                <div className="fixed inset-0 z-40 flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-lg text-slate-800">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 transition">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto hide-scroll flex-1">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SAYFALAR ---
        
        // 1. Kurulum Sayfası
        const SetupScreen = ({ onSetup }) => {
            const [url, setUrl] = useState('');
            const [key, setKey] = useState('');
            
            return (
                <div className="min-h-screen flex items-center justify-center bg-dark text-white p-4">
                    <div className="bg-slate-800 p-8 rounded-xl w-full max-w-md shadow-2xl border border-slate-700">
                        <div className="flex items-center gap-3 mb-6 justify-center">
                            <i data-lucide="activity" className="text-primary w-8 h-8"></i>
                            <h2 className="text-2xl font-bold">MedTrack Setup</h2>
                        </div>
                        <p className="text-sm text-slate-400 mb-6 text-center">Kurumsal yapı için Supabase API bilgilerini giriniz.</p>
                        <input className="w-full p-3 mb-4 bg-slate-900 border border-slate-700 rounded text-white outline-none focus:border-primary" placeholder="Supabase Project URL" value={url} onChange={e=>setUrl(e.target.value)} />
                        <input className="w-full p-3 mb-6 bg-slate-900 border border-slate-700 rounded text-white outline-none focus:border-primary" placeholder="Anon Public Key" value={key} onChange={e=>setKey(e.target.value)} />
                        <button className="w-full bg-primary hover:bg-blue-600 p-3 rounded font-medium transition" onClick={() => onSetup(url, key)}>Sistemi Başlat</button>
                    </div>
                </div>
            );
        };

        // 2. Giriş Sayfası
        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center bg-dark p-4">
                    <div className="bg-slate-800 p-8 rounded-xl w-full max-w-md shadow-2xl border border-slate-700 text-white">
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-bold text-white mb-2">MedTrack Enterprise</h2>
                            <p className="text-slate-400 text-sm">Operasyon & Stok Yönetim Merkezi</p>
                        </div>
                        <input type="email" placeholder="E-posta" className="w-full p-3 mb-4 bg-slate-900 border border-slate-700 rounded outline-none focus:border-primary" value={email} onChange={e=>setEmail(e.target.value)} />
                        <input type="password" placeholder="Şifre" className="w-full p-3 mb-6 bg-slate-900 border border-slate-700 rounded outline-none focus:border-primary" value={password} onChange={e=>setPassword(e.target.value)} />
                        <button className="w-full bg-primary hover:bg-blue-600 p-3 rounded font-medium transition mb-4" onClick={() => onLogin(email, password)}>Giriş Yap</button>
                        <button className="w-full text-sm text-slate-400 hover:text-white transition" onClick={() => { localStorage.clear(); window.location.reload(); }}>Sistem Ayarlarını Sıfırla (Setup)</button>
                    </div>
                </div>
            );
        };

        // 3. Dashboard
        const Dashboard = () => {
            const [stats, setStats] = useState({ today: 0, pending: 0, total: 0 });
            
            useEffect(() => {
                const fetchStats = async () => {
                    const today = new Date().toISOString().split('T')[0];
                    const { data } = await supabaseClient.from('surgeries').select('*');
                    
                    if (data) {
                        setStats({
                            today: data.filter(s => s.date === today).length,
                            pending: data.filter(s => s.status === 'Planlandı').length,
                            total: data.length
                        });
                    }
                };
                fetchStats();
            }, []);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-slate-800">Operasyon Kontrol Merkezi</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Bugünkü Ameliyatlar</h3>
                            <div className="text-4xl font-bold">{stats.today}</div>
                        </div>
                        <div className="bg-gradient-to-br from-orange-500 to-red-600 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Planlanan (Açık)</h3>
                            <div className="text-4xl font-bold">{stats.pending}</div>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-500 to-teal-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Toplam Operasyon</h3>
                            <div className="text-4xl font-bold">{stats.total}</div>
                        </div>
                    </div>
                </div>
            );
        };

        // 4. Ameliyatlar Modülü (CRUD + Excel)
        const SurgeriesView = () => {
            const toast = useToast();
            const [surgeries, setSurgeries] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0], time: '', is_time_unknown: false,
                type: '', hospital: '', doctor: '', is_doctor_unknown: false, status: 'Planlandı', notes: '', adet: 1
            });

            const loadSurgeries = async () => {
                const { data, error } = await supabaseClient.from('surgeries').select('*').order('date', { ascending: false });
                if (data) setSurgeries(data);
                if (error) toast('Veriler yüklenemedi: ' + error.message, 'error');
            };

            useEffect(() => { loadSurgeries(); }, []);

            // Realtime Güncellemeler (Supabase)
            useEffect(() => {
                const channel = supabaseClient.channel('public:surgeries')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'surgeries' }, payload => {
                        loadSurgeries();
                    }).subscribe();
                return () => { supabaseClient.removeChannel(channel); };
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                let docName = formData.doctor;
                
                // Doktor ismi boş değilse ve Dr. ile başlamıyorsa ekle
                if (!formData.is_doctor_unknown && docName && !docName.startsWith('Dr.')) {
                    docName = 'Dr. ' + docName;
                }

                const payload = { 
                    ...formData, 
                    doctor: docName,
                    time: formData.is_time_unknown ? null : formData.time
                };
                
                const { error } = await supabaseClient.from('surgeries').insert([payload]);
                if (error) {
                    toast(error.message, 'error');
                } else {
                    toast('Ameliyat başarıyla eklendi!', 'success');
                    setIsModalOpen(false);
                    // Formu sıfırla (Tarih bugünde kalsın)
                    setFormData({
                        ...formData, time: '', doctor: '', type: '', notes: '', hospital: '', is_time_unknown: false, is_doctor_unknown: false
                    });
                }
            };

            const exportToExcel = () => {
                if (surgeries.length === 0) {
                    toast('Dışa aktarılacak veri yok.', 'error');
                    return;
                }
                const exportData = surgeries.map((s, index) => ({
                    'Sıra': index + 1,
                    'Tarih': s.date,
                    'Saat': s.is_time_unknown ? 'Saat netleşmedi' : s.time,
                    'Ameliyat': s.type,
                    'Hastane': s.hospital,
                    'Doktor': s.is_doctor_unknown ? 'Doktor netleşmedi' : s.doctor,
                    'Adet': s.adet,
                    'Durum': s.status,
                    'Not': s.notes || '-'
                }));
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Ameliyatlar");
                XLSX.writeFile(workbook, `Ameliyat_Listesi_${new Date().toISOString().split('T')[0]}.xlsx`);
                toast('Excel dosyası indiriliyor', 'success');
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Planlandı': return 'bg-blue-100 text-blue-700';
                    case 'Devam Ediyor': return 'bg-orange-100 text-orange-700';
                    case 'Tamamlandı': return 'bg-green-100 text-green-700';
                    case 'İptal Edildi': return 'bg-red-100 text-red-700';
                    default: return 'bg-slate-100 text-slate-700';
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center flex-wrap gap-4">
                        <h2 className="text-2xl font-bold text-slate-800">Ameliyatlar</h2>
                        <div className="flex gap-2">
                            <button onClick={exportToExcel} className="bg-emerald-600 text-white px-4 py-2 rounded font-medium shadow-md hover:bg-emerald-700 transition flex items-center gap-2">
                                <i data-lucide="file-spreadsheet" className="w-4 h-4"></i> Excel İndir
                            </button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-primary text-white px-4 py-2 rounded font-medium shadow-md hover:bg-blue-600 transition flex items-center gap-2">
                                <i data-lucide="plus" className="w-4 h-4"></i> Yeni Ekle
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-50 text-slate-500">
                                    <tr>
                                        <th className="p-4 font-semibold">Tarih / Saat</th>
                                        <th className="p-4 font-semibold">Ameliyat Türü</th>
                                        <th className="p-4 font-semibold">Hastane & Doktor</th>
                                        <th className="p-4 font-semibold">Adet</th>
                                        <th className="p-4 font-semibold">Durum</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {surgeries.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400">Henüz ameliyat kaydı bulunmuyor.</td></tr> :
                                        surgeries.map(s => (
                                            <tr key={s.id} className="border-t border-slate-100 hover:bg-slate-50 transition cursor-pointer">
                                                <td className="p-4 font-medium text-slate-800">
                                                    <div>{s.date}</div>
                                                    <div className="text-xs text-slate-500 font-normal">{s.is_time_unknown || !s.time ? 'Saat netleşmedi' : s.time}</div>
                                                </td>
                                                <td className="p-4 text-slate-700">{s.type}</td>
                                                <td className="p-4">
                                                    <div className="font-medium text-slate-800">{s.hospital}</div>
                                                    <div className="text-xs text-slate-500">{s.is_doctor_unknown || !s.doctor ? 'Doktor netleşmedi' : s.doctor}</div>
                                                </td>
                                                <td className="p-4 text-slate-700">{s.adet}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${getStatusColor(s.status)}`}>{s.status}</span>
                                                </td>
                                            </tr>
                                        ))
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <Modal title="Yeni Ameliyat Kaydı" onClose={() => setIsModalOpen(false)}>
                            <form onSubmit={handleSave} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tarih</label>
                                        <input type="date" required value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                    </div>
                                    <div>
                                        <label className="flex items-center justify-between text-sm font-medium text-slate-700 mb-1">
                                            <span>Saat</span>
                                            <label className="flex items-center gap-1 cursor-pointer text-xs font-normal text-slate-500">
                                                <input type="checkbox" checked={formData.is_time_unknown} onChange={e=>setFormData({...formData, is_time_unknown: e.target.checked, time: ''})} className="accent-primary" /> Bilinmiyor (?)
                                            </label>
                                        </label>
                                        <input type="time" disabled={formData.is_time_unknown} required={!formData.is_time_unknown} value={formData.time} onChange={e=>setFormData({...formData, time: e.target.value})} className="w-full p-2 border rounded bg-slate-50 disabled:opacity-50 outline-none focus:border-primary" />
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Ameliyat Türü (Örn: Total Diz Protezi)</label>
                                    <input type="text" required placeholder="Tür giriniz..." value={formData.type} onChange={e=>setFormData({...formData, type: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Hastane</label>
                                        <input type="text" required placeholder="Hastane adı..." value={formData.hospital} onChange={e=>setFormData({...formData, hospital: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                    </div>
                                    <div>
                                        <label className="flex items-center justify-between text-sm font-medium text-slate-700 mb-1">
                                            <span>Doktor</span>
                                            <label className="flex items-center gap-1 cursor-pointer text-xs font-normal text-slate-500">
                                                <input type="checkbox" checked={formData.is_doctor_unknown} onChange={e=>setFormData({...formData, is_doctor_unknown: e.target.checked, doctor: ''})} className="accent-primary" /> Bilinmiyor (?)
                                            </label>
                                        </label>
                                        <input type="text" disabled={formData.is_doctor_unknown} required={!formData.is_doctor_unknown} placeholder="İsim (Dr. otomatik eklenir)" value={formData.doctor} onChange={e=>setFormData({...formData, doctor: e.target.value})} className="w-full p-2 border rounded bg-slate-50 disabled:opacity-50 outline-none focus:border-primary" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Adet</label>
                                        <input type="number" min="1" required value={formData.adet} onChange={e=>setFormData({...formData, adet: parseInt(e.target.value)})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Durum</label>
                                        <select value={formData.status} onChange={e=>setFormData({...formData, status: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary">
                                            <option value="Planlandı">Planlandı</option>
                                            <option value="Devam Ediyor">Devam Ediyor</option>
                                            <option value="Tamamlandı">Tamamlandı</option>
                                            <option value="İptal Edildi">İptal Edildi</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Notlar & Gerekli Ekipmanlar</label>
                                    <textarea rows="3" placeholder="Opsiyonel notlar..." value={formData.notes} onChange={e=>setFormData({...formData, notes: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary"></textarea>
                                </div>

                                <div className="pt-2">
                                    <button type="submit" className="w-full bg-primary text-white p-3 rounded font-bold hover:bg-blue-600 transition shadow-lg">Kaydet ve Kapat</button>
                                </div>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // --- ANA BİLEŞEN VE LAYOUT ---
        const Layout = ({ children, menu, setMenu, user, onLogout }) => {
            useEffect(() => { lucide.createIcons(); });
            
            const menuItems = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Kontrol Merkezi' },
                { id: 'surgeries', icon: 'activity', label: 'Ameliyatlar' }
            ];

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    {/* Desktop Sidebar */}
                    <div className="hidden md:flex flex-col w-64 bg-dark text-slate-300">
                        <div className="p-6 flex items-center gap-3 text-white border-b border-slate-800">
                            <i data-lucide="crosshairs" className="text-primary w-8 h-8"></i>
                            <span className="font-bold text-xl tracking-tight">MedTrack</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto hide-scroll">
                            {menuItems.map(m => (
                                <button key={m.id} onClick={() => setMenu(m.id)} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${menu === m.id ? 'bg-primary text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <i data-lucide={m.icon} className="w-5 h-5"></i> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800 text-sm">
                            <div className="text-white mb-3 truncate">{user?.email}</div>
                            <button onClick={onLogout} className="text-red-400 hover:text-red-300 flex items-center gap-2 transition w-full p-2 rounded hover:bg-slate-800">
                                <i data-lucide="log-out" className="w-4 h-4"></i> Çıkış Yap
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <div className="md:hidden bg-dark text-white p-4 flex justify-between items-center shadow-md z-10">
                            <div className="flex items-center gap-2 font-bold text-lg">
                                <i data-lucide="crosshairs" className="text-primary w-5 h-5"></i> MedTrack
                            </div>
                            <button onClick={onLogout} className="p-1"><i data-lucide="log-out"></i></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 hide-scroll">
                            {children}
                        </div>
                        
                        {/* Mobile Bottom Nav */}
                        <div className="md:hidden bg-white border-t border-slate-200 flex justify-around p-2 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
                            {menuItems.map(m => (
                                <button key={m.id} onClick={() => setMenu(m.id)} className={`flex flex-col items-center p-2 rounded w-full transition ${menu === m.id ? 'text-primary' : 'text-slate-500'}`}>
                                    <i data-lucide={m.icon} className="w-6 h-6 mb-1"></i>
                                    <span className="text-[10px] font-medium">{m.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [setupDone, setSetupDone] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeMenu, setActiveMenu] = useState('dashboard');
            const toast = useToast();

            useEffect(() => {
                const checkSession = async () => {
                    const url = localStorage.getItem('sb_url');
                    const key = localStorage.getItem('sb_key');
                    if (url && key && supabaseClient) {
                        setSetupDone(true);
                        const { data: { session }, error } = await supabaseClient.auth.getSession();
                        if (session) setUser(session.user);
                    }
                    setLoading(false);
                };
                checkSession();
            }, []);

            const handleSetup = (url, key) => {
                if (!url || !key) {
                    toast('Lütfen tüm alanları doldurun.', 'error');
                    return;
                }
                localStorage.setItem('sb_url', url);
                localStorage.setItem('sb_key', key);
                window.location.reload();
            };

            const handleLogin = async (email, password) => {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) toast('Giriş başarısız: ' + error.message, 'error');
                else {
                    setUser(data.user);
                    toast('Başarıyla giriş yapıldı.', 'success');
                }
            };

            const handleLogout = async () => {
                await supabaseClient.auth.signOut();
                setUser(null);
                window.location.reload();
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-dark text-white font-bold">Sistem Başlatılıyor...</div>;
            if (!setupDone) return <SetupScreen onSetup={handleSetup} />;
            if (!user) return <LoginScreen onLogin={handleLogin} />;

            return (
                <Layout menu={activeMenu} setMenu={setActiveMenu} user={user} onLogout={handleLogout}>
                    {activeMenu === 'dashboard' ? <Dashboard /> : <SurgeriesView />}
                </Layout>
            );
        };

        const RootApp = () => (
            <ToastProvider>
                <App />
            </ToastProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
