<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Enterprise | Kurumsal ERP & Medikal Operasyon</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#3b82f6', dark: '#0f172a' }
                }
            }
        }
    </script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase & SheetJS & Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const getSupabase = () => {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (url && key) return supabase.createClient(url, key);
            return null;
        };
        let supabaseClient = getSupabase();

        // --- TOAST BİLDİRİM ---
        const ToastContext = createContext();
        const useToast = () => useContext(ToastContext);
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };
            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-enter px-4 py-3 rounded shadow-lg text-white flex items-center gap-2 pointer-events-auto ${t.type === 'error' ? 'bg-red-500' : t.type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`}>
                                <i data-lucide={t.type === 'success' ? 'check-circle' : t.type === 'error' ? 'alert-circle' : 'info'} className="w-5 h-5"></i>
                                {t.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // --- MODAL ---
        const Modal = ({ title, onClose, children, large = false }) => {
            useEffect(() => { lucide.createIcons(); });
            return (
                <div className="fixed inset-0 z-40 flex items-center justify-center p-4 modal-overlay">
                    <div className={`bg-white rounded-xl shadow-2xl w-full ${large ? 'max-w-4xl' : 'max-w-2xl'} max-h-[90vh] flex flex-col overflow-hidden`}>
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-lg text-slate-800">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 transition"><i data-lucide="x"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto hide-scroll flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD ---
        const Dashboard = () => {
            const [stats, setStats] = useState({ today: 0, pending: 0, total: 0, lowStock: 0, totalMovements: 0 });
            useEffect(() => {
                const fetchStats = async () => {
                    if(!supabaseClient) return;
                    const today = new Date().toISOString().split('T')[0];
                    const [surgeries, products, movements] = await Promise.all([
                        supabaseClient.from('surgeries').select('*'),
                        supabaseClient.from('products').select('*'),
                        supabaseClient.from('stock_movements').select('*', { count: 'exact', head: true })
                    ]);
                    
                    if (surgeries.data && products.data) {
                        setStats({
                            today: surgeries.data.filter(s => s.date === today).length,
                            pending: surgeries.data.filter(s => s.status === 'Planlandı').length,
                            total: surgeries.data.length,
                            lowStock: products.data.filter(p => p.shelf_stock < 10).length,
                            totalMovements: movements.count || 0
                        });
                    }
                };
                fetchStats();
            }, []);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-slate-800">Kontrol Merkezi</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Bugünkü Ameliyatlar</h3>
                            <div className="text-4xl font-bold">{stats.today}</div>
                        </div>
                        <div className="bg-gradient-to-br from-orange-500 to-red-600 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Kritik Stok Uyarısı</h3>
                            <div className="text-4xl font-bold">{stats.lowStock} <span className="text-lg font-normal">ürün</span></div>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-500 to-teal-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Açık Operasyon</h3>
                            <div className="text-4xl font-bold">{stats.pending}</div>
                        </div>
                        <div className="bg-gradient-to-br from-slate-700 to-slate-900 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Toplam Stok İşlemi</h3>
                            <div className="text-4xl font-bold">{stats.totalMovements}</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- STOK & DEPO ERP MODÜLÜ ---
        const InventoryView = ({ user }) => {
            const toast = useToast();
            const [tab, setTab] = useState('products');
            const [products, setProducts] = useState([]);
            const [movements, setMovements] = useState([]);
            const [isMovementModalOpen, setIsMovementModalOpen] = useState(false);
            const [isCountModalOpen, setIsCountModalOpen] = useState(false);
            const [selectedProductForCount, setSelectedProductForCount] = useState(null);
            const [countValue, setCountValue] = useState('');
            
            const [movementForm, setMovementForm] = useState({
                product_id: '', movement_type: 'FATURALI_SATIŞ', quantity: 1, 
                invoice_no: '', hospital: '', doctor: '', surgery_type: '', personnel: '', notes: ''
            });

            const loadData = async () => {
                if(!supabaseClient) return;
                const { data: p } = await supabaseClient.from('products').select('*').order('name');
                if(p) setProducts(p);
                const { data: m } = await supabaseClient.from('stock_movements').select('*, products(name)').order('created_at', {ascending: false}).limit(100);
                if(m) setMovements(m);
            };

            useEffect(() => { loadData(); }, [tab]);

            // Stok Çıkış / Fatura İşlemi
            const handleMovementSubmit = async (e) => {
                e.preventDefault();
                const { product_id, movement_type, quantity, hospital, notes, invoice_no, doctor, surgery_type, personnel } = movementForm;
                
                const { error } = await supabaseClient.rpc('process_stock_movement', {
                    p_product_id: product_id, p_type: movement_type, p_qty: parseInt(quantity), p_hospital: hospital, 
                    p_notes: notes, p_user: user.id, p_invoice_no: invoice_no, p_doctor: doctor, 
                    p_surgery_type: surgery_type, p_personnel: personnel
                });

                if (error) toast('İşlem başarısız: ' + error.message, 'error');
                else {
                    toast('Stok işlemi başarıyla kaydedildi!', 'success');
                    setIsMovementModalOpen(false);
                    setMovementForm({...movementForm, quantity: 1, invoice_no: '', notes: ''});
                    loadData();
                }
            };

            // Depo Sayımı İşlemi
            const handleCountSubmit = async (e) => {
                e.preventDefault();
                const diff = parseInt(countValue) - selectedProductForCount.shelf_stock;
                
                if (diff !== 0) {
                    const moveType = diff > 0 ? 'SAYIM_FAZLASI' : 'SAYIM_FİRESİ';
                    await supabaseClient.rpc('process_stock_movement', {
                        p_product_id: selectedProductForCount.id, p_type: moveType, p_qty: Math.abs(diff), 
                        p_hospital: 'MERKEZ DEPO', p_notes: 'Envanter Sayım Eşitlemesi', p_user: user.id
                    });
                }

                await supabaseClient.from('stock_counts').insert([{
                    product_id: selectedProductForCount.id, system_quantity: selectedProductForCount.shelf_stock,
                    counted_quantity: parseInt(countValue), difference: diff, created_by: user.id
                }]);

                toast('Sayım kaydedildi ve stok güncellendi.', 'success');
                setIsCountModalOpen(false);
                setCountValue('');
                loadData();
            };

            const exportMovements = () => {
                const exportData = movements.map((m, i) => ({
                    'Sıra': i + 1,
                    'Tarih': new Date(m.created_at).toLocaleString('tr-TR'),
                    'İşlem Tipi': m.movement_type,
                    'Ürün': m.products?.name,
                    'Adet': m.quantity,
                    'Fatura/İrsaliye No': m.invoice_no || '-',
                    'Kurum/Taraf': m.hospital || '-',
                    'Doktor': m.doctor || '-',
                    'Ameliyat': m.surgery_type || '-',
                    'Personel': m.personnel || '-',
                    'Not': m.notes || '-'
                }));
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Mal Hareketleri");
                XLSX.writeFile(workbook, `Mal_Hareketleri_${new Date().toISOString().split('T')[0]}.xlsx`);
                toast('Excel indiriliyor', 'success');
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Depo & Kurumsal Envanter</h2>
                    </div>

                    <div className="flex gap-4 border-b border-slate-200 overflow-x-auto hide-scroll">
                        <button onClick={()=>setTab('products')} className={`pb-3 px-2 font-medium border-b-2 whitespace-nowrap transition ${tab==='products'?'border-primary text-primary':'border-transparent text-slate-500'}`}>Ürünler & Raf</button>
                        <button onClick={()=>setTab('movements')} className={`pb-3 px-2 font-medium border-b-2 whitespace-nowrap transition ${tab==='movements'?'border-primary text-primary':'border-transparent text-slate-500'}`}>Mal Hareketleri (İrsaliye/Fatura)</button>
                        <button onClick={()=>setTab('count')} className={`pb-3 px-2 font-medium border-b-2 whitespace-nowrap transition ${tab==='count'?'border-primary text-primary':'border-transparent text-slate-500'}`}>Depo Sayımı</button>
                    </div>

                    {tab === 'products' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500">
                                    <tr>
                                        <th className="p-4">Ürün Kodu</th>
                                        <th className="p-4">Ürün Adı</th>
                                        <th className="p-4">Raf Adeti (Merkez)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {products.map(p => (
                                        <tr key={p.id} className="border-t border-slate-100 hover:bg-slate-50">
                                            <td className="p-4 font-medium">{p.code}</td>
                                            <td className="p-4">{p.name}</td>
                                            <td className="p-4"><span className={`px-2 py-1 rounded text-xs font-bold ${p.shelf_stock > 10 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{p.shelf_stock} Adet</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {tab === 'count' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden p-6">
                            <h3 className="font-bold text-lg mb-4">Fiziksel Depo Sayımı Yap</h3>
                            <p className="text-slate-500 text-sm mb-6">Sistemdeki raf adetleri ile fiziksel sayımınızı eşitleyin. Farklılıklar 'Sayım Fazlası' veya 'Sayım Firesi' olarak kaydedilir.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {products.map(p => (
                                    <div key={p.id} className="border border-slate-200 p-4 rounded-lg flex justify-between items-center hover:shadow-md transition">
                                        <div>
                                            <div className="font-bold text-slate-800">{p.name}</div>
                                            <div className="text-xs text-slate-500">Sistem: {p.shelf_stock} Adet</div>
                                        </div>
                                        <button onClick={()=>{setSelectedProductForCount(p); setIsCountModalOpen(true);}} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1 rounded text-sm font-medium">Sayım Gir</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'movements' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                <button onClick={exportMovements} className="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-emerald-700 transition flex items-center gap-2">
                                    <i data-lucide="file-spreadsheet" className="w-4 h-4"></i> Excel'e Aktar
                                </button>
                                <button onClick={() => setIsMovementModalOpen(true)} className="bg-primary text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-600 transition flex items-center gap-2">
                                    <i data-lucide="upload" className="w-4 h-4"></i> Yeni Çıkış / Fatura
                                </button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-slate-50 text-slate-500">
                                        <tr>
                                            <th className="p-4">Tarih</th>
                                            <th className="p-4">İşlem & Fatura No</th>
                                            <th className="p-4">Ürün & Miktar</th>
                                            <th className="p-4">Operasyon Detayı (Doktor/Hastane/Personel)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {movements.map(m => (
                                            <tr key={m.id} className="border-t border-slate-100 hover:bg-slate-50">
                                                <td className="p-4 text-slate-500">{new Date(m.created_at).toLocaleString('tr-TR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 inline-block mb-1 rounded text-xs font-bold ${
                                                        m.movement_type.includes('GİRİŞ')||m.movement_type.includes('FAZLASI')?'bg-green-100 text-green-700':
                                                        m.movement_type.includes('SEVK')?'bg-blue-100 text-blue-700':
                                                        'bg-orange-100 text-orange-700'
                                                    }`}>{m.movement_type}</span>
                                                    <div className="text-xs font-mono text-slate-500">{m.invoice_no || '-'}</div>
                                                </td>
                                                <td className="p-4">
                                                    <div className="font-bold text-slate-800">{m.products?.name}</div>
                                                    <div className="text-xs font-medium text-slate-600">{m.quantity} Adet</div>
                                                </td>
                                                <td className="p-4">
                                                    <div className="text-xs text-slate-700 font-medium">{m.hospital} <span className="text-slate-400">|</span> {m.doctor}</div>
                                                    <div className="text-[11px] text-slate-500 mt-1">{m.surgery_type} <span className="text-slate-400">|</span> Per: {m.personnel}</div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Fatura / Çıkış Modalı */}
                    {isMovementModalOpen && (
                        <Modal title="Kurumsal Ürün Çıkışı / Fişi" onClose={() => setIsMovementModalOpen(false)} large>
                            <form onSubmit={handleMovementSubmit} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {/* Sol Kolon - İşlem Temel Bilgileri */}
                                    <div className="space-y-4">
                                        <h4 className="font-bold text-slate-700 border-b pb-2 mb-4">Ürün & Evrak Bilgileri</h4>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">İşlem Tipi</label>
                                            <select required value={movementForm.movement_type} onChange={e=>setMovementForm({...movementForm, movement_type: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary">
                                                <option value="FATURALI_SATIŞ">Faturalı Satış / Çıkış</option>
                                                <option value="AMELİYAT_KULLANIMI">Ameliyat Kullanımı</option>
                                                <option value="HASTANEYE_SEVK">Hastaneye Konsinye Sevk</option>
                                                <option value="GİRİŞ">Merkez Depoya Giriş</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Ürün</label>
                                            <select required value={movementForm.product_id} onChange={e=>setMovementForm({...movementForm, product_id: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary">
                                                <option value="">Seçiniz...</option>
                                                {products.map(p => <option key={p.id} value={p.id}>{p.name} (Stok: {p.shelf_stock})</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Adet</label>
                                                <input type="number" min="1" required value={movementForm.quantity} onChange={e=>setMovementForm({...movementForm, quantity: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Fatura / İrsaliye No</label>
                                                <input type="text" placeholder="Örn: FAT-2026-001" value={movementForm.invoice_no} onChange={e=>setMovementForm({...movementForm, invoice_no: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Sağ Kolon - Operasyonel Bilgiler */}
                                    <div className="space-y-4">
                                        <h4 className="font-bold text-slate-700 border-b pb-2 mb-4">Operasyon & Taraf Bilgileri</h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Kurum / Hastane</label>
                                                <input type="text" placeholder="Hastane Adı" value={movementForm.hospital} onChange={e=>setMovementForm({...movementForm, hospital: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Doktor Adı</label>
                                                <input type="text" placeholder="Örn: Dr. Ali Yılmaz" value={movementForm.doctor} onChange={e=>setMovementForm({...movementForm, doctor: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Ameliyat Türü</label>
                                            <input type="text" placeholder="Örn: Total Diz Protezi" value={movementForm.surgery_type} onChange={e=>setMovementForm({...movementForm, surgery_type: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Sorumlu Personel (Teslim Eden vb.)</label>
                                            <input type="text" placeholder="Şirket personeli adı" value={movementForm.personnel} onChange={e=>setMovementForm({...movementForm, personnel: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Ek Notlar</label>
                                            <input type="text" value={movementForm.notes} onChange={e=>setMovementForm({...movementForm, notes: e.target.value})} className="w-full p-2 border rounded bg-slate-50 outline-none focus:border-primary" />
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-primary text-white p-3 rounded font-bold hover:bg-blue-600 transition shadow-lg">İşlemi Kaydet ve Stoktan Düş</button>
                            </form>
                        </Modal>
                    )}

                    {/* Sayım Modalı */}
                    {isCountModalOpen && selectedProductForCount && (
                        <Modal title="Fiziksel Sayım Girişi" onClose={() => setIsCountModalOpen(false)}>
                            <form onSubmit={handleCountSubmit} className="space-y-4">
                                <div className="bg-slate-100 p-4 rounded text-sm mb-4">
                                    <span className="font-bold block mb-1">{selectedProductForCount.name}</span>
                                    Sistemdeki güncel stok: <b>{selectedProductForCount.shelf_stock}</b> Adet
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Fiziksel Olarak Sayılan Adet</label>
                                    <input type="number" min="0" required value={countValue} onChange={e=>setCountValue(e.target.value)} className="w-full p-3 border rounded bg-slate-50 outline-none focus:border-primary text-lg font-bold" />
                                </div>
                                <button type="submit" className="w-full bg-slate-800 text-white p-3 rounded font-bold hover:bg-slate-700 transition">Sayımı Onayla ve Eşitle</button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // --- AMELİYATLAR MODÜLÜ --- (Aynı Kalıyor, Kısaltıldı)
        const SurgeriesView = () => {
            const toast = useToast();
            const [surgeries, setSurgeries] = useState([]);
            useEffect(() => {
                const load = async () => { const { data } = await supabaseClient.from('surgeries').select('*').order('date', { ascending: false }); if(data) setSurgeries(data); };
                load();
            }, []);
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-slate-800">Ameliyat Takvimi</h2>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <p className="text-slate-500 text-sm">Ameliyat kayıtları detaylı stok çıkış (Fatura/Operasyon) modülüyle entegre edilmiştir. Operasyon stok çıkışlarını <b>Depo & Stok -> Yeni Çıkış</b> ekranından detaylı fatura/doktor bilgisi ile yapabilirsiniz.</p>
                        <table className="w-full text-left text-sm mt-4">
                            <thead className="bg-slate-50 text-slate-500"><tr><th className="p-4">Tarih</th><th className="p-4">Ameliyat</th><th className="p-4">Hastane & Doktor</th></tr></thead>
                            <tbody>
                                {surgeries.map(s => <tr key={s.id} className="border-t border-slate-100"><td className="p-4">{s.date}</td><td className="p-4">{s.type}</td><td className="p-4">{s.hospital} - {s.doctor}</td></tr>)}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- KURULUM / GİRİŞ / APP KABUĞU ---
        const SetupScreen = ({ onSetup }) => { /* Setup Kodları (Önceki mesajdakiyle aynı) */
            const [url, setUrl] = useState(''); const [key, setKey] = useState('');
            return ( <div className="min-h-screen flex items-center justify-center bg-dark p-4"><div className="bg-slate-800 p-8 rounded-xl w-full max-w-md text-white"><h2 className="text-2xl font-bold mb-4">Setup</h2><input placeholder="URL" value={url} onChange={e=>setUrl(e.target.value)} className="w-full p-2 mb-2 bg-slate-900 border rounded"/><input placeholder="Key" value={key} onChange={e=>setKey(e.target.value)} className="w-full p-2 mb-4 bg-slate-900 border rounded"/><button onClick={()=>onSetup(url,key)} className="w-full bg-primary p-2 rounded">Başlat</button></div></div> );
        };
        const LoginScreen = ({ onLogin }) => { /* Login Kodları */
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            return ( <div className="min-h-screen flex items-center justify-center bg-dark p-4"><div className="bg-slate-800 p-8 rounded-xl w-full max-w-md text-white"><h2 className="text-2xl font-bold mb-4">Giriş Yap</h2><input placeholder="E-posta" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-2 mb-2 bg-slate-900 border rounded"/><input type="password" placeholder="Şifre" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-2 mb-4 bg-slate-900 border rounded"/><button onClick={()=>onLogin(email,password)} className="w-full bg-primary p-2 rounded">Giriş</button></div></div> );
        };

        const Layout = ({ children, menu, setMenu, user, onLogout }) => {
            useEffect(() => { lucide.createIcons(); });
            const menuItems = [ { id: 'dashboard', icon: 'layout-dashboard', label: 'Kontrol Merkezi' }, { id: 'inventory', icon: 'package', label: 'Depo & Stok ERP' }, { id: 'surgeries', icon: 'activity', label: 'Ameliyat Takvimi' } ];
            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    <div className="hidden md:flex flex-col w-64 bg-dark text-slate-300">
                        <div className="p-6 flex items-center gap-3 text-white border-b border-slate-800"><i data-lucide="crosshairs" className="text-primary w-8 h-8"></i><span className="font-bold text-xl">MedTrack</span></div>
                        <nav className="flex-1 p-4 space-y-2">{menuItems.map(m => (<button key={m.id} onClick={() => setMenu(m.id)} className={`w-full flex items-center gap-3 p-3 rounded-lg ${menu === m.id ? 'bg-primary text-white' : 'hover:bg-slate-800'}`}><i data-lucide={m.icon} className="w-5 h-5"></i> {m.label}</button>))}</nav>
                        <div className="p-4 border-t border-slate-800 text-sm"><button onClick={onLogout} className="text-red-400 hover:bg-slate-800 w-full p-2 rounded text-left flex gap-2"><i data-lucide="log-out" className="w-4 h-4"></i>Çıkış Yap</button></div>
                    </div>
                    <div className="flex-1 flex flex-col h-screen overflow-y-auto p-4 md:p-8">{children}</div>
                </div>
            );
        };

        const App = () => {
            const [setupDone, setSetupDone] = useState(false); const [user, setUser] = useState(null); const [loading, setLoading] = useState(true); const [activeMenu, setActiveMenu] = useState('inventory');
            const toast = useToast();
            useEffect(() => {
                const init = async () => { if(supabaseClient) { setSetupDone(true); const {data:{session}} = await supabaseClient.auth.getSession(); if(session) setUser(session.user); } setLoading(false); }; init();
            }, []);
            if (loading) return <div className="h-screen flex items-center justify-center bg-dark text-white font-bold">Yükleniyor...</div>;
            if (!setupDone) return <SetupScreen onSetup={(u,k)=>{localStorage.setItem('sb_url',u); localStorage.setItem('sb_key',k); window.location.reload();}} />;
            if (!user) return <LoginScreen onLogin={async(e,p)=>{const {data,error}=await supabaseClient.auth.signInWithPassword({email:e,password:p}); if(error)toast(error.message,'error'); else setUser(data.user);}} />;

            return (
                <Layout menu={activeMenu} setMenu={setActiveMenu} user={user} onLogout={async()=>{await supabaseClient.auth.signOut(); window.location.reload();}}>
                    {activeMenu === 'dashboard' ? <Dashboard /> : activeMenu === 'inventory' ? <InventoryView user={user} /> : <SurgeriesView />}
                </Layout>
            );
        };

        const RootApp = () => (<ToastProvider><App /></ToastProvider>);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
