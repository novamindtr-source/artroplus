    </div>
  );
}

// ─── USERS VIEW ───────────────────────────────────────────────────────────────
function UsersView({profile}){
  const toast=useToast();
  const [users,setUsers]=useState([]);
  const [modal,setModal]=useState(null);
  const emptyUserForm={id:null,email:"",password:"",full_name:"",role:"user",status:"active",pending:false};
  const [f,setF]=useState(emptyUserForm);
  const [loading,setLoading]=useState(false);

  const pendingKey="artroplus_pending_users";
  const readPending=()=>{
    try{return JSON.parse(localStorage.getItem(pendingKey)||"[]");}
    catch(e){return[];}
  };
  const writePending=(items)=>localStorage.setItem(pendingKey,JSON.stringify(items));
  const mergeUsers=(remote,pending)=>{
    const byKey=new Map();
    [...(pending||[]),...(remote||[])].forEach(u=>{
      const key=u.id||u.email;
      const normalized={...u};
      normalized.full_name=normalized.full_name||normalized.name||normalized.email||"";
      normalized.status=normalized.status||"active";
      if(!("pending" in normalized))normalized.pending=false;
      if(key)byKey.set(key,{...byKey.get(key),...normalized});
    });
    return [...byKey.values()].sort((a,b)=>String(b.created_at||"").localeCompare(String(a.created_at||"")));
  };

  const loadUsers=async()=>{
    const pending=readPending();
    const {data,error}=await SB.from("profiles").select("*").order("created_at",{ascending:false});
    if(error){
      setUsers(pending);
      toast("Kullanıcı listesi yerel kayıtlarla gösteriliyor: "+error.message,"warning");
      return;
    }
    setUsers(mergeUsers(data||[],pending));
  };

  useEffect(()=>{loadUsers();},[]);

  const openCreate=()=>{
    setF(emptyUserForm);
    setModal("create");
  };

  const openEdit=(u)=>{
    setF({
      id:u.id,
      email:u.email||"",
      password:"",
      full_name:u.full_name||u.name||"",
      role:u.role||"user",
      status:u.status||"active",
      pending:!!u.pending,
    });
    setModal("edit");
  };

  const closeModal=()=>{
    setModal(null);
    setF(emptyUserForm);
  };

  const create=async()=>{
    if(!f.email||!f.password||!f.full_name)return toast("Tüm alanlar gerekli","warning");
    setLoading(true);
    const createdAt=new Date().toISOString();
    const tempSB=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
    const{data,error}=await tempSB.auth.signUp({
      email:f.email,
      password:f.password,
      options:{data:{full_name:f.full_name,role:f.role}}
    });
    if(error){toast(error.message,"error");setLoading(false);return;}
    const uid=data?.user?.id;
    const newUser={id:uid||`pending-${Date.now()}`,full_name:f.full_name,name:f.full_name,role:f.role,email:f.email,status:"active",created_at:createdAt,pending:!uid};
    const pending=mergeUsers([newUser],readPending());
    writePending(pending);
    setUsers(prev=>mergeUsers(prev,[newUser]));
    if(uid){
      const {error:profileError}=await SB.from("profiles").upsert({id:uid,name:f.full_name,role:f.role,status:"active"});
      if(profileError)toast("Auth kullanıcısı oluştu, profil listesi yerel olarak eklendi: "+profileError.message,"warning");
    }
    toast("Kullanıcı oluşturuldu","success");
    closeModal();
    setLoading(false);
    loadUsers();
  };

  const updateUser=async()=>{
    if(!f.id||!f.full_name)return toast("Ad Soyad gerekli","warning");
    setLoading(true);
    const patch={name:f.full_name,role:f.role,status:f.status||"active",updated_at:new Date().toISOString()};
    if(f.pending||String(f.id).startsWith("pending-")){
      const pending=readPending().map(u=>u.id===f.id?{...u,...patch,full_name:f.full_name}:u);
      writePending(pending);
      setUsers(prev=>prev.map(u=>u.id===f.id?{...u,...patch,full_name:f.full_name}:u));
      toast("Yerel kullanıcı güncellendi","success");
      closeModal();
      setLoading(false);
      return;
    }
    const {error}=await SB.from("profiles").update(patch).eq("id",f.id);
    if(error){
      toast(error.message,"error");
      setLoading(false);
      return;
    }
    setUsers(prev=>prev.map(u=>u.id===f.id?{...u,...patch,full_name:f.full_name}:u));
    toast("Kullanıcı güncellendi","success");
    closeModal();
    setLoading(false);
    loadUsers();
  };

  const saveUser=()=>modal==="edit"?updateUser():create();

  const roleColors={admin:"bg-violet2/20 text-violet2 border-violet2/30",yonetici:"bg-amber-500/20 text-amber-300 border-amber-500/30","yönetici":"bg-amber-500/20 text-amber-300 border-amber-500/30",user:"bg-brand/20 text-brand-300 border-brand/30"};
  const roleLabel=role=>isManager({role})?(role==="admin"?"Admin":"Yönetici"):"Kullanıcı";
  const statusLabel=status=>status==="inactive"?"Pasif":"Aktif";

  return(
    <div className="space-y-4">
      {modal&&(
        <Modal title={modal==="edit"?"Kullanıcı Düzenle":"Yeni Kullanıcı"} onClose={closeModal} size="sm"
          footer={<div className="flex gap-2"><button onClick={closeModal} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button><button onClick={saveUser} disabled={loading} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold disabled:opacity-60">{loading?"⋯":modal==="edit"?"Kaydet":"Oluştur"}</button></div>}>
          <div className="space-y-4">
            <div><Label required>Ad Soyad</Label><Input value={f.full_name} onChange={e=>setF(p=>({...p,full_name:e.target.value}))}/></div>
            <div><Label required={modal!=="edit"}>E-posta</Label><Input type="email" value={f.email} disabled={modal==="edit"} onChange={e=>setF(p=>({...p,email:e.target.value}))}/></div>
            {modal!=="edit"&&<div><Label required>Şifre</Label><Input type="password" value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))}/></div>}
            <div><Label>Rol</Label><Select value={f.role} onChange={e=>setF(p=>({...p,role:e.target.value}))}><option value="user">Kullanıcı</option><option value="yonetici">Yönetici</option><option value="admin">Admin</option></Select></div>
            {modal==="edit"&&<div><Label>Durum</Label><Select value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))}><option value="active">Aktif</option><option value="inactive">Pasif</option></Select></div>}
          </div>
        </Modal>
      )}

      <div className="flex items-center justify-between gap-3">
        <h1 className="text-xl font-bold text-white">Kullanıcılar</h1>
        <div className="flex gap-2">
          <button onClick={loadUsers} className="px-3 py-2 rounded-xl bg-navy-800 hover:bg-navy-700 text-slate-300 text-sm font-semibold border border-white/8">Yenile</button>
          <button onClick={openCreate} className="px-4 py-2 rounded-xl btn-primary text-white text-sm font-bold flex items-center gap-1.5">+ Yeni Kullanıcı</button>
        </div>
      </div>

      <div className="card rounded-2xl overflow-hidden divide-y divide-white/5">
        {users.length===0?(
          <div className="px-5 py-12 text-center text-slate-500 text-sm">Kullanıcı bulunamadı</div>
        ):users.map(u=>(
          <div key={u.id} className="table-row px-5 py-4 flex items-center gap-4">
            <div className="w-10 h-10 rounded-xl bg-brand/20 border border-brand/30 flex items-center justify-center text-brand-300 font-bold text-sm flex-shrink-0">
              {(u.full_name||u.name||u.email||"?")[0].toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-semibold text-white truncate">{u.full_name||u.name||"—"}</div>
              <div className="text-xs text-slate-500 truncate">{u.email}</div>
            </div>
            <div className="flex items-center gap-2">
              <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${roleColors[u.role]||roleColors.user}`}>{roleLabel(u.role)}</span>
              <span className={`px-2 py-0.5 rounded-full text-xs border ${u.status==="inactive"?"bg-slate-700/60 text-slate-300 border-white/10":"bg-emerald2/20 text-emerald2 border-emerald2/30"}`}>{statusLabel(u.status)}</span>
              {u.pending&&<span className="px-2 py-0.5 rounded-full text-xs bg-amber2/20 text-amber2 border border-amber2/30">Yerel</span>}
              {u.id===profile?.id&&<span className="px-2 py-0.5 rounded-full text-xs bg-emerald2/20 text-emerald2 border border-emerald2/30">Siz</span>}
              <button onClick={()=>openEdit(u)} className="px-3 py-1.5 rounded-lg bg-navy-800 hover:bg-navy-700 text-slate-300 text-xs font-semibold border border-white/8">Düzenle</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [mobileOpen,setMobileOpen]=useState(false);
  const [surgeries,setSurgeries]=useState([]);
  const [types,setTypes]=useState([]);
  const [hospitals,setHospitals]=useState([]);
  const [doctors,setDoctors]=useState([]);
  const [personel,setPersonel]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [urunler,setUrunler]=useState([]);
  const [stoklar,setStoklar]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    SB.auth.getSession().then(({data:{session}})=>{setSession(session);if(!session)setLoading(false);});
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{setSession(s);if(!s){setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session)loadAll();},[session]);

  const loadAll=async()=>{
    setLoading(true);
    try{
      const[surg,typ,hosp,doc,pers,users,notf,urn,stk,prof]=await Promise.all([
        SB.from("surgeries").select("*").order("date",{ascending:false}).order("time"),
        SB.from("surgery_types").select("*").order("name"),
        SB.from("hospitals").select("*").order("name"),
        SB.from("doctors").select("*").order("name"),
        SB.from("personel").select("*").order("name"),
        SB.from("profiles").select("*").order("name"),
        SB.from("notifications").select("*").order("created_at",{ascending:false}).limit(50),
        SB.from("urunler").select("*").order("ad"),
        SB.from("stok").select("*"),
        SB.from("profiles").select("*").eq("id",(await SB.auth.getUser()).data.user?.id).single(),
      ]);
      setSurgeries(surg.data||[]);
      setTypes(typ.data||[]);
      const dbHospitals=hosp.data||[];
      const shelf=findCompanyShelf(dbHospitals)||{id:"company-shelf-local",name:COMPANY_SHELF_NAME};
      const normalizedHospitals=findCompanyShelf(dbHospitals)?dbHospitals:[shelf,...dbHospitals];
      setHospitals(normalizedHospitals);
      setDoctors(doc.data||[]);
      setPersonel(buildProgramPersonnel(users.data||[],pers.data||[]));
      setNotifs(notf.data||[]);
      setUrunler((urn.data||[]).map(normalizeProduct));
      setStoklar((stk.data||[]).map(s=>normalizeStock(s,shelf.id)));
      setProfile(prof.data?{...prof.data,full_name:prof.data.full_name||prof.data.name||prof.data.email||"Kullanıcı"}:prof.data);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const addNotif=async(msg)=>{
    const{data:{user}}=await SB.auth.getUser();
    if(!user)return;
    await SB.from("notifications").insert({user_id:user.id,message:msg,is_read:false,created_at:new Date().toISOString()});
    setNotifs(p=>[{id:Date.now(),message:msg,is_read:false,created_at:new Date().toISOString()},...p]);
  };

  const readNotif=async(id)=>{
    await SB.from("notifications").update({is_read:true}).eq("id",id);
    setNotifs(p=>p.map(n=>n.id===id?{...n,is_read:true}:n));
  };

  const readAll=async()=>{
    await SB.from("notifications").update({is_read:true}).eq("is_read",false);
    setNotifs(p=>p.map(n=>({...n,is_read:true})));
  };

  const delNotif=async(id)=>{
    await SB.from("notifications").delete().eq("id",id);
    setNotifs(p=>p.filter(n=>n.id!==id));
  };

  const delAllNotifs=async()=>{
    await SB.from("notifications").delete().neq("id","00000000-0000-0000-0000-000000000000");
    setNotifs([]);
  };

  const logout=async()=>{await SB.auth.signOut();setSession(null);setPage("dashboard");};

  const unread=notifs.filter(n=>!n.is_read).length;
  const manager=isManager(profile);

  useEffect(()=>{
    if(profile&&!canAccessPage(page,profile))setPage("program");
  },[profile,page]);

  if(!session){
    return(
      <ToastProvider>
        <AuthScreen onLogin={()=>loadAll()}/>
      </ToastProvider>
    );
  }

  if(loading){
    return(
      <div className="min-h-screen flex items-center justify-center" style={{background:"#060b18"}}>
        <div className="text-center">
          <img src={LOGO_LIGHT_SRC} className="h-10 mx-auto mb-6 opacity-60 pulse-soft" alt="ARTROPLUS"/>
          <div className="flex gap-1.5 justify-center">
            {[0,1,2].map(i=>(
              <div key={i} className="w-2 h-2 rounded-full bg-brand pulse-soft" style={{animationDelay:`${i*0.2}s`}}></div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const renderPage=()=>{
    if(!canAccessPage(page,profile)){
      return<ProgramView surgeries={surgeries} types={types} doctors={doctors} personel={personel} hospitals={hospitals} onRefresh={loadAll} profile={profile} onNotif={addNotif} onAddSurgery={(form)=>SB.from("surgeries").insert({...form,created_by:profile?.id}).then(()=>loadAll())}/>;
    }
    switch(page){
      case"dashboard":return<Dashboard surgeries={surgeries} types={types} profile={profile} setPage={setPage} doctors={doctors}/>;
      case"surgeries":return<SurgeriesView surgeries={surgeries} types={types} hospitals={hospitals} doctors={doctors} profile={profile} onRefresh={loadAll} onAddList={loadAll} onNotif={addNotif}/>;
      case"program":return<ProgramView surgeries={surgeries} types={types} doctors={doctors} personel={personel} hospitals={hospitals} onRefresh={loadAll} profile={profile} onNotif={addNotif} onAddSurgery={(form)=>SB.from("surgeries").insert({...form,created_by:profile?.id}).then(()=>loadAll())}/>;
      case"products":return<UrunlerView urunler={urunler} stoklar={stoklar} hospitals={hospitals} loadAll={loadAll}/>;
      case"stock":return<StokView urunler={urunler} stoklar={stoklar} hospitals={hospitals} loadAll={loadAll}/>;
      case"movements":return<HareketlerView urunler={urunler} stoklar={stoklar} surgeries={surgeries} hospitals={hospitals} loadAll={loadAll}/>;
      case"invoices":return<FaturalarView surgeries={surgeries} urunler={urunler} stoklar={stoklar} hospitals={hospitals} personel={personel} loadAll={loadAll}/>;
      case"notifications":return<NotifsView notifs={notifs} onRead={readNotif} onReadAll={readAll} onDelete={delNotif} onDeleteAll={delAllNotifs}/>;
      case"lists":return<ListsView types={types} doctors={doctors} hospitals={hospitals} onRefresh={loadAll}/>;
      case"users":return manager?<UsersView profile={profile}/>:<div className="text-slate-500 text-sm p-8 text-center">Erişim yetkiniz yok.</div>;
      default:return null;
    }
  };

  return(
    <ToastProvider>
      <div className="min-h-screen flex">
        <Sidebar page={page} setPage={setPage} profile={profile} unread={unread} onLogout={logout} mobileOpen={mobileOpen} onMobileClose={()=>setMobileOpen(false)}/>
        {/* Main content */}
        <div className="flex-1 lg:ml-60 min-h-screen">
          {/* Top bar */}
          <div className="sticky top-0 z-30 enterprise-topbar px-4 lg:px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <button onClick={()=>setMobileOpen(true)} className="lg:hidden w-9 h-9 rounded-xl hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                <svg width="18" height="14" fill="none"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="14" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
              </button>
              <div className="w-9 h-9 rounded-xl border border-white/8 bg-navy-900/60 flex items-center justify-center text-slate-300">
                <span className="text-base leading-none">{NAV.find(n=>n.id===page)?.icon}</span>
              </div>
              <div>
                <div className="enterprise-kicker">ARTROPLUS</div>
                <div className="text-sm font-bold text-slate-100">{NAV.find(n=>n.id===page)?.label}</div>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <div className="hidden md:inline-flex enterprise-badge">
                <span className="enterprise-dot"></span>
                Sistem aktif
              </div>
              <div className="hidden lg:inline-flex enterprise-badge">{fmtTR(todayStr)}</div>
              <button onClick={()=>setPage("notifications")} className="relative w-9 h-9 rounded-xl hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                <span>⌀</span>
                {unread>0&&<span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-rose2"></span>}
              </button>
              <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-xl bg-navy-800 border border-white/8">
                <div className="w-6 h-6 rounded-full bg-brand flex items-center justify-center text-white text-xs font-bold">
                  {(profile?.full_name||"U")[0].toUpperCase()}
                </div>
                <span className="text-xs text-slate-300 font-medium max-w-[100px] truncate">{profile?.full_name||"Kullanıcı"}</span>
              </div>
            </div>
          </div>
          {/* Page content */}
          <div className="p-4 lg:p-6 fade-up">
            {page==="dashboard"&&loading?<SkeletonDashboard/>:renderPage()}
          </div>
        </div>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
