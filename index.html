  <style>
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#07111f;color:#e2e8f0;margin:0;overflow-x:hidden;}
    @keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseSoft{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes skeletonPulse{0%{opacity:.6}50%{opacity:.3}100%{opacity:.6}}
    @keyframes toastProgress{from{width:100%}to{width:0}}
    .toast-in{animation:slideIn .3s ease-out}
    .fade-up{animation:fadeUp .25s ease-out}
    .pulse-soft{animation:pulseSoft 2s infinite}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:#475569}

    .glass{background:rgba(10,16,37,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
    .glass-premium{background:rgba(255,255,255,.05);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 1px rgba(255,255,255,.04);}
    .glass-light{background:rgba(15,26,53,.6);backdrop-filter:blur(12px);}
    .card{background:linear-gradient(135deg,#0f1a35 0%,#0d1730 100%);border:1px solid rgba(255,255,255,.07);}
    .card-premium{background:linear-gradient(135deg,rgba(15,26,53,.96),rgba(13,23,48,.96));border:1px solid rgba(255,255,255,.07);border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.35);}
    .card-hover{transition:all .2s;cursor:pointer;}
    .card-hover:hover{border-color:rgba(37,99,235,.4);box-shadow:0 0 20px rgba(37,99,235,.1);transform:translateY(-1px);}
    .shimmer{background:linear-gradient(90deg,#0f1a35 25%,#162448 50%,#0f1a35 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
    .skeleton-box{border-radius:12px;background:#0f1a35;animation:skeletonPulse 1.6s ease-in-out infinite;position:relative;overflow:hidden;}

    .sidebar-item{transition:all .18s ease;}
    .sidebar-item:hover{background:rgba(37,99,235,.12);color:#93c5fd;}
    .sidebar-item.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;box-shadow:0 4px 15px rgba(37,99,235,.35);}
    .btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);transition:all .2s;}
    .btn-primary:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8);box-shadow:0 6px 20px rgba(37,99,235,.45);transform:translateY(-1px);}

    .input-dark::placeholder{color:#475569;}

    .badge-planned{background:rgba(37,99,235,.2);color:#93c5fd;border:1px solid rgba(37,99,235,.3);}

    .rounded-xl{border-radius:10px!important;}
    .rounded-2xl{border-radius:12px!important;}
    .sidebar-item{border:1px solid transparent;}
    .sidebar-item:hover{background:rgba(37,99,235,.08);border-color:rgba(148,163,184,.12);color:#dbeafe;}
    .sidebar-item.active{background:rgba(37,99,235,.16);border-color:rgba(96,165,250,.32);color:#fff;box-shadow:inset 3px 0 0 #60a5fa,0 8px 20px rgba(15,23,42,.22);}
    .btn-primary,.btn-premium{background:#2563eb;box-shadow:0 1px 0 rgba(255,255,255,.08) inset;}
    .btn-primary:hover,.btn-premium:hover{background:#1d4ed8;box-shadow:0 10px 24px rgba(37,99,235,.26);transform:translateY(-1px);}
    .btn-danger{background:#dc2626;}
    .input-dark{background:#08111f;border-color:rgba(148,163,184,.18);}
    .input-dark:hover{border-color:rgba(148,163,184,.28);}
    .table-row{border-bottom-color:rgba(148,163,184,.09);}
    .table-row:hover{background:rgba(96,165,250,.055);}
    .modal-bg{background:rgba(2,6,23,.78);backdrop-filter:blur(12px);}
    .modal-box{background:#0b1528;border:1px solid rgba(148,163,184,.18);box-shadow:0 24px 80px rgba(0,0,0,.42);}
    .enterprise-topbar{background:rgba(8,17,32,.96);border-bottom:1px solid rgba(148,163,184,.14);box-shadow:0 1px 0 rgba(255,255,255,.03);}
    .enterprise-kicker{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#64748b;font-weight:800;}
    .enterprise-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.7);color:#cbd5e1;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;}

    .enterprise-panel{background:linear-gradient(180deg,rgba(15,23,42,.88),rgba(8,17,32,.96));border:1px solid rgba(148,163,184,.16);box-shadow:0 14px 42px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.035);}
    .enterprise-metric{border-left:1px solid rgba(148,163,184,.12);}
    .enterprise-metric:first-child{border-left:0;}
    .quality-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:999px;border:1px solid rgba(148,163,184,.16);background:rgba(15,23,42,.72);font-size:11px;font-weight:800;color:#cbd5e1;}
    .lot-key{display:inline-flex;align-items:center;gap:6px;padding:4px 7px;border-radius:8px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.16);color:#bfdbfe;font-family:monospace;font-size:11px;font-weight:800;}
    .card,.stat-card,.card-premium{width:100%!important;max-width:100%!important;box-sizing:border-box;}
    .flex-responsive{display:flex;flex-wrap:wrap;gap:.75rem;}

    body{

    .lc-icon-btn:hover{background:#f1f5f9!important;color:var(--lc-text)!important;}
    .lc-badge{background:#f8fafc;border:1px solid var(--lc-border);color:#475569;}
    .lc-card{background:var(--lc-card);border:1px solid var(--lc-border);box-shadow:var(--lc-shadow);border-radius:14px;}
    .lc-card-hover{transition:box-shadow .18s ease,transform .18s ease;}
    .lc-card-hover:hover{box-shadow:0 4px 14px rgba(16,24,40,.08);transform:translateY(-1px);}
    .lc-heading{color:var(--lc-text);}
    .lc-muted{color:var(--lc-muted);}
    .lc-faint{color:#94a3b8;}
    .lc-divider{border-color:var(--lc-border)!important;}
    .lc-pill{background:#f1f5f9;color:#475569;}
    .lc-pill-active{background:var(--lc-blue);color:#fff;}
    .lc-btn-primary{background:var(--lc-blue);color:#fff;transition:all .15s ease;}
    .lc-btn-primary:hover{background:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,.28);}
    .lc-btn-soft{background:var(--lc-blue-soft);color:var(--lc-blue);}
    .lc-btn-soft:hover{background:#e0e9ff;}
    .lc-info-panel{background:var(--lc-blue-soft);border:1px solid #dbe6ff;}
    .lc-timeline-dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .lc-track{border-left:2px solid var(--lc-border);}
    .lc-progress-track{background:#eef1f6;}
    .lc-row:hover{background:#f8fafc;}
    @media(max-width:1024px){
      .lc-sidebar{position:fixed;}
    }
    .lc-auth{background:#0b1c33;}
    .lc-auth-bg{position:absolute;inset:0;overflow:hidden;z-index:0;}
    .lc-auth-shape{position:absolute;inset:0;}
    .lc-auth-shape-1{background:linear-gradient(135deg,#0ea5b7,#1a7ea6);clip-path:polygon(0 0,48% 0,0 62%);}
    .lc-auth-shape-2{background:linear-gradient(120deg,#facc15,#f59e0b 55%,#ea580c);clip-path:polygon(14% 0,100% 0,100% 38%,62% 68%,0 30%);}
    .lc-auth-shape-3{background:radial-gradient(circle at 85% 85%,rgba(37,99,235,.35),transparent 55%);}
    .lc-auth-card{background:#ffffff;border-radius:20px;box-shadow:0 30px 90px rgba(2,10,25,.45);overflow:hidden;}
    .lc-auth-input{background:#f4f7fd;border:1px solid #e6ebf5;color:#0f172a;transition:border-color .15s,box-shadow .15s;}
    .lc-auth-input::placeholder{color:#94a3b8;}
    .lc-auth-input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.14);}
    .auth-screen{
      background:
        linear-gradient(135deg,rgba(7,17,32,.96),rgba(8,20,38,.98)),
        radial-gradient(circle at 18% 18%,rgba(47,128,237,.18),transparent 420px)!important;
    }
    .auth-shell{isolation:isolate;}
    .auth-brief{
      min-height:520px;
      padding:34px;
      border-radius:14px;
      background:linear-gradient(180deg,rgba(17,31,53,.94),rgba(8,20,38,.96));
      border:1px solid rgba(148,163,184,.18);
      box-shadow:0 24px 80px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.04);
      position:relative;
      overflow:hidden;
    }
    .auth-brief::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,rgba(90,167,255,.18),transparent 38%),radial-gradient(circle at 78% 18%,rgba(22,163,106,.16),transparent 280px);
      pointer-events:none;
    }
    .auth-brief>*{position:relative;z-index:1;}
    .auth-login-col .card{border-top:3px solid #5aa7ff!important;}
    .corp-mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
    .corp-mini-card{
      border:1px solid rgba(148,163,184,.16);
      background:rgba(7,17,32,.58);
      border-radius:10px;
      padding:14px;
    }
    .corp-top-title{display:flex;align-items:center;gap:12px;min-width:0;}
    .corp-page-icon{
      width:40px;height:40px;border-radius:10px;
      border:1px solid rgba(148,163,184,.2);
      background:linear-gradient(180deg,rgba(17,31,53,.95),rgba(8,20,38,.95));
      display:flex;align-items:center;justify-content:center;
      color:#dbeafe;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .corp-user-pill{
      border:1px solid rgba(148,163,184,.18)!important;
      background:rgba(10,20,36,.76)!important;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
    }
    .corp-section-hero{
      padding:18px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.16);
      background:linear-gradient(90deg,rgba(17,31,53,.94),rgba(8,20,38,.84));
      box-shadow:0 18px 52px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.035);
    }
    .stat-card{position:relative;overflow:hidden;}
    .stat-card::after{
      content:"";
      position:absolute;
      left:0;right:0;bottom:0;height:3px;
      background:linear-gradient(90deg,rgba(90,167,255,.42),rgba(22,163,106,.34));
      opacity:.7;
    }
    .sidebar-section-label{
      padding:10px 16px 6px;
      font-size:10px;
      color:#64748b;
      letter-spacing:.11em;
      text-transform:uppercase;
      font-weight:900;
    }
    .sidebar-status-card{
      border:1px solid rgba(148,163,184,.14);
      background:rgba(8,20,38,.66);
      border-radius:10px;
      padding:10px 12px;
      margin:0 12px 10px;
    }
    @media(max-width:1023px){
      .auth-shell{max-width:420px!important;display:block!important;}
      .corp-section-hero{padding:15px;}
    }
    @media(max-width:640px){
      .corp-mini-grid{grid-template-columns:1fr;}
      .corp-top-title{gap:9px;}
      .corp-page-icon{width:36px;height:36px;}
    }
  </style>
</head>
