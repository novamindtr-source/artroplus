<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Enterprise | Medikal Operasyon & ERP</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#3b82f6', dark: '#0f172a' }
                }
            }
        }
    </script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase & SheetJS & Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext } = React;

        // --- SUPABASE INIT ---
        const getSupabase = () => {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (url && key) return supabase.createClient(url, key);
            return null;
        };
        let supabaseClient = getSupabase();

        // --- CONTEXTS ---
        const ToastContext = createContext();
        const useToast = () => useContext(ToastContext);

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev.filter(t => t.message !== message), { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-enter px-4 py-3 rounded shadow-lg text-white flex items-center gap-2 ${t.type === 'error' ? 'bg-red-500' : t.type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`}>
                                <i data-lucide={t.type === 'success' ? 'check-circle' : t.type === 'error' ? 'alert-circle' : 'info'} className="w-5 h-5"></i>
                                {t.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // --- COMPONENTS ---
        const Modal = ({ title, onClose, children }) => {
            useEffect(() => { lucide.createIcons(); });
            return (
                <div className="fixed inset-0 z-40 flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700"><i data-lucide="x"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto hide-scroll flex-1">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEWS ---
        const Dashboard = () => {
            const [stats, setStats] = useState({ today: 0, pending: 0, lowStock: 0 });
            
            useEffect(() => {
                const fetchStats = async () => {
                    const today = new Date().toISOString().split('T')[0];
                    const [surgeries, products] = await Promise.all([
                        supabaseClient.from('surgeries').select('*'),
                        supabaseClient.from('products').select('*')
                    ]);
                    
                    if (surgeries.data && products.data) {
                        setStats({
                            today: surgeries.data.filter(s => s.date === today).length,
                            pending: surgeries.data.filter(s => s.status === 'Planlandı').length,
                            lowStock: products.data.filter(p => p.shelf_stock < 10).length
                        });
                    }
                };
                fetchStats();
            }, []);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Operasyon Kontrol Merkezi</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Bugünkü Ameliyatlar</h3>
                            <div className="text-4xl font-bold">{stats.today}</div>
                        </div>
                        <div className="bg-gradient-to-br from-orange-500 to-red-600 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Kritik Stok Uyarısı</h3>
                            <div className="text-4xl font-bold">{stats.lowStock} <span className="text-lg font-normal">ürün</span></div>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-500 to-teal-700 text-white p-6 rounded-xl shadow-lg">
                            <h3 className="text-white/80 font-medium mb-1">Planlanan (Açık) Operasyon</h3>
                            <div className="text-4xl font-bold">{stats.pending}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const SurgeriesView = () => {
            const toast = useToast();
            const [surgeries, setSurgeries] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0], time: '', is_time_unknown: false,
                type: '', hospital: '', doctor: '', is_doctor_unknown: false, status: 'Planlandı', notes: '', adet: 1
            });

            const loadSurgeries = async () => {
                const { data, error } = await supabaseClient.from('surgeries').select('*').order('date', { ascending: false });
                if (data) setSurgeries(data);
                if (error) toast('Veriler yüklenemedi', 'error');
            };

            useEffect(() => { loadSurgeries(); }, []);

            // Realtime Listener
            useEffect(() => {
                const channel = supabaseClient.channel('public:surgeries')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'surgeries' }, payload => {
                        loadSurgeries();
                    }).subscribe();
                return () => { supabaseClient.removeChannel(channel); };
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                let docName = formData.doctor;
                if (!formData.is_doctor_unknown && docName && !docName.startsWith('Dr.')) {
                    docName = 'Dr. ' + docName;
                }

                const payload = { ...formData, doctor: docName };
                
                const { error } = await supabaseClient.from('surgeries').insert([payload]);
                if (error) {
                    toast(error.message, 'error');
                } else {
                    toast('Ameliyat başarıyla eklendi', 'success');
                    setIsModalOpen(false);
                    setFormData({ ...formData, time: '', doctor: '', type: '', notes: '' });
                }
            };

            const exportToExcel = () => {
                const exportData = surgeries.map((s, index) => ({
                    'Sıra': index + 1,
                    'Tarih': s.date,
                    'Saat': s.is_time_unknown ? 'Saat netleşmedi' : s.time,
                    'Ameliyat': s.type,
                    'Hastane': s.hospital,
                    'Doktor': s.is_doctor_unknown ? 'Doktor netleşmedi' : s.doctor,
                    'Adet': s.adet,
                    'Durum': s.status,
                    'Not': s.notes
                }));
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Ameliyatlar");
                XLSX.writeFile(workbook, `Ameliyat_Programi_${new Date().toISOString().split('T')[0]}.xlsx`);
                toast('Excel indiriliyor', 'success');
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Planlandı': return 'bg-blue-100 text-blue-700';
                    case 'Devam Ediyor': return 'bg-orange-100 text-orange-700';
                    case 'Tamamlandı': return 'bg-green-100 text-green-700';
                    case 'İptal Edildi': return 'bg-red-100 text-red-700';
                    default: return 'bg-slate-100 text-slate-700';
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center flex-wrap gap-4">
                        <h2 className="text-2xl font-bold">Ameliyatlar</h2>
                        <div className="flex gap-2">
                            <button onClick={exportToExcel} className="bg-emerald-600 text-white px-4 py-2 rounded font-medium shadow-md hover:bg-emerald-700 transition flex items-center gap-2">
                                <i data-lucide="file-spreadsheet" className="w-4 h-4"></i> Excel İndir
                            </button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-primary text-white px-4 py-2 rounded font-medium shadow-md hover:bg-blue-600 transition flex items-center gap-2">
                                <i data-lucide="plus" className="w-4 h-4"></i> Yeni Ameliyat
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-50 text-slate-500">
                                    <tr>
                                        <th className="p-4">Tarih / Saat</th>
                                        <th className="p-4">Ameliyat Türü</th>
                                        <th className="p-4">Hastane & Doktor</th>
                                        <th className="p-4">Adet</th>
                                        <th className="p-4">Durum</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {surgeries.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400">Kayıt bulunamadı.</td></tr> :
                                        surgeries.map(s => (
                                            <tr key={s.id} className="border-t border-slate-100 hover:bg-slate-50 transition cursor-pointer">
                                                <td className="p-4 font-medium">
                                                    <div>{s.date}</div>
                                                    <div className="text-xs text-slate-500">{s.is_time_unknown ? 'Saat netleşmedi' : s.time}</div>
                                                </td>
                                                <td className="p-4">{s.type}</td>
                                                <td className="p-4">
                                                    <div className="font-medium text-slate-800">{s.hospital}</div>
                                                    <div className="text-xs text-slate-500">{s.is_doctor_unknown ? 'Doktor netleşmedi' : s.doctor}</div>
                                                </td>
                                                <td className="p-4">{s.adet}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${getStatusColor(s.status)}`}>{s.status}</span>
                                                </td>
                                            </tr>
                                        ))
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <Modal title="Yeni Ameliyat Kaydı" onClose={() => setIsModalOpen(false)}>
                            <form onSubmit={handleSave} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tarih</label>
                                        <input type="date" required value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} className="w-full p-2 border rounded bg-slate-50" />
                                    </div>
                                    <div>
                                        <label className="flex items-center justify-between text-sm font-medium text-slate-700 mb-1">
                                            <span>Saat</span>
                                            <label className="flex items-center gap-1 cursor-pointer text-xs font-normal text-slate-500">
                                                <input type="checkbox" checked={formData.is_time_unknown} onChange={e=>setFormData({...formData, is_time_unknown: e.target.checked, time: ''})} /> Bilinmiyor (?)
                                            </label>
                                        </label>
                                        <input type="time" disabled={formData.is_time_unknown} value={formData.time} onChange={e=>setFormData({...formData, time: e.target.value})} className="w-full p-2 border rounded bg-slate-50 disabled:opacity-50" />
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Ameliyat Türü (Örn: Total Diz Protezi)</label>
                                    <input type="text" required value={formData.type} onChange={e=>setFormData({...formData, type: e.target.value})} className="w-full p-2 border rounded bg-slate-50" list="surgery-types" />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Hastane</label>
                                        <input type="text" required value={formData.hospital} onChange={e=>setFormData({...formData, hospital: e.target.value})} className="w-full p-2 border rounded bg-slate-50" />
                                    </div>
                                    <div>
                                        <label className="flex items-center justify-between text-sm font-medium text-slate-700 mb-1">
                                            <span>Doktor</span>
                                            <label className="flex items-center gap-1 cursor-pointer text-xs font-normal text-slate-500">
                                                <input type="checkbox" checked={formData.is_doctor_unknown} onChange={e=>setFormData({...formData, is_doctor_unknown: e.target.checked, doctor: ''})} /> Bilinmiyor (?)
                                            </label>
                                        </label>
                                        <input type="text" disabled={formData.is_doctor_unknown} placeholder="İsim (Dr. otomatik eklenir)" value={formData.doctor} onChange={e=>setFormData({...formData, doctor: e.target.value})} className="w-full p-2 border rounded bg-slate-50 disabled:opacity-50" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Adet</label>
                                        <input type="number" min="1" required value={formData.adet} onChange={e=>setFormData({...formData, adet: parseInt(e.target.value)})} className="w-full p-2 border rounded bg-slate-50" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Durum</label>
                                        <select value={formData.status} onChange={e=>setFormData({...formData, status: e.target.value})} className="w-full p-2 border rounded bg-slate-50">
                                            <option>Planlandı</option>
                                            <option>Devam Ediyor</option>
                                            <option>Tamamlandı</option>
                                            <option>İptal Edildi</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Notlar & Gerekli Ekipmanlar</label>
                                    <textarea rows="3" value={formData.notes} onChange={e=>setFormData({...formData, notes: e.target.value})} className="w-full p-2 border rounded bg-slate-50"></textarea>
                                </div>

                                <button type="submit" className="w-full bg-primary text-white p-3 rounded font-bold hover:bg-blue-600 transition">Kaydet</button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        // Layout Component (Simplified for brevity, assumes Sidebar is passed)
        const Layout = ({ children, menu, setMenu, onLogout }) => {
            useEffect(() => { lucide.createIcons(); });
            const menuItems = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Kontrol Merkezi' },
                { id: 'surgeries', icon: 'activity', label: 'Ameliyatlar' }
            ];

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    <div className="hidden md:flex flex-col w-64 bg-dark text-slate-300">
                        <div className="p-6 flex items-center gap-3 text-white border-b border-slate-800">
                            <i data-lucide="crosshairs" className="text-primary"></i>
                            <span className="font-bold text-xl tracking-tight">MedTrack</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            {menuItems.map(m => (
                                <button key={m.id} onClick={() => setMenu(m.id)} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${menu === m.id ? 'bg-primary text-white' : 'hover:bg-slate-800'}`}>
                                    <i data-lucide={m.icon} className="w-5 h-5"></i> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={onLogout} className="text-red-400 hover:text-red-300 flex items-center gap-2"><i data-lucide="log-out" className="w-4 h-4"></i> Çıkış Yap</button>
                        </div>
                    </div>
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">{children}</div>
                    </div>
                </div>
            );
        };

        // --- APP ROOT ---
        const AppContent = () => {
            const [activeMenu, setActiveMenu] = useState('dashboard');
            
            const handleLogout = async () => {
                await supabaseClient.auth.signOut();
                window.location.reload();
            };

            return (
                <Layout menu={activeMenu} setMenu={setActiveMenu} onLogout={handleLogout}>
                    {activeMenu === 'dashboard' ? <Dashboard /> : <SurgeriesView />}
                </Layout>
            );
        };

        const RootApp = () => (
            <ToastProvider>
                <AppContent />
            </ToastProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
