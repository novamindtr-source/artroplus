<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTROPLUS</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="app" class="min-h-screen bg-gray-900 text-white flex items-center justify-center">
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="w-full max-w-md bg-gray-800 rounded-2xl p-8 shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-white text-center mb-2">ARTROPLUS</h1>
        <p class="text-gray-400 text-center mb-8">Medikal Yönetim Sistemi</p>
        
        <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500/50 text-red-300 p-3 rounded-xl mb-4 text-sm"></div>
        
        <input type="email" id="emailInput" placeholder="E-posta" 
            class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-400 mb-3 focus:outline-none focus:border-blue-500">
        
        <input type="password" id="passwordInput" placeholder="Şifre" 
            class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-400 mb-4 focus:outline-none focus:border-blue-500">
        
        <button id="loginBtn" class="w-full p-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition">
            Giriş Yap
        </button>
    </div>

    <!-- ANA SAYFA -->
    <div id="dashboardScreen" class="hidden w-full max-w-4xl">
        <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl border border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">ARTROPLUS</h1>
                <div class="flex items-center gap-4">
                    <span id="userEmail" class="text-gray-400"></span>
                    <button id="logoutBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl text-sm font-bold transition">Çıkış</button>
                </div>
            </div>
            
            <!-- MENÜ BUTONLARI -->
            <div class="grid grid-cols-3 gap-4 mb-6">
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="dashboard">📊 Dashboard</button>
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="surgeries">⚕️ Ameliyatlar</button>
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="patients">👤 Hastalar</button>
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="products">📦 Ürünler</button>
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="stock">📊 Stok</button>
                <button class="menu-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-xl transition" data-page="finance">💰 Finans</button>
            </div>

            <!-- SAYFA İÇERİKLERİ -->
            <div id="pageContent">
                <div id="page-dashboard">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-gray-700 rounded-xl p-6 text-center">
                            <p class="text-gray-400 text-sm">Toplam Ameliyat</p>
                            <p class="text-3xl font-bold text-blue-400" id="statSurgeries">0</p>
                        </div>
                        <div class="bg-gray-700 rounded-xl p-6 text-center">
                            <p class="text-gray-400 text-sm">Hastalar</p>
                            <p class="text-3xl font-bold text-green-400" id="statPatients">0</p>
                        </div>
                        <div class="bg-gray-700 rounded-xl p-6 text-center">
                            <p class="text-gray-400 text-sm">Ürünler</p>
                            <p class="text-3xl font-bold text-purple-400" id="statProducts">0</p>
                        </div>
                    </div>
                </div>

                <div id="page-surgeries" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">⚕️ Ameliyatlar</h2>
                        <button id="addSurgeryBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-bold transition">+ Ekle</button>
                    </div>
                    <div id="surgeriesList" class="space-y-2"></div>
                </div>

                <div id="page-patients" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">👤 Hastalar</h2>
                        <button id="addPatientBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-bold transition">+ Ekle</button>
                    </div>
                    <div id="patientsList" class="space-y-2"></div>
                </div>

                <div id="page-products" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">📦 Ürünler</h2>
                        <button id="addProductBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-bold transition">+ Ekle</button>
                    </div>
                    <div id="productsList" class="space-y-2"></div>
                </div>

                <div id="page-stock" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">📊 Stok</h2>
                        <button id="addStockBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-bold transition">+ Stok Girişi</button>
                    </div>
                    <div id="stockList" class="space-y-2"></div>
                </div>

                <div id="page-finance" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">💰 Finans</h2>
                        <button id="addInvoiceBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-bold transition">+ Fatura</button>
                    </div>
                    <div id="invoicesList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full border border-gray-700">
        <div class="flex justify-between items-center mb-4">
            <h2 id="modalTitle" class="text-xl font-bold">Yeni Kayıt</h2>
            <button id="modalCloseBtn" class="text-gray-400 hover:text-white text-2xl">✕</button>
        </div>
        <div id="modalBody"></div>
        <button id="modalSaveBtn" class="w-full mt-4 p-3 bg-blue-600 hover:bg-blue-700 rounded-xl text-white font-bold transition">Kaydet</button>
    </div>
</div>

<script>
// ============================================================
// SUPABASE BAĞLANTI
// ============================================================
const SB_URL = "https://gvzkldgueygixbypyfsp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emtsZGd1ZXlnaXhieXB5ZnNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjczOTEsImV4cCI6MjA5NDk0MzM5MX0.jqBfY-3mp3-jhsQjENmfv7kntL8dvr4gcPt3-GPK-SQ";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ============================================================
// DOM ELEMENTLERİ
// ============================================================
const loginScreen = document.getElementById('loginScreen');
const dashboardScreen = document.getElementById('dashboardScreen');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const errorMessage = document.getElementById('errorMessage');
const userEmail = document.getElementById('userEmail');
const modalOverlay = document.getElementById('modalOverlay');
const modalCloseBtn = document.getElementById('modalCloseBtn');

// ============================================================
// FONKSİYONLAR
// ============================================================

function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.classList.remove('hidden');
    setTimeout(() => errorMessage.classList.add('hidden'), 5000);
}

function showPage(page) {
    document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
    const target = document.getElementById('page-' + page);
    if (target) target.classList.remove('hidden');
}

async function refreshDashboard() {
    try {
        const { count: surgeries } = await sb.from('surgeries').select('*', { count: 'exact', head: true });
        const { count: patients } = await sb.from('patients').select('*', { count: 'exact', head: true });
        const { count: products } = await sb.from('urunler').select('*', { count: 'exact', head: true });
        document.getElementById('statSurgeries').textContent = surgeries || 0;
        document.getElementById('statPatients').textContent = patients || 0;
        document.getElementById('statProducts').textContent = products || 0;
    } catch(e) {
        console.error('Dashboard hatası:', e);
    }
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session) {
        loginScreen.classList.add('hidden');
        dashboardScreen.classList.remove('hidden');
        userEmail.textContent = data.session.user.email;
        refreshDashboard();
        loadSurgeries();
        loadPatients();
        loadProducts();
        loadStock();
        loadInvoices();
    }
}

// ============================================================
// GİRİŞ / ÇIKIŞ
// ============================================================
loginBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    if (!email || !password) { showError('E-posta ve şifre girin.'); return; }
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'Giriş yapılıyor...';
    
    const { error } = await sb.auth.signInWithPassword({ email, password });
    
    loginBtn.disabled = false;
    loginBtn.textContent = 'Giriş Yap';
    
    if (error) { showError(error.message); return; }
    checkSession();
});

logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    loginScreen.classList.remove('hidden');
    dashboardScreen.classList.add('hidden');
});

passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

// ============================================================
// MENÜ NAVİGASYONU
// ============================================================
document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        showPage(this.dataset.page);
    });
});

// ============================================================
// MODAL
// ============================================================
function openModal(title, html) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = html;
    modalOverlay.classList.remove('hidden');
    modalOverlay.style.display = 'flex';
}

function closeModal() {
    modalOverlay.classList.add('hidden');
    modalOverlay.style.display = 'none';
}

modalCloseBtn.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

// ============================================================
// AMELİYATLAR
// ============================================================
async function loadSurgeries() {
    const { data } = await sb.from('surgeries').select('*').order('date', { ascending: false });
    const list = document.getElementById('surgeriesList');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="text-gray-500 text-center py-4">Ameliyat yok</div>';
        return;
    }
    list.innerHTML = data.map(s => `
        <div class="bg-gray-700 rounded-xl p-4 flex justify-between items-center">
            <div>
                <div class="font-bold">${s.type || 'Belirtilmemiş'}</div>
                <div class="text-sm text-gray-400">${s.date} · ${s.time || 'Saat yok'} · ${s.doctor || 'Doktor yok'}</div>
            </div>
            <span class="px-3 py-1 rounded-full text-xs font-bold ${s.status === 'done' ? 'bg-green-600' : 'bg-yellow-600'}">${s.status === 'done' ? 'Tamamlandı' : 'Planlandı'}</span>
        </div>
    `).join('');
}

document.getElementById('addSurgeryBtn').addEventListener('click', () => {
    openModal('Yeni Ameliyat', `
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" type="date" id="fSurgeryDate">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" type="time" id="fSurgeryTime">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Ameliyat Türü" id="fSurgeryType">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Doktor" id="fSurgeryDoctor">
        <select class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white" id="fSurgeryStatus">
            <option value="planned">Planlandı</option>
            <option value="done">Tamamlandı</option>
        </select>
    `);
    document.getElementById('modalSaveBtn').onclick = async () => {
        const { error } = await sb.from('surgeries').insert({
            date: document.getElementById('fSurgeryDate').value,
            time: document.getElementById('fSurgeryTime').value,
            type: document.getElementById('fSurgeryType').value,
            doctor: document.getElementById('fSurgeryDoctor').value,
            status: document.getElementById('fSurgeryStatus').value
        });
        if (error) { showError(error.message); return; }
        closeModal();
        loadSurgeries();
        refreshDashboard();
    };
});

// ============================================================
// HASTALAR
// ============================================================
async function loadPatients() {
    const { data } = await sb.from('patients').select('*').order('name');
    const list = document.getElementById('patientsList');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="text-gray-500 text-center py-4">Hasta yok</div>';
        return;
    }
    list.innerHTML = data.map(p => `
        <div class="bg-gray-700 rounded-xl p-4 flex justify-between items-center">
            <div>
                <div class="font-bold">${p.name}</div>
                <div class="text-sm text-gray-400">${p.phone || 'Telefon yok'} · ${p.email || 'E-posta yok'}</div>
            </div>
        </div>
    `).join('');
}

document.getElementById('addPatientBtn').addEventListener('click', () => {
    openModal('Yeni Hasta', `
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Ad Soyad" id="fPatientName">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Telefon" id="fPatientPhone">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="E-posta" id="fPatientEmail">
    `);
    document.getElementById('modalSaveBtn').onclick = async () => {
        const { error } = await sb.from('patients').insert({
            name: document.getElementById('fPatientName').value,
            phone: document.getElementById('fPatientPhone').value,
            email: document.getElementById('fPatientEmail').value
        });
        if (error) { showError(error.message); return; }
        closeModal();
        loadPatients();
        refreshDashboard();
    };
});

// ============================================================
// ÜRÜNLER
// ============================================================
async function loadProducts() {
    const { data } = await sb.from('urunler').select('*');
    const list = document.getElementById('productsList');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="text-gray-500 text-center py-4">Ürün yok</div>';
        return;
    }
    list.innerHTML = data.map(p => `
        <div class="bg-gray-700 rounded-xl p-4 flex justify-between items-center">
            <div>
                <div class="font-bold">${p.ad}</div>
                <div class="text-sm text-gray-400">${p.kod || 'Kod yok'} · ${p.birim || 'adet'}</div>
            </div>
            <span class="text-sm text-gray-400">Stok: ${p.stok || 0}</span>
        </div>
    `).join('');
}

document.getElementById('addProductBtn').addEventListener('click', () => {
    openModal('Yeni Ürün', `
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Ürün Adı" id="fProductName">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Kod" id="fProductCode">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="Birim" id="fProductUnit">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white" type="number" placeholder="Min. Stok" id="fProductMinStock">
    `);
    document.getElementById('modalSaveBtn').onclick = async () => {
        const { error } = await sb.from('urunler').insert({
            ad: document.getElementById('fProductName').value,
            kod: document.getElementById('fProductCode').value,
            birim: document.getElementById('fProductUnit').value,
            min_stok: parseInt(document.getElementById('fProductMinStock').value) || 0
        });
        if (error) { showError(error.message); return; }
        closeModal();
        loadProducts();
        refreshDashboard();
    };
});

// ============================================================
// STOK
// ============================================================
async function loadStock() {
    const { data } = await sb.from('stok').select('*, urunler(ad)');
    const list = document.getElementById('stockList');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="text-gray-500 text-center py-4">Stok yok</div>';
        return;
    }
    list.innerHTML = data.map(s => `
        <div class="bg-gray-700 rounded-xl p-4 flex justify-between items-center">
            <div>
                <div class="font-bold">${s.urunler?.ad || 'Ürün yok'}</div>
                <div class="text-sm text-gray-400">LOT: ${s.lot || 'Yok'} · SKT: ${s.skt || 'Yok'}</div>
            </div>
            <span class="text-lg font-bold text-blue-400">${s.miktar || 0}</span>
        </div>
    `).join('');
}

document.getElementById('addStockBtn').addEventListener('click', async () => {
    const { data: products } = await sb.from('urunler').select('id, ad');
    let options = products.map(p => `<option value="${p.id}">${p.ad}</option>`).join('');
    openModal('Stok Girişi', `
        <select class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" id="fStockProduct">${options}</select>
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" type="number" placeholder="Adet" id="fStockQty">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" placeholder="LOT" id="fStockLot">
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white" type="date" id="fStockSkt">
    `);
    document.getElementById('modalSaveBtn').onclick = async () => {
        const { error } = await sb.from('stok').insert({
            urun_id: document.getElementById('fStockProduct').value,
            miktar: parseInt(document.getElementById('fStockQty').value) || 1,
            lot: document.getElementById('fStockLot').value,
            skt: document.getElementById('fStockSkt').value
        });
        if (error) { showError(error.message); return; }
        closeModal();
        loadStock();
        refreshDashboard();
    };
});

// ============================================================
// FİNANS
// ============================================================
async function loadInvoices() {
    const { data } = await sb.from('invoices').select('*').order('created_at', { ascending: false });
    const list = document.getElementById('invoicesList');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="text-gray-500 text-center py-4">Fatura yok</div>';
        return;
    }
    list.innerHTML = data.map(inv => `
        <div class="bg-gray-700 rounded-xl p-4 flex justify-between items-center">
            <div>
                <div class="font-bold">${inv.invoice_number || 'FAT-' + String(inv.id).slice(0,8)}</div>
                <div class="text-sm text-gray-400">${inv.total_amount || 0} ₺</div>
            </div>
            <span class="px-3 py-1 rounded-full text-xs font-bold ${inv.status === 'paid' ? 'bg-green-600' : 'bg-yellow-600'}">${inv.status === 'paid' ? 'Ödendi' : 'Bekliyor'}</span>
        </div>
    `).join('');
}

document.getElementById('addInvoiceBtn').addEventListener('click', async () => {
    const { data: surgeries } = await sb.from('surgeries').select('id, type');
    let options = surgeries.map(s => `<option value="${s.id}">${s.type}</option>`).join('');
    openModal('Yeni Fatura', `
        <select class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" id="fInvoiceSurgery">${options}</select>
        <input class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3" type="number" placeholder="Tutar" id="fInvoiceAmount">
        <select class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white" id="fInvoiceStatus">
            <option value="pending">Bekliyor</option>
            <option value="paid">Ödendi</option>
        </select>
    `);
    document.getElementById('modalSaveBtn').onclick = async () => {
        const { error } = await sb.from('invoices').insert({
            surgery_id: document.getElementById('fInvoiceSurgery').value,
            total_amount: parseFloat(document.getElementById('fInvoiceAmount').value) || 0,
            status: document.getElementById('fInvoiceStatus').value,
            invoice_number: 'FAT-' + Date.now().toString().slice(-8)
        });
        if (error) { showError(error.message); return; }
        closeModal();
        loadInvoices();
        refreshDashboard();
    };
});

// ============================================================
// SAYFA YÜKLENİNCE
// ============================================================
checkSession();
</script>

</body>
</html>
