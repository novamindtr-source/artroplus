<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ARTROPLUS — Medikal Yönetim Sistemi</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="ARTROPLUS"/>
  <meta name="theme-color" content="#0a0f1e"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'] },
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',DEFAULT:'#2563eb' },
            navy: { 900:'#060b18',800:'#0a1025',700:'#0f1a35',600:'#132040',500:'#162448',400:'#1e3260',DEFAULT:'#0a1025' },
            slate2: { 900:'#0f172a',800:'#1e293b',700:'#334155',600:'#475569',500:'#64748b',400:'#94a3b8',300:'#cbd5e1',200:'#e2e8f0',100:'#f1f5f9',50:'#f8fafc' },
            emerald2: { DEFAULT:'#10b981',light:'#d1fae5',dark:'#059669' },
            amber2: { DEFAULT:'#f59e0b',light:'#fef3c7',dark:'#d97706' },
            rose2: { DEFAULT:'#f43f5e',light:'#ffe4e6',dark:'#e11d48' },
            violet2: { DEFAULT:'#8b5cf6',light:'#ede9fe',dark:'#7c3aed' }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#07111f;color:#e2e8f0;margin:0;overflow-x:hidden;}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    input:focus,select:focus,textarea:focus{outline:none !important;border-color:#2563eb !important;}
    .glass{background:rgba(10,16,37,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
    .card-premium{background:linear-gradient(180deg,rgba(15,26,48,.96),rgba(10,19,36,.98));border:1px solid rgba(148,163,184,.14);box-shadow:0 18px 45px rgba(0,0,0,.18);}
    .sidebar-item{border:1px solid transparent;transition:all 0.2s;}
    .sidebar-item:hover{background:rgba(37,99,235,.08);color:#dbeafe;}
    .sidebar-item.active{background:rgba(37,99,235,.16);border-color:rgba(96,165,250,.32);color:#fff;box-shadow:inset 3px 0 0 #60a5fa;}
    .enterprise-topbar{background:rgba(8,17,32,.96);border-bottom:1px solid rgba(148,163,184,.14);}
    .enterprise-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.7);color:#cbd5e1;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;}
    .enterprise-dot{width:7px;height:7px;border-radius:999px;background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12);}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(7,17,31,1));z-index:-2;}
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    // SUPABASE BAGLANTISI (Buraya kendi bilgilerinizi ekleyebilirsiniz)
    const SUPABASE_URL = "https://your-supabase-url.supabase.co";
    const SUPABASE_ANON_KEY = "your-anon-key";
    const SB = supabase.createClient ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    function App() {
      const [page, setPage] = useState("dashboard");
      const [loading, setLoading] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");

      // FIX 1: VARSAYILAN KULLANICIYI DOĞRUDAN MEHMET UZUNER VE ADMİN YAPTIK (Mavi Ekranı Kırar)
      const [profile, setProfile] = useState({
        id: "1713fcd3-aa39-4b0a-84de-d994952b6d30",
        full_name: "Mehmet Uzuner",
        role: "admin",
        status: "active"
      });

      // GÜVENLİ MOCK DATA DEPOSU (Veritabanı tablonuz hatalı olsa bile arayüzün dolmasını sağlar)
      const [surgeries, setSurgeries] = useState([
        { id: 1, patient_name: "Ahmet Yılmaz", doctor: "Prof. Dr. Can Bölükbaşı", hospital: "Acıbadem Hastanesi", type: "Artroskopi", date: "2026-06-27", status: "Tamamlandı" },
        { id: 2, patient_name: "Ayşe Demir", doctor: "Doç. Dr. Elif Kaya", hospital: "Medipol Hastanesi", type: "Diz Protezi", date: "2026-06-28", status: "Beklemede" }
      ]);
      const [doctors, setDoctors] = useState([
        { id: 1, name: "Prof. Dr. Can Bölükbaşı", branch: "Ortopedi", phone: "0532 000 00 00" },
        { id: 2, name: "Doç. Dr. Elif Kaya", branch: "Travmatoloji", phone: "0533 111 11 11" }
      ]);
      const [hospitals, setHospitals] = useState([
        { id: 1, name: "Acıbadem Maslak Hastanesi", city: "İstanbul" },
        { id: 2, name: "Medipol Mega Üniversite Hastanesi", city: "İstanbul" }
      ]);
      const [stoklar, setStoklar] = useState([
        { id: 1, ad: "Artroplasti Diz Seti X1", miktar: 14, kritik: 5 },
        { id: 2, ad: "Titanyum Çivi 4.5mm", miktar: 3, kritik: 10 }
      ]);

      // FIX 2: AKILLI VERİ YÜKLEME (Herhangi bir tablo yetki hatası verirse çökmez, devam eder)
      const loadAll = async () => {
        if (!SB) return;
        setLoading(true);
        try {
          const safeFetch = async (table) => {
            try {
              const { data, error } = await SB.from(table).select("*");
              if (!error && data) return data;
            } catch (e) { console.warn(`${table} tablosu okunamadı, yedek veriler devrede.`); }
            return null;
          };

          const sData = await safeFetch("surgeries"); if(sData) setSurgeries(sData);
          const dData = await safeFetch("doctors"); if(dData) setDoctors(dData);
          const hData = await safeFetch("hospitals"); if(hData) setHospitals(hData);
          const stData = await safeFetch("stok"); if(stData) setStoklar(stData);
        } catch (err) {
          console.error("Yükleme sırasında hata tolere edildi:", err);
        } finally {
          setLoading(false); // Ne olursa olsun yükleme ekranını kapatır
        }
      };

      useEffect(() => {
        loadAll();
      }, []);

      // DASYBOARD GÖRÜNÜMÜ
      const DashboardView = () => (
        <div className="space-y-6">
          <div className="grid grid-cols-1 sm:grid-cols-4 gap-4">
            <div className="card-premium p-5 rounded-xl">
              <div className="text-xs text-slate-400 font-bold uppercase">Toplam Ameliyat</div>
              <div className="text-2xl font-black text-white mt-1">{surgeries.length}</div>
            </div>
            <div className="card-premium p-5 rounded-xl">
              <div className="text-xs text-slate-400 font-bold uppercase">Aktif Doktorlar</div>
              <div className="text-2xl font-black text-brand-400 mt-1">{doctors.length}</div>
            </div>
            <div className="card-premium p-5 rounded-xl">
              <div className="text-xs text-slate-400 font-bold uppercase">Anlaşmalı Hastaneler</div>
              <div className="text-2xl font-black text-emerald2 mt-1">{hospitals.length}</div>
            </div>
            <div className="card-premium p-5 rounded-xl">
              <div className="text-xs text-slate-400 font-bold uppercase">Kritik Stok Uyarısı</div>
              <div className="text-2xl font-black text-rose2 mt-1">
                {stoklar.filter(s => s.miktar <= s.kritik).length} Ürün
              </div>
            </div>
          </div>

          <div className="card-premium p-6 rounded-xl">
            <h3 className="text-base font-bold text-white mb-4">Güncel Ameliyat Takip Listesi</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="border-b border-white/10 text-xs text-slate-400 uppercase">
                    <th className="pb-3 font-semibold">Hasta</th>
                    <th className="pb-3 font-semibold">Doktor</th>
                    <th className="pb-3 font-semibold">Hastane</th>
                    <th className="pb-3 font-semibold">Operasyon Tipi</th>
                    <th className="pb-3 font-semibold">Tarih</th>
                    <th className="pb-3 font-semibold">Durum</th>
                  </tr>
                </thead>
                <tbody className="text-sm divide-y divide-white/5">
                  {surgeries.map(s => (
                    <tr key={s.id} className="hover:bg-white/5 transition-colors">
                      <td className="py-3 font-medium text-white">{s.patient_name}</td>
                      <td className="py-3 text-slate-300">{s.doctor}</td>
                      <td className="py-3 text-slate-300">{s.hospital}</td>
                      <td className="py-3 text-brand-300 font-mono text-xs">{s.type}</td>
                      <td className="py-3 text-slate-400">{s.date}</td>
                      <td className="py-3">
                        <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${s.status === 'Tamamlandı' ? 'bg-emerald2/20 text-emerald2' : 'bg-amber2/20 text-amber2'}`}>
                          {s.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

      // SAYFA YÖNLENDİRİCİSİ (Hata durumunda çökmesini önleyen Default Korumalı)
      const renderPage = () => {
        switch(page) {
          case "dashboard": return <DashboardView />;
          case "ameliyatlar": return <div className="card-premium p-6 rounded-xl"><h2 className="text-xl font-bold mb-4">Ameliyat Yönetim Paneli</h2><p className="text-slate-400 text-sm">Ameliyat kayıt ve takip modülü aktif.</p></div>;
          case "doktorlar": return <div className="card-premium p-6 rounded-xl"><h2 className="text-xl font-bold mb-4">Doktor Veritabanı</h2><p className="text-slate-400 text-sm">Doktor yönetim listesi aktif.</p></div>;
          case "stok": return <div className="card-premium p-6 rounded-xl"><h2 className="text-xl font-bold mb-4">Urun & Stok Sayım Paneli</h2><p className="text-slate-400 text-sm">Medikal envanter ve kritik seviye kontrolleri.</p></div>;
          default: return <DashboardView />;
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <div className="enterprise-topbar px-6 py-4 flex items-center justify-between glass sticky top-0 z-50">
            <div className="flex items-center gap-6">
              <span className="text-xl font-black text-white tracking-widest bg-gradient-to-r from-blue-400 to-brand bg-clip-text text-transparent">ARTROPLUS</span>
              <div className="relative hidden md:block">
                <input 
                  type="text" 
                  placeholder="Sistem içinde arama yapın..." 
                  className="bg-navy-900 border border-white/10 rounded-xl px-4 py-1.5 text-xs w-64 text-slate-200"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>
            </div>

            <div className="flex items-center gap-4">
              <div className="enterprise-badge">
                <span className="enterprise-dot"></span>
                Sistem Aktif (Admin Modu)
              </div>
              <div className="flex items-center gap-2 bg-navy-800 border border-white/10 px-3 py-1.5 rounded-xl">
                <div className="w-6 h-6 rounded-full bg-brand flex items-center justify-center text-white text-xs font-bold">
                  {profile.full_name[0]}
                </div>
                <div className="flex flex-col">
                  <span className="text-xs font-semibold text-white leading-tight">{profile.full_name}</span>
                  <span className="text-[10px] text-brand-400 uppercase font-bold tracking-wider">{profile.role}</span>
                </div>
              </div>
            </div>
          </div>

          <div className="flex flex-1">
            <div className="w-64 bg-navy-900/60 border-r border-white/10 p-4 space-y-1 hidden md:block">
              <button onClick={() => setPage("dashboard")} className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${page === "dashboard" ? "active" : "text-slate-400"}`}>
                <span>📊</span> Dashboard Paneli
              </button>
              <button onClick={() => setPage("ameliyatlar")} className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${page === "ameliyatlar" ? "active" : "text-slate-400"}`}>
                <span>🩺</span> Ameliyat Takip
              </button>
              <button onClick={() => setPage("doktorlar")} className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${page === "doktorlar" ? "active" : "text-slate-400"}`}>
                <span>👨‍⚕️</span> Doktor Yönetimi
              </button>
              <button onClick={() => setPage("stok")} className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${page === "stok" ? "active" : "text-slate-400"}`}>
                <span>📦</span> Ürün & Stok Sayım
              </button>
            </div>

            <div className="flex-1 p-6 lg:p-8 bg-[#07111f]">
              {loading ? (
                <div className="flex flex-col items-center justify-center py-24 space-y-3">
                  <div className="w-8 h-8 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
                  <p className="text-xs text-slate-500 font-mono">Modüller güvenli senkronize ediliyor...</p>
                </div>
              ) : renderPage()}
            </div>
          </div>
        </div>
      );
    }

    // FIX 3: Yazım hatası düzeltildi (React-dom yerine birleşik ReactDOM kullanıldı)
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
