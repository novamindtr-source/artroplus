// ============================================================
// GS1 BARCODE PARSER
// ============================================================
function parseGS1(raw) {
    const result = { gtin: '', lot: '', serial: '', expiryDate: null, mfgDate: null, qty: 1, ref: '', udi: String(raw || '').trim() };
    if (!raw || raw.length < 4) return result;
    let s = raw.replace(/^\].[0-9]/, '').replace(/^\][a-zA-Z][0-9]/, '').trim();
    const GS = '\x1d';
    const FIXED = { '01': 14, '10': 20, '17': 6, '11': 6, '21': 20, '30': 8 };
    const applyAI = (ai, val) => {
        switch (ai) {
            case '01': result.gtin = val; break;
            case '10': result.lot = val; break;
            case '21': result.serial = val; break;
            case '17': { const d = normalizeDate(val); if (d) result.expiryDate = d; break; }
            case '11': { const d = normalizeDate(val); if (d) result.mfgDate = d; break; }
            case '30': result.qty = parseInt(val) || 1; break;
        }
    };
    const aiPairs = [];
    s.replace(/\((\d{2,4})\)\s*([^\(]+)/g, (_, ai, val) => { aiPairs.push([ai, val.trim()]); return ''; });
    if (aiPairs.length) {
        aiPairs.forEach(([ai, val]) => applyAI(ai, FIXED[ai] ? val.slice(0, FIXED[ai]) : val));
    }
    const refMatch = s.match(/\b[A-Z]{1,6}-\d{2,}[A-Z0-9-]*\b/i);
    if (refMatch && !result.ref) result.ref = refMatch[0].toUpperCase();
    const gtinMatch = s.match(/\b\d{12,14}\b/);
    if (gtinMatch && !result.gtin) result.gtin = gtinMatch[0];
    return result;
}

function normalizeDate(val) {
    if (!val) return null;
    const s = String(val).trim();
    let m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
    if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    m = s.match(/^(\d{6})$/);
    if (m) {
        const yy = s.slice(0, 2), mm = s.slice(2, 4), dd = s.slice(4, 6);
        const year = parseInt(yy, 10) + (parseInt(yy, 10) < 50 ? 2000 : 1900);
        return `${year}-${mm}-${dd === '00' ? '01' : dd}`;
    }
    m = s.match(/^(\d{8})$/);
    if (m) return `${s.slice(0, 4)}-${s.slice(4, 6)}-${s.slice(6, 8)}`;
    return null;
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'info') {
    const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.borderLeft = `4px solid ${colors[type] || colors.info}`;
    el.innerHTML = msg;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(20px)'; setTimeout(() => el.remove(), 300); }, 4000);
}

function setupSidebar() {
    document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
        el.addEventListener('click', function() {
            const page = this.dataset.page;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            showPage(page);
            document.getElementById('pageTitle').textContent = this.textContent.trim();
        });
    });
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        currentUser = null;
        renderLogin();
    });
}

function setupModals() {
    document.querySelectorAll('.modal-close, .modal-overlay').forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target === this || this.classList.contains('modal-close')) {
                this.closest('.modal-overlay').classList.remove('active');
            }
        });
    });
}

function openModal(title, content) {

    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = content;
    overlay.classList.add('active');
}

function closeModal(id) {

async function doLogin() {

        return;
    }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Giriş yapılıyor...';
    const { error } = await sb.auth.signInWithPassword({ email, password });
