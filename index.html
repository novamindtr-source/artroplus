<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedTrack Enterprise</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"],
          },
          colors: {
            brand: {
              DEFAULT: "#4361ee",
              light: "#eef1ff",
              dark: "#2d4bc4",
            },
          },
        },
      },
    };
  </script>

  <script
    src="https://unpkg.com/react@18/umd/react.development.js"
    crossorigin
  ></script>

  <script
    src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    crossorigin
  ></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 0;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast-in {
      animation: slideIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // TOAST CONTEXT
    const ToastContext = createContext();

    const useToast = () => useContext(ToastContext);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);

      const addToast = (message, type = "info") => {
        const id = Date.now();

        setToasts((prev) => [
          ...prev,
          {
            id,
            message,
            type,
          },
        ]);

        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 3000);
      };

      return (
        <ToastContext.Provider value={addToast}>
          {children}

          <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
            {toasts.map((t) => (
              <div
                key={t.id}
                className={`toast-in px-4 py-3 rounded-xl shadow-lg text-white font-medium ${
                  t.type === "error"
                    ? "bg-red-500"
                    : t.type === "success"
                    ? "bg-green-500"
                    : "bg-slate-800"
                }`}
              >
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    // APP
    function App() {
      const toast = useToast();

      useEffect(() => {
        toast("Sistem başarıyla başlatıldı", "success");
      }, []);

      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-xl">
            <h1 className="text-4xl font-extrabold text-slate-800 mb-4">
              MedTrack Enterprise
            </h1>

            <p className="text-slate-600 mb-6">
              React + Tailwind çalışan tek dosya örneği.
            </p>

            <div className="flex gap-3">
              <button
                onClick={() =>
                  toast("Başarılı işlem", "success")
                }
                className="px-5 py-3 rounded-xl bg-green-500 text-white font-semibold"
              >
                Success
              </button>

              <button
                onClick={() =>
                  toast("Hata oluştu", "error")
                }
                className="px-5 py-3 rounded-xl bg-red-500 text-white font-semibold"
              >
                Error
              </button>

              <button
                onClick={() =>
                  toast("Bilgilendirme mesajı")
                }
                className="px-5 py-3 rounded-xl bg-slate-800 text-white font-semibold"
              >
                Info
              </button>
            </div>
          </div>
        </div>
      );
    }

    // RENDER
    const root = ReactDOM.createRoot(
      document.getElementById("root")
    );

    root.render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  </script>
</body>
</html>
