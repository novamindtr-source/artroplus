<script type="text/babel">
const { useState, useEffect, createContext, useContext, useMemo } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell } = Recharts;

// ── 1. MADDE: GELİŞMİŞ GS1 BARKOD PARSER SİSTEMİ ──
function parseMedicalBarcode(raw) {
  const res = { gtin: "", ref: "", lot: "—", expiryDate: "—", mfgDate: "—", qty: 1, udi: String(raw || "").trim() };
  if (!raw) return res;
  let clean = res.udi;
  const pairs = [];
  clean.replace(/\((\d{2,4})\)\s*([^\(]+)/g, (_, ai, val) => { pairs.push([ai, val.trim()]); return ""; });
  const applyAI = (ai, val) => {
    switch (ai) {
      case "01": res.gtin = val; res.ref = val.replace(/^0+/, "") || val; break;
      case "10": res.lot = val; break;
      case "17":
        if (val.length === 6) { res.expiryDate = `20${val.slice(0, 2)}-${val.slice(2, 4)}-${val.slice(4, 6)}`; }
        break;
      case "11":
        if (val.length === 6) { res.mfgDate = `20${val.slice(0, 2)}-${val.slice(2, 4)}-${val.slice(4, 6)}`; }
        break;
      case "30": res.qty = parseInt(val, 10) || 1; break;
    }
  };
  if (pairs.length > 0) { pairs.forEach(([ai, val]) => applyAI(ai, val)); }
  else {
    if (clean.startsWith("01") && clean.length >= 16) {
      applyAI("01", clean.slice(2, 16));
      let rem = clean.slice(16);
      if (rem.startsWith("17") && rem.length >= 8) { applyAI("17", rem.slice(2, 8)); rem = rem.slice(8); }
      if (rem.startsWith("11") && rem.length >= 8) { applyAI("11", rem.slice(2, 8)); rem = rem.slice(8); }
      if (rem.startsWith("10")) { applyAI("10", rem.slice(2)); }
    } else { res.ref = clean; }
  }
  return res;
}

const ToastContext = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = (msg, type = "info") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  };
  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`pointer-events-auto toast-in min-w-[280px] p-4 rounded-xl shadow-2xl border text-sm font-semibold flex items-center justify-between text-white ${
            t.type==='success'?'bg-emerald2 border-emerald2/20':t.type==='error'?'bg-rose2 border-rose2/20':'bg-navy-700 border-white/10'
          }`}>
            <span>{t.msg}</span>
            <button onClick={() => setToasts(p => p.filter(x => x.id !== t.id))} className="ml-3 opacity-60 hover:opacity-100">✕</button>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function App() {
  const { addToast } = useContext(ToastContext);
  const [session, setSession] = useState({ user: { email: 'demo@artroplus.com' } });
  const [profile, setProfile] = useState({ full_name: "Saha Elemanı Mühendisi", role: "field_user" });
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Core App States
  const [products, setProducts] = useState([
    { id: "1", code: "AR-2323BCC", name: "Suture Anchor 5.5mm", manufacturer: "Arthrex", unit: "adet", min_stock: 5 },
    { id: "2", code: "AR-4411IFS", name: "Interference Screw 7x25mm", manufacturer: "Stryker", unit: "adet", min_stock: 3 },
    { id: "3", code: "BTN-9900", name: "Anatomic Button Kit", manufacturer: "Smith & Nephew", unit: "adet", min_stock: 2 }
  ]);
  const [stoklar, setStoklar] = useState([
    { id: "s1", urun_id: "1", hospital_id: "auto", lot: "15485965", expiration_date: "2029-07-31", quantity: 12 },
    { id: "s2", urun_id: "1", hospital_id: "auto", lot: "15485999", expiration_date: "2029-12-01", quantity: 5 },
    { id: "s3", urun_id: "2", hospital_id: "auto", lot: "LOT-A7", expiration_date: "2028-05-14", quantity: 8 },
    { id: "s4", urun_id: "3", hospital_id: "auto", lot: "LOT-B2", expiration_date: "2030-01-20", quantity: 15 }
  ]);
  const [hospitals, setHospitals] = useState([
    { id: "h1", name: "Acıbadem Maslak Hastanesi", address: "İstanbul" },
    { id: "h2", name: "Liv Hospital Ulus", address: "İstanbul" },
    { id: "h3", name: "Florence Nightingale", address: "İstanbul" }
  ]);
  const [surgeries, setSurgeries] = useState([
    { id: "1", date: "2026-05-24", time: "09:30", type: "Ön Çapraz Bağ Rekonstrüksiyonu", hospital_id: "h1", doctor: "Prof. Dr. Ahmet Yılmaz", status: "planned", personnel: "Ahmet Tekin, Caner Bulut" },
    { id: "2", date: "2026-05-24", time: "14:00", type: "Omuz Artroskopisi Bankart Tamiri", hospital_id: "h2", doctor: "Doç. Dr. Selin Kaya", status: "planned", personnel: "Caner Bulut" },
    { id: "3", date: "2026-05-24", time: "19:45", type: "Menisküs Parsiyel Rezeksiyonu", hospital_id: "h1", doctor: "Prof. Dr. Ahmet Yılmaz", status: "planned", personnel: "Merve Güneş" }
  ]);
  
  // ── 3. MADDE: HOSPITAL_ID UYUMLU STOK HAREKET LOG DEVRESİ ──
  const [hareketler, setHareketler] = useState([
    { id: "log1", urun_id: "1", hospital_id: "auto", lot: "15485965", miktar: 12, aciklama: "İlk Kurulum Stok Girişi", created_at: "2026-05-24 08:00" }
  ]);
  
  // ── 6. MADDE: FATURA VE EKİP BAZLI TÜKETİM KAYITLARI ──
  const [faturalar, setFaturalar] = useState([]);

  // Form states
  const [barcodeInp, setBarcodeInp] = useState("");
  const [parsedState, setParsedState] = useState(null);
  const [stokEkleHospital, setStokEkleHospital] = useState("auto");
  const [activeTimelineVaka, setActiveTimelineVaka] = useState(null);

  // 4. MADDE: AMELİYAT PROGRAMLAMA FORM STATE (Stok içermez)
  const [progForm, setProgForm] = useState({ date: "2026-05-24", time: "08:00", type: "", hospital_id: "h1", doctor: "", personnelList: [] });
  const mockPersoneller = ["Ahmet Tekin", "Caner Bulut", "Merve Güneş", "Selin Öztürk", "Hakan Yurt"];

  // 5. MADDE: AMELİYAT TÜKETİM MODÜLÜ SEPET STATE (REF + LOT + Adet bazlı)
  const [selectedSurgeryId, setSelectedSurgeryId] = useState("");
  const [tuketimSide, setTuketimSide] = useState("Sağ");
  const [tuketimPatientName, setTuketimPatientName] = useState("");
  const [tuketimCart, setTuketimCart] = useState([]);

  useEffect(() => {
    if (barcodeInp) {
      setParsedState(parseMedicalBarcode(barcodeInp));
    } else {
      setParsedState(null);
    }
  }, [barcodeInp]);

  const totalStok = (urunId) => {
    return stoklar.filter(s => s.urun_id === urunId).reduce((acc, curr) => acc + curr.quantity, 0);
  };

  // Garantili Manuel Log Kaydı (Schema mismatch hatasını çözmek için hospital_id eklenmiştir)
  const insertMovementLog = (urunId, hospitalId, lotNum, amount, desc, surgeryId = null) => {
    const newLog = {
      id: "log-" + Math.random().toString(36).substring(2, 9),
      urun_id: urunId,
      hospital_id: hospitalId,
      lot: lotNum,
      miktar: amount,
      aciklama: desc,
      surgery_id: surgeryId,
      created_at: new Date().toISOString().replace('T', ' ').substring(0, 19)
    };
    setHareketler(p => [newLog, ...p]);
  };

  // 1 & 2. MADDE: BARKODLU ÜRÜN GİRİŞ TETİKLEYİCİ
  const handleAddStokScan = (e) => {
    e.preventDefault();
    if (!parsedState || !parsedState.ref) {
      addToast("Lütfen geçerli bir barkod girin veya okutun.", "error");
      return;
    }

    const { ref, lot, expiryDate, qty } = parsedState;
    let targetProd = products.find(p => p.code === ref);
    
    if (!targetProd) {
      const newProdId = String(products.length + 1);
      targetProd = { id: newProdId, code: ref, name: `Suture Product ${ref}`, manufacturer: "Otomatik Giriş", unit: "adet", min_stock: 0 };
      setProducts(p => [...p, targetProd]);
    }

    setStoklar(prev => {
      const matchIndex = prev.findIndex(s => s.urun_id === targetProd.id && s.lot === lot && s.hospital_id === stokEkleHospital);
      if (matchIndex > -1) {
        const u = [...prev];
        u[matchIndex].quantity += qty;
        return u;
      } else {
        return [...prev, { id: "stok-" + Date.now(), urun_id: targetProd.id, hospital_id: stokEkleHospital, lot, expiration_date: expiryDate !== "—" ? expiryDate : null, quantity: qty }];
      }
    });

    insertMovementLog(targetProd.id, stokEkleHospital, lot, qty, "Barkod sistemiyle depoya stok eklendi");
    addToast(`Stok Başarıyla Kaydedildi! REF: ${ref} | LOT: ${lot}`, "success");
    setBarcodeInp("");
  };

  // 4. MADDE: AMELİYAT PROGRAMLAMA
  const handleSaveProgram = (e) => {
    e.preventDefault();
    if (!progForm.type || !progForm.doctor) {
      addToast("Lütfen Ameliyat Türü ve Doktor alanlarını doldurun.", "error");
      return;
    }
    const newSur = {
      id: String(surgeries.length + 1),
      date: progForm.date,
      time: progForm.time,
      type: progForm.type,
      hospital_id: progForm.hospital_id,
      doctor: progForm.doctor,
      status: "planned",
      personnel: progForm.personnelList.join(", ") || "Atanmadı"
    };
    setSurgeries(p => [...p, newSur]);
    addToast("Ameliyat Programı Planlandı.", "success");
    setProgForm({ date: "2026-05-24", time: "08:00", type: "", hospital_id: "h1", doctor: "", personnelList: [] });
  };

  // 5 & 6. MADDE: GARANTİLİ STOK DÜŞÜMÜ VE EKİP FATURALANDIRMA ZİNCİRİ
  const handleExecuteTuketim = (e) => {
    e.preventDefault();
    if (!selectedSurgeryId) { addToast("Lütfen tüketim için bir ameliyat vaka kaydı seçin.", "error"); return; }
    if (!tuketimPatientName) { addToast("Hasta adı eklenmesi zorunludur.", "error"); return; }
    if (tuketimCart.length === 0) { addToast("Tüketim sepetine barkodlu ürün eklenmedi.", "error"); return; }

    const targetSur = surgeries.find(s => s.id === selectedSurgeryId);
    if (!targetSur) return;

    for (let item of tuketimCart) {
      const prod = products.find(p => p.code === item.ref);
      if (!prod) { addToast(`HATA: REF: ${item.ref} kodlu ürün sistemde bulunamadı.`, "error"); return; }
      const stokRec = stoklar.find(s => s.urun_id === prod.id && s.lot === item.lot);
      if (!stokRec || stokRec.quantity < item.quantity) {
        addToast(`KRİTİK HATA: Stok yetersiz! REF: ${item.ref} | LOT: ${item.lot} için çıkış yapılamaz.`, "error");
        return;
      }
    }

    setStoklar(prev => {
      return prev.map(s => {
        const prod = products.find(p => p.id === s.urun_id);
        const cartMatch = tuketimCart.find(c => c.ref === prod?.code && c.lot === s.lot);
        if (cartMatch) {
          return { ...s, quantity: s.quantity - cartMatch.quantity };
        }
        return s;
      });
    });

    tuketimCart.forEach(item => {
      const prod = products.find(p => p.code === item.ref);
      insertMovementLog(prod.id, targetSur.hospital_id, item.lot, -item.quantity, `Ameliyat tüketim çıkışı yapıldı (${tuketimPatientName})`, targetSur.id);
    });

    const targetHosp = hospitals.find(h => h.id === targetSur.hospital_id);
    const newFatura = {
      id: "FAT-" + Date.now().toString().slice(-6),

                </div>

                {faturalar.length === 0 ? (
                  <div className="text-slate-500 italic text-center p-8 text-xs">Henüz faturalandırılmış bir ameliyat tüketim kaydı bulunmuyor.</div>
                ) : (
                  <div className="space-y-4">
                    {faturalar.map(f => (
                      <div key={f.id} className="p-5 rounded-2xl bg-navy-900 border border-white/10 space-y-3">
                        <div className="flex flex-wrap justify-between items-center border-b border-white/5 pb-2 gap-2 text-xs">
                          <div>
                            <span className="font-mono text-brand-300 font-bold mr-3">KAYIT ID: {f.id}</span>
                            <span className="text-white font-bold">{f.hospital_name} — {f.surgery_name}</span>
                          </div>
                          <span className="bg-emerald2/20 border border-emerald2/30 text-emerald2 font-bold px-2 py-0.5 rounded">AMELİYAT TARAFI: {f.side}</span>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-slate-300">
                          <div><span className="text-slate-500">Hasta Adı:</span> <strong className="text-white">{f.patient_name}</strong></div>
                          <div><span className="text-slate-500">Sorumlu Hekim:</span> <strong className="text-white">{f.doctor_name}</strong></div>
                        </div>
                        
                        <div className="text-xs text-slate-300">
                          <span className="text-slate-500 font-bold">Ortak Sorumlu Ameliyat Ekibi:</span> <strong className="text-violet2">{f.team_personnel}</strong>
                        </div>

                        <div className="p-3 bg-navy-800 rounded-xl space-y-1">
                          <div className="text-[11px] text-slate-500 font-bold mb-1">Faturalandırılan Ürünler:</div>
                          {f.items.map((u, idx) => (
                            <div key={idx} className="flex justify-between text-xs font-mono text-slate-300 border-b border-white/5 last:border-0 pb-1 pt-1">
                              <span>REF: <strong className="text-white">{u.ref}</strong> | LOT: <strong className="text-amber2">{u.lot}</strong></span>
                              <span className="text-emerald2 font-bold">{u.quantity} adet</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ORTAK ALAN: REALTIME TRANSACTION LOG TABLE (3 & 7. MADDE) */}
          <div className="glass-premium p-5 rounded-2xl space-y-4">
            <h3 className="text-sm font-bold text-white">Sistem İşlem Günlüğü (Realtime Audit Transaction Log)</h3>
            <div className="table-scroll">
              <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                {hareketler.map(h => (
                  <div key={h.id} className="text-xs font-mono bg-navy-900 p-3 rounded-xl border border-white/5 flex flex-wrap justify-between items-center gap-2">
                    <span className="text-slate-500">[{h.created_at}]</span>
                    <span className="text-white font-bold">{h.aciklama}</span>
                    <span className="text-slate-300">LOT: <strong className="text-amber2">{h.lot}</strong></span>
                    <span className="text-slate-400">Depo/Kurum ID: {h.hospital_id}</span>
                    <span className={`font-bold ${h.miktar > 0 ? 'text-emerald2' : 'text-rose2'}`}>
                      {h.miktar > 0 ? `+${h.miktar}` : h.miktar} adet
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>

        </div>
      </div>

      {/* TIMELINE TIKLANDIĞINDA DETAY GÖSTEREN MODAL PANELDİR (8. Madde) */}
      {activeTimelineVaka && (
        <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
          <div className="modal-box w-full max-w-md rounded-2xl p-5 space-y-4">
            <div className="flex justify-between items-start border-b border-white/10 pb-2">
              <h3 className="text-sm font-bold text-white">{activeTimelineVaka.type}</h3>
              <button onClick={() => setActiveTimelineVaka(null)} className="text-slate-400 hover:text-white font-bold">✕</button>
            </div>
            <div className="space-y-2.5 text-xs text-slate-300">
              <div><span className="text-slate-500">Sorumlu Doktor:</span> <strong>{activeTimelineVaka.doctor}</strong></div>
              <div><span className="text-slate-500">Hastane Kurumu:</span> <strong>{hospitals.find(h=>h.id===activeTimelineVaka.hospital_id)?.name || 'Ana Depo'}</strong></div>
              <div><span className="text-slate-500">Zamanlama:</span> <strong className="font-mono text-brand-300">{activeTimelineVaka.date} — {activeTimelineVaka.time}</strong></div>
              <div>
                <span className="text-slate-500 block mb-1">Görevli Klinik / Saha Ekibi:</span>
                <div className="p-2.5 bg-navy-900 rounded-xl text-white font-medium border border-white/5">
                  {activeTimelineVaka.personnel}
                </div>
              </div>
            </div>
            <div className="pt-2">
              <button 
                onClick={() => {
                  setSelectedSurgeryId(activeTimelineVaka.id);
                  setPage("tuketim");
                  setActiveTimelineVaka(null);
                }}
                className="w-full py-2.5 bg-brand text-white font-bold rounded-xl text-xs"
              >
                Bu Vakanın Stok Çıkış Sayfasına Git
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ToastProvider><App /></ToastProvider>);
</script>
</body>
</html>
