function BarcodeCameraModal({onDetected,onClose}){
  const toast=useToast();
  const videoRef=useRef(null);
  const detectorRef=useRef(null);
  const streamRef=useRef(null);
  const zxingControlsRef=useRef(null);
  const stopRef=useRef(false);
  const [status,setStatus]=useState("Kamera hazırlanıyor...");
  const [manual,setManual]=useState("");

  useEffect(()=>{
    let raf=0;
    const stop=()=>{
      stopRef.current=true;
      if(raf)cancelAnimationFrame(raf);
      zxingControlsRef.current?.stop?.();
      streamRef.current?.getTracks?.().forEach(t=>t.stop());
    };
    const start=async()=>{
      try{
        if(!navigator.mediaDevices?.getUserMedia){
          setStatus("Bu tarayıcı kamera erişimini desteklemiyor.");
          return;
        }
        const stream=await navigator.mediaDevices.getUserMedia({
          video:{
            facingMode:{ideal:"environment"},
            width:{ideal:1280},
            height:{ideal:720},
            focusMode:"continuous"
          },
          audio:false
        });
        streamRef.current=stream;
        if(videoRef.current){
          videoRef.current.srcObject=stream;
          await videoRef.current.play();
        }
        const emitDetected=value=>{
          if(value&&!stopRef.current){
            toast("Barkod okundu","success");
            stop();
            onDetected(String(value));
            onClose();
          }
        };
        const startNativeDetector=()=>{
          if(!("BarcodeDetector" in window))return false;
          try{
            detectorRef.current=new BarcodeDetector({formats:["data_matrix","qr_code","code_128","code_39","ean_13","ean_8","upc_a","upc_e"]});
          }catch(e){return false;}
          const tick=async()=>{
            if(stopRef.current)return;
            try{
              if(videoRef.current?.readyState>=2){
                const codes=await detectorRef.current.detect(videoRef.current);
                if(codes.length){
                  const value=codes[0].rawValue||codes[0].rawData||"";
                  if(value){emitDetected(value);return;}
                }
              }
            }catch(e){}
            raf=requestAnimationFrame(tick);
          };
          raf=requestAnimationFrame(tick);
          return true;
        };
        const nativeActive=startNativeDetector();
        if(window.ZXingBrowser?.BrowserMultiFormatReader){
          setStatus(nativeActive?"Kamera aktif. Hızlı okuyucu ve yedek okuyucu birlikte çalışıyor.":"Kamera aktif. UDI/DataMatrix kodunu kare içine yaklaştırın.");
          const reader=new window.ZXingBrowser.BrowserMultiFormatReader();
          const onDecode=result=>{
            const value=result?.getText?.()||result?.text||"";
            emitDetected(value);
          };
          if(reader.decodeFromVideoElement)zxingControlsRef.current=await reader.decodeFromVideoElement(videoRef.current,onDecode);
          else zxingControlsRef.current=await reader.decodeFromVideoDevice(undefined,videoRef.current,onDecode);
          setTimeout(()=>{if(!stopRef.current)setStatus("Okuma olmazsa etiketi yaklaştırın, ışığı artırın veya alttaki manuel alana UDI metnini girin.");},7000);
          return;
        }
        if(nativeActive){
          setStatus("Kamera aktif. Barkodu kameraya yaklaştırın.");
          setTimeout(()=>{if(!stopRef.current)setStatus("Okuma olmazsa etiketi yaklaştırın, ışığı artırın veya manuel alana UDI metnini girin.");},7000);
          return;
        }
        setStatus("Bu tarayıcı kamera barkod okumayı desteklemiyor. Manuel alan veya USB okuyucu ile devam edin.");
      }catch(e){
        setStatus("Kamera açılamadı. Telefon tarayıcısında kamera izni verin. Dosya modunda olmazsa localhost/HTTPS üzerinden açın veya manuel alanı kullanın.");
      }
    };
    start();
    return stop;
  },[]);

  return(
    <Modal title="Telefon Kamerası ile Barkod Oku" onClose={onClose} size="lg"
      footer={<div className="flex gap-2">
        <button onClick={onClose} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">Kapat</button>
        <button onClick={()=>{if(manual.trim()){onDetected(manual.trim());onClose();}}} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Manuel Barkodu Kullan</button>
      </div>}>
      <div className="space-y-4">
        <div className="rounded-2xl overflow-hidden bg-black border border-white/10 aspect-video flex items-center justify-center">
          <video ref={videoRef} muted playsInline className="w-full h-full object-cover"/>
        </div>
        <p className="text-sm text-slate-400">{status}</p>
        <div>
          <Label>Manuel / Kopyala Yapıştır</Label>
          <Input value={manual} onChange={e=>setManual(e.target.value)} placeholder="Kamera desteklenmezse barkodu buraya girin" className="font-mono"/>
        </div>
      </div>
    </Modal>
  );
}

function BarcodeScannerModal({onResult,onClose,urunler,hospitals}){
  const toast=useToast();
  const [input,setInput]=useState("");
  const [parsed,setParsed]=useState(null);
  const [manualMode,setManualMode]=useState(false);
  const [selUrun,setSelUrun]=useState("");
  const [selHospital,setSelHospital]=useState("");
  const [qty,setQty]=useState(1);
  const [movType,setMovType]=useState("in");
  const [cameraModal,setCameraModal]=useState(false);
  const inputRef=useRef(null);
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);

  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),100);},[]);

  const handleScan=(raw)=>{
    if(!raw.trim())return;
    const p=parseGS1(raw.trim());
    setParsed(p);

    // Auto-match ürün by lot number or GTIN/REF
    let matched=null;
    if(p.lot){matched=urunler.find(u=>u.code&&u.code.toLowerCase()===p.ref?.toLowerCase());}
    if(!matched&&p.ref){matched=urunler.find(u=>u.code&&(u.code===p.ref||u.code===p.gtin?.replace(/^0+/,"")));}
    if(matched)setSelUrun(matched.id);
    if(p.qty)setQty(p.qty);
  };

  const confirm=async()=>{
    if(!selUrun){toast("Ürün seçin","warning");return;}
    let targetHospital=selHospital;
    if(movType==="in"&&!targetHospital){
      try{
        const shelf=await ensureCompanyShelf(hospitals);
        targetHospital=shelf.id;
      }catch(e){toast(e.message,"error");return;}
    }
    if(!targetHospital){toast("Hastane seçin","warning");return;}
    onResult({
      urun_id:selUrun,hospital_id:targetHospital,
      lotNumber:parsed?.lot||"",
      serialNumber:parsed?.serial||"",
      udiNumber:parsed?.udi||input||"",
      refNumber:parsed?.ref||"",
      mfgDate:parsed?.mfgDate||null,
      expiryDate:parsed?.expiryDate||null,
      quantity:qty,
      type:movType,
      source:"barcode",
    });
  };

  const isExpired=parsed?.expiryDate&&new Date(parsed.expiryDate)<new Date();
  const daysLeft=parsed?.expiryDate?Math.floor((new Date(parsed.expiryDate)-new Date())/86400000):null;

  return(
    <Modal title="📷 Barkod ile Stok Girişi" onClose={onClose} size="lg"
      footer={
        <div className="flex gap-3">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button>
          <button onClick={confirm} disabled={!parsed||!selUrun||isExpired}
            className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold disabled:opacity-40">
            {isExpired?"⚠ SKT Geçmiş — Kullanılamaz":"✓ Stoka Ekle"}
          </button>
        </div>
      }>
      <div className="space-y-4">

        {cameraModal&&<BarcodeCameraModal onDetected={(raw)=>{handleScan(raw);setInput("");}} onClose={()=>setCameraModal(false)}/>}

        {/* Scanner input */}
        <div className="rounded-xl border-2 border-dashed p-4 space-y-3" style={{borderColor:parsed?"#10b981":"#334155"}}>
          <div className="flex items-center gap-2 text-sm text-slate-400">
            <span className="text-lg">📷</span>
            <span>USB okuyucu ile barkodu okutun veya manuel girin</span>
          </div>
          <div className="flex gap-2">
            <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){handleScan(input);setInput("");}}}
              placeholder="Barkod okutun veya yapıştırın → Enter"
              className="flex-1 px-4 py-2.5 rounded-xl input-dark text-sm font-mono"/>
            <button onClick={()=>{handleScan(input);setInput("");}} className="px-4 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">
              Okut
            </button>
            <button onClick={()=>setCameraModal(true)} className="px-4 py-2.5 rounded-xl bg-emerald2/20 hover:bg-emerald2/30 text-emerald2 text-sm font-bold border border-emerald2/30">
              Kamera
            </button>
          </div>
          <p className="text-xs text-slate-600">USB barkod okuyucu klavye gibi davranır — direkt kutuya okutabilirsiniz</p>
        </div>

        {/* Parsed result */}
        {parsed&&(
          <div className={`rounded-xl p-4 border fade-up ${isExpired?"bg-rose2/10 border-rose2/30":"bg-emerald2/8 border-emerald2/25"}`}>
            <div className="flex items-center gap-2 mb-3">
              <span className={`text-sm font-bold ${isExpired?"text-rose2":"text-emerald2"}`}>
                {isExpired?"⚠ UYARI: Son Kullanma Tarihi Geçmiş!":"✓ Barkod Okundu"}
              </span>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {[
                {l:"REF / GTIN",v:parsed.ref||parsed.gtin||"—"},
                {l:"Ürün",v:parsed.productName||"—"},
                {l:"UDI / Barkod",v:parsed.udi||"—"},
                {l:"Lot Numarası",v:parsed.lot||"—"},
                {l:"Seri No",v:parsed.serial||"—"},
                  {l:"Son Kullanma",v:parsed.expiryDate?`${parsed.expiryDate}${daysLeft!==null?` (${daysLeft>0?daysLeft+" gün kaldı":"GEÇMİŞ"})`:""}` :"—"},
                {l:"Üretim Tarihi",v:parsed.mfgDate||"—"},
                {l:"Miktar",v:String(parsed.qty||1)},
              ].map(r=>(
                <div key={r.l} className="bg-navy-800 rounded-lg p-2.5">
                  <div className="text-[10px] text-slate-500 mb-0.5">{r.l}</div>
                  <div className={`text-xs font-bold truncate ${r.l==="Son Kullanma"&&isExpired?"text-rose2":"text-white"}`}>{r.v}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Hareket tipi */}
        <div>
          <Label>Hareket Tipi</Label>
          <div className="grid grid-cols-2 gap-2">
            {["in","out"].map(t=>(
              <button key={t} type="button" onClick={()=>setMovType(t)}
                className={`py-2.5 rounded-xl text-sm font-bold border-2 transition-all ${movType===t?(t==="in"?"bg-emerald2/20 border-emerald2 text-emerald2":"bg-rose2/20 border-rose2 text-rose2"):"bg-navy-800 border-white/10 text-slate-400"}`}>
                {t==="in"?"↓ Stok Girişi":"↑ Stok Çıkışı"}
              </button>
            ))}
          </div>
        </div>

        {/* Ürün + Raf/Hastane */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <Label required>Ürün</Label>
            <Select value={selUrun} onChange={e=>setSelUrun(e.target.value)}>
              <option value="">Seçin</option>
              {urunler.map(u=><option key={u.id} value={u.id}>{u.name}{u.code?` (${u.code})`:""}</option>)}
            </Select>
            {parsed?.ref&&!selUrun&&<p className="text-xs text-amber2 mt-1">REF {parsed.ref} eşleşmedi — manuel seçin</p>}
          </div>
          <div>
            <Label>{movType==="in"?"Raf / Depo":"Hastane"}</Label>
            <Select value={selHospital} onChange={e=>setSelHospital(e.target.value)}>
              <option value="">{movType==="in"?"Otomatik: Ana Depo":"Seçin"}</option>
              {visibleHospitals.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
            </Select>
          </div>
        </div>

        {/* Miktar */}
        <div>
          <Label required>Miktar</Label>
          <Input type="number" min="1" value={qty} onChange={e=>setQty(Number(e.target.value))}/>
        </div>

        {/* Arthrex etiketi örnek */}
        <div className="bg-navy-900 rounded-xl p-3 border border-white/5">
          <p className="text-xs text-slate-500 mb-2 font-semibold">Desteklenen etiket formatları:</p>
          <div className="flex flex-wrap gap-2">
            {["Arthrex","Stryker","Zimmer","Smith+Nephew","DePuy"].map(b=>(
              <span key={b} className="text-xs px-2 py-1 rounded-full bg-navy-800 text-slate-400 border border-white/8">{b}</span>
            ))}
          </div>
          <p className="text-[10px] text-slate-600 mt-2">GS1-128 / GS1 DataMatrix / UDI standartlarını destekler</p>
        </div>
      </div>
    </Modal>
  );
}

// Hareket tipi etiketleri (notes alanına prefix olarak kaydedilir)
const MOV_TAGS={
  SHELF_TO_HOSPITAL:"[RAF→HASTANE]",
  RETURN:          "[GERİ ALIM]",
  TEMP_RETURN:     "[GEÇİCİ GERİ]",
  LOSS:            "[KAYIP]",
  TRANSFER:        "[TRANSFER]",
  ADJUST:          "[DÜZELTME]",
};
const MOV_META={
  "[RAF→HASTANE]": {label:"Raf → Hastane",  color:"#3b82f6", icon:"→",  bg:"rgba(59,130,246,.18)"},
  "[GERİ ALIM]":   {label:"Geri Alım",      color:"#10b981", icon:"↩",  bg:"rgba(16,185,129,.18)"},
  "[GEÇİCİ GERİ]": {label:"Geçici Geri",    color:"#f59e0b", icon:"↻",  bg:"rgba(245,158,11,.18)"},
  "[KAYIP]":        {label:"Kayıp/Eksik",    color:"#f43f5e", icon:"✕",  bg:"rgba(244,63,94,.18)"},
  "[TRANSFER]":     {label:"Transfer",       color:"#8b5cf6", icon:"⇄",  bg:"rgba(139,92,246,.18)"},
  "[DÜZELTME]":     {label:"Düzeltme",       color:"#64748b", icon:"✎",  bg:"rgba(100,116,139,.18)"},
};
const getMovTag=(notes)=>{
  if(!notes)return null;
  return Object.keys(MOV_META).find(k=>notes.startsWith(k))||null;
};

function StokView({urunler,stoklar,hospitals,loadAll}){
  const toast=useToast();
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);
  const [hareketler,setHareketler]=useState([]);
  const [activeTab,setActiveTab]=useState("overview");
  const [hFilter,setHFilter]=useState("");
  const [histFilter,setHistFilter]=useState("");

  // Modals
  const [opModal,setOpModal]=useState(false);   // işlem seç
  const [adjustModal,setAdjustModal]=useState(null);
  const [af,setAf]=useState({quantity:0,notes:""});

  // İşlem form
  const emptyOp={op:"",urun_id:"",from_id:"",to_id:"",lot:"",quantity:1,notes:"",
    lossReason:"kayboldu",expectedReturn:"",tempNote:""};
  const [op,setOp]=useState(emptyOp);
  const [opLoading,setOpLoading]=useState(false);

  useEffect(()=>{loadH();},[]);
  const loadH=async()=>{
    const{data}=await SB.from("hareketler").select("*").order("created_at",{ascending:false}).limit(300);
    const defaultHospitalId=findCompanyShelf(hospitals)?.id||"company-shelf-local";
    setHareketler((data||[]).map(h=>normalizeMovement(h,defaultHospitalId)));
  };

  const rows=useMemo(()=>stoklar.map(s=>({
    ...s,
    urun:urunler.find(u=>u.id===s.urun_id)||{name:"?",unit:"",min_stock:0,code:""},
    hospital:{...(hospitals.find(h=>h.id===s.hospital_id)||{}),name:displayLocationName(hospitals.find(h=>h.id===s.hospital_id)||{name:"?"})||"?"},
  })),[stoklar,urunler,hospitals]);

  const productSummary=useMemo(()=>{
    const m={};
    rows.forEach(r=>{
      if(!m[r.urun_id])m[r.urun_id]={urun:r.urun,total:0,hospitals:[],min:r.urun.min_stock||0};
      m[r.urun_id].total+=r.quantity||0;
      m[r.urun_id].hospitals.push({name:r.hospital.name,qty:r.quantity||0,id:r.hospital_id,row:r});
    });
    return Object.values(m).sort((a,b)=>a.urun.name.localeCompare(b.urun.name));
  },[rows]);

  const alerts=useMemo(()=>productSummary.filter(p=>p.total<=p.min||p.total===0)
    .sort((a,b)=>(a.total/Math.max(a.min,1))-(b.total/Math.max(b.min,1))),[productSummary]);

  const hospitalSummary=useMemo(()=>{
    const m={};
    rows.forEach(r=>{
      if(!m[r.hospital_id])m[r.hospital_id]={hospital:r.hospital,items:[],total:0,critical:0,empty:0};
      m[r.hospital_id].items.push(r);m[r.hospital_id].total++;
      if(r.quantity===0)m[r.hospital_id].empty++;
      else if(r.quantity<=(r.urun.min_stock||0))m[r.hospital_id].critical++;
    });
    return Object.values(m).sort((a,b)=>a.hospital.name.localeCompare(b.hospital.name));
  },[rows]);

  // Stok düzelt (manuel)
  const adjustStock=async()=>{
    if(!adjustModal)return;
    const{error}=await updateStockQuantity(adjustModal,Number(af.quantity));
    if(error)return toast(error.message,"error");
    const diff=Number(af.quantity)-(adjustModal.quantity||0);
    if(diff!==0){
      await insertMovement(movementPayload({
        urun_id:adjustModal.urun_id,
        hospital_id:adjustModal.hospital_id,
        type:diff>0?"in":"out",
        quantity:Math.abs(diff),
        notes:`${MOV_TAGS.ADJUST} ${af.notes||"Manuel düzeltme"}`
      }));
    }
    toast("Stok güncellendi ✓","success");
    setAdjustModal(null);loadAll();loadH();
  };

  // Ana işlem kaydetme
  const saveOp=async()=>{
    const qty=Number(op.quantity)||1;
    if(!op.urun_id)return toast("Ürün seçin","warning");
    setOpLoading(true);

    try{
      const urun=urunler.find(u=>u.id===op.urun_id);
      const now=new Date().toISOString();

    if(op.op==="shelf_to_hospital"){
      // Raftan hastaneye çıkış
      if(!op.to_id){setOpLoading(false);return toast("Hedef hastane seçin","warning");}
      const fromStok=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
      if(op.from_id&&(!fromStok||fromStok.quantity<qty)){setOpLoading(false);return toast("Kaynak stok yetersiz","warning");}
      const toStok=findStockRow(stoklar,op.urun_id,op.to_id,op.lot);
      if(op.from_id){
        await updateStockQuantity(fromStok,fromStok.quantity-qty);
        await insertMovement(movementPayload({urun_id:op.urun_id,hospital_id:op.from_id,lot:op.lot,type:"out",quantity:qty,
          notes:`${MOV_TAGS.SHELF_TO_HOSPITAL} ${hospitals.find(h=>h.id===op.to_id)?.name||""} ${op.notes||""}`.trim()}));
      }
      if(toStok){await updateStockQuantity(toStok,toStok.quantity+qty);}
      else{await insertStockQuantity(op.urun_id,op.to_id,qty,op.lot);}
      await insertMovement(movementPayload({urun_id:op.urun_id,hospital_id:op.to_id,lot:op.lot,type:"in",quantity:qty,
        notes:`${MOV_TAGS.SHELF_TO_HOSPITAL} ${op.notes||""}`.trim()}));
      toast(`${qty} ${urun?.unit||"adet"} hastaneye gönderildi ✓`,"success");
    }

    else if(op.op==="return"){
      // Kalıcı geri alım
      if(!op.from_id){setOpLoading(false);return toast("Kaynak hastane seçin","warning");}
      let targetId=op.to_id;
      if(!targetId){
        try{
          const shelf=await ensureCompanyShelf(hospitals);
          targetId=shelf.id;
        }catch(e){
          setOpLoading(false);
          return toast(e.message,"error");
        }
      }
      const fromStok=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
      if(!fromStok||fromStok.quantity<qty){setOpLoading(false);return toast("Hastanede yeterli stok yok","warning");}
      const toStok=findStockRow(stoklar,op.urun_id,targetId,op.lot);
      await updateStockQuantity(fromStok,fromStok.quantity-qty);
      if(toStok){await updateStockQuantity(toStok,toStok.quantity+qty);}
      else{await insertStockQuantity(op.urun_id,targetId,qty,op.lot);}
      await insertWithSchemaFallback("hareketler",[
        movementPayload({urun_id:op.urun_id,hospital_id:op.from_id,lot:op.lot,type:"out",quantity:qty,
          notes:`${MOV_TAGS.RETURN} → ${hospitals.find(h=>h.id===targetId)?.name||COMPANY_SHELF_NAME} ${op.notes||""}`.trim()}),
        movementPayload({urun_id:op.urun_id,hospital_id:targetId,lot:op.lot,type:"in",quantity:qty,
          notes:`${MOV_TAGS.RETURN} ← ${hospitals.find(h=>h.id===op.from_id)?.name||""} ${op.notes||""}`.trim()}),
      ]);
      toast(`${qty} ${urun?.unit||"adet"} geri alındı ✓`,"success");
    }

    else if(op.op==="temp_return"){
      // Geçici geri alım (stoktan düşülmez, not olarak kaydedilir)
      if(!op.from_id){setOpLoading(false);return toast("Kaynak hastane seçin","warning");}
      const note=`${MOV_TAGS.TEMP_RETURN} Geçici alım${op.expectedReturn?` — Tahmini iade: ${op.expectedReturn}`:""} ${op.notes||""}`.trim();
      await insertMovement(movementPayload({urun_id:op.urun_id,hospital_id:op.from_id,lot:op.lot,type:"out",quantity:qty,notes:note}));
      // Stoktan düş — fiziksel olarak geri geldi
      const fromStok=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
      if(fromStok&&fromStok.quantity>=qty){
        await updateStockQuantity(fromStok,fromStok.quantity-qty);
      }
      toast(`${qty} ${urun?.unit||"adet"} geçici olarak alındı. ${op.expectedReturn?"İade: "+op.expectedReturn:""}`.trim(),"success");
    }

    else if(op.op==="loss"){
      // Kayıp / Eksik bildirimi
      if(!op.from_id){setOpLoading(false);return toast("Kayıp lokasyonu seçin","warning");}
      const fromStok=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
      const actualQty=Math.min(qty,fromStok?.quantity||0);
      if(fromStok){
        await updateStockQuantity(fromStok,Math.max(0,fromStok.quantity-qty));
      }
      const LOSS_REASONS={"kayboldu":"Kayboldu","hasar":"Hasarlı/Kullanılamaz","fire":"Fire/Bozuk",
        "ameliyat":"Ameliyatta Kullanıldı","iade":"Üreticiye İade","diger":"Diğer"};
      const note=`${MOV_TAGS.LOSS} Sebep: ${LOSS_REASONS[op.lossReason]||op.lossReason} ${op.notes||""}`.trim();
      await insertMovement(movementPayload({urun_id:op.urun_id,hospital_id:op.from_id,lot:op.lot,type:"out",quantity:qty,notes:note}));
      toast(`${qty} ${urun?.unit||"adet"} kayıp olarak raporlandı`,"warning");
    }

      setOpLoading(false);setOpModal(false);setOp(emptyOp);loadAll();loadH();
    }catch(e){
      setOpLoading(false);
      toast(e.message||"Stok işlemi tamamlanamadı","error");
    }
  };

  // Stats
  const totalItems=rows.length;
  const totalEmpty=rows.filter(r=>r.quantity===0).length;
  const totalCritical=rows.filter(r=>r.quantity>0&&r.quantity<=(r.urun.min_stock||0)).length;
  const totalOk=totalItems-totalEmpty-totalCritical;

  // Kayıp sayısı (son 30 gün)
  const lossCount=useMemo(()=>{
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
    return hareketler.filter(h=>h.notes?.startsWith(MOV_TAGS.LOSS)&&new Date(h.created_at)>cutoff)
      .reduce((a,h)=>a+h.quantity,0);
  },[hareketler]);

  const tabs=[
    {id:"overview",label:"Genel Bakış",icon:"⊞"},
    {id:"hospital",label:"Hastaneler",icon:"⊟"},
    {id:"alerts",label:"Uyarılar",icon:"⚠",badge:alerts.length},
    {id:"history",label:"Hareketler",icon:"◷"},
  ];

  // İşlem tipi kartları
  const OPS=[
    {id:"shelf_to_hospital",icon:"→",label:"Raf → Hastane",desc:"Depo/raftan hastaneye gönder",
     color:"#3b82f6",bg:"rgba(59,130,246,.12)"},
    {id:"return",icon:"↩",label:"Geri Alım",desc:"Hastaneden kalıcı olarak geri al",
     color:"#10b981",bg:"rgba(16,185,129,.12)"},
    {id:"temp_return",icon:"↻",label:"Geçici Geri Alım",desc:"Sterilizasyon/bakım için geçici al",
     color:"#f59e0b",bg:"rgba(245,158,11,.12)"},
    {id:"loss",icon:"✕",label:"Kayıp / Eksik",desc:"Kaybolan, hasarlı veya fire ürün bildir",
     color:"#f43f5e",bg:"rgba(244,63,94,.12)"},
  ];

  const selOpMeta=OPS.find(o=>o.id===op.op);

  // History filter
  const filteredHistory=useMemo(()=>{
    return hareketler.filter(h=>{
      const u=urunler.find(x=>x.id===h.urun_id);
      const ho=hospitals.find(x=>x.id===h.hospital_id);
      if(!histFilter)return true;
      const q=histFilter.toLowerCase();
      return u?.name?.toLowerCase().includes(q)||ho?.name?.toLowerCase().includes(q)||h.notes?.toLowerCase().includes(q);
    });
  },[hareketler,histFilter,urunler,hospitals]);

  return(
    <div className="space-y-5">

      {/* ── Stok Düzelt Modal ─────────────────────────────────── */}
      {adjustModal&&(
        <Modal title="Stok Miktarını Düzenle" onClose={()=>setAdjustModal(null)} size="sm"
          footer={<div className="flex gap-2">
            <button onClick={()=>setAdjustModal(null)} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button>
            <button onClick={adjustStock} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Güncelle</button>
          </div>}>
          <div className="space-y-4">
            <div className="bg-navy-800 rounded-xl p-3 border border-white/8">
              <p className="text-xs text-slate-500 mb-0.5">Ürün</p>
              <p className="text-sm font-bold text-white">{adjustModal.urun?.name}</p>
              <p className="text-xs text-slate-500">{adjustModal.hospital?.name}</p>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-navy-800 rounded-xl p-3 text-center">
                <p className="text-xs text-slate-500 mb-1">Mevcut</p>
                <p className="text-2xl font-black text-white">{adjustModal.quantity||0}</p>
                <p className="text-xs text-slate-500">{adjustModal.urun?.unit}</p>
              </div>
              <div className="bg-navy-800 rounded-xl p-3 text-center">
                <p className="text-xs text-slate-500 mb-1">Fark</p>
                <p className={`text-2xl font-black ${Number(af.quantity)-(adjustModal.quantity||0)>0?"text-emerald2":Number(af.quantity)-(adjustModal.quantity||0)<0?"text-rose2":"text-slate-400"}`}>
                  {Number(af.quantity)-(adjustModal.quantity||0)>0?"+":""}{Number(af.quantity)-(adjustModal.quantity||0)||"0"}
                </p>
                <p className="text-xs text-slate-500">{adjustModal.urun?.unit}</p>
              </div>
            </div>
            <div><Label required>Yeni Miktar</Label><Input type="number" min="0" value={af.quantity} onChange={e=>setAf(p=>({...p,quantity:e.target.value}))}/></div>
            <div><Label>Not</Label><Input value={af.notes} onChange={e=>setAf(p=>({...p,notes:e.target.value}))} placeholder="Düzeltme nedeni..."/></div>
          </div>
        </Modal>
      )}

      {/* ── İşlem Modal ───────────────────────────────────────── */}
      {opModal&&(
        <Modal
          title={op.op?selOpMeta?.label||"İşlem":"İşlem Seçin"}
          onClose={()=>{setOpModal(false);setOp(emptyOp);}}
          size="md"
          footer={op.op?(
            <div className="flex gap-2">
              <button onClick={()=>setOp(p=>({...p,op:""}))} className="px-4 py-2.5 rounded-xl bg-navy-800 text-slate-400 text-sm border border-white/8">← Geri</button>
              <button onClick={saveOp} disabled={opLoading} className="flex-1 py-2.5 rounded-xl text-white text-sm font-bold disabled:opacity-50 transition-all"
                style={{background:selOpMeta?`linear-gradient(135deg,${selOpMeta.color}cc,${selOpMeta.color})`:""}}>
                {opLoading?"⋯ İşleniyor…":op.op==="loss"?"⚠ Kayıp Bildir":"✓ Onayla"}
              </button>
            </div>
          ):null}>

          {/* Op seçim ekranı */}
          {!op.op?(

              {OPS.map(o=>(
                <button key={o.id} onClick={()=>setOp(p=>({...p,op:o.id}))}
                  className="rounded-2xl p-4 text-left border-2 transition-all hover:scale-[1.02] active:scale-[0.98]"
                  style={{background:o.bg,borderColor:o.color+"40"}}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl mb-3 font-bold"
                    style={{background:o.color+"20",color:o.color}}>{o.icon}</div>
                  <p className="text-sm font-bold text-white mb-0.5">{o.label}</p>
                  <p className="text-xs text-slate-400 leading-relaxed">{o.desc}</p>
                </button>
              ))}
            </div>
          ):(
            <div className="space-y-4">
              {/* Ürün seç */}
              <div>
                <Label required>REF / Referans</Label>
                <Select value={op.urun_id} onChange={e=>setOp(p=>({...p,urun_id:e.target.value,lot:""}))}>
                  <option value="">REF seçin</option>
                  {urunler.map(u=>{
                    const tot=stoklar.filter(s=>s.urun_id===u.id).reduce((a,b)=>a+(b.quantity||0),0);
                    return<option key={u.id} value={u.id}>{u.code||"REF yok"} — {tot} {u.unit}</option>;
                  })}
                </Select>
              </div>
              <div>
                <Label>LOT Numarası</Label>
                <Select value={op.lot} onChange={e=>setOp(p=>({...p,lot:e.target.value}))}>
                  <option value="">LOT seçin / yok</option>
                  {stoklar.filter(s=>s.urun_id===op.urun_id&&(!op.from_id||s.hospital_id===op.from_id)).map(s=>(
                    <option key={s.id||s.lot} value={s.lot||""}>{s.lot||"LOT yok"} ({s.quantity})</option>
                  ))}
                </Select>
              </div>

              {/* RAF → HASTANE */}
              {op.op==="shelf_to_hospital"&&(
                <>
                  <div className="grid grid-cols-[1fr_32px_1fr] gap-2 items-end">
                    <div>
                      <Label>Kaynak (Raf/Depo)</Label>
                      <Select value={op.from_id} onChange={e=>setOp(p=>({...p,from_id:e.target.value}))}>
                        <option value="">Ana Stoktan</option>
                        {visibleHospitals.map(h=>{
                          const total=stoklar.filter(x=>x.urun_id===op.urun_id&&x.hospital_id===h.id&&(!op.lot||normalizeLot(x.lot)===normalizeLot(op.lot))).reduce((a,x)=>a+(Number(x.quantity)||0),0);
                          return<option key={h.id} value={h.id}>{h.name} ({total})</option>;
                        })}
                      </Select>
                    </div>
                    <div className="text-center text-slate-400 pb-3 text-lg">→</div>
                    <div>
                      <Label required>Hedef Hastane</Label>
                      <Select value={op.to_id} onChange={e=>setOp(p=>({...p,to_id:e.target.value}))}>
                        <option value="">Seçin</option>
                        {visibleHospitals.filter(h=>h.id!==op.from_id).map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                      </Select>
                    </div>
                  </div>
                  {op.from_id&&op.urun_id&&(()=>{
                    const s=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
                    return s?<div className="bg-brand/10 rounded-xl p-3 text-xs text-brand-300 border border-brand/20">Kaynak stok: <b>{s.quantity}</b> {urunler.find(u=>u.id===op.urun_id)?.unit}</div>:null;
                  })()}
                </>
              )}

              {/* GERİ ALIM */}
              {op.op==="return"&&(
                <div className="grid grid-cols-[1fr_32px_1fr] gap-2 items-end">
                  <div>
                    <Label required>Kaynak Hastane</Label>
                    <Select value={op.from_id} onChange={e=>setOp(p=>({...p,from_id:e.target.value}))}>
                      <option value="">Seçin</option>
                      {visibleHospitals.map(h=>{
                        const total=stoklar.filter(x=>x.urun_id===op.urun_id&&x.hospital_id===h.id&&(!op.lot||normalizeLot(x.lot)===normalizeLot(op.lot))).reduce((a,x)=>a+(Number(x.quantity)||0),0);
                        return<option key={h.id} value={h.id}>{h.name} ({total})</option>;
                      })}
                    </Select>
                  </div>
                  <div className="text-center text-slate-400 pb-3 text-lg">↩</div>
                  <div>
                    <Label required>Hedef (Depo/Raf)</Label>
                    <Select value={op.to_id} onChange={e=>setOp(p=>({...p,to_id:e.target.value}))}>
                      <option value="">Otomatik: Ana Depo</option>
                      {visibleHospitals.filter(h=>h.id!==op.from_id).map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                    </Select>
                  </div>
                </div>
              )}

              {/* GEÇİCİ GERİ ALIM */}
              {op.op==="temp_return"&&(
                <>
                  <div>
                    <Label required>Hangi Hastaneden</Label>
                    <Select value={op.from_id} onChange={e=>setOp(p=>({...p,from_id:e.target.value}))}>
                      <option value="">Seçin</option>
                      {visibleHospitals.map(h=>{
                        const total=stoklar.filter(x=>x.urun_id===op.urun_id&&x.hospital_id===h.id&&(!op.lot||normalizeLot(x.lot)===normalizeLot(op.lot))).reduce((a,x)=>a+(Number(x.quantity)||0),0);
                        return<option key={h.id} value={h.id}>{h.name} ({total})</option>;
                      })}
                    </Select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <Label>Geçici Alım Nedeni</Label>
                      <Select value={op.tempNote} onChange={e=>setOp(p=>({...p,tempNote:e.target.value}))}>
                        <option value="">Seçin</option>
                        <option value="Sterilizasyon">Sterilizasyon</option>
                        <option value="Bakım/Kontrol">Bakım / Kontrol</option>
                        <option value="Fotoğraflama">Fotoğraflama</option>
                        <option value="Numune">Numune Gösterimi</option>
                        <option value="Onarım">Onarım</option>
                        <option value="Diğer">Diğer</option>
                      </Select>
                    </div>
                    <div>
                      <Label>Tahmini İade Tarihi</Label>
                      <Input type="date" value={op.expectedReturn} onChange={e=>setOp(p=>({...p,expectedReturn:e.target.value}))}/>
                    </div>
                  </div>
                  <div className="bg-amber2/8 rounded-xl p-3 border border-amber2/20 text-xs text-amber2">
                    ↻ Stoktan düşülür. İade edildiğinde tekrar giriş yapılmalıdır.
                  </div>
                </>
              )}

              {/* KAYIP */}
              {op.op==="loss"&&(
                <>
                  <div>
                    <Label required>Kayıp Lokasyonu</Label>
                    <Select value={op.from_id} onChange={e=>setOp(p=>({...p,from_id:e.target.value}))}>
                      <option value="">Seçin</option>
                      {visibleHospitals.map(h=>{
                        const total=stoklar.filter(x=>x.urun_id===op.urun_id&&x.hospital_id===h.id&&(!op.lot||normalizeLot(x.lot)===normalizeLot(op.lot))).reduce((a,x)=>a+(Number(x.quantity)||0),0);
                        return<option key={h.id} value={h.id}>{h.name} ({total})</option>;
                      })}
                    </Select>
                  </div>
                  <div>
                    <Label required>Kayıp Nedeni</Label>
                    <div className="grid grid-cols-3 gap-2">
                      {[["kayboldu","Kayboldu"],["hasar","Hasarlı"],["fire","Fire/Bozuk"],
                        ["ameliyat","Ameliyatta"],["iade","Üreticiye İade"],["diger","Diğer"]].map(([v,l])=>(
                        <button key={v} type="button" onClick={()=>setOp(p=>({...p,lossReason:v}))}
                          className={`py-2 rounded-xl text-xs font-semibold border-2 transition-all ${op.lossReason===v?"border-rose2 bg-rose2/20 text-rose2":"border-white/10 bg-navy-800 text-slate-400 hover:border-rose2/40"}`}>
                          {l}
                        </button>
                      ))}
                    </div>
                  </div>
                  {op.from_id&&op.urun_id&&(()=>{
                    const s=findStockRow(stoklar,op.urun_id,op.from_id,op.lot);
                    return s?<div className="bg-rose2/10 rounded-xl p-3 text-xs text-rose2 border border-rose2/20">Mevcut stok: <b>{s.quantity}</b> {urunler.find(u=>u.id===op.urun_id)?.unit} — bu miktardan düşülecek</div>:null;
                  })()}
                </>
              )}

              {/* Ortak alanlar */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <Label required>Miktar</Label>
                  <Input type="number" min="1" value={op.quantity} onChange={e=>setOp(p=>({...p,quantity:e.target.value}))}/>
                </div>
                <div>
                  <Label>Not / Açıklama</Label>
                  <Input value={op.notes} onChange={e=>setOp(p=>({...p,notes:e.target.value}))} placeholder="Opsiyonel..."/>
                </div>
              </div>
            </div>
          )}
        </Modal>
      )}

      {/* ── Başlık ──────────────────────────────────────────────── */}
      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <h1 className="text-xl font-bold text-white">Stok Yönetimi</h1>
        <div className="sm:ml-auto flex flex-wrap gap-2">
          <button onClick={()=>{setOp(emptyOp);setOpModal(true);}}
            className="px-4 py-2 rounded-xl bg-brand/20 hover:bg-brand/30 text-brand-300 text-sm font-bold border border-brand/30 flex items-center gap-2 transition-colors">
            ⊕ İşlem Yap
          </button>
          {alerts.length>0&&(
            <button onClick={()=>setActiveTab("alerts")}
              className="px-4 py-2 rounded-xl bg-amber2/20 hover:bg-amber2/30 text-amber2 text-sm font-semibold border border-amber2/30 flex items-center gap-1.5 transition-colors">
              ⚠ {alerts.length} Uyarı
            </button>
          )}
        </div>
      </div>

      {/* ── Stat kartları ─────────────────────────────────────────── */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        {[
          {l:"Toplam Kayıt",v:totalItems,c:"#3b82f6"},
          {l:"Stok Tamam",v:totalOk,c:"#10b981"},
          {l:"Kritik Stok",v:totalCritical,c:"#f59e0b"},
          {l:"Tükenmiş",v:totalEmpty,c:"#f43f5e"},
          {l:"Kayıp (30g)",v:lossCount,c:"#94a3b8"},
        ].map(s=>(
          <div key={s.l} className="stat-card rounded-2xl p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="w-2.5 h-2.5 rounded-full" style={{background:s.c}}></div>
              <span className="text-2xl font-black" style={{color:s.c}}>{s.v}</span>
            </div>
            <div className="h-1 rounded-full bg-navy-700 overflow-hidden mb-2">
              <div className="h-full rounded-full" style={{width:totalItems?`${Math.round(s.v/totalItems*100)}%`:"0%",background:s.c}}></div>
            </div>
            <p className="text-xs text-slate-500">{s.l}</p>
          </div>
        ))}
      </div>

      {/* ── İşlem kısayolları ──────────────────────────────────────── */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-2">
        {OPS.map(o=>(
          <button key={o.id} onClick={()=>{setOp({...emptyOp,op:o.id});setOpModal(true);}}
            className="flex items-center gap-3 px-4 py-3 rounded-xl border transition-all hover:scale-[1.01] active:scale-[.99]"
            style={{background:o.bg,borderColor:o.color+"35"}}>
            <span className="text-lg font-black" style={{color:o.color}}>{o.icon}</span>
            <span className="text-xs font-semibold text-white text-left leading-tight">{o.label}</span>
          </button>
        ))}
      </div>

      {/* ── Sekmeler ─────────────────────────────────────────────── */}
      <div className="flex border-b border-white/8">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)}
            className={`px-4 py-3 text-sm font-semibold flex items-center gap-1.5 border-b-2 transition-all -mb-px ${activeTab===t.id?"border-brand text-brand-300":"border-transparent text-slate-500 hover:text-slate-300"}`}>
            <span>{t.icon}</span>
            <span className="hidden sm:inline">{t.label}</span>
            {t.badge>0&&<span className="w-5 h-5 rounded-full bg-amber2/80 text-navy-900 text-xs font-black flex items-center justify-center">{t.badge}</span>}
          </button>
        ))}
      </div>

      {/* ── Overview ─────────────────────────────────────────────── */}
      {activeTab==="overview"&&(
        <div className="card rounded-2xl overflow-hidden">
          <div className="px-4 py-3 border-b border-white/8 flex items-center justify-between">
            <div className="relative">
              <input value={hFilter} onChange={e=>setHFilter(e.target.value)} placeholder="Ürün ara..." className="pl-7 pr-4 py-2 rounded-xl input-dark text-sm w-56"/>
              <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-xs">⌕</span>
            </div>
            <span className="text-xs text-slate-500">{productSummary.length} ürün çeşidi</span>
          </div>
          {productSummary.filter(p=>!hFilter||p.urun.name.toLowerCase().includes(hFilter.toLowerCase())).map(p=>{
            const isEmpty=p.total===0,isLow=p.total>0&&p.total<=p.min;
            const sc=isEmpty?"#f43f5e":isLow?"#f59e0b":"#10b981";
            const pct=p.min>0?Math.min(100,Math.round(p.total/p.min*100)):p.total>0?100:0;
            return(
              <div key={p.urun.id} className="table-row border-b border-white/5 last:border-b-0">
                <div className="px-5 py-3 flex items-center gap-4">
                  <div className="w-1.5 h-10 rounded-full flex-shrink-0" style={{background:sc}}></div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                      <span className="text-sm font-semibold text-white">{p.urun.name}</span>
                      {p.urun.code&&<span className="text-xs text-slate-600 font-mono">{p.urun.code}</span>}
                    </div>
                    <div className="flex flex-wrap gap-1.5">
                      {p.hospitals.map(h=>(
                        <button key={h.id} onClick={e=>{e.stopPropagation();setAf({quantity:h.qty,notes:""});setAdjustModal(h.row||{urun_id:p.urun.id,hospital_id:h.id,quantity:h.qty,urun:p.urun,hospital:{name:h.name},id:h.row?.id});}}
                          className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-navy-700 hover:bg-navy-600 border border-white/8 text-xs transition-colors group">
                          <span className="text-slate-400 truncate max-w-[90px]">{h.name}</span>
                          <span className={`font-bold ${h.qty===0?"text-rose2":h.qty<=p.min?"text-amber2":"text-emerald2"}`}>{h.qty}</span>
                          <span className="text-slate-600 group-hover:text-slate-300 transition-colors">✎</span>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="text-right flex-shrink-0 w-24">
                    <div className="text-lg font-black" style={{color:sc}}>{p.total}<span className="text-xs font-normal text-slate-500 ml-1">{p.urun.unit}</span></div>
                    {p.min>0&&(
                      <div>
                        <div className="h-1.5 bg-navy-700 rounded-full overflow-hidden mt-1 w-full">
                          <div className="h-full rounded-full" style={{width:`${pct}%`,background:sc}}></div>
                        </div>
                        <div className="text-[10px] text-slate-600 mt-0.5">Min: {p.min}</div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Hastane görünümü ────────────────────────────────────── */}
      {activeTab==="hospital"&&(
        <div className="space-y-4">
          {hospitalSummary.map(hs=>(
            <div key={hs.hospital.id} className="card rounded-2xl overflow-hidden">
              <div className="px-5 py-4 border-b border-white/8 flex items-center justify-between">
                <div>
                  <h3 className="font-bold text-sm text-white">{hs.hospital.name}</h3>
                  <p className="text-xs text-slate-500 mt-0.5">{hs.total} ürün çeşidi</p>
                </div>
                <div className="flex gap-2">
                  {hs.empty>0&&<span className="px-2.5 py-1 rounded-full text-xs font-bold bg-rose2/20 text-rose2 border border-rose2/30">{hs.empty} tükenmiş</span>}
                  {hs.critical>0&&<span className="px-2.5 py-1 rounded-full text-xs font-bold bg-amber2/20 text-amber2 border border-amber2/30">{hs.critical} kritik</span>}
                </div>
              </div>
              <div className="divide-y divide-white/5 max-h-64 overflow-y-auto">
                {hs.items.sort((a,b)=>a.urun.name.localeCompare(b.urun.name)).map(r=>{
                  const isEmpty=r.quantity===0,isLow=r.quantity>0&&r.quantity<=(r.urun.min_stock||0);
                  const sc=isEmpty?"#f43f5e":isLow?"#f59e0b":"#10b981";
                  return(
                    <div key={r.id} className="table-row px-5 py-2.5 flex items-center gap-3 cursor-pointer"
                      onClick={()=>{setAf({quantity:r.quantity,notes:""});setAdjustModal(r);}}>
                      <div className="w-1.5 h-8 rounded-full flex-shrink-0" style={{background:sc}}></div>
                      <span className="flex-1 text-sm text-slate-200 truncate">{r.urun.name}</span>
                      {r.urun.code&&<span className="text-xs text-slate-600 font-mono hidden sm:block">{r.urun.code}</span>}
                      <span className="text-sm font-bold" style={{color:sc}}>{r.quantity}<span className="text-xs font-normal text-slate-500 ml-1">{r.urun.unit}</span></span>
                      <span className="text-slate-600 hover:text-slate-400 text-xs">✎</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

      {/* ── Uyarılar ────────────────────────────────────────────── */}

        <div className="space-y-3">
          {alerts.length===0?(

// ─── MOVEMENTS VIEW ────────────────────────────────────────────────────────────
function HareketlerView({urunler,stoklar,surgeries,hospitals,loadAll}){
  const toast=useToast();
  const visibleHospitals=useMemo(()=>selectableHospitals(hospitals),[hospitals]);
  const [modal,setModal]=useState(false);
  const [barcodeModal,setBarcodeModal]=useState(false);
  const [hareketler,setHareketler]=useState([]);
  const [search,setSearch]=useState("");
  const [fType,setFType]=useState("");
  const [fHospital,setFHospital]=useState("");
  const [f,setF]=useState({urun_id:"",hospital_id:"",surgery_id:"",lot:"",type:"out",quantity:1,notes:""});

  useEffect(()=>{load();},[]);
  const load=async()=>{
    const{data}=await SB.from("hareketler").select("*").order("created_at",{ascending:false}).limit(500);
    const defaultHospitalId=findCompanyShelf(hospitals)?.id||"company-shelf-local";
    setHareketler((data||[]).map(h=>normalizeMovement(h,defaultHospitalId)));
  };

  const filtered=hareketler.filter(h=>{
    const urun=urunler.find(u=>u.id===h.urun_id);
    const hosp=hospitals.find(x=>x.id===h.hospital_id);
    if(fType&&h.type!==fType)return false;
    if(fHospital&&h.hospital_id!==fHospital)return false;
    if(search){const q=search.toLowerCase();return urun?.code?.toLowerCase().includes(q)||h.lot?.toLowerCase().includes(q)||displayLocationName(hosp).toLowerCase().includes(q)||h.notes?.toLowerCase().includes(q);}
    return true;
  });

  const save=async(formData)=>{
    const d=formData||f;
    if(!d.urun_id||!d.hospital_id)return toast("Ürün ve hastane seçin","warning");
    const qty=Number(d.quantity)||1;
    const{error}=await insertMovement(movementPayload({urun_id:d.urun_id,hospital_id:d.hospital_id,lot:d.lot||"",type:d.type,quantity:qty,notes:d.notes||"",surgery_id:d.surgery_id||null}));
    if(error)return toast(error.message,"error");
    const stok=findStockRow(stoklar,d.urun_id,d.hospital_id,d.lot||"");
    if(stok){
      const newQ=d.type==="in"?stok.quantity+qty:Math.max(0,stok.quantity-qty);
      await updateStockQuantity(stok,newQ);
    }else if(d.type==="in"){
      await insertStockQuantity(d.urun_id,d.hospital_id,qty,d.lot||"");
    }
    toast("Hareket kaydedildi ✓","success");
    setModal(false);loadAll();load();
  };

  const handleBarcodeResult=async(result)=>{
    if(result.expiryDate&&new Date(result.expiryDate)<new Date()){
      toast("Son kullanma tarihi geçmiş ürün sisteme eklenemez!","error");return;
    }
    const note=`Barkod${result.udiNumber?` — UDI:${result.udiNumber}`:""}${result.refNumber?` — REF:${result.refNumber}`:""}${result.lotNumber?` — LOT:${result.lotNumber}`:""}${result.mfgDate?` — ÜRT:${result.mfgDate}`:""}${result.expiryDate?` — SKT:${result.expiryDate}`:""}`;
    await save({urun_id:result.urun_id,hospital_id:result.hospital_id,lot:result.lotNumber||"",type:result.type,quantity:result.quantity,notes:note,surgery_id:""});
    setBarcodeModal(false);
  };

  const totalIn=hareketler.filter(h=>h.type==="in").reduce((a,h)=>a+h.quantity,0);
  const totalOut=hareketler.filter(h=>h.type==="out").reduce((a,h)=>a+h.quantity,0);

  return(
    <div className="space-y-5">
      {barcodeModal&&<BarcodeScannerModal onResult={handleBarcodeResult} onClose={()=>setBarcodeModal(false)} urunler={urunler} hospitals={hospitals}/>}
      {modal&&(
        <Modal title="Manuel Hareket Ekle" onClose={()=>setModal(false)} size="md"
          footer={<div className="flex gap-2"><button onClick={()=>setModal(false)} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button><button onClick={()=>save(f)} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Kaydet</button></div>}>
          <div className="space-y-4">
            <div><Label required>Hareket Tipi</Label>
              <div className="grid grid-cols-2 gap-2">
                {["in","out"].map(t=>(
                  <button key={t} type="button" onClick={()=>setF(p=>({...p,type:t}))}
                    className={`py-3 rounded-xl text-sm font-bold border-2 transition-all flex items-center justify-center gap-2 ${f.type===t?(t==="in"?"bg-emerald2/20 border-emerald2 text-emerald2":"bg-rose2/20 border-rose2 text-rose2"):"bg-navy-800 border-white/10 text-slate-400"}`}>
                    {t==="in"?"↓ Stok Girişi":"↑ Stok Çıkışı"}
                  </button>
                ))}
              </div>
            </div>
            <div><Label required>REF / Referans</Label><Select value={f.urun_id} onChange={e=>setF(p=>({...p,urun_id:e.target.value,lot:""}))}><option value="">REF seçin</option>{urunler.map(u=><option key={u.id} value={u.id}>{u.code||"REF yok"} ({u.unit})</option>)}</Select></div>
            <div><Label required>Hastane</Label>
              <Select value={f.hospital_id} onChange={e=>setF(p=>({...p,hospital_id:e.target.value}))}>
                <option value="">Hastane seçin</option>
                {visibleHospitals.map(h=>{const total=stoklar.filter(x=>x.urun_id===f.urun_id&&x.hospital_id===h.id).reduce((a,x)=>a+(Number(x.quantity)||0),0);return<option key={h.id} value={h.id}>{h.name}{f.urun_id?` (${total})`:""}</option>;})}
              </Select>
            </div>
            <div><Label>LOT Numarası</Label>
              <Select value={f.lot} onChange={e=>setF(p=>({...p,lot:e.target.value}))}>
                <option value="">LOT seçin / yok</option>
                {stoklar.filter(s=>s.urun_id===f.urun_id&&(!f.hospital_id||s.hospital_id===f.hospital_id)).map(s=><option key={s.id||s.lot} value={s.lot||""}>{s.lot||"LOT yok"} ({s.quantity})</option>)}
              </Select>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label required>Miktar</Label><Input type="number" min="1" value={f.quantity} onChange={e=>setF(p=>({...p,quantity:e.target.value}))}/></div>
              <div><Label>Not</Label><Input value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))} placeholder="Açıklama..."/></div>
            </div>
          </div>
        </Modal>
      )}

      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <h1 className="text-xl font-bold text-white">Mal Hareketleri</h1>
        <div className="sm:ml-auto flex flex-wrap gap-2">
          <button onClick={()=>setBarcodeModal(true)}
            className="px-4 py-2 rounded-xl bg-amber2/20 hover:bg-amber2/30 text-amber2 text-sm font-bold border border-amber2/30 flex items-center gap-2 transition-colors">
            ▦ Barkod ile Ekle
          </button>
          <button onClick={()=>{setF({urun_id:"",hospital_id:"",surgery_id:"",lot:"",type:"out",quantity:1,notes:""});setModal(true);}} className="px-4 py-2 rounded-xl btn-primary text-white text-sm font-bold flex items-center gap-1.5">+ Manuel Ekle</button>
        </div>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div className="card rounded-2xl p-4">
          <p className="text-xs text-slate-500 mb-1">Toplam Giriş</p>
          <p className="text-2xl font-black text-emerald2">{totalIn}</p>
        </div>
        <div className="card rounded-2xl p-4">
          <p className="text-xs text-slate-500 mb-1">Toplam Çıkış</p>
          <p className="text-2xl font-black text-rose2">{totalOut}</p>
        </div>
        <div className="card rounded-2xl p-4">
          <p className="text-xs text-slate-500 mb-1">Kayıt</p>
          <p className="text-2xl font-black text-white">{filtered.length}</p>
        </div>
      </div>

      <div className="card rounded-2xl p-4">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div className="relative">
            <Input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Ürün, hastane veya not ara..."/>
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 text-xs">?</span>
          </div>
          <Select value={fType} onChange={e=>setFType(e.target.value)}>
            <option value="">Tüm hareketler</option>
            <option value="in">Stok Girişi</option>
            <option value="out">Stok Çıkışı</option>
          </Select>
          <Select value={fHospital} onChange={e=>setFHospital(e.target.value)}>
            <option value="">Tüm hastaneler</option>
            {visibleHospitals.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
          </Select>
        </div>
      </div>

      <div className="card rounded-2xl overflow-hidden">
        {filtered.length===0?(
          <div className="py-12 text-center text-slate-500 text-sm">Hareket bulunamadı</div>
        ):filtered.map(h=>{
          const urun=urunler.find(u=>u.id===h.urun_id);
          const hosp=hospitals.find(x=>x.id===h.hospital_id);
          const tag=getMovTag(h.notes);
          const meta=tag?MOV_META[tag]:null;
          const isIn=h.type==="in";
          const d=new Date(h.created_at);
          const cleanNote=tag?h.notes.replace(tag,"").trim():h.notes;
          return(
            <div key={h.id} className="table-row px-5 py-3 flex items-center gap-3 border-b border-white/5 last:border-b-0">
              <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 ${meta?"":isIn?"bg-emerald2/15 text-emerald2":"bg-rose2/15 text-rose2"}`}
                style={meta?{background:meta.bg,color:meta.color}:null}>
                {meta?meta.icon:(isIn?"v":"^")}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                  <span className="text-sm font-semibold text-white truncate">{urun?.name||"Ürün bulunamadı"}</span>
                  <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${meta?"":isIn?"bg-emerald2/15 text-emerald2":"bg-rose2/15 text-rose2"}`}
                    style={meta?{background:meta.bg,color:meta.color}:null}>
                    {meta?meta.label:(isIn?"Giriş":"Çıkış")}
                  </span>
                </div>
                <div className="text-xs text-slate-500 truncate">{displayLocationName(hosp)||"Hastane bulunamadı"}{cleanNote?` - ${cleanNote}`:""}</div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className={`text-sm font-bold ${meta?"":isIn?"text-emerald2":"text-rose2"}`} style={meta?{color:meta.color}:null}>
                  {isIn?"+":"-"}{h.quantity}<span className="text-xs font-normal text-slate-500 ml-1">{urun?.unit}</span>
                </div>
                <div className="text-xs text-slate-600">{d.toLocaleDateString("tr-TR")} {d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
// ─── INVOICE / CONSUMPTION VIEW ───────────────────────────────────────────────
function FaturalarView({surgeries,urunler,stoklar,hospitals,personel=[],loadAll}){
  const toast=useToast();
  const [records,setRecords]=useState([]);
  const [modal,setModal]=useState(false);
  const emptyInvoiceForm={surgery_id:"",patient_name:"",side:"",personnel:[],items:[{urun_id:"",lot:"",quantity:1}]};
  const [f,setF]=useState(emptyInvoiceForm);

  const load=async()=>{
    const {data}=await SB.from("hareketler").select("*").order("created_at",{ascending:false}).limit(500);
    const defaultHospitalId=findCompanyShelf(hospitals)?.id||"company-shelf-local";
    setRecords((data||[]).map(h=>normalizeMovement(h,defaultHospitalId)).filter(h=>h.notes?.includes("[FATURA]")||h.surgery_id));
  };
  useEffect(()=>{load();},[]);

  const selectedSurgery=surgeries.find(s=>s.id===f.surgery_id);
  const selectedHospitalId=selectedSurgery?(hospitals.find(h=>h.name===selectedSurgery.hospital)?.id||findCompanyShelf(hospitals)?.id||"company-shelf-local"):"";
  const team=selectedSurgery?getSurgeryPersonnel(selectedSurgery):[];
  useEffect(()=>{
    setF(prev=>{
      if(!prev.surgery_id)return prev;
      const surgery=surgeries.find(s=>s.id===prev.surgery_id);
      const surgeryTeam=surgery?getSurgeryPersonnel(surgery):[];
      if(!surgeryTeam.length||prev.personnel.length)return prev;
      return {...prev,personnel:surgeryTeam};
    });
  },[f.surgery_id,surgeries]);
  const updateItem=(idx,patch)=>setF(prev=>({...prev,items:prev.items.map((it,i)=>i===idx?{...it,...patch}:it)}));
  const addItem=()=>setF(prev=>({...prev,items:[...prev.items,{urun_id:"",lot:"",quantity:1}]}));
  const removeItem=idx=>setF(prev=>({...prev,items:prev.items.filter((_,i)=>i!==idx)}));
  const toggleInvoicePersonnel=name=>setF(prev=>({
    ...prev,
    personnel:prev.personnel.includes(name)?prev.personnel.filter(x=>x!==name):[...prev.personnel,name]
  }));

  const saveInvoice=async()=>{
    if(!selectedSurgery)return toast("Ameliyat seçin","warning");
    if(!f.patient_name.trim())return toast("Hasta adı gerekli","warning");
    if(!f.side)return toast("Ameliyat tarafı seçin","warning");
    const invoiceTeam=f.personnel.length?f.personnel:team;
    const validItems=f.items.filter(i=>i.urun_id&&Number(i.quantity)>0);
    if(!validItems.length)return toast("En az bir ürün ekleyin","warning");
    for(const item of validItems){
      const stok=findStockRow(stoklar,item.urun_id,selectedHospitalId,item.lot);
      const qty=Number(item.quantity)||1;
      const urun=urunler.find(u=>u.id===item.urun_id);
      if(!stok||stok.quantity<qty)return toast(`Stok yetersiz: ${urun?.code||"REF"} / ${item.lot||"LOT yok"}`,"error");
    }
    for(const item of validItems){
      const stok=findStockRow(stoklar,item.urun_id,selectedHospitalId,item.lot);
      const qty=Number(item.quantity)||1;
      await updateStockQuantity(stok,stok.quantity-qty);
      const note=`[FATURA] Hasta: ${f.patient_name} — Taraf: ${f.side} — Ameliyat: ${selectedSurgery.type} — Doktor: ${selectedSurgery.doctor} — Personel: ${invoiceTeam.join(", ")||"Personel seçilmemiş"}`;
      const {error}=await insertMovement(movementPayload({urun_id:item.urun_id,hospital_id:selectedHospitalId,lot:item.lot||"",type:"out",quantity:qty,notes:note,surgery_id:selectedSurgery.id}));
      if(error)return toast(error.message,"error");
    }
    await SB.from("surgeries").update({status:"done"}).eq("id",selectedSurgery.id);
    toast("Fatura / tüketim kaydı oluşturuldu ✓","success");
    setModal(false);
    setF(emptyInvoiceForm);
    loadAll();load();
  };

  const recordRows=records.map(r=>({h:r,urun:urunler.find(u=>u.id===r.urun_id)||{},surgery:surgeries.find(s=>s.id===r.surgery_id)||{},hospital:hospitals.find(h=>h.id===r.hospital_id)||{}}));

  return(
    <div className="space-y-5">
      {modal&&(
        <Modal title="Fatura / Tüketim Çıkışı" onClose={()=>setModal(false)} size="lg"
          footer={<div className="flex gap-2"><button onClick={()=>setModal(false)} className="flex-1 py-2.5 rounded-xl bg-navy-800 text-slate-300 text-sm border border-white/8">İptal</button><button onClick={saveInvoice} className="flex-1 py-2.5 rounded-xl btn-primary text-white text-sm font-bold">Çıkış Yap</button></div>}>
          <div className="space-y-4">
            <div><Label required>Ameliyat</Label><Select value={f.surgery_id} onChange={e=>setF(p=>({...p,surgery_id:e.target.value,personnel:[]}))}><option value="">Ameliyat seçin</option>{surgeries.map(s=><option key={s.id} value={s.id}>{fmtTR(s.date)} — {s.type} — {s.hospital} — {s.doctor}</option>)}</Select></div>
            {selectedSurgery&&<div className="grid grid-cols-1 md:grid-cols-3 gap-2">
              <div className="card rounded-xl p-3"><div className="text-xs text-slate-500">Doktor</div><div className="text-sm font-bold text-white">{selectedSurgery.doctor}</div></div>
              <div className="card rounded-xl p-3"><div className="text-xs text-slate-500">Hastane</div><div className="text-sm font-bold text-white">{selectedSurgery.hospital}</div></div>
              <div className="card rounded-xl p-3"><div className="text-xs text-slate-500">Personel</div><div className="text-sm font-bold text-white truncate">{(f.personnel.length?f.personnel:team).join(", ")||"Personel yok"}</div></div>
            </div>}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div><Label required>Hasta Adı</Label><Input value={f.patient_name} onChange={e=>setF(p=>({...p,patient_name:e.target.value}))}/></div>
              <div><Label required>Ameliyat Tarafı</Label><Select value={f.side} onChange={e=>setF(p=>({...p,side:e.target.value}))}><option value="">Seçin</option><option>Sağ</option><option>Sol</option><option>Bilateral</option><option>Taraf yok</option></Select></div>
            </div>
            <div>
              <Label>Ameliyata Katılan Personel</Label>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-44 overflow-y-auto rounded-xl border border-white/8 bg-navy-900/40 p-2">
                {personel.length===0?(

                      <span className="min-w-0 flex-1">

                    <Select value={item.lot} onChange={e=>updateItem(idx,{lot:e.target.value})}><option value="">LOT seçin</option>{lotRows.map(s=><option key={s.id||s.lot} value={s.lot||""}>{s.lot||"LOT yok"} ({s.quantity})</option>)}</Select>
                    <Input type="number" min="1" value={item.quantity} onChange={e=>updateItem(idx,{quantity:e.target.value})}/>

                  </div>
                );

      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <div><h1 className="text-xl font-bold text-white">Fatura / Tüketim</h1><p className="text-sm text-slate-500 mt-0.5">Ameliyat bazlı REF + LOT ürün çıkışı ve ekip sorumluluğu</p></div>
        <button onClick={()=>setModal(true)} className="sm:ml-auto px-4 py-2 rounded-xl btn-primary text-white text-sm font-bold">+ Çıkış Yap</button>
      </div>
      <div className="card rounded-2xl overflow-hidden">
        <div className="hidden lg:grid grid-cols-[1fr_1fr_1.2fr_1fr_1fr_1fr_.7fr] px-5 py-3 border-b border-white/8 bg-navy-900/50">{["REF","LOT","Ameliyat / Hasta","Doktor","Hastane","Personel","Adet"].map(h=><div key={h} className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</div>)}</div>
        {recordRows.length===0?<div className="px-5 py-12 text-center text-slate-500 text-sm">Fatura / tüketim kaydı bulunamadı</div>:recordRows.map(({h,urun,surgery,hospital})=>{
            const invoiceTeam=h.notes?.match(/(?:Personel|Ekip):\s*([^—]+)/)?.[1]?.trim()||getSurgeryPersonnel(surgery).join(", ")||"Personel yok";
            return(
              <div key={h.id} className="table-row px-5 py-4 lg:grid lg:grid-cols-[1fr_1fr_1.2fr_1fr_1fr_1fr_.7fr] gap-4">
                <div className="font-mono text-sm font-bold text-white">{urun.code||"REF yok"}</div>
                <div className="font-mono text-sm text-brand-300">{h.lot||"LOT yok"}</div>
                <div className="text-sm text-slate-300">{surgery.type||"—"}<div className="text-xs text-slate-500">{h.notes?.match(/Hasta:\s*([^—]+)/)?.[1]?.trim()||"Hasta yok"}</div></div>
                <div className="text-sm text-slate-400">{surgery.doctor||"—"}</div>
                <div className="text-sm text-slate-400">{displayLocationName(hospital)||surgery.hospital||"—"}</div>
                <div className="text-sm text-slate-400 truncate">{invoiceTeam}</div>
                <div className="text-sm font-black text-rose2">{h.quantity}</div>
              </div>
            );
        })}
      </div>
    </div>
  );
}

// ─── LIST GROUP ───────────────────────────────────────────────────────────────
function ListGroup({title,items,isDoc,onAdd,onEdit,onDel,color}){
  const [adding,setAdding]=useState(false);
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const toast=useToast();

  const save=async(name)=>{
    const n=isDoc?autoDoc(name):name;
    if(!n.trim())return;
    await onAdd(n);setAdding(false);
  };

  const update=async(id)=>{
    if(!editVal.trim())return;
    const n=isDoc?autoDoc(editVal):editVal;
    await onEdit(id,n);setEditId(null);
  };

  return(
    <div className="card rounded-2xl overflow-hidden">
      <div className="px-5 py-4 border-b border-white/8 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full" style={{background:color}}></div>
          <span className="font-bold text-sm text-white">{title}</span>
          <span className="text-xs text-slate-500 bg-navy-800 px-2 py-0.5 rounded-full">{items.length}</span>
        </div>
        <button onClick={()=>setAdding(true)} className="w-7 h-7 rounded-lg btn-primary text-white text-sm font-bold flex items-center justify-center">+</button>
      </div>
      <div className="divide-y divide-white/5 max-h-72 overflow-y-auto">
        {adding&&(
          <div className="px-4 py-3">
            <InlineAdd onSave={save} onCancel={()=>setAdding(false)} placeholder={`${title} ekle`} isDoc={isDoc}/>
          </div>
        )}
        {items.map(item=>(
          <div key={item.id||item.name} className="table-row px-4 py-2.5 flex items-center gap-3">
            {editId===item.id?(
              <div className="flex-1 flex gap-2">
                <Input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")update(item.id);if(e.key==="Escape")setEditId(null);}} className="flex-1 py-1.5 text-sm" autoFocus/>
                <button onClick={()=>update(item.id)} className="px-2.5 py-1.5 rounded-lg btn-primary text-white text-xs font-bold">✓</button>
                <button onClick={()=>setEditId(null)} className="px-2.5 py-1.5 rounded-lg bg-navy-700 text-slate-400 text-xs">✕</button>
              </div>
            ):(
              <>
                <span className="flex-1 text-sm text-slate-200">{item.name}</span>
                <button onClick={()=>{setEditId(item.id);setEditVal(item.name);}} className="w-6 h-6 rounded-lg hover:bg-brand/20 text-slate-600 hover:text-brand-300 flex items-center justify-center text-xs transition-colors">✎</button>
                <button onClick={()=>onDel(item.id)} className="w-6 h-6 rounded-lg hover:bg-rose2/20 text-slate-600 hover:text-rose2 flex items-center justify-center text-xs transition-colors">⊗</button>
              </>
            )}
          </div>
        ))}
        {items.length===0&&!adding&&<div className="px-4 py-6 text-sm text-slate-600 text-center">Kayıt yok</div>}
      </div>
    </div>
  );
}

// ─── LISTS VIEW ───────────────────────────────────────────────────────────────
function ListsView({types,doctors,hospitals,onRefresh}){
  const toast=useToast();

    add:async(name)=>{const{error}=await SB.from(table).insert({name});if(error)toast(error.message,"error");else{toast("Eklendi","success");onRefresh();}},
    edit:async(id,name)=>{const{error}=await SB.from(table).update({name}).eq("id",id);if(error)toast(error.message,"error");else{toast("Güncellendi","success");onRefresh();}},
    del:async(id)=>{const{error}=await SB.from(table).delete().eq("id",id);if(error)toast(error.message,"error");else{toast("Silindi","success");onRefresh();}},
  });
  const tc=crud("surgery_types"),dc=crud("doctors"),hc=crud("hospitals");
  return(
    <div className="space-y-4">
      <h1 className="text-xl font-bold text-white">Liste Yönetimi</h1>
