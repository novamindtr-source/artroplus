<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTROPLUS</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="app" class="min-h-screen bg-gray-900 flex items-center justify-center p-4">
    <!-- GİRİŞ EKRANI -->
    <div id="loginBox" class="w-full max-w-md bg-gray-800 rounded-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold text-white text-center">ARTROPLUS</h1>
        <p class="text-gray-400 text-center mb-6">Medikal Yönetim Sistemi</p>
        
        <div id="errorMsg" class="hidden bg-red-500/20 text-red-300 p-3 rounded-xl mb-4 text-sm"></div>
        
        <input type="email" id="email" placeholder="E-posta" 
            class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-3 focus:outline-none focus:border-blue-500">
        
        <input type="password" id="password" placeholder="Şifre" 
            class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white mb-4 focus:outline-none focus:border-blue-500">
        
        <button id="loginBtn" class="w-full p-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition">
            Giriş Yap
        </button>
    </div>

    <!-- ANA SAYFA (Gizli) -->
    <div id="dashboardBox" class="hidden w-full max-w-4xl">
        <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-white">ARTROPLUS</h1>
                <button id="logoutBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl text-white font-bold">Çıkış</button>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-gray-700 rounded-xl p-6 text-center">
                    <p class="text-gray-400 text-sm">Toplam</p>
                    <p class="text-3xl font-bold text-blue-400" id="totalCount">0</p>
                </div>
                <div class="bg-gray-700 rounded-xl p-6 text-center">
                    <p class="text-gray-400 text-sm">Bugün</p>
                    <p class="text-3xl font-bold text-green-400" id="todayCount">0</p>
                </div>
                <div class="bg-gray-700 rounded-xl p-6 text-center">
                    <p class="text-gray-400 text-sm">Durum</p>
                    <p class="text-3xl font-bold text-yellow-400">✅</p>
                </div>
            </div>
            <p class="text-gray-500 text-center mt-6 text-sm">Hoş geldiniz! Sistem çalışıyor.</p>
        </div>
    </div>
</div>

<script>
// ============================================================
// SUPABASE BAĞLANTI
// ============================================================
const SB_URL = "https://gvzkldgueygixbypyfsp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emtsZGd1ZXlnaXhieXB5ZnNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjczOTEsImV4cCI6MjA5NDk0MzM5MX0.jqBfY-3mp3-jhsQjENmfv7kntL8dvr4gcPt3-GPK-SQ";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ============================================================
// DOM ELEMENTLERİ
// ============================================================
const loginBox = document.getElementById('loginBox');
const dashboardBox = document.getElementById('dashboardBox');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const errorMsg = document.getElementById('errorMsg');

// ============================================================
// FONKSİYONLAR
// ============================================================
function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove('hidden');
    setTimeout(() => errorMsg.classList.add('hidden'), 4000);
}

async function doLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!email || !password) {
        showError('E-posta ve şifre girin.');
        return;
    }
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'Giriş yapılıyor...';
    
    const { error } = await sb.auth.signInWithPassword({ email, password });
    
    loginBtn.disabled = false;
    loginBtn.textContent = 'Giriş Yap';
    
    if (error) {
        showError(error.message);
        return;
    }
    
    // Giriş başarılı
    loginBox.classList.add('hidden');
    dashboardBox.classList.remove('hidden');
    
    // Verileri yükle
    loadStats();
}

async function loadStats() {
    try {
        const { count } = await sb.from('surgeries').select('*', { count: 'exact', head: true });
        document.getElementById('totalCount').textContent = count || 0;
        
        const today = new Date().toISOString().split('T')[0];
        const { count: todayCount } = await sb.from('surgeries')
            .select('*', { count: 'exact', head: true })
            .eq('date', today);
        document.getElementById('todayCount').textContent = todayCount || 0;
    } catch(e) {
        console.error('Veri yükleme hatası:', e);
    }
}

async function doLogout() {
    await sb.auth.signOut();
    dashboardBox.classList.add('hidden');
    loginBox.classList.remove('hidden');
    emailInput.value = '';
    passwordInput.value = '';
}

// ============================================================
// OLAY DİNLEYİCİLER
// ============================================================
loginBtn.addEventListener('click', doLogin);
logoutBtn.addEventListener('click', doLogout);

passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
});

emailInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
});

// ============================================================
// SAYFA AÇILINCA OTOMATİK KONTROL
// ============================================================
(async function init() {
    const { data } = await sb.auth.getSession();
    if (data.session) {
        loginBox.classList.add('hidden');
        dashboardBox.classList.remove('hidden');
        loadStats();
    }
})();
</script>

</body>
</html>
