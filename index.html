<div class="app">

<script>
(()=>{const KEY="artroplus_enterprise_v2";const C=["#1769e0","#0f9f6e","#d98b05","#7256d9","#0794b8","#d94452"];let page="dashboard",query="",mode="all",locFilter="",searchTimer=null,calDate=new Date(),assignDate="";
const uid=()=>Math.random().toString(36).slice(2,9);const today=()=>new Date().toISOString().slice(0,10);assignDate=today();

function migrate(){db.hospitals=db.hospitals||[{id:"ana",name:"Ana Depo",type:"depot",color:C[0]}];if(!db.hospitals.some(x=>x.id=="ana"))db.hospitals.unshift({id:"ana",name:"Ana Depo",type:"depot",color:C[0]});db.doctors=db.doctors||[...new Set((db.surgeries||[]).map(x=>x.doctor).filter(Boolean))];db.surgeryTypes=db.surgeryTypes||[...new Set((db.surgeries||[]).map(x=>x.type).filter(Boolean))];db.personnel=db.personnel||[...new Set((db.surgeries||[]).map(x=>x.personnel).filter(Boolean))];db.stock=db.stock||[];db.moves=db.moves||[];db.products=db.products||[];db.surgeries=db.surgeries||[];db.users=db.users||[{id:uid(),fullName:"Mehmet Yönetici",email:"admin@artroplus.local",password:"1234",role:"Yönetici",status:"Aktif",phone:"",personnel:true}];db.users.forEach(u=>{u.password=u.password||"1234";u.status=u.status||"Aktif"});const knownProducts=[["AR-8500EX","FiberTak SpeedBridge","Arthrex",2,"00888867043817"],["AR-9835","ApolloRF H50 Aspirating Ablator","Arthrex",2,"00888867320253"],["ASH4250-01","Super TurboVac 90 IFS","Smith & Nephew",3,"00817470006506"],["72205324","Fast-Fix Flex Curved Inserter","Smith & Nephew",5,"00885556772737"],["25-1800","Q-FIX Suture Anchor","Smith & Nephew",4,"00885556724600"],["Infinity Retro-Reamer","Infinity Retro-Reamer 8 mm","Conmed",2,"30845854083509"],["800612200","GripLoc PEEK Suture Anchor","Rejoin",2,""]];knownProducts.forEach(k=>{let pr=db.products.find(x=>x.ref===k[0]);if(pr){pr.name=pr.name||k[1];pr.brand=pr.brand||k[2];pr.min=pr.min||k[3];pr.gtin=pr.gtin||k[4]}else db.products.push({id:uid(),ref:k[0],name:k[1],brand:k[2],unit:"adet",min:k[3],gtin:k[4]||""})})}
const p=id=>db.products.find(x=>x.id===id)||{};const h=id=>db.hospitals.find(x=>x.id===id)||{name:"Lokasyon yok",color:"#64748b"};const txt=v=>String(v||"").toLocaleLowerCase("tr-TR");const toast=m=>{let t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400)};

function cal(){let y=calDate.getFullYear(),m=calDate.getMonth(),start=(new Date(y,m,1).getDay()+6)%7,days=new Date(y,m+1,0).getDate(),month=new Date(y,m,1).toLocaleDateString("tr-TR",{month:"long",year:"numeric"}),html=`<div class="cal-head"><div class="cal-title">${month}</div><div class="row-actions"><button class="btn soft" data-cal="-1">Önceki Ay</button><button class="btn soft" data-cal="0">Bugün</button><button class="btn soft" data-cal="1">Sonraki Ay</button><button class="btn primary" data-action="surgery">Ameliyat Ekle</button></div></div><div class="calendar">`;for(let i=0;i<start;i++)html+=`<div class="day"></div>`;for(let d=1;d<=days;d++){let date=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,ev=db.surgeries.filter(s=>s.date==date).sort((a,b)=>a.time.localeCompare(b.time));html+=`<div class="day"><div class="dn">${d}</div>${ev.map(e=>`<div class="event"><b>${e.time} ${e.doctor}</b>${e.hospital} / ${e.type}${e.personnel?`<br>Personel: ${e.personnel}`:""}</div>`).join("")}<button class="btn soft" style="margin-top:8px;padding:6px 8px;font-size:11px" data-action="surgery" data-date="${date}">+ Ekle</button></div>`}return html+`</div>`+surgeryTable()}
function modal(t,b,f){let m=document.getElementById("modal");m.innerHTML=`<div class="modal"><div class="mh"><h2>${t}</h2><button class="x" id="x">×</button></div><div class="mb">${b}</div><div class="mf">${f}</div></div>`;m.classList.add("open");document.getElementById("x").onclick=close}function close(){document.getElementById("modal").classList.remove("open")}const val=id=>document.getElementById(id)?.value||"";const optsP=()=>db.products.map(p=>`<option value="${p.id}">${p.ref} - ${p.brand}</option>`).join("");const optsH=(ana=true)=>db.hospitals.filter(h=>ana||h.id!="ana").map(h=>`<option value="${h.id}">${h.name}</option>`).join("");
function productModal(productId=null){let existing=db.products.find(x=>x.id==productId),isEdit=!!existing;modal(isEdit?"Ürün Kartı Düzenle":"Manuel Ürün Ekle",`<div class="form"><label><span class="label">REF</span><input class="field" id="pRef" value="${existing?.ref||""}"></label><label><span class="label">GTIN</span><input class="field" id="pGtin" value="${existing?.gtin||""}" placeholder="Varsa 01 alanı"></label><label><span class="label">Marka</span><input class="field" id="pBrand" value="${existing?.brand||""}"></label><label class="full"><span class="label">Ürün Adı</span><input class="field" id="pName" value="${existing?.name||""}"></label>${isEdit?"":`<label><span class="label">LOT</span><input class="field" id="pLot"></label><label><span class="label">Ana Depo Adedi</span><input class="field" id="pQty" type="number" value="1"></label><label><span class="label">SKT</span><input class="field" id="pExp" type="date"></label>`}<label><span class="label">Minimum Stok</span><input class="field" id="pMin" type="number" value="${existing?.min||0}"></label></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveP">Kaydet</button>`);document.getElementById("cancel").onclick=close;document.getElementById("saveP").onclick=()=>{if(isEdit){existing.ref=val("pRef").toUpperCase();existing.gtin=normDigits(val("pGtin"));existing.brand=val("pBrand")||"Marka yok";existing.name=val("pName")||existing.ref;existing.min=+val("pMin")||0;if(!existing.ref)return toast("REF zorunlu");toast("Ürün kartı güncellendi")}else{let pr={id:uid(),ref:val("pRef").toUpperCase(),gtin:normDigits(val("pGtin")),brand:val("pBrand")||"Marka yok",name:val("pName")||val("pRef"),unit:"adet",min:+val("pMin")||0};if(!pr.ref)return toast("REF zorunlu");db.products.push(pr);let qty=+val("pQty")||0;if(qty>0){db.stock.push(st(pr.id,"ana",val("pLot").toUpperCase(),qty,val("pExp")));db.moves.push({id:uid(),date:new Date().toISOString(),type:"receipt",productId:pr.id,locationId:" function stockModal(stockId){let s=db.stock.find(x=>x.id==stockId);if(!s)return;let pr=p(s.productId),ho=h(s.locationId);modal("Stok Satırı Düzenle",`<div class="form"><label><span class="label">REF</span><input class="field" value="${pr.ref}" disabled></label><label><span class="label">Lokasyon</span><input class="field" value="${ho.name}" disabled></label><label><span class="label">LOT</span><input class="field" id="eLot" value="${s.lot||""}"></label><label><span class="label">Adet</span><input class="field" id="eQty" type="number" min="0" value="${s.qty}"></label><label><span class="label">SKT</span><input class="field" id="eExp" type="date" value="${s.exp||""}"></label></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveStock">Kaydet</button>`);document.getElementById("cancel").onclick=close;document.getElementById("saveStock").onclick=()=>{let old=s.qty,oldLot=s.lot,oldExp=s.exp,nextQty=Math.max(0,+val("eQty")||0),nextLot=val("eLot").toUpperCase().trim(),nextExp=val("eExp");if(!nextLot)return toast("LOT zorunlu");if(old==nextQty&&oldLot==nextLot&&oldExp==nextExp)return toast("Değişiklik yok");s.lot=nextLot;s.qty=nextQty;s.exp=nextExp;let diff=Math.abs(s.qty-old);if(diff>0)db.moves.push({id:uid(),date:new Date().toISOString(),type:s.qty>=old?"receipt":"out",productId:s.productId,locationId:s.locationId,lot:s.lot,qty:diff,note:"Stok düzeltme"});db.stock=db.stock.filter(x=>x.qty>0);save();close();toast("Stok satırı güncellendi");render()}}

function moveModal(def="receipt"){modal("Ürün Hareket İşlemi",`<div class="form"><label><span class="label">İşlem</span><select class="field" id="mType"><option value="receipt">Ana Depoya Stok Giriş</option><option value="consign">Ana Depo → Hastane / Konsinye</option><option value="return">Hastane → Ana Depo / Geri Alım</option><option value="out">Stok Çıkış</option></select></label><label><span class="label">REF / Kod Ara</span><input class="field" id="mSearch" placeholder="Örn: AR-6430, 6430, Zimmer"></label><label><span class="label">Ürün</span><select class="field" id="mProduct">${optsP()}</select></label><label><span class="label">LOT</span><input class="field" id="mLot" list="mLots"></label><label><span class="label">Adet</span><input class="field" id="mQty" type="number" value="1"></label><label><span class="label" id="mLocLabel">Lokasyon</span><select class="field" id="mLoc">${optsH(true)}</select></label><label><span class="label">SKT</span><input class="field" id="mExp" type="date"></label><label class="full"><span class="label">Not</span><input class="field" id="mNote"></label><datalist id="mLots"></datalist></div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveM">Kaydet</button>`);document.getElementById("mType").value=def;wireMoveForm();document.getElementById("cancel").onclick=close;document.getElementById("saveM").onclick=saveMove}

function locationOptionsFor(type,pid="",lot=""){let list=type=="return"?db.hospitals.filter(x=>x.type=="hospital"):db.hospitals;if(type=="receipt")list=db.hospitals.filter(x=>x.id=="ana");return list.map(x=>{let q=pid?db.stock.filter(s=>s.productId==pid&&s.locationId==x.id&&(!lot||s.lot==lot)).reduce((a,s)=>a+s.qty,0):0;return`<option value="${x.id}">${x.name}${pid?` (${q})`:""}</option>`}).join("")}

function row(pid,loc,lot){return db.stock.find(s=>s.productId==pid&&s.locationId==loc&&s.lot==lot)}function addStock(pid,loc,lot,qty,exp){let r=row(pid,loc,lot);if(r)r.qty+=qty;else db.stock.push(st(pid,loc,lot,qty,exp))}
function saveMove(){let type=val("mType"),pid=val("mProduct"),lot=val("mLot").toUpperCase().trim(),qty=+val("mQty"),loc=val("mLoc"),sourceLoc=loc,note=val("mNote");if(!pid)return toast("Ürün seçin");if(!lot)return toast("LOT girin veya listeden seçin");if(!Number.isFinite(qty)||qty<=0)return toast("Adet 0'dan büyük olmalı");if(type=="receipt"){addStock(pid,"ana",lot,qty,val("mExp"));loc="ana";note=note||"Ana depo stok giriş"}if(type=="consign"){if(loc=="ana")return toast("Hedef hastane seçin");let r=row(pid,"ana",lot);if(!r||r.qty<qty)return toast(`Ana Depo yeterli değil. Raf adedi: ${r?r.qty:0}`);r.qty-=qty;addStock(pid,loc,lot,qty,r.exp);note=note||`Ana Depo → ${h(loc).name} konsinye sevk`}if(type=="return"){if(loc=="ana")return toast("Kaynak hastane seçin");let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast(`${h(loc).name} stokunda yeterli adet yok`);r.qty-=qty;addStock(pid,"ana",lot,qty,r.exp);loc="ana";note=note||`${h(sourceLoc).name} → Ana Depo geri alım`}if(type=="out"){let r=row(pid,loc,lot);if(!r||r.qty<qty)return toast("Seçili lokasyonda yeterli stok yok");r.qty-=qty;note=note||"Stok çıkış"}db.moves.push({id:uid(),date:new Date().toISOString(),type,productId:pid,locationId:loc,sourceLocationId:sourceLoc,lot,qty,note});db.stock=db.stock.filter(s=>s.qty>0);save();close();toast("Hareket kaydedildi");render()}
function normDigits(v){return String(v||"").replace(/\D/g,"")}
function scanMatches(b){let gt=normDigits(b.gtin),ref=txt(b.ref||""),exact=null;if(gt)exact=db.products.find(x=>normDigits(x.gtin)==gt);if(!exact&&ref)exact=db.products.find(x=>txt(x.ref)==ref);if(exact)return{exact,candidates:[exact]};let candidates=[];if(ref&&ref.length>=3)candidates=db.products.filter(x=>txt(x.ref).includes(ref)||txt(x.name).includes(ref));if(!candidates.length&&gt)candidates=db.products.filter(x=>normDigits(x.gtin)==gt);return{exact:null,candidates}}
function productByScan(b){let m=scanMatches(b);return m.exact||m.candidates.length==1?m.candidates[0]:null}

ceholder="Lot numarası"></label><label><span class="label">Ana Depo / Raf Adedi</span><input class="field" id="rQty" type="number" min="1" value="1"></label><label><span class="label">SKT</span><input class="field" id="rExp" type="date"></label><label><span class="label">Seri No</span><input class="field" id="rSerial" placeholder="Varsa"></label><label><span class="label">Lokasyon</span><input class="field" value="Ana Depo / Raf" disabled></label><label class="full"><span class="label">Not</span><input class="field" id="rNote" placeholder="İsteğe bağlı açıklama"></label></div></section></div><div class="phs" style="margin-top:12px">Bu ekran sadece Ana Depo/Raf stok girişidir. Ana depoda stok oluşmadan konsinye sevk veya çıkış yapılamaz.</div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveReceipt">Ana Depoya Kaydet</button>`);document.querySelector("#modal .modal").classList.add("wide");document.getElementById("cancel").onclick=close;wireReceiptHub()}
function fillReceiptFromProduct(pr){if(!pr)return;document.getElementById("rRef").value=pr.ref||"";document.getElementById("rGtin").value=pr.gtin||"";document.getElementById("rBrand").value=pr.brand||"";document.getElementById("rName").value=pr.name||""}

function applyScanToReceipt(raw){let b=parseB(raw),matches=scanMatches(b),pr=productByScan(b),product=document.getElementById("rProduct"),search=document.getElementById("rSearch");if(b.ref||b.gtin){search.value=b.ref||b.gtin;product.innerHTML=matches.candidates.length?matches.candidates.map(p=>`<option value="${p.id}">${p.ref} - ${p.brand} - ${p.name}</option>`).join(""):productOptions(search.value)}if(matches.candidates.length>1&&!matches.exact)toast("Birden fazla ürün eşleşti, listeden doğru REF seçin");if(pr){product.value=pr.id;fillReceiptFromProduct(pr);b.ref=pr.ref||b.ref}else{product.value="";document.getElementById("rRef").value=b.ref||val("rRef");document.getElementById("rGtin").value=b.gtin||val("rGtin");if(b.gtin&&!b.ref)toast("GTIN bulundu; REF için ürün kartı eşleşmedi, kullanıcı onayı gerekli")}document.getElementById("rLot").value=b.lot||val("rLot");document.getElementById("rQty").value=b.qty||1;document.getElementById("rExp").value=b.exp||val("rExp");document.getElementById("rSerial").value=b.serial||val("rSerial");document.getElementById("receiptBarcodeResult").innerHTML=scanSummary(b,!!pr);if(!b.lot||!b.exp)toast("Barkod LOT/SKT içermiyor")}

function saveReceiptFromHub(){let pid=val("rProduct"),ref=val("rRef").toUpperCase().trim(),gtin=normDigits(val("rGtin")),lot=val("rLot").toUpperCase().trim(),qty=+val("rQty")||0;if(!pid){if(!ref)return toast("REF zorunlu; GTIN REF yerine yazılamaz");let existing=db.products.find(x=>txt(x.ref)==txt(ref)||normDigits(x.gtin)==gtin&&gtin);if(existing)pid=existing.id;else{let pr={id:uid(),ref,gtin,brand:val("rBrand")||"Marka yok",name:val("rName")||ref,unit:"adet",min:0};db.products.push(pr);pid=pr.id}}else{let pr=db.products.find(x=>x.id==pid);if(pr&&gtin&&!pr.gtin)pr.gtin=gtin}if(!lot)return toast("LOT zorunlu");if(qty<1)return toast("Adet en az 1 olmalı");addStock(pid,"ana",lot,qty,val("rExp"));let serial=val("rSerial"),note=val("rNote")||"Ana depo stok girişi";if(gtin)note+=` / GTIN: ${gtin}`;if(serial)note+=` / SN: ${serial}`;db.moves.push({id:uid(),date:new Date().toISOString(),type:"receipt",productId:pid,locationId:"ana",lot,qty,note});save();close();toast("Stok Ana Depo/Raf'a eklendi");render()}

function parseGs1(t){let out={},raw=String(t||"").trim().replace(/[\x1d\n\r\t]/g," ");[...raw.matchAll(/\((\d{2,4})\)\s*([^\(]+)/g)].forEach(m=>{let ai=m[1],v=m[2].trim();if(["01","17","11","30"].includes(ai))v=normDigits(v);if(ai=="01")out.gtin=v.slice(0,14);if(ai=="17")out.exp=v.slice(0,6);if(ai=="11")out.mfg=v.slice(0,6);if(ai=="10")out.lot=v.replace(/\s+/g,"").slice(0,30);if(ai=="21")out.serial=v.replace(/\s+/g,"").slice(0,30);if(ai=="240")out.ref=v.replace(/\s+/g,"").slice(0,30);if(ai=="30")out.qty=+v||1});if(Object.keys(out).length)return out;let s=raw.replace(/\s+/g,""),ais=["01","17","11","10","21","30","240"],readAi=ai=>{let i=s.indexOf(ai);if(i<0)return"";let start=i+ai.length,stop=s.length;ais.filter(x=>x!=ai).forEach(x=>{let j=s.indexOf(x,start);if(j>start&&j<stop)stop=j});return s.slice(start,stop)};out.gtin=readAi("01").slice(0,14);out.exp=readAi("17").slice(0,6);out.mfg=readAi("11").slice(0,6);out.lot=readAi("10").slice(0,30);out.serial=readAi("21").slice(0,30);out.ref=readAi("240").slice(0,30);out.qty=+(readAi("30")||0)||1;return out}
function gs1Date(v){if(!/^\d{6}$/.test(v))return v||"";let yy=+v.slice(0,2),mm=+v.slice(2,4),dd=+v.slice(4,6),year=2000+yy;if(mm<1||mm>12)return"";let max=new Date(year,mm,0).getDate();if(dd===0)dd=max;if(dd<1||dd>max)return"";return`${year}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`}
function parseB(raw){let t=String(raw||"").trim(),plain=t.replace(/[\x1d\n\r\t]/g," "),g=parseGs1(t),ref=(plain.match(/(?:REF|REF NO|KOD|ÜRÜN KODU|URUN KODU|P\/N|PN)[:\s]*([A-Z0-9-]+)/i)||[])[1]||g.ref||"",lot=(plain.match(/(?:LOT|LOT NO|BATCH)[:\s]*([A-Z0-9-]+)/i)||[])[1]||g.lot||"",qty=+(plain.match(/(?:QTY|ADET|MIKTAR|MİKTAR)[:\s]*(\d+)/i)||[])[1]||g.qty||1,exp=(plain.match(/(?:SKT|EXP|EXPIRY|SON KULLANMA)[:\s]*(\d{6}|\d{4}-\d{2}-\d{2})/i)||[])[1]||g.exp||"",serial=(plain.match(/(?:SN|SERIAL|SERİ|SERI)[:\s]*([A-Z0-9-]+)/i)||[])[1]||g.serial||"";exp=gs1Date(exp);return{ref,gtin:g.gtin,lot:String(lot||""),qty,exp,serial,mfg:gs1Date(g.mfg||"")}}
let usbBuffer="",lastUsb="",lastUsbAt=0,usbTimer=null;
function processUsbScan(raw){let code=String(raw||usbBuffer||"").trim();if(!code)return;let now=Date.now();if(code===lastUsb&&now-lastUsbAt<1500){usbBuffer="";return}lastUsb=code;lastUsbAt=now;usbBuffer="";let ta=document.getElementById("receiptBarcode");if(ta)ta.value=code;applyScanToReceipt(code)}
function initUsbScanner(){window.addEventListener("keydown",e=>{let ta=document.getElementById("receiptBarcode");if(!ta||!document.getElementById("modal").classList.contains("open"))return;let tag=(document.activeElement?.tagName||"").toUpperCase();if(tag&&["INPUT","SELECT"].includes(tag))return;if(e.key==="Enter"){e.preventDefault();processUsbScan(document.activeElement===ta?ta.value:usbBuffer);return}if(e.key.length===1){usbBuffer+=e.key;clearTimeout(usbTimer);usbTimer=setTimeout(()=>usbBuffer="",700)}})}
async function decodeImageBarcode(){let file=document.getElementById("barcodeFile")?.files?.[0];if(!file)return toast("Fotoğraf seçin");if(!("BarcodeDetector" in window))return toast("Bu tarayıcı fotoğraftan barkod okumayı desteklemiyor");try{let detector=new BarcodeDetector({formats:["code_128","qr_code","data_matrix"]}),bitmap=await createImageBitmap(file),codes=await detector.detect(bitmap);if(!codes.length)return toast("Fotoğrafta barkod bulunamadı");processUsbScan(codes[0].rawValue)}catch(e){toast("Fotoğraftan barkod okunamadı")}}
function surgeryModal(date=today(),id=null){let ex=db.surgeries.find(x=>x.id==id),isEdit=!!ex;modal(isEdit?"Ameliyat Düzenle":"Ameliyat Ekle",`<div class="form"><label><span class="label">Tarih</span><input class="field" id="sDate" type="date" value="${ex?.date||date}"></label><label><span class="label">Saat</span><input class="field" id="sTime" type="time" value="${ex?.time||"08:00"}"></label><label><span class="label">Doktor</span><select class="field" id="sDoc"><option value="">Doktor seçin</option>${optList(db.doctors,ex?.doctor)}</select></label><label><span class="label">Hastane</span><select class="field" id="sHosp"><option value="">Hastane seçin</option>${optsH(false)}</select></label><label><span class="label">Ameliyat Türü</span><select class="field" id="sType"><option value="">Tür seçin</option>${optList(db.surgeryTypes,ex?.type)}</select></label><label><span class="label">Personel</span><select class="field" id="sPer"><option value="">Personel seçin</option>${optList(db.personnel,ex?.personnel)}</select></label><label class="full"><span class="label">Not / Açıklama</span><input class="field" id="sNote" value="${ex?.note||""}" placeholder="Set, özel durum, teslim notu"></label></div><div class="phs" style="margin-top:12px">Liste boşsa Ayarlar > Tanımlar ekranından doktor, hastane, ameliyat türü ve personel ekleyin.</div>`,`<button class="btn" id="cancel">İptal</button><button class="btn primary" id="saveS">${isEdit?"Güncelle":"Kaydet"}</button>`);if(ex){let hosp=db.hospitals.find(x=>x.name==ex.hospital);if(hosp)document.getElementById("sHosp").value=hosp.id}document.getElementById("cancel").onclick=close;document.getElementById("saveS").onclick=()=>{if(!val("sDoc")||!val("sHosp")||!val("sType"))return toast("Doktor, hastane ve ameliyat türü seçin");let rec=isEdit?ex:{id:uid()};Object.assign(rec,{date:val("sDate"),time:val("sTime"),doctor:val("sDoc"),hospital:h(val("sHosp")).name,type:val("sType"),personnel:val("sPer")||"",note:val("sNote")});if(!isEdit)db.surgeries.push(rec);save();close();toast(isEdit?"Ameliyat güncellendi":"Ameliyat eklendi");render()}}

function go(pg){page=pg;document.getElementById("side").classList.remove("open");render()}function bind(){document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>go(b.dataset.page));document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>go(b.dataset.goto));document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>document.getElementById("g-"+b.dataset.toggle).classList.toggle("open"));document.querySelectorAll(".local").forEach(i=>i.oninput=e=>scheduleSearch(e.target.value));document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});document.querySelectorAll("[data-export]").forEach(b=>b.onclick=()=>{let x=b.dataset.export;if(x=="moves")exportMoves();else if(x=="surgeries")exportSurgeries();else if(x=="products")exportProducts();else exportStock()});document.querySelectorAll("[data-template]").forEach(b=>b.onclick=()=>exportTemplate(b.dataset.template));document.querySelectorAll("[data-print]").forEach(b=>b.onclick=()=>window.print());document.querySelectorAll("[data-def]").forEach(b=>b.onclick=()=>defModal(b.dataset.def));document.querySelectorAll("[data-edit-def]").forEach(b=>b.onclick=()=>defModal(b.dataset.editDef,+b.dataset.index));document.querySelectorAll("[data-del-def]").forEach(b=>b.onclick=()=>deleteDef(b.dataset.delDef,+b.dataset.index));document.querySelectorAll("[data-product-edit]").forEach(b=>b.onclick=()=>productModal(b.dataset.productEdit));document.querySelectorAll("[data-product-del]").forEach(b=>b.onclick=()=>deleteProduct(b.dataset.productDel));document.querySelectorAll("[data-stock-edit]").forEach(b=>b.onclick=()=>stockModal(b.dataset.stockEdit));document.querySelectorAll("[data-stock-del]").forEach(b=>b.onclick=()=>deleteStock(b.dataset.stockDel));document.querySelectorAll("[data-user-add]").forEach(b=>b.onclick=()=>userModal());document.querySelectorAll("[data-user-edit]").forEach(b=>b.onclick=()=>userModal(b.dataset.userEdit));document.querySelectorAll("[data-user-del]").
