// ── 1. MADDE: GS1-128 / DATAMATRIX BARKOD PARSER FONKSİYONU ──
function parseGS1(rawBarcode) {
  const result = {
    gtin: "",
    ref: "",
    lot: "—",
    expiryDate: "—",
    mfgDate: "—",
    qty: 1,
    raw: rawBarcode || ""
  };
  if (!rawBarcode) return result;

  let cleanStr = rawBarcode.trim();
  const matches = [];
  // Parantezli AI yapılarını yakala: (01)00888867026728(10)15485965
  cleanStr.replace(/\((\d{2,4})\)\s*([^\(]+)/g, (_, ai, val) => {
    matches.push([ai, val.trim()]);
    return "";
  });

  const processAI = (ai, val) => {
    switch (ai) {
      case "01": // GTIN / UDI
        result.gtin = val;
        // Medikal standartlarda GTIN'in ön sıfırları ayıklandığında Katalog/REF koduna erişilir
        result.ref = val.replace(/^0+/, "") || val;
        break;
      case "10": // LOT Numarası
        result.lot = val;
        break;
      case "17": // Son Kullanma Tarihi (YYMMDD)
        if (val.length === 6) {
          result.expiryDate = `20${val.slice(0, 2)}-${val.slice(2, 4)}-${val.slice(4, 6)}`;
        }
        break;
      case "11": // Üretim Tarihi (YYMMDD)
        if (val.length === 6) {
          result.mfgDate = `20${val.slice(0, 2)}-${val.slice(2, 4)}-${val.slice(4, 6)}`;
        }
        break;
      case "30":
        result.qty = parseInt(val, 10) || 1;
        break;
    }
  };

  if (matches.length > 0) {
    matches.forEach(([ai, val]) => processAI(ai, val));
  } else {
    // Parantezsiz düz akış kontrolü
    if (cleanStr.startsWith("01") && cleanStr.length >= 16) {
      processAI("01", cleanStr.slice(2, 16));
      let remainder = cleanStr.slice(16);
      if (remainder.startsWith("17") && remainder.length >= 8) {
        processAI("17", remainder.slice(2, 8));
        remainder = remainder.slice(8);
      }
      if (remainder.startsWith("10")) {
        processAI("10", remainder.slice(2));
      }
    } else {
      // Düz metin girildiyse fallback olarak REF ata
      result.ref = cleanStr;
    }
  }
  return result;
}
