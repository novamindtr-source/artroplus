const relTime = ts => { const diff=Date.now()-new Date(ts).getTime(); if(diff<60000)return"Az önce"; if(diff<3600000)return`${Math.floor(diff/60000)} dk önce`; if(diff<86400000)return`${Math.floor(diff/3600000)} sa önce`; return`${Math.floor(diff/86400000)} gün önce`; };
const tColor  = (types,type) => { const i=types.findIndex(t=>t.name===type); return TYPE_COLORS[i<0?0:i%TYPE_COLORS.length]; };
const inits   = n => (n||"?").split(" ").filter(Boolean).map(w=>w[0]).slice(0,2).join("").toUpperCase();

  const saveEdit=()=>{if(!editVal.trim())return;onEdit(editId,isDoctor?autoDoc(editVal.trim()):editVal.trim());setEditId(null);};
  return(
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"20px 22px"}}>

                <button onClick={()=>onRemove(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 6px",display:"flex"}} title="Sil"><Ico d="M6 18L18 6M6 6l12 12" size={13} color="#ef4444" sw={2.5}/></button>
              </div>
            )}

        ))}
      </div>
      <div style={{marginTop:10,fontSize:11,color:MUTED}}>{items.length} kayıt</div>

}


function SearchableSelect({items,value,onChange,placeholder,disabled}){

        <span style={{flex:1,fontSize:14,color:selected?TEXT:MUTED,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected?selected.name:placeholder}</span>
        <svg width="14" height="14" fill="none" stroke={MUTED} strokeWidth="2" viewBox="0 0 24 24" style={{transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .15s",flexShrink:0}}><path d="M6 9l6 6 6-6"/></svg>
      </div>
      {open&&!disabled&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:CARD,border:`1px solid ${BORDER}`,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:50,maxHeight:220,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"8px 10px",borderBottom:`1px solid ${BORDER}`}}>
            <input autoFocus style={{...inp,padding:"6px 10px",fontSize:13}} placeholder="Ara..." value={q} onChange={e=>setQ(e.target.value)} onClick={e=>e.stopPropagation()}/>
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            <div style={{padding:"6px 10px",fontSize:13,color:MUTED,cursor:"pointer"}} onClick={()=>{onChange("");setOpen(false);setQ("");}}>— Seçiniz —</div>
            {filtered.length===0?<div style={{padding:"10px",fontSize:13,color:MUTED,textAlign:"center"}}>Sonuç yok</div>
            :filtered.map(i=>(
              <div key={i.id} onClick={()=>{onChange(i.name);setOpen(false);setQ("");}} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",background:value===i.name?ACCENT_LT:"transparent",color:value===i.name?ACCENT:TEXT,fontWeight:value===i.name?600:400}}>
                {i.name}

          </div>
        </div>
      )}

function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [authTab,setAuthTab]=useState("login");
  const [authErr,setAuthErr]=useState("");
  const [authMsg,setAuthMsg]=useState("");
  const [showForgot,setShowForgot]=useState(false);
  const [forgotEmail,setForgotEmail]=useState("");
  const [forgotMsg,setForgotMsg]=useState("");
  const [loginF,setLoginF]=useState({email:"",password:""});
  const [regF,setRegF]=useState({name:"",email:"",password:""});
  const [loading,setLoading]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [surgeries,setSurgeries]=useState([]);
  const [types,setTypes]=useState([]);
  const [doctors,setDoctors]=useState([]);
  const [hospitals,setHospitals]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [editS,setEditS]=useState(null);
  const [surgForm,setSurgForm]=useState({date:"",time:"09:00",type:"",hospital:"",doctor:"",status:"planned",notes:"",adet:1});
  const [viewS,setViewS]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [fType,setFType]=useState("");
  const [fStatus,setFStatus]=useState("");
  const [searchQ,setSearchQ]=useState("");
  const [calMonth,setCalMonth]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [selDay,setSelDay]=useState(null);
  const [inlineAdd,setInlineAdd]=useState(null);
  const [toasts,setToasts]=useState([]);
  const [users,setUsers]=useState([]);
  const [newUser,setNewUser]=useState({name:"",email:"",password:""});
  const [userMsg,setUserMsg]=useState("");
  const [userErr,setUserErr]=useState("");
  const [statFilter,setStatFilter]=useState('all');
  const [selectedType,setSelectedType]=useState(null);

  const unread=notifs.filter(n=>!n.read).length;

  const prevNotifsRef = React.useRef([]);
  const loadNotifs=useCallback(async uid=>{
    if(!uid)return;
    try{
      const [{data:all},{data:reads}]=await Promise.all([
        sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(100),
        sb.from("notification_reads").select("notification_id").eq("user_id",uid),
      ]);
      const rs=new Set((reads||[]).map(r=>r.notification_id));
      const merged=(all||[]).map(n=>({...n,read:rs.has(n.id)}));
      // Show toast for new notifications from other users
      const prev=prevNotifsRef.current;
      if(prev.length>0){
        merged.filter(n=>!n.read&&!prev.find(p=>p.id===n.id)).forEach(n=>{
          setToasts(p=>[...p,{id:n.id+"_toast",message:n.message,type:n.type}]);
          setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==n.id+"_toast")),4000);
        });
      }
      prevNotifsRef.current=merged;
      setNotifs(merged);
    }catch{}
  },[]);

  const loadAll=useCallback(async uid=>{
    setLoading(true);
    try{
      const [{data:surgs},{data:typs},{data:docs},{data:hosps}]=await Promise.all([
        sb.from("surgeries").select("*").order("date").order("time"),
        sb.from("surgery_types").select("*").order("name"),
        sb.from("doctors").select("*").order("name"),
        sb.from("hospitals").select("*").order("name"),
      ]);
      setSurgeries(surgs||[]);setTypes(typs||[]);setDoctors(docs||[]);setHospitals(hosps||[]);
      await loadNotifs(uid);
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[loadNotifs]);

  const afterLogin=useCallback(async sess=>{
    setSession(sess);
    const uid=sess.user.id;
    try{
      const{data:p}=await sb.from("profiles").select("*").eq("id",uid).single();
      if(p?.status==="disabled"){await sb.auth.signOut();setSession(null);setAuthErr("Hesabınız devre dışı bırakılmıştır. Yönetici ile iletişime geçin.");return;}
      setProfile(p||{id:uid,name:sess.user.email,role:"user"});
    }
    catch{setProfile({id:uid,name:sess.user.email,role:"user"});}
    await loadAll(uid);
  },[loadAll]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session)afterLogin(session);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{if(session)afterLogin(session);});
    return()=>subscription.unsubscribe();
  },[afterLogin]);

  useEffect(()=>{
    if(!session)return;
    const iv=setInterval(()=>loadNotifs(session.user.id),30000);
    return()=>clearInterval(iv);
  },[session,loadNotifs]);

  useEffect(()=>{
    if(page==="users"&&profile?.role==="admin") loadUsers();
  },[page,profile,loadUsers]);

  const handleForgot=async()=>{
    setForgotMsg("");
    if(!forgotEmail){setForgotMsg("E-posta adresinizi girin.");return;}
    const{error}=await sb.auth.resetPasswordForEmail(forgotEmail,{redirectTo:"https://artropluspanel.com"});
    if(error){setForgotMsg("Hata: "+error.message);}
    else{setForgotMsg("Şifre sıfırlama linki e-postanıza gönderildi.");}
  };
  const handleLogin=async()=>{
    setAuthErr("");setAuthMsg("");
    const{error}=await sb.auth.signInWithPassword({email:loginF.email,password:loginF.password});
    if(error)setAuthErr("E-posta veya şifre hatalı.");
  };
  const handleRegister=async()=>{
    setAuthErr("");setAuthMsg("");
    if(!regF.name||!regF.email||!regF.password){setAuthErr("Tüm alanları doldurun.");return;}
    const{data,error}=await sb.auth.signUp({email:regF.email,password:regF.password,options:{data:{name:regF.name}}});
    if(error){setAuthErr(error.message);return;}
    if(!data.session){setAuthMsg("E-postanıza onay linki gönderildi. Onaylayıp giriş yapın.");setAuthTab("login");}
  };
  const handleLogout=async()=>{
    await sb.auth.signOut();
    setSession(null);setProfile(null);setSurgeries([]);setTypes([]);setDoctors([]);setHospitals([]);setNotifs([]);
  };

  const pushNotif=async(message,type)=>{
    await sb.from("notifications").insert({message,type});
    await loadNotifs(session?.user?.id);
    showToast(message,type);
    await sendTelegram(message);
  };

  const loadUsers=useCallback(async()=>{
    try{const{data}=await sb.from("profiles").select("*").order("created_at",{ascending:false});setUsers(data||[]);}
    catch(e){console.error(e);}
  },[]);

  const createUser=async()=>{
    setUserErr("");setUserMsg("");
    if(!newUser.name||!newUser.email||!newUser.password){setUserErr("Tüm alanları doldurun.");return;}
    if(newUser.password.length<6){setUserErr("Şifre en az 6 karakter olmalı.");return;}
    const{data,error}=await sb.auth.signUp({email:newUser.email,password:newUser.password,options:{data:{name:newUser.name}}});
    if(error){setUserErr(error.message);return;}
    setUserMsg(`${newUser.name} kullanıcısı oluşturuldu. E-posta onayı gönderildi.`);
    setNewUser({name:"",email:"",password:""});
    setTimeout(()=>loadUsers(),1000);
  };

  const deleteUser=async(uid,name)=>{
    if(!window.confirm(`"${name}" kullanıcısını silmek istiyor musunuz?`)) return;
    try{
      await sb.from("profiles").update({status:"disabled"}).eq("id",uid);
      setUsers(p=>p.map(u=>u.id===uid?{...u,status:"disabled"}:u));
      setUserMsg(`${name} kullanıcısı devre dışı bırakıldı.`);
    }catch(e){setUserErr("Hata: "+e.message);}
  };
  const enableUser=async(uid,name)=>{
    try{
      await sb.from("profiles").update({status:"active"}).eq("id",uid);
      setUsers(p=>p.map(u=>u.id===uid?{...u,status:"active"}:u));
      setUserMsg(`${name} kullanıcısı tekrar aktif edildi.`);
    }catch(e){setUserErr("Hata: "+e.message);}
  };
  const showToast=(message,type="info")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  };
  const buildMsg=(old,form,doc,tim)=>{
    const changes=[];
    const sl={planned:"Planlandı",in_progress:"Devam Ediyor",completed:"Tamamlandı",cancelled:"İptal Edildi"};
    if(old.status!==form.status)changes.push(`durum "${sl[form.status]}" olarak değişti`);
    if(old.date!==form.date)changes.push(`tarih ${fmtTR(form.date)} olarak değişti`);
    if(old.time!==tim)changes.push(`saat ${tim==="Bilinmiyor"?"bilinmiyor":tim} olarak değişti`);
    if(old.doctor!==doc)changes.push(`doktor ${doc==="Bilinmiyor"?"bilinmiyor":doc} olarak değişti`);
    if(old.hospital!==form.hospital)changes.push(`hastane ${form.hospital} olarak değişti`);
    if(changes.length===0)return`${form.type} ameliyatı güncellendi.`;
    return`${form.type} ameliyatı: ${changes.join("; ")}.`;
  };

  const saveSurg=async()=>{
    if(!surgForm.date||!surgForm.type||!surgForm.hospital)return;
    const doc=surgForm.doctor||"Bilinmiyor";
    const tim=surgForm.time||"Bilinmiyor";
    if(editS){
      await sb.from("surgeries").update({...surgForm,doctor:doc,time:tim,updated_at:new Date().toISOString()}).eq("id",editS.id);
      await pushNotif(buildMsg(editS,surgForm,doc,tim),surgForm.status==="cancelled"?"warning":surgForm.status==="completed"?"success":"info");
    }else{
      await sb.from("surgeries").insert({...surgForm,doctor:doc,time:tim,created_by:session?.user?.id});
      await pushNotif(`Yeni ameliyat eklendi: ${surgForm.type} — ${fmtTR(surgForm.date)} saat ${tim} · ${surgForm.hospital}.`,"new");
    }
    setShowModal(false);setInlineAdd(null);
    await loadAll(session?.user?.id);
  };

  const delSurg=async id=>{
    const s=surgeries.find(x=>x.id===id);

      </nav>

      {viewS&&(
        <div className="modal-wrap" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setViewS(null)}>
          <div className="modal-box" style={{background:CARD,borderRadius:16,width:"100%",maxWidth:500,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:`${tColor(types,viewS.type)}12`,padding:"20px 24px",borderBottom:`1px solid ${BORDER}`}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
                <div><TypeDot types={types} type={viewS.type}/><div style={{fontWeight:800,fontSize:20,marginTop:6}}>{viewS.type}</div></div>
                <button style={{...bBtn("ghost"),padding:"6px",borderRadius:8,flexShrink:0}} onClick={()=>setViewS(null)}><Ico d="M6 18L18 6M6 6l12 12" color={MUTED}/></button>
              </div>
            </div>
            <div style={{padding:"20px 24px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                {[["Tarih",fmtTR(viewS.date),false],["Saat",viewS.time||"—",viewS.time==="Bilinmiyor"],["Hastane",viewS.hospital,false],["Doktor",viewS.doctor||"—",viewS.doctor==="Bilinmiyor"],["Adet",(viewS.adet||1)+" adet",false]].map(([l,v,unk])=>(
                  <div key={l}><div style={{fontSize:11,color:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{l}</div><div style={{fontSize:14,fontWeight:600,color:unk?MUTED:TEXT,fontStyle:unk?"italic":"normal"}}>{v}</div></div>
                ))}
              </div>
              <div style={{marginBottom:14}}><div style={{fontSize:11,color:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Durum</div><Badge status={viewS.status}/></div>
              {viewS.notes&&<div style={{background:BG,borderRadius:8,padding:"10px 12px",marginBottom:14}}><div style={{fontSize:11,color:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Notlar</div><div style={{fontSize:13,lineHeight:1.6}}>{viewS.notes}</div></div>}
              <div style={{display:"flex",gap:10,paddingTop:14,borderTop:`1px solid ${BORDER}`}}>
                <button style={{...bBtn("primary"),fontSize:13,flex:1,justifyContent:"center"}} onClick={()=>openEdit(viewS)}>Düzenle</button>
                <button style={{...bBtn("danger"),fontSize:13}} onClick={()=>setConfirmDel(viewS)}>Sil</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showModal&&(
        <div className="modal-wrap" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setShowModal(false)}>
          <div className="modal-box" style={{background:CARD,borderRadius:16,width:"100%",maxWidth:540,maxHeight:"96vh",overflow:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"18px 24px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:CARD,zIndex:1}}>
              <div style={{fontWeight:700,fontSize:16}}>{editS?"Ameliyat Düzenle":"Yeni Ameliyat Ekle"}</div>
              <button style={{...bBtn("ghost"),padding:"6px",borderRadius:8}} onClick={()=>setShowModal(false)}><Ico d="M6 18L18 6M6 6l12 12" color={MUTED}/></button>
            </div>
            <div style={{padding:"20px 24px"}}>
              <div className="form-half" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

                <div><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Tarih *</label><input style={inp} type="date" value={surgForm.date} onChange={e=>setSurgForm(p=>({...p,date:e.target.value}))}/></div>
                <div>
                  <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Saat</label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <input style={{...inp,flex:1,opacity:surgForm.time==="Bilinmiyor"?0.35:1}} type="time" value={surgForm.time==="Bilinmiyor"?"":surgForm.time} disabled={surgForm.time==="Bilinmiyor"} onChange={e=>setSurgForm(p=>({...p,time:e.target.value}))}/>
                    <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:MUTED,cursor:"pointer",whiteSpace:"nowrap",userSelect:"none"}}><input type="checkbox" checked={surgForm.time==="Bilinmiyor"} onChange={e=>setSurgForm(p=>({...p,time:e.target.checked?"Bilinmiyor":"09:00"}))} style={{accentColor:ACCENT}}/> ?</label>
                  </div>
                </div>

                <div style={{gridColumn:"1/-1"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                    <label style={{fontSize:12,fontWeight:700}}>Ameliyat Türü *</label>
                    <button style={{fontSize:11,color:ACCENT,background:"none",border:"none",cursor:"pointer",fontWeight:600}} onClick={()=>setInlineAdd(inlineAdd==="type"?null:"type")}>+ Yeni ekle</button>
                  </div>
                  <select style={inp} value={surgForm.type} onChange={e=>setSurgForm(p=>({...p,type:e.target.value}))}>
                    <option value="">Tür seçin...</option>
                    {types.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
                  </select>
                  {inlineAdd==="type"&&<InlineAdd onSave={v=>handleInlineSave("type",v)} onCancel={()=>setInlineAdd(null)} placeholder="Yeni tür..." isDoctor={false}/>}
                </div>

                <div style={{gridColumn:"1/-1"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                    <label style={{fontSize:12,fontWeight:700}}>Hastane *</label>
                    <button style={{fontSize:11,color:ACCENT,background:"none",border:"none",cursor:"pointer",fontWeight:600}} onClick={()=>setInlineAdd(inlineAdd==="hospital"?null:"hospital")}>+ Yeni ekle</button>
                  </div>
                  <select style={inp} value={surgForm.hospital} onChange={e=>setSurgForm(p=>({...p,hospital:e.target.value}))}>
                    <option value="">Hastane seçin...</option>
                    {hospitals.map(h=><option key={h.id} value={h.name}>{h.name}</option>)}
                  </select>
                  {inlineAdd==="hospital"&&<InlineAdd onSave={v=>handleInlineSave("hospital",v)} onCancel={()=>setInlineAdd(null)} placeholder="Hastane adı..." isDoctor={false}/>}
                </div>

                <div style={{gridColumn:"1/-1"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                    <label style={{fontSize:12,fontWeight:700}}>Doktor</label>
                    <button style={{fontSize:11,color:ACCENT,background:"none",border:"none",cursor:"pointer",fontWeight:600}} onClick={()=>setInlineAdd(inlineAdd==="doctor"?null:"doctor")}>+ Yeni ekle</button>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <select style={{...inp,flex:1,opacity:surgForm.doctor==="Bilinmiyor"?0.35:1}} value={surgForm.doctor==="Bilinmiyor"?"":surgForm.doctor} disabled={surgForm.doctor==="Bilinmiyor"} onChange={e=>setSurgForm(p=>({...p,doctor:e.target.value}))}>
                      <option value="">Doktor seçin...</option>
                      {doctors.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
                    </select>
                    <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:MUTED,cursor:"pointer",whiteSpace:"nowrap",userSelect:"none"}}><input type="checkbox" checked={surgForm.doctor==="Bilinmiyor"} onChange={e=>setSurgForm(p=>({...p,doctor:e.target.checked?"Bilinmiyor":""}))} style={{accentColor:ACCENT}}/> Bilinmiyor</label>
                  </div>
                  {inlineAdd==="doctor"&&<InlineAdd onSave={v=>handleInlineSave("doctor",v)} onCancel={()=>setInlineAdd(null)} placeholder="Ad Soyad (Dr. otomatik eklenir)" isDoctor={true}/>}
                </div>

                <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Durum</label><select style={inp} value={surgForm.status} onChange={e=>setSurgForm(p=>({...p,status:e.target.value}))}>{Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
                <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Adet</label><input style={inp} type="number" min="1" max="99" value={surgForm.adet||1} onChange={e=>setSurgForm(p=>({...p,adet:parseInt(e.target.value)||1}))}/></div>
                <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Notlar</label><textarea style={{...inp,minHeight:72,resize:"vertical"}} placeholder="Ek bilgi..." value={surgForm.notes} onChange={e=>setSurgForm(p=>({...p,notes:e.target.value}))}/></div>
              </div>
              {(!surgForm.date||!surgForm.type||!surgForm.hospital)&&<div style={{fontSize:12,color:MUTED,marginTop:8}}>* Tarih, tür ve hastane zorunludur.</div>}
              <div style={{display:"flex",gap:10,marginTop:16,paddingTop:14,borderTop:`1px solid ${BORDER}`}}>
                <button style={{...bBtn("primary"),fontSize:14,flex:1,justifyContent:"center"}} onClick={saveSurg}>{editS?"Kaydet":"Ameliyat Ekle"}</button>
                <button style={{...bBtn("secondary"),fontSize:14}} onClick={()=>setShowModal(false)}>İptal</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <ToastContainer toasts={toasts} onRemove={id=>setToasts(p=>p.filter(t=>t.id!==id))}/>
      {confirmDel&&(
        <ConfirmModal
          message={`"${confirmDel.type}" ameliyatı (${fmtTR(confirmDel.date)}) kalıcı olarak silinecek. Bu işlem geri alınamaz.`}
          onConfirm={()=>delSurg(confirmDel.id)}
          onCancel={()=>setConfirmDel(null)}
        />
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
