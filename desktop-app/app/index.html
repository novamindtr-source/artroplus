async function cloudPullNow(){if(!window.ArtroplusSync?.pullSnapshot)return toast("Bulut istemcisi hazır değil");if(!yes("Buluttaki veriler bu bilgisayardaki verilerin üzerine yazılacak. Emin misiniz?"))return;toast("Buluttan getiriliyor...");let ok=await window.ArtroplusSync.pullSnapshot();if(ok){db=safeJson(localStorage.getItem(KEY),null)||db;migrate();toast("Veriler buluttan alındı");render()}else toast("Buluttan veri alınamadı: "+(window.ArtroplusSync.status?.error||"bilinmeyen hata"))}
function mapCloudProfile(p){if(!p)return null;return{id:p.id,fullName:p.full_name||p.email||"Kullanıcı",email:p.email||"",role:p.role||"Sadece Görüntüleme",status:p.status||"Pasif",phone:p.phone||"",personnel:!!p.is_personnel,cloud:true}}
async function loadCloudProfile(){if(!cloudEnabled())return null;let p=await window.ArtroplusCloud.currentProfile();cloudProfile=mapCloudProfile(p);return cloudProfile}
function currentUser(){if(cloudProfile)return cloudProfile.status!="Pasif"?cloudProfile:null;let email=sessionStorage.getItem(SESSION);return db.users.find(u=>txt(u.email)==txt(email)&&u.status!="Pasif")}function roleKey(v){return txt(v).normalize("NFD").replace(/[\u0300-\u036f]/g,"")}function isAdmin(){let u=currentUser(),r=roleKey(u?.role);return !!u&&(r=="yonetici"||r=="admin"||r.includes("yonetici"))}function canOpen(pg){return isAdmin()||!["users","analytics"].includes(pg)}
function paintUser(){let u=currentUser(),n=document.getElementById("userName"),r=document.getElementById("userRole"),a=document.getElementById("userAvatar");if(n)n.textContent=u?.fullName||"ARTROPLUS";if(r)r.textContent=u?`${u.role} erişimi`:"Oturum yok";if(a)a.textContent=(u?.fullName||"A").trim().charAt(0).toUpperCase()}
async function logout(){if(!yes("Oturum kapatılsın mı?"))return;try{if(cloudEnabled())await window.ArtroplusCloud.signOut()}catch(e){console.warn(e)}cloudProfile=null;sessionStorage.removeItem(SESSION);location.reload()}
function cloudAuthMessage(e){let msg=txt(e?.message||e);if(/invalid login credentials|email not confirmed|invalid credentials/i.test(msg))return "E-posta veya şifre hatalı.";if(/failed to fetch|network|load failed/i.test(msg))return "Supabase bağlantısı kurulamadı. İnternet bağlantısını ve proje ayarlarını kontrol edin.";if(/permission denied|row-level security|rls/i.test(msg))return "Bu işlem için Supabase yetkiniz yok. Yönetici rolünü veya RLS politikasını kontrol edin.";if(/jwt|session/i.test(msg))return "Oturum doğrulanamadı. Lütfen tekrar giriş yapın.";return "Giriş yapılamadı: "+(msg||"Bilinmeyen hata")}function loginScreen(){document.body.insertAdjacentHTML("beforeend",`<div class="login-lock" id="loginLock"><div class="login-card"><img class="login-logo" src="${document.querySelector(".brand-logo")?.src||""}" alt="ARTRO+ Medikal"><div class="kicker">Yetkili Eri\u015fim</div><h1>ARTROPLUS Medikal</h1><p>Firma \u00e7al\u0131\u015fanlar\u0131 i\u00e7in g\u00fcvenli operasyon paneli. L\u00fctfen size tan\u0131mlanan hesapla giri\u015f yap\u0131n.</p><div class="login-secure">Oturum bilgileri ki\u015fiye \u00f6zeldir</div><label for="loginEmail"><span class="label">E-posta</span><input class="field" id="loginEmail" type="email" autocomplete="username" placeholder="ad@firma.com"></label><label for="loginPassword"><span class="label">\u015eifre</span><input class="field" id="loginPassword" type="password" autocomplete="current-password" placeholder="\u015eifrenizi girin"></label><button class="btn primary" id="loginBtn" style="width:100%;margin-top:14px" aria-label="Oturum a\u00e7">Oturum A\u00e7</button><div class="mini-note">Eri\u015fim yetkisi i\u00e7in sistem y\u00f6neticisi kullan\u0131c\u0131 olu\u015fturmal\u0131d\u0131r.</div></div></div>`);enhanceAccessibility();let submit=async()=>{let email=val("loginEmail").trim(),pass=val("loginPassword");let account=db.users.find(x=>txt(x.email)==txt(email));if(account){if(account.status=="Pasif")return toast("Bu kullanıcı pasif durumda");let ok=await checkPassword(account,pass);if(!ok)return toast("Şifre hatalı");if(account.password&&!account.passwordHash){await setPassword(account,pass);save()}sessionStorage.setItem(SESSION,account.email);document.getElementById("loginLock").remove();render();if(cloudEnabled())window.ArtroplusCloud.signIn(email,pass).catch(e=>console.warn("Bulut oturumu açılamadı (senkron çalışmayabilir):",e));return}if(cloudConfigEnabled()&&!window.ArtroplusCloud)return toast("Supabase istemci dosyası yüklenemedi. src/supabase-data-client.js yolunu kontrol edin.");if(cloudEnabled()){try{await window.ArtroplusCloud.signIn(email,pass);let profile=await loadCloudProfile();if(!profile){await window.ArtroplusCloud.signOut();cloudProfile=null;return toast("Profil kaydı bulunamadı. Supabase profiles tablosunda kullanıcı rolünü kontrol edin.")}if(profile.status=="Pasif"){await window.ArtroplusCloud.signOut();cloudProfile=null;return toast("Bu kullanıcı pasif durumda")}sessionStorage.setItem(SESSION,profile.email||email);document.getElementById("loginLock").remove();render();return}catch(e){console.error(e);return toast(cloudAuthMessage(e))}}return toast("Bu e-posta uygulama kullanıcı listesinde yok. Kullanıcılar bölümünden eklenmeli.")};document.getElementById("loginBtn").onclick=submit;document.getElementById("loginPassword").onkeydown=e=>{if(e.key==="Enter")submit()}}
document.getElementById("q").oninput=e=>scheduleSearch(e.target.value);document.getElementById("notifBtn").onclick=notificationModal;document.getElementById("menu").onclick=()=>document.getElementById("side").classList.add("open");{let modalBg=document.getElementById("modal"),mouseDownOnBg=false;modalBg.addEventListener("mousedown",e=>{mouseDownOnBg=e.target.id=="modal"});modalBg.addEventListener("click",e=>{if(e.target.id=="modal"&&mouseDownOnBg)close();mouseDownOnBg=false})}initUsbScanner();initBackspaceGuard();(async()=>{let looksEmpty=db.users.length<=1&&!db.products.length&&!db.stock.length&&!db.moves.length;if(window.ArtroplusSync?.status?.enabled&&looksEmpty){let pulled=await window.ArtroplusSync.pullSnapshot();if(pulled){db=safeJson(localStorage.getItem(KEY),null)||db;migrate()}}if(cloudEnabled()){try{let profile=await loadCloudProfile();if(profile&&profile.status!="Pasif"){await migrateSecurity();render();return}}catch(e){console.warn(e)}}await migrateSecurity();currentUser()?render():loginScreen()})();
})();
</script>
